<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tilt</title>
<!-- Arcade Night faces, vendored (offline-first, no-build) — see fonts/ -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">
  <div class="meta">
    <span class="chip">LEVEL <b id="lvlN">1</b></span>
    <button id="reset" class="iconbtn" aria-label="Restart level"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg></button>
  </div>

  <div class="timer">
    <div class="tlab">TIME</div>
    <div class="tval"><span id="timeV">0.0</span><span class="unit">s</span></div>
    <div class="tbest" id="bestLab"></div>
  </div>

  <div id="stage">
    <div class="trayframe"><canvas id="tray"></canvas></div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<div id="ov"><div class="card" id="card"></div></div>
<div class="toast" id="toast"></div>

<script src="js/vendor/web-game-core.js"></script>
<script src="js/engine.js"></script>
<script src="js/physics.js"></script>
<script src="js/tutorial-script.js"></script>
<script src="js/game.js"></script>
</body>
</html>
