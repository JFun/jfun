<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rattle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">tap same-colour groups · tap empty space to rattle</div>
  <button id="gear" aria-label="Settings"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><g fill="#c9b8dc"><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(45 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(90 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(135 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(180 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(225 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(270 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(315 12 12)"></rect></g><circle cx="12" cy="12" r="6" stroke="#c9b8dc" stroke-width="2.6"></circle></svg></button>

  <!-- ══ HOME ══ (canvas pile renders behind; this overlay is transparent) -->
  <div id="home" class="screen">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
    <button id="homeGear" class="scircle" aria-label="Settings"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><g fill="#c9b8dc"><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(45 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(90 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(135 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(180 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(225 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(270 12 12)"></rect><rect x="10.6" y="1.6" width="2.8" height="4.6" rx="1.4" transform="rotate(315 12 12)"></rect></g><circle cx="12" cy="12" r="6" stroke="#c9b8dc" stroke-width="2.6"></circle></svg></button>
    <div class="home-title">
      <div class="wordmark"><span>R</span><span>A</span><span>T</span><span>T</span><span>L</span><span>E</span></div>
      <div class="tagline"><span>POP</span><i class="td coral"></i><span>TUMBLE</span><i class="td sky"></i><span>CLEAR</span></div>
    </div>
    <div class="home-cta">
      <button class="primary playbtn" id="playBtn">PLAY&nbsp;&nbsp;▸</button>
      <div class="home-sub" id="homeSub">LEVEL 1 · CHAPTER 1</div>
    </div>
  </div>

  <!-- ══ SETTINGS ══ -->
  <div id="settings" class="screen">
    <div class="set-top">
      <button id="setBack" class="scircle sm" aria-label="Back"><svg width="11" height="18" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="#c9b8dc" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      <div class="set-title">SETTINGS</div><div style="width:42px"></div>
    </div>
    <div class="set-body">
      <div class="set-group"><div class="set-label">GAME</div>
        <button class="set-row tog-row" id="setSound"><span>Sound</span><span class="tog"></span></button>
        <button class="set-row tog-row" id="setHaptics"><span>Haptics</span><span class="tog"></span></button>
      </div>
      <div class="set-group"><div class="set-label">LEARN</div>
        <button class="set-row" id="setReplay"><span class="rw2"><b>Replay element intros</b><small>duck · stone · shell · balloon · bomb</small></span><i class="chev"></i></button>
        <button class="set-row" id="setHowto"><span>How to play</span><i class="chev"></i></button>
      </div>
      <div class="set-group"><div class="set-label">ABOUT</div>
        <button class="set-row" id="setSupport"><span>Support</span><i class="chev"></i></button>
        <button class="set-row" id="setPrivacy"><span>Privacy</span><i class="chev"></i></button>
      </div>
    </div>
    <div class="set-foot"><canvas id="setDuck" width="68" height="68"></canvas><span>RATTLE · V1.0</span></div>
  </div>

  <!-- ══ LEVEL PATH (map) ══ -->
  <div id="levelpath" class="screen">
    <div class="lp-top">
      <button id="lpBack" class="scircle sm" aria-label="Back"><svg width="11" height="18" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="#c9b8dc" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      <div class="lp-chapter" id="lpChapter">CHAPTER 1</div>
      <div class="lp-starpill"><span style="color:#ffce6b">★</span><span id="lpStarCount" style="font-family:'Lilita One'">0</span></div>
    </div>
    <div class="lp-scroll" id="lpScroll"><div class="lp-inner" id="lpInner"></div></div>
    <div class="lp-foot">
      <div class="lp-bar"><div class="lp-fill" id="lpBarFill"></div></div>
      <div class="lp-progress" id="lpProgress">0 CLEARED · 106 TOTAL</div>
    </div>
  </div>

  <div id="ov"><div id="card"></div></div>
  <script src="js/engine.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/vendor/analytics.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
