<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lanthorn — lantern block puzzle</title>
<meta name="description" content="Drag pieces, clear lines, light every lantern.">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cellipse cx='50' cy='55' rx='30' ry='38' fill='%23ffb95e'/%3E%3Crect x='38' y='10' width='24' height='10' rx='3' fill='%23232741'/%3E%3C/svg%3E">
</head>
<body>
<canvas id="bg"></canvas>
<main>
  <section id="scr-title" class="screen active">
    <span id="titleMenuSlot"></span>
    <div class="hero"><div class="lan lit-lan"></div></div>
    <h1>LANTHORN</h1>
    <p class="tag">LANTERN BLOCK PUZZLE</p>
    <button id="btnPlay" class="primary big">Play</button>
    <button id="btnSky" class="skybtn"><span class="moon"></span><span id="btnSkyLabel">Night sky</span></button>
  </section>

  <section id="scr-game" class="screen">
    <div id="hud">
      <span class="hudleft">
        <span id="hudLevel"></span>
        <span id="hudWorld"></span>
      </span>
      <span id="hudDots"></span>
      <span id="hudMenuSlot"><span id="menuWrap">
        <button id="btnMenu" class="ghostbtn" title="Menu">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3.1"/>
            <path d="M19.4 13.4a7.7 7.7 0 0 0 0-2.8l2.1-1.6-2-3.4-2.5 1a7.7 7.7 0 0 0-2.4-1.4L14.1 2.5h-4l-.5 2.7a7.7 7.7 0 0 0-2.4 1.4l-2.5-1-2 3.4 2.1 1.6a7.7 7.7 0 0 0 0 2.8l-2.1 1.6 2 3.4 2.5-1a7.7 7.7 0 0 0 2.4 1.4l.5 2.7h4l.5-2.7a7.7 7.7 0 0 0 2.4-1.4l2.5 1 2-3.4z"/>
          </svg>
        </button>
        <div id="gameMenu">
          <button id="btnHome" class="ghostbtn" title="Home">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9.6 12 2.5l9 7.1V20a1.6 1.6 0 0 1-1.6 1.6H4.6A1.6 1.6 0 0 1 3 20Z"/>
              <path d="M9.4 21.6v-8h5.2v8"/>
            </svg>
          </button>
          <button id="btnMute" class="ghostbtn" title="Sound">♪</button>
          <button id="btnBgm" class="ghostbtn" title="Music">♫</button>
          <button id="btnVib" class="ghostbtn" title="Vibration">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
              <rect x="9" y="5" width="6" height="14" rx="1.6"/>
              <path d="M5.6 9.4v5.2M18.4 9.4v5.2"/>
              <path d="M2.8 10.6v2.8M21.2 10.6v2.8"/>
            </svg>
          </button>
        </div>
      </span></span>
    </div>
    <div id="worldbar"><i id="worldfill"></i></div>
    <div id="tut">Light a lantern — fill its row or column.</div>
    <div id="board"><div id="nospace">No space left</div></div>
    <div id="tray"></div>
  </section>

  <section id="scr-sky" class="screen">
    <div id="skyworld"></div>
    <div class="scrhead"><h2>YOUR NIGHT SKY</h2></div>
    <p id="skyCount"></p>
    <div id="skyplace"></div>
    <button id="btnSkyHome" class="homepill">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9.6 12 2.5l9 7.1V20a1.6 1.6 0 0 1-1.6 1.6H4.6A1.6 1.6 0 0 1 3 20Z"/>
        <path d="M9.4 21.6v-8h5.2v8"/>
      </svg>
      Home
    </button>
  </section>
</main>
<canvas id="fx"></canvas>
<div id="ghost"></div>
<div id="planetcard"></div>
<div id="overlay"><div class="card">
  <button id="ovClose" class="ovclose" title="Close">✕</button>
  <div id="ovLevel" class="ovlevel"></div>
  <h2 id="ovTitle"></h2>
  <div id="ovHero" class="ovhero"><div class="lan lit-lan"><i class="ribs"></i></div><span id="ovBadge"></span></div>
  <div id="ovWorld" class="ovworld"><i class="orb"></i><span id="ovWorldCount"></span></div>
  <div id="ovDots"></div>
  <p id="ovText"></p>
  <div id="ovBtns"></div>
</div></div>

<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js" onerror="/* local dev: wrapper no-ops */"></script>
<script src="js/engine.js"></script>
<script src="js/levels.js"></script>
<script src="js/endless.js"></script>
<script src="js/planets.js"></script>
<script src="js/analytics.js"></script>
<script src="js/sdk.js"></script>
<script src="js/audio.js"></script>
<script src="js/fx.js"></script>
<script src="js/game.js"></script>
</body>
</html>
