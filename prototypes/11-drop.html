<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>DROP</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#0b0d12;overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
#c{display:block;position:fixed;inset:0;touch-action:none}
#hint{position:fixed;left:50%;top:21%;transform:translateX(-50%);background:rgba(20,26,40,.88);color:#aebadb;font:600 13px -apple-system,system-ui,sans-serif;padding:8px 15px;border-radius:999px;border:1px solid rgba(120,140,190,.28);pointer-events:none;opacity:1;transition:opacity .7s;white-space:nowrap;letter-spacing:.05em;z-index:2}
#hint.hide{opacity:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">drag &middot; release to drop</div>
<script>
'use strict';
/* ============ DROP — pachinko roguelite ============ */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const hintEl=document.getElementById('hint');
const DT=1/120,MULTS=[1,2,5,2,1];
const F="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif";

/* ---- layout vars ---- */
let W=300,H=560,dpr=1;
let boardW=300,bx0=0,bx1=300;
let topH=56,bucketH=56,bucketTop=504,pegR=6.8,ballR=13,colSp=41;
let pegTop=110,pegBottom=470,wallInset=13,launchY=80,divW=2.4,divR=3.4;
let boardRows=9,boardCols=6,bgGrad=null;

/* ---- run state ---- */
let phase='aim';               // 'aim' | 'play' | 'draft' | 'place' | 'over'
let round=1,quota=80,scored=0,dropsLeft=5;
let upgrades=[];
let plusDrops=0,heavy=0,magnet=false,crown=false;
let pegs=[];
let dividerFr=[0.2,0.4,0.6,0.8];
let balls=[];
let gtime=0,overT=0,newBest=false;
let quotaMetPlayed=false,quotaMetFx=0,barGlow=0,barF=0,barV=0;
let bannerText='',bannerT=99;
let aimX=150,aimTarget=150,aiming=false,dragVX=0,lastPX=0,lastPT=0;
let firstDrop=false;
let draftCards=[],draftT=0,picked=-1,revealT=0,pressedCard=-1;
let pendKey=null,pendTotal=0,pendPlaced=0,pendX=0,pendY=0,pendDrag=false,pendPulse=0,placeHintShown=false;

let best=0;try{best=parseInt(localStorage.getItem('drop-best'),10)||0;}catch(e){}
function saveBest(){try{localStorage.setItem('drop-best',String(best));}catch(e){}}

/* ---- helpers ---- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function fmt(n){return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function easeOutBack(p){p=clamp(p,0,1);const c=1.70158,x=p-1;return 1+(c+1)*x*x*x+c*x*x;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function clampAim(x){return clamp(x,bx0+ballR+6,bx1-ballR-6);}
function pegRad(p){return p.placed?pegR*1.15:pegR;}

/* ---- card defs ---- */
const CARD_DEFS={
 gold:{label:'GOLD PEG',sub:'2 pegs pay 5'},
 bumper:{label:'BUMPER',sub:'big kick, pays 3'},
 splitter:{label:'SPLITTER',sub:'ball splits in two'},
 drop:{label:'+1 DROP',sub:'+1 every round'},
 heavy:{label:'HEAVY BALL',sub:'all pegs pay ×2'},
 magnet:{label:'MAGNET RIM',sub:'×5 bucket wider'},
 crown:{label:'COMBO CROWN',sub:'combo pays more'}
};

/* ---- fx pools ---- */
const POPS=[];for(let i=0;i<40;i++)POPS.push({on:false,x:0,y:0,vy:0,t:0,life:1,txt:'',color:'#fff',size:12});
let popIdx=0;
function pop(x,y,txt,color,size){const o=POPS[popIdx];popIdx=(popIdx+1)%POPS.length;o.on=true;o.x=x;o.y=y;o.t=0;o.life=0.85;o.vy=-H*0.10;o.txt=txt;o.color=color;o.size=size;}
const RINGS=[];
function ring(x,y,r0,r1,color,life){if(RINGS.length>=28)RINGS.shift();RINGS.push({x,y,r0,r1,color,t:0,life:life||0.38});}
const PARTS=[];
function burst(x,y,color,n,spd){for(let i=0;i<n;i++){if(PARTS.length>=150)PARTS.shift();const a=Math.random()*Math.PI*2,s=(0.3+Math.random()*0.7)*spd;PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-spd*0.35,t:0,life:0.4+Math.random()*0.5,color,r:ballR*(0.12+Math.random()*0.18)});}}

/* ---- audio (lazy, synthesized) ---- */
let AC=null,master=null;
function initAudio(){if(AC)return;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;AC=new A();master=AC.createGain();master.gain.value=0.4;master.connect(AC.destination);}catch(e){AC=null;}}
document.addEventListener('visibilitychange',()=>{if(AC&&document.visibilityState==='visible'){AC.resume().catch(()=>{});}});
function tone(f,dur,type,vol,delay,slide){
 if(!AC)return;
 try{
  const t0=AC.currentTime+(delay||0);
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(master);
  o.start(t0);o.stop(t0+dur+0.03);
 }catch(e){}
}
function dingSound(semis){const f=660*Math.pow(2,Math.min(semis,12)/12);tone(f,0.13,'triangle',0.2);}
function goldDing(semis){const f=990*Math.pow(2,Math.min(semis,12)/12);tone(f,0.11,'triangle',0.24);tone(f*1.5,0.13,'triangle',0.18,0.06);}
function bumperSound(){tone(220,0.12,'sawtooth',0.2,0,-150);tone(95,0.16,'square',0.12);}
function chunkSound(mult){
 tone(110,0.09,'square',0.26,0,-40);
 const arr=[0,4,7,12,16],n=Math.min(5,Math.max(1,mult));
 for(let i=0;i<n;i++)tone(523.25*Math.pow(2,arr[i]/12),0.17,'triangle',0.2,0.05+i*0.055);
}
function swellSound(){tone(392,0.5,'sine',0.22,0,196);tone(523,0.6,'sine',0.2,0.08,262);tone(659,0.7,'sine',0.18,0.16,330);}
function overSound(){tone(392,0.28,'triangle',0.22);tone(311,0.28,'triangle',0.22,0.22);tone(233,0.5,'triangle',0.22,0.44);}
function clickSound(){tone(880,0.06,'square',0.14);tone(1320,0.05,'square',0.08,0.03);}
function splitSound(){tone(700,0.1,'triangle',0.18);tone(1050,0.12,'triangle',0.18,0.05);}
function thunkSound(){tone(85,0.16,'square',0.3,0,-35);tone(320,0.07,'triangle',0.2,0.01);tone(660,0.1,'triangle',0.14,0.06);}
function denySound(){tone(180,0.09,'square',0.13,0,-70);}

/* ---- layout & board ---- */
function layout(){
 W=Math.max(120,window.innerWidth||300);
 H=Math.max(200,window.innerHeight||560);
 dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
 cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);
 cv.style.width=W+'px';cv.style.height=H+'px';
 boardW=Math.min(W,H*0.66);bx0=(W-boardW)/2;bx1=bx0+boardW;
 topH=clamp(H*0.105,52,84);
 bucketH=clamp(H*0.10,46,88);
 bucketTop=H-bucketH;
 pegR=boardW/44;ballR=pegR*1.9;
 colSp=boardW/7.2;
 pegTop=topH+clamp(H*0.09,40,80);
 pegBottom=bucketTop-ballR*2.6;
 wallInset=boardW*0.045;
 launchY=topH+ballR+8;
 divW=Math.max(2.2,boardW*0.008);divR=divW*1.5;
 bgGrad=ctx.createLinearGradient(0,0,0,H);
 bgGrad.addColorStop(0,'rgba(90,120,255,0.05)');
 bgGrad.addColorStop(0.5,'rgba(0,0,0,0)');
 bgGrad.addColorStop(1,'rgba(255,190,80,0.045)');
 if(pegs.length)positionPegs();
}
function buildBoard(){
 pegs=[];
 boardCols=(boardW/H)<0.62?6:7;
 const span=pegBottom-pegTop;
 boardRows=clamp(Math.floor(span/(colSp*0.92))+1,7,9);
 for(let r=0;r<boardRows;r++){
  const cnt=(r%2===0)?boardCols:boardCols-1;
  for(let c=0;c<cnt;c++)pegs.push({r,c,cnt,x:0,y:0,type:'base',flash:0,splitUsed:false});
 }
 positionPegs();
}
function positionPegs(){
 const span=pegBottom-pegTop;
 const rs=boardRows>1?span/(boardRows-1):0;
 for(const p of pegs){
  if(p.placed){p.x=bx0+p.fx*boardW;p.y=pegTop+p.fy*span;continue;}
  const totalW=(p.cnt-1)*colSp;
  p.x=bx0+(boardW-totalW)/2+p.c*colSp;
  p.y=pegTop+p.r*rs;
 }
}
/* ---- scoring ---- */
function pegBase(p){return p.type==='gold'?5:p.type==='bumper'?3:p.type==='splitter'?2:1;}
function pegPay(p,drop){let v=pegBase(p);if(crown)v+=Math.min(drop.hits-1,7);return v*(1<<heavy);}
function pegColor(t){return t==='gold'?'#ffd34d':t==='bumper'?'#7ae2ff':t==='splitter'?'#d8b4fe':'#cfe0ff';}

/* ---- update loop (fixed timestep) ---- */
function update(dt){
 gtime+=dt;bannerT+=dt;
 quotaMetFx=Math.max(0,quotaMetFx-dt*0.8);
 barGlow=Math.max(0,barGlow-dt*2.2);
 const target=quota>0?clamp(scored/quota,0,1):0;
 barV+=(target-barF)*90*dt;barV*=Math.exp(-8*dt);barF+=barV*dt;
 updateFx(dt);
 if(phase==='aim'){aimX+=(aimTarget-aimX)*Math.min(1,dt*16);}
 else if(phase==='play'){stepBalls(dt);if(balls.length===0)resolveDrop();}
 else if(phase==='draft'){
  draftT+=dt;
  if(picked>=0){
   revealT+=dt;
   const key=draftCards[picked].key;
   if(key==='gold'||key==='bumper'||key==='splitter'){
    if(revealT>0.6)enterPlace(key);
   }else if(revealT>1.05)beginRound(round+1);
  }
 }
 else if(phase==='place'){pendPulse+=dt;}
 else if(phase==='over'){overT+=dt;}
}
function updateFx(dt){
 for(const p of pegs)if(p.flash>0)p.flash=Math.max(0,p.flash-dt*3);
 for(let i=RINGS.length-1;i>=0;i--){const r=RINGS[i];r.t+=dt;if(r.t>=r.life)RINGS.splice(i,1);}
 for(let i=PARTS.length-1;i>=0;i--){const q=PARTS[i];q.t+=dt;if(q.t>=q.life){PARTS.splice(i,1);continue;}q.vy+=H*1.4*dt;q.x+=q.vx*dt;q.y+=q.vy*dt;}
 for(const o of POPS){if(!o.on)continue;o.t+=dt;if(o.t>=o.life){o.on=false;continue;}o.y+=o.vy*dt;o.vy*=Math.exp(-2*dt);}
}

/* ---- physics ---- */
function stepBalls(dt){
 const G=H*1.7,vmax=H*1.9;
 for(let i=balls.length-1;i>=0;i--){
  const b=balls[i];
  b.px=b.x;b.py=b.y;
  b.age+=dt;
  if(b.age>20&&!b.ghost){b.ghost=true;b.vx=0;}
  b.vy+=G*dt;
  let sp=Math.hypot(b.vx,b.vy);
  if(sp>vmax){b.vx*=vmax/sp;b.vy*=vmax/sp;}
  b.x+=b.vx*dt;b.y+=b.vy*dt;
  collideWalls(b);
  if(!b.ghost)collidePegs(b);
  collideDividers(b);
  if(b.y>H-ballR*0.55){land(b,i);continue;}
  sp=Math.hypot(b.vx,b.vy);
  if(sp<H*0.05)b.stallT+=dt;else b.stallT=0;
  if(b.stallT>1.5){b.stallT=0;b.vx+=(Math.random()-0.5)*H*0.3;b.vy-=H*0.12;}
 }
}
function collideWalls(b){
 const rest=0.5;
 if(b.y<=bucketTop){
  const Ldx=wallInset,Ldy=bucketTop-topH,L=Math.hypot(Ldx,Ldy);
  let nx=Ldy/L,ny=-Ldx/L;                       // left funnel wall, normal into board
  let d=(b.x-bx0)*nx+(b.y-topH)*ny;
  if(d<ballR){
   b.x+=nx*(ballR-d);b.y+=ny*(ballR-d);
   const vn=b.vx*nx+b.vy*ny;
   if(vn<0){const vtx=(b.vx-vn*nx)*0.99,vty=(b.vy-vn*ny)*0.99;b.vx=vtx-vn*rest*nx;b.vy=vty-vn*rest*ny;}
  }
  nx=-Ldy/L;ny=-Ldx/L;                          // right funnel wall
  d=(b.x-bx1)*nx+(b.y-topH)*ny;
  if(d<ballR){
   b.x+=nx*(ballR-d);b.y+=ny*(ballR-d);
   const vn=b.vx*nx+b.vy*ny;
   if(vn<0){const vtx=(b.vx-vn*nx)*0.99,vty=(b.vy-vn*ny)*0.99;b.vx=vtx-vn*rest*nx;b.vy=vty-vn*rest*ny;}
  }
 }else{
  if(b.x<bx0+ballR){b.x=bx0+ballR;if(b.vx<0)b.vx=-b.vx*rest;}
  if(b.x>bx1-ballR){b.x=bx1-ballR;if(b.vx>0)b.vx=-b.vx*rest;}
 }
 if(b.y<topH+ballR){b.y=topH+ballR;if(b.vy<0)b.vy=-b.vy*rest;}
}
function collidePegs(b){
 for(let pi=0;pi<pegs.length;pi++){
  const p=pegs[pi];
  const pr=pegRad(p),cd=ballR+pr,cd2=cd*cd,rearm=cd+pr,re2=rearm*rearm;
  const dx=b.x-p.x,dy=b.y-p.y;
  if(dx>rearm||dx<-rearm||dy>rearm||dy<-rearm){if(b.touch[pi])delete b.touch[pi];continue;}
  const d2=dx*dx+dy*dy;
  if(d2<cd2){
   const d=Math.sqrt(d2)||0.001,nx=dx/d,ny=dy/d;
   b.x=p.x+nx*cd;b.y=p.y+ny*cd;
   const vn=b.vx*nx+b.vy*ny;
   if(vn<0){
    const rest=p.type==='bumper'?1.6:0.55*Math.pow(0.75,heavy);
    let vn2=-vn*rest;
    if(p.type==='bumper')vn2=Math.max(vn2,H*0.55);
    const vtx=(b.vx-vn*nx)*0.99,vty=(b.vy-vn*ny)*0.99;
    const nvx=vtx+nx*vn2,nvy=vty+ny*vn2;
    const j=(Math.random()-0.5)*0.07,cj=Math.cos(j),sj=Math.sin(j); // ±2° jitter
    b.vx=nvx*cj-nvy*sj;b.vy=nvx*sj+nvy*cj;
   }
   if(!b.touch[pi]){b.touch[pi]=true;hitPeg(b,p,pi);}
  }else if(b.touch[pi]&&d2>re2){delete b.touch[pi];}
 }
}
function collideDividers(b){
 if(b.y<bucketTop-ballR-divR)return;
 for(const f of dividerFr){
  const dx0=bx0+f*boardW;
  if(Math.abs(b.x-dx0)>ballR+divR+3)continue;
  const cdx=b.x-dx0,cdy=b.y-bucketTop,cd=ballR+divR,d2=cdx*cdx+cdy*cdy;
  if(d2<cd*cd&&d2>0.0001){
   const d=Math.sqrt(d2),nx=cdx/d,ny=cdy/d;
   b.x=dx0+nx*cd;b.y=bucketTop+ny*cd;
   const vn=b.vx*nx+b.vy*ny;
   if(vn<0){const vtx=(b.vx-vn*nx)*0.99,vty=(b.vy-vn*ny)*0.99;b.vx=vtx-vn*0.45*nx;b.vy=vty-vn*0.45*ny;}
  }else if(b.y>bucketTop+divR){
   const pen=ballR+divW-Math.abs(b.x-dx0);
   if(pen>0){const s=b.x<dx0?-1:1;b.x+=s*pen;b.vx=-b.vx*0.4;}
  }
 }
}
function hitPeg(b,p,pi){
 b.drop.hits++;
 const pay=pegPay(p,b.drop);
 b.drop.pegPoints+=pay;
 p.flash=1;
 const col=pegColor(p.type);
 ring(p.x,p.y,pegR*1.1,pegR*3.2,col,0.35);
 pop(p.x,p.y-pegR*2.2,'+'+pay,col,Math.max(11,boardW*0.042));
 const semis=Math.min(b.drop.hits-1,12);
 if(p.type==='gold')goldDing(semis);
 else if(p.type==='bumper'){bumperSound();dingSound(semis);}
 else dingSound(semis);
 if(p.type==='splitter'&&!p.splitUsed&&balls.length<3){
  p.splitUsed=true;
  const sp=Math.max(Math.hypot(b.vx,b.vy),H*0.35);
  const a=Math.atan2(b.vy,b.vx);
  b.vx=Math.cos(a-0.45)*sp;b.vy=Math.sin(a-0.45)*sp;
  const nb={x:b.x,y:b.y,px:b.x,py:b.y,vx:Math.cos(a+0.45)*sp,vy:Math.sin(a+0.45)*sp,drop:b.drop,ghost:false,age:0,stallT:0,touch:{}};
  nb.touch[pi]=true;
  balls.push(nb);
  ring(p.x,p.y,pegR,pegR*6,'#d8b4fe',0.5);
  splitSound();
 }
}
function land(b,i){
 balls.splice(i,1);
 const fr=clamp((b.x-bx0)/boardW,0,0.999);
 let bi=4;
 for(let k=0;k<4;k++){if(fr<dividerFr[k]){bi=k;break;}}
 const mult=MULTS[bi];
 const pts=b.drop.pegPoints*mult;
 scored+=pts;
 barGlow=1;
 const xs=[0].concat(dividerFr).concat([1]);
 const cx=bx0+(xs[bi]+xs[bi+1])/2*boardW;
 const col=mult>=5?'#ffd34d':mult>=2?'#7ad7ff':'#aeb9d6';
 pop(cx,bucketTop-boardW*0.05,'+'+fmt(pts),col,Math.max(15,boardW*0.07));
 burst(cx,bucketTop+bucketH*0.35,col,mult>=5?26:14,H*0.5);
 ring(cx,bucketTop+bucketH*0.4,ballR,ballR*4,col,0.5);
 chunkSound(mult);
 if(!quotaMetPlayed&&scored>=quota){quotaMetPlayed=true;quotaMetFx=1.2;swellSound();}
}

/* ---- state machine ---- */
function resolveDrop(){
 if(scored>=quota)startDraft();
 else if(dropsLeft<=0)gameOver();
 else phase='aim';
}
function doDrop(x,vx0){
 if(phase!=='aim'||dropsLeft<=0)return;
 dropsLeft--;
 if(!firstDrop){firstDrop=true;hintEl.classList.add('hide');}
 for(const p of pegs)p.splitUsed=false;
 const drop={pegPoints:0,hits:0};
 balls.push({x:clampAim(x),y:launchY,px:x,py:launchY,vx:vx0||0,vy:0,drop,ghost:false,age:0,stallT:0,touch:{}});
 phase='play';
}
function buildPool(){
 const placedN=pegs.reduce((n,p)=>n+(p.placed?1:0),0);
 const splitters=pegs.reduce((n,p)=>n+(p.type==='splitter'?1:0),0);
 const pool=[];
 if(placedN<24)pool.push('gold');
 if(placedN<24)pool.push('bumper');
 if(placedN<24&&splitters<3)pool.push('splitter');
 if(plusDrops<3)pool.push('drop');
 if(heavy<2)pool.push('heavy');
 if(!magnet)pool.push('magnet');
 if(!crown)pool.push('crown');
 if(!pool.length)pool.push('gold');
 return pool;
}
function pickCards(){
 const pool=buildPool();
 for(let i=pool.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;const t=pool[i];pool[i]=pool[j];pool[j]=t;}
 const out=[];
 for(let i=0;i<3;i++)out.push({key:pool[i%pool.length]});
 return out;
}
function startDraft(){phase='draft';draftT=0;picked=-1;revealT=0;pressedCard=-1;draftCards=pickCards();}
function applyPick(i){
 if(phase!=='draft'||picked>=0||i<0||i>=draftCards.length)return;
 picked=i;revealT=0;clickSound();
 const key=draftCards[i].key,def=CARD_DEFS[key];
 const midX=bx0+boardW/2;
 if(key==='drop'){plusDrops=Math.min(3,plusDrops+1);pop(midX,topH+boardW*0.14,'+1 DROP','#7dee9a',Math.max(14,boardW*0.06));}
 else if(key==='heavy'){heavy=Math.min(2,heavy+1);pop(midX,topH+boardW*0.14,'PEG PAY ×'+(1<<heavy),'#ffd34d',Math.max(14,boardW*0.06));}
 else if(key==='magnet'){
  magnet=true;dividerFr=[0.2,0.38,0.62,0.8];
  ring(bx0+0.38*boardW,bucketTop,4,boardW*0.1,'#ffd34d',0.6);
  ring(bx0+0.62*boardW,bucketTop,4,boardW*0.1,'#ffd34d',0.6);
 }
 else if(key==='crown'){crown=true;pop(midX,topH+boardW*0.14,'COMBO ON','#ffd34d',Math.max(14,boardW*0.06));}
 /* gold / bumper / splitter defer to the 'place' phase — the player positions them */
 upgrades.push(def.label);
}
/* ---- part placement ---- */
function placeYMin(){return launchY+ballR*2;}
function placeYMax(){return pegBottom;}
function placeLegal(x,y){
 if(y<placeYMin()||y>placeYMax())return false;
 const m=wallInset+ballR*3;
 if(x<bx0+m||x>bx1-m)return false;
 const minD=pegR*2.2,minD2=minD*minD;
 for(const p of pegs){const dx=x-p.x,dy=y-p.y;if(dx*dx+dy*dy<minD2)return false;}
 return true;
}
function nearestLegal(cx,cy){
 if(placeLegal(cx,cy))return[cx,cy];
 let bestP=null,bd=1e18;
 const m=wallInset+ballR*3;
 for(let gy=0;gy<=20;gy++)for(let gx=0;gx<=20;gx++){
  const x=lerp(bx0+m,bx1-m,gx/20),y=lerp(placeYMin(),placeYMax(),gy/20);
  if(!placeLegal(x,y))continue;
  const d=(x-cx)*(x-cx)+(y-cy)*(y-cy);
  if(d<bd){bd=d;bestP=[x,y];}
 }
 return bestP||[cx,cy];
}
function enterPlace(key){
 phase='place';pendKey=key;
 pendTotal=key==='gold'?2:1;pendPlaced=0;
 pendDrag=false;pendPulse=0;
 const c=nearestLegal(bx0+boardW/2,(placeYMin()+placeYMax())/2);
 pendX=c[0];pendY=c[1];
 if(!placeHintShown){placeHintShown=true;hintEl.textContent='drag your new part · release to place';hintEl.classList.remove('hide');}
}
function tryPlace(x,y){
 if(phase!=='place'||!pendKey)return false;
 if(!placeLegal(x,y)){
  denySound();
  ring(x,y,ballR*1.2,ballR*2,'#ff6b6b',0.3);
  return false;
 }
 const span=(pegBottom-pegTop)||1;
 pegs.push({r:-1,c:0,cnt:0,x,y,fx:(x-bx0)/boardW,fy:(y-pegTop)/span,type:pendKey,flash:1.4,splitUsed:false,placed:true});
 const col=pegColor(pendKey);
 thunkSound();
 ring(x,y,pegR,pegR*6,col,0.55);
 ring(x,y,pegR*0.6,pegR*3.4,'#ffffff',0.4);
 burst(x,y,col,14,H*0.42);
 pendPlaced++;
 if(pendPlaced>=pendTotal){
  pendKey=null;pendDrag=false;
  hintEl.classList.add('hide');
  beginRound(round+1);
 }else{
  pendDrag=false;pendPulse=0;
  const c=nearestLegal(bx0+boardW/2,(placeYMin()+placeYMax())/2);
  pendX=c[0];pendY=c[1];
 }
 return true;
}
function beginRound(r){
 round=r;
 quota=Math.round(80*Math.pow(round,1.55));
 scored=0;quotaMetPlayed=false;barF=0;barV=0;
 dropsLeft=5+plusDrops;
 balls=[];phase='aim';banner('ROUND '+round);
}
function gameOver(){
 phase='over';overT=0;
 newBest=round>best;
 if(newBest){best=round;saveBest();}
 overSound();
}
function banner(t){bannerText=t;bannerT=0;}
function newRun(){
 round=1;quota=80;scored=0;dropsLeft=5;
 upgrades=[];plusDrops=0;heavy=0;magnet=false;crown=false;
 dividerFr=[0.2,0.4,0.6,0.8];
 balls=[];quotaMetPlayed=false;barF=0;barV=0;quotaMetFx=0;newBest=false;
 picked=-1;pressedCard=-1;aiming=false;
 pendKey=null;pendTotal=0;pendPlaced=0;pendDrag=false;pendPulse=0;
 buildBoard();
 aimX=aimTarget=bx0+boardW/2;
 phase='aim';banner('ROUND 1');
}
/* ---- drawing ---- */
function draw(){
 ctx.setTransform(dpr,0,0,dpr,0,0);
 ctx.textBaseline='middle';
 ctx.fillStyle='#0b0d12';ctx.fillRect(0,0,W,H);
 if(bx0>1){ctx.fillStyle='#0d1019';ctx.fillRect(bx0-3,0,boardW+6,H);}
 if(bgGrad){ctx.fillStyle=bgGrad;if(bx0>1)ctx.fillRect(bx0-3,0,boardW+6,H);else ctx.fillRect(0,0,W,H);}
 drawWalls();
 drawBuckets();
 drawPegs();
 if(phase==='aim')drawAim();
 for(const b of balls){
  ctx.strokeStyle='rgba(255,255,255,0.16)';ctx.lineWidth=ballR*1.1;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(b.px,b.py);ctx.lineTo(b.x,b.y);ctx.stroke();
  drawBall(b.x,b.y,b.ghost);
 }
 if(phase==='place')drawPlace();
 drawRings();drawParts();drawPops();
 drawHUD();
 drawBanner();
 if(phase==='draft')drawDraft();
 if(phase==='over')drawOver();
}
function drawWalls(){
 ctx.strokeStyle='rgba(148,166,210,0.14)';ctx.lineWidth=2;
 ctx.beginPath();
 ctx.moveTo(bx0+1,topH);ctx.lineTo(bx0+wallInset,bucketTop);
 ctx.moveTo(bx1-1,topH);ctx.lineTo(bx1-wallInset,bucketTop);
 ctx.moveTo(bx0+1,bucketTop);ctx.lineTo(bx0+1,H);
 ctx.moveTo(bx1-1,bucketTop);ctx.lineTo(bx1-1,H);
 ctx.stroke();
 ctx.strokeStyle='rgba(148,166,210,0.10)';ctx.lineWidth=1;
 ctx.beginPath();ctx.moveTo(bx0,topH);ctx.lineTo(bx1,topH);ctx.stroke();
}
function drawBuckets(){
 const xs=[0].concat(dividerFr).concat([1]).map(f=>bx0+f*boardW);
 for(let i=0;i<5;i++){
  const x0=xs[i],x1=xs[i+1],m=MULTS[i];
  ctx.fillStyle=m>=5?'rgba(255,205,77,'+(0.10+quotaMetFx*0.08)+')':m>=2?'rgba(90,170,255,0.07)':'rgba(148,166,210,0.05)';
  ctx.fillRect(x0+2,bucketTop,x1-x0-4,bucketH);
  ctx.fillStyle=m>=5?'#ffd34d':m>=2?'#9fd7ff':'#77839c';
  ctx.font='800 '+(boardW*(m>=5?0.058:0.045)).toFixed(1)+'px '+F;
  ctx.textAlign='center';
  ctx.fillText('×'+m,(x0+x1)/2,bucketTop+bucketH*0.55);
 }
 for(const f of dividerFr){
  const dx0=bx0+f*boardW;
  ctx.fillStyle='#39445c';
  rr(dx0-divW,bucketTop,divW*2,bucketH,divW);ctx.fill();
  ctx.fillStyle='#4d5b7a';
  ctx.beginPath();ctx.arc(dx0,bucketTop,divR,0,7);ctx.fill();
 }
 ctx.strokeStyle='rgba(148,166,210,0.18)';ctx.lineWidth=2;
 ctx.beginPath();ctx.moveTo(bx0,H-1);ctx.lineTo(bx1,H-1);ctx.stroke();
}
function drawPart(type,x,y,r,placed){
 if(placed){
  const ro=type==='bumper'?r*1.8:r*1.45;
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=Math.max(2,r*0.5);
  ctx.beginPath();ctx.arc(x,y,ro,0,7);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=Math.max(1,r*0.14);
  ctx.beginPath();ctx.arc(x,y,ro,0,7);ctx.stroke();
 }
 if(type==='gold'){
  ctx.fillStyle='rgba(255,205,77,0.16)';ctx.beginPath();ctx.arc(x,y,r*2.3,0,7);ctx.fill();
  ctx.fillStyle='#ffcf4f';ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(x-r*0.3,y-r*0.3,r*0.32,0,7);ctx.fill();
  ctx.font='800 '+(r*1.2).toFixed(1)+'px '+F;ctx.textAlign='center';ctx.fillStyle='#6b4a00';
  ctx.fillText('5',x,y+r*0.08);
 }else if(type==='bumper'){
  ctx.fillStyle='rgba(105,220,255,0.10)';ctx.beginPath();ctx.arc(x,y,r*2.5,0,7);ctx.fill();
  ctx.fillStyle='#3e4859';ctx.beginPath();ctx.arc(x,y,r*0.85,0,7);ctx.fill();
  ctx.strokeStyle='#69dcff';ctx.lineWidth=Math.max(1.5,r*0.3);
  ctx.beginPath();ctx.arc(x,y,r+Math.max(2,r*0.4),0,7);ctx.stroke();
 }else if(type==='splitter'){
  ctx.fillStyle='rgba(192,132,252,0.12)';ctx.beginPath();ctx.arc(x,y,r*2.2,0,7);ctx.fill();
  ctx.fillStyle='#c084fc';
  ctx.beginPath();ctx.arc(x-r*0.22,y,r*0.95,Math.PI*0.5,Math.PI*1.5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(x+r*0.22,y,r*0.95,-Math.PI*0.5,Math.PI*0.5);ctx.closePath();ctx.fill();
 }else{
  ctx.fillStyle='#3e4859';ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.10)';ctx.beginPath();ctx.arc(x-r*0.28,y-r*0.28,r*0.4,0,7);ctx.fill();
 }
}
function drawPegs(){
 for(const p of pegs){
  const r=pegRad(p);
  drawPart(p.type,p.x,p.y,r,!!p.placed);
  if(p.flash>0){
   ctx.globalAlpha=Math.min(1,p.flash)*0.85;
   ctx.fillStyle='#ffffff';
   ctx.beginPath();ctx.arc(p.x,p.y,r*(1+(1.2-Math.min(1.2,p.flash))*0.5),0,7);ctx.fill();
   ctx.globalAlpha=1;
  }
 }
}
function drawPlace(){
 if(!pendKey)return;
 const legal=placeLegal(pendX,pendY);
 const puls=pendDrag?0:0.5+0.5*Math.sin(pendPulse*4.5);
 const rad=ballR*1.55+puls*ballR*0.22;
 ctx.save();
 if(legal){ctx.fillStyle='rgba(125,238,154,0.10)';ctx.strokeStyle='rgba(125,238,154,0.8)';}
 else{ctx.fillStyle='rgba(255,107,107,0.10)';ctx.strokeStyle='rgba(255,107,107,0.85)';}
 ctx.beginPath();ctx.arc(pendX,pendY,rad,0,7);ctx.fill();
 ctx.lineWidth=Math.max(1.5,pegR*0.3);
 ctx.beginPath();ctx.arc(pendX,pendY,rad,0,7);ctx.stroke();
 if(!legal){
  const s=rad*0.7071;
  ctx.beginPath();ctx.moveTo(pendX-s,pendY-s);ctx.lineTo(pendX+s,pendY+s);ctx.stroke();
 }
 drawPart(pendKey,pendX,pendY,pegR*1.15*1.3,true);
 if(pendTotal>1){
  ctx.font='700 '+Math.max(10,boardW*0.04).toFixed(1)+'px '+F;
  ctx.textAlign='center';ctx.fillStyle='#cdd7ec';
  ctx.fillText((pendPlaced+1)+' of '+pendTotal,pendX,pendY-rad-boardW*0.04);
 }
 ctx.restore();
}
function drawAim(){
 ctx.save();
 ctx.strokeStyle='rgba(255,255,255,0.20)';ctx.lineWidth=1.5;ctx.setLineDash([5,8]);
 ctx.beginPath();ctx.moveTo(aimX,launchY+ballR+4);ctx.lineTo(aimX,launchY+(bucketTop-launchY)*0.45);ctx.stroke();
 ctx.restore();
 drawBall(aimX,launchY,false);
}
function drawBall(x,y,ghost){
 ctx.save();
 if(ghost)ctx.globalAlpha=0.55;
 const g=ctx.createRadialGradient(x-ballR*0.35,y-ballR*0.4,ballR*0.12,x,y,ballR);
 if(heavy>0){g.addColorStop(0,'#cdd7ec');g.addColorStop(0.55,'#7f8ca9');g.addColorStop(1,'#3c465e');}
 else{g.addColorStop(0,'#ffffff');g.addColorStop(0.55,'#dde6f6');g.addColorStop(1,'#8d9dc0');}
 ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,ballR,0,7);ctx.fill();
 ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(x-ballR*0.32,y-ballR*0.38,ballR*0.16,0,7);ctx.fill();
 ctx.restore();
}
function drawRings(){
 for(const r of RINGS){
  const q=clamp(r.t/r.life,0,1),e=q*(2-q);
  ctx.globalAlpha=(1-q)*0.9;
  ctx.strokeStyle=r.color;ctx.lineWidth=Math.max(1.2,pegR*0.35*(1-q)+0.8);
  ctx.beginPath();ctx.arc(r.x,r.y,lerp(r.r0,r.r1,e),0,7);ctx.stroke();
 }
 ctx.globalAlpha=1;
}
function drawParts(){
 for(const q of PARTS){
  ctx.globalAlpha=Math.max(0,1-q.t/q.life);
  ctx.fillStyle=q.color;
  ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,7);ctx.fill();
 }
 ctx.globalAlpha=1;
}
function drawPops(){
 ctx.textAlign='center';
 for(const o of POPS){
  if(!o.on)continue;
  const q=o.t/o.life;
  ctx.globalAlpha=q<0.15?q/0.15:Math.max(0,1-Math.max(0,(q-0.5)/0.5));
  const sc=1+0.25*Math.max(0,1-o.t*7);
  ctx.font='800 '+(o.size*sc).toFixed(1)+'px '+F;
  ctx.fillStyle=o.color;
  ctx.fillText(o.txt,o.x,o.y);
 }
 ctx.globalAlpha=1;
}
function drawHUD(){
 const pad=boardW*0.045;
 const rowY=topH*0.27;
 ctx.textAlign='left';ctx.font='800 '+(boardW*0.052).toFixed(1)+'px '+F;ctx.fillStyle='#e9eefb';
 ctx.fillText('ROUND '+round,bx0+pad,rowY);
 ctx.textAlign='right';ctx.font='600 '+(boardW*0.036).toFixed(1)+'px '+F;ctx.fillStyle='#5f6b85';
 ctx.fillText('best: R'+best,bx1-pad,rowY);
 const total=5+plusDrops,dr=Math.max(2.4,boardW*0.012),dsp=dr*3.1;
 if(phase!=='place'){
  const dx0=bx0+boardW/2-(total-1)*dsp/2;
  for(let i=0;i<total;i++){
   const x=dx0+i*dsp;
   if(i<dropsLeft){ctx.fillStyle='#e9eefb';ctx.beginPath();ctx.arc(x,rowY,dr,0,7);ctx.fill();}
   else{ctx.strokeStyle='rgba(233,238,251,0.35)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,rowY,dr*0.85,0,7);ctx.stroke();}
  }
 }
 const bw=boardW*0.91,bxp=bx0+(boardW-bw)/2,by=topH*0.50,bh=topH*0.36;
 rr(bxp,by,bw,bh,bh/2);ctx.fillStyle='#141a29';ctx.fill();
 if(phase==='place'){
  ctx.strokeStyle='rgba(125,238,154,'+(0.45+0.3*Math.sin(gtime*5)).toFixed(3)+')';ctx.lineWidth=1.5;ctx.stroke();
  ctx.font='800 '+(bh*0.55).toFixed(1)+'px '+F;ctx.textAlign='center';ctx.fillStyle='#7dee9a';
  let t='PLACE YOUR PART · '+(pendKey?CARD_DEFS[pendKey].label:'');
  if(pendTotal>1)t+=' '+(pendPlaced+1)+'/'+pendTotal;
  ctx.fillText(t,bxp+bw/2,by+bh/2+0.5);
  return;
 }
 if(quotaMetFx>0){ctx.strokeStyle='rgba(255,211,77,'+Math.min(1,quotaMetFx).toFixed(2)+')';ctx.lineWidth=2;}
 else{ctx.strokeStyle='#273250';ctx.lineWidth=1;}
 ctx.stroke();
 const f=clamp(barF,0,1);
 if(f>0.004){
  ctx.save();
  rr(bxp+1.5,by+1.5,bw-3,bh-3,(bh-3)/2);ctx.clip();
  const met=scored>=quota;
  const gcol=ctx.createLinearGradient(bxp,0,bxp+bw,0);
  if(met){gcol.addColorStop(0,'#f5a623');gcol.addColorStop(1,'#ffd95e');}
  else{gcol.addColorStop(0,'#2f8fe0');gcol.addColorStop(1,'#6fe0ff');}
  ctx.fillStyle=gcol;ctx.fillRect(bxp,by,bw*f,bh);
  if(barGlow>0){ctx.fillStyle='rgba(255,255,255,'+(barGlow*0.28).toFixed(3)+')';ctx.fillRect(bxp,by,bw*f,bh);}
  ctx.restore();
 }
 ctx.font='700 '+(bh*0.6).toFixed(1)+'px '+F;ctx.textAlign='center';ctx.fillStyle='#f2f5fd';
 ctx.fillText(fmt(scored)+' / '+fmt(quota),bxp+bw/2,by+bh/2+0.5);
}
function drawBanner(){
 if(bannerT>=1.25||phase==='over'||phase==='draft')return;
 const a=bannerT<0.18?bannerT/0.18:bannerT>0.85?Math.max(0,(1.25-bannerT)/0.4):1;
 const sc=0.8+0.2*easeOutBack(clamp(bannerT/0.35,0,1));
 ctx.save();
 ctx.globalAlpha=a*0.95;
 ctx.translate(bx0+boardW/2,H*0.30);ctx.scale(sc,sc);
 ctx.font='900 '+(boardW*0.11).toFixed(1)+'px '+F;ctx.textAlign='center';
 ctx.shadowColor='rgba(110,150,255,0.55)';ctx.shadowBlur=16;
 ctx.fillStyle='#e9eefb';ctx.fillText(bannerText,0,0);
 ctx.restore();
}
function cardRect(i){
 const cw=Math.min(boardW*0.29,190),ch=cw*1.35,gap=Math.min(boardW*0.025,14);
 const totalW=cw*3+gap*2,x0=(W-totalW)/2;
 return {x:x0+i*(cw+gap),y:H*0.45-ch/2,w:cw,h:ch};
}
function drawDraft(){
 const dealA=clamp(draftT/0.25,0,1);
 let ov=0.72*dealA;
 if(picked>=0)ov*=clamp(1-revealT/0.45,0,1);
 ctx.fillStyle='rgba(6,8,14,'+ov.toFixed(3)+')';ctx.fillRect(0,0,W,H);
 const r0=cardRect(0);
 if(picked<0){
  ctx.globalAlpha=dealA;
  ctx.font='800 '+(boardW*0.05).toFixed(1)+'px '+F;ctx.textAlign='center';ctx.fillStyle='#aebadb';
  ctx.fillText('PICK ONE',W/2,r0.y-boardW*0.075);
  ctx.globalAlpha=1;
 }
 for(let i=0;i<3;i++){
  const r=cardRect(i);
  const p=clamp((draftT-i*0.08)/0.32,0,1),e=easeOutBack(p);
  let a=p,yOff=(1-e)*boardW*0.15,sc=1;
  if(pressedCard===i&&picked<0){sc=1.05;yOff-=boardW*0.012;}
  if(picked>=0){
   if(i===picked){sc=1+revealT*0.25;a=clamp(1-revealT/0.6,0,1);}
   else a=clamp(1-revealT*3,0,1);
  }
  if(a<=0.003)continue;
  const def=CARD_DEFS[draftCards[i].key];
  ctx.save();
  ctx.globalAlpha=a;
  ctx.translate(r.x+r.w/2,r.y+r.h/2+yOff);ctx.scale(sc,sc);
  rr(-r.w/2,-r.h/2,r.w,r.h,r.w*0.09);
  ctx.fillStyle='#151b29';ctx.fill();
  ctx.strokeStyle=i===picked?'#ffd34d':'rgba(120,145,210,0.45)';ctx.lineWidth=1.5;ctx.stroke();
  drawIcon(draftCards[i].key,0,-r.h*0.20,r.w*0.62);
  ctx.font='800 '+(r.w*0.115).toFixed(1)+'px '+F;ctx.textAlign='center';ctx.fillStyle='#e9eefb';
  ctx.fillText(def.label,0,r.h*0.13);
  ctx.font='500 '+(r.w*0.092).toFixed(1)+'px '+F;ctx.fillStyle='#8b97b4';
  ctx.fillText(def.sub,0,r.h*0.28);
  ctx.restore();
 }
}
function drawIcon(key,cx,cy,s){
 ctx.save();ctx.translate(cx,cy);
 if(key==='gold'){
  ctx.fillStyle='rgba(255,205,77,0.15)';ctx.beginPath();ctx.arc(0,0,s*0.55,0,7);ctx.fill();
  const g=ctx.createRadialGradient(-s*0.12,-s*0.15,s*0.04,0,0,s*0.45);
  g.addColorStop(0,'#fff4c8');g.addColorStop(0.55,'#ffd34d');g.addColorStop(1,'#dd9a1c');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s*0.38,0,7);ctx.fill();
 }else if(key==='bumper'){
  ctx.fillStyle='#3e4859';ctx.beginPath();ctx.arc(0,0,s*0.26,0,7);ctx.fill();
  ctx.strokeStyle='#69dcff';ctx.lineWidth=s*0.08;ctx.beginPath();ctx.arc(0,0,s*0.44,0,7);ctx.stroke();
 }else if(key==='splitter'){
  ctx.fillStyle='#c084fc';
  ctx.beginPath();ctx.arc(-s*0.09,0,s*0.36,Math.PI*0.5,Math.PI*1.5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(s*0.09,0,s*0.36,-Math.PI*0.5,Math.PI*0.5);ctx.closePath();ctx.fill();
 }else if(key==='drop'){
  const g=ctx.createRadialGradient(-s*0.2,-s*0.1,s*0.03,-s*0.08,s*0.05,s*0.4);
  g.addColorStop(0,'#ffffff');g.addColorStop(1,'#9fb0d2');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(-s*0.08,s*0.05,s*0.3,0,7);ctx.fill();
  ctx.strokeStyle='#7dee9a';ctx.lineWidth=s*0.09;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(s*0.32,-s*0.38);ctx.lineTo(s*0.32,-s*0.06);ctx.moveTo(s*0.16,-s*0.22);ctx.lineTo(s*0.48,-s*0.22);ctx.stroke();
 }else if(key==='heavy'){
  const g=ctx.createRadialGradient(-s*0.15,-s*0.18,s*0.05,0,0,s*0.48);
  g.addColorStop(0,'#8d9ab8');g.addColorStop(0.6,'#404b63');g.addColorStop(1,'#151a26');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s*0.42,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(-s*0.16,-s*0.18,s*0.07,0,7);ctx.fill();
 }else if(key==='magnet'){
  ctx.fillStyle='#4d5b7a';
  rr(-s*0.48,-s*0.3,s*0.1,s*0.6,s*0.04);ctx.fill();
  rr(s*0.38,-s*0.3,s*0.1,s*0.6,s*0.04);ctx.fill();
  ctx.strokeStyle='#ffd34d';ctx.lineWidth=s*0.07;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(-s*0.08,-s*0.12);ctx.lineTo(-s*0.24,0);ctx.lineTo(-s*0.08,s*0.12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*0.08,-s*0.12);ctx.lineTo(s*0.24,0);ctx.lineTo(s*0.08,s*0.12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s*0.42,s*0.42);ctx.lineTo(s*0.42,s*0.42);ctx.stroke();
 }else if(key==='crown'){
  ctx.fillStyle='#ffd34d';
  ctx.beginPath();
  ctx.moveTo(-s*0.42,s*0.28);ctx.lineTo(-s*0.42,-s*0.1);ctx.lineTo(-s*0.2,s*0.06);ctx.lineTo(0,-s*0.32);
  ctx.lineTo(s*0.2,s*0.06);ctx.lineTo(s*0.42,-s*0.1);ctx.lineTo(s*0.42,s*0.28);ctx.closePath();ctx.fill();
 }
 ctx.restore();
}
function drawOver(){
 const a=clamp(overT*1.6,0,1);
 ctx.fillStyle='rgba(8,10,16,'+(0.78*a).toFixed(3)+')';ctx.fillRect(0,0,W,H);
 if(a<0.1)return;
 ctx.globalAlpha=a;
 ctx.textAlign='center';
 ctx.font='600 '+(boardW*0.045).toFixed(1)+'px '+F;ctx.fillStyle='#8b97b4';
 ctx.fillText('quota missed',W/2,H*0.32);
 const sc=0.8+0.2*easeOutBack(clamp(overT*1.4,0,1));
 ctx.save();
 ctx.translate(W/2,H*0.42);ctx.scale(sc,sc);
 ctx.font='900 '+(Math.min(boardW*0.17,72)).toFixed(1)+'px '+F;ctx.fillStyle='#e9eefb';
 ctx.shadowColor='rgba(255,120,90,0.4)';ctx.shadowBlur=20;
 ctx.fillText('ROUND '+round,0,0);
 ctx.restore();
 if(newBest){
  ctx.font='800 '+(boardW*0.055).toFixed(1)+'px '+F;
  ctx.fillStyle='#ffd34d';
  ctx.globalAlpha=a*(0.7+0.3*Math.sin(gtime*5));
  ctx.fillText('NEW BEST',W/2,H*0.51);
  ctx.globalAlpha=a;
 }else{
  ctx.font='600 '+(boardW*0.05).toFixed(1)+'px '+F;ctx.fillStyle='#8b97b4';
  ctx.fillText('best: R'+best,W/2,H*0.51);
 }
 ctx.font='600 '+(boardW*0.045).toFixed(1)+'px '+F;
 ctx.globalAlpha=a*(0.45+0.35*Math.sin(gtime*4.2));
 ctx.fillStyle='#e9eefb';
 ctx.fillText('tap to retry',W/2,H*0.60);
 ctx.globalAlpha=1;
}

/* ---- input ---- */
function cardAt(x,y){
 for(let i=0;i<3;i++){
  const r=cardRect(i);
  if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)return i;
 }
 return -1;
}
function onDown(e){
 e.preventDefault();
 initAudio();
 if(AC&&AC.state==='suspended')AC.resume().catch(()=>{});
 try{cv.setPointerCapture(e.pointerId);}catch(err){}
 if(phase==='aim'){
  aiming=true;aimTarget=clampAim(e.clientX);
  lastPX=e.clientX;lastPT=performance.now();dragVX=0;
 }else if(phase==='place'){
  pendDrag=true;
  pendX=clamp(e.clientX,bx0+pegR,bx1-pegR);
  pendY=clamp(e.clientY-ballR*1.6,topH+pegR,H-pegR);
 }else if(phase==='draft'&&picked<0){
  pressedCard=cardAt(e.clientX,e.clientY);
 }
}
function onMove(e){
 if(aiming&&phase==='aim'){
  const now=performance.now(),dt=(now-lastPT)/1000;
  if(dt>0.001){const v=(e.clientX-lastPX)/dt;dragVX=dragVX*0.7+v*0.3;lastPX=e.clientX;lastPT=now;}
  aimTarget=clampAim(e.clientX);
 }else if(phase==='place'&&pendDrag){
  pendX=clamp(e.clientX,bx0+pegR,bx1-pegR);
  pendY=clamp(e.clientY-ballR*1.6,topH+pegR,H-pegR);
 }else if(phase==='draft'&&pressedCard>=0&&picked<0){
  if(cardAt(e.clientX,e.clientY)!==pressedCard)pressedCard=-1;
 }
}
function onUp(e){
 if(phase==='aim'&&aiming){
  aiming=false;
  const vx0=clamp(dragVX*0.12,-boardW*0.35,boardW*0.35);
  doDrop(aimX,vx0);
 }else if(phase==='place'&&pendDrag){
  pendDrag=false;
  tryPlace(pendX,pendY);
 }else if(phase==='draft'&&picked<0){
  const ci=cardAt(e.clientX,e.clientY);
  if(ci>=0&&ci===pressedCard)applyPick(ci);
  pressedCard=-1;
 }else if(phase==='over'&&overT>0.45){
  newRun();
 }
}
function onCancel(){aiming=false;pressedCard=-1;pendDrag=false;}
cv.addEventListener('pointerdown',onDown);
cv.addEventListener('pointermove',onMove);
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onCancel);
window.addEventListener('contextmenu',e=>e.preventDefault());

/* ---- resize ---- */
function onResize(){
 const oh=H,obx=bx0,obw=boardW;
 layout();
 const sx=boardW/obw,sy=H/oh;
 for(const b of balls){b.x=bx0+(b.x-obx)*sx;b.y*=sy;b.px=b.x;b.py=b.y;}
 aimX=bx0+(aimX-obx)*sx;
 aimTarget=bx0+(aimTarget-obx)*sx;
 pendX=bx0+(pendX-obx)*sx;pendY*=sy;
}
window.addEventListener('resize',onResize);

/* ---- test API ---- */
window.__game={
 state:()=>({round,quota,scored,dropsLeft,phase,pendingPart:phase==='place'?pendKey:null,upgrades:upgrades.slice(),best}),
 stepN:(n)=>{for(let i=0;i<n;i++)update(DT);draw();},
 drop:(x01)=>{if(phase==='aim'){const x=clampAim(bx0+clamp(x01,0,1)*boardW);aimX=aimTarget=x;doDrop(x,0);}},
 pick:(i)=>{if(phase==='draft'&&picked<0)applyPick(i);},
 placeAt:(x01,y01)=>{
  if(phase!=='place')return false;
  const x=bx0+clamp(x01,0,1)*boardW,y=clamp(y01,0,1)*H;
  pendX=x;pendY=y;
  return tryPlace(x,y);
 }
};

/* ---- boot ---- */
layout();
newRun();
if(window.requestAnimationFrame){
 let last=performance.now(),acc=0;
 const loop=(now)=>{
  requestAnimationFrame(loop);
  let d=(now-last)/1000;last=now;
  if(d>0.05)d=0.05;
  acc+=d;
  while(acc>=DT){update(DT);acc-=DT;}
  draw();
 };
 requestAnimationFrame(loop);
}
</script>
