<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>TOPPLE</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#0b0d12;overflow:hidden;overscroll-behavior:none}
  canvas{display:block;touch-action:none;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
'use strict';
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const STEP = 1/120;
const PAL = ['#ffce6b','#6ea8ff','#ff6b6b','#4bd48a','#9d7bff'];

let W=0, H=0, DPR=0;
let level=1, cansDown=0, cansTotal=0, ballsLeft=3, phase='play';
let cans=[], shelves=[], parts=[], sparks=[];
let cat=null, failCat=false, failClock=0, catHintA=0, catHintDone=false;
let ball={x:0,y:0,vx:0,vy:0,active:false,settled:true,settleC:0,airT:0};
let spot={x:150,y:500};
let canH=40, canW=25, PR=12.5, BR=11, G=1120, boothX=0, boothW=300, floorY=520;
let thrown=false, hintA=1;
let aiming=false, aimId=-1, aimStart={x:0,y:0}, aimCur={x:0,y:0};
let shake=0, popT=0, clearT=0, failT=0, settling=false, simT=0;
let lastHit={};
const hashMap=new Map();

/* ---------- levels ---------- */
function levelDef(n){
  // launcher sits bottom-LEFT; every stack gets a narrow plinth on the RIGHT side
  // so slingshot arcs have direct diagonal line-of-sight to the can bodies.
  // (a launcher UNDER a shelf can never reach cans standing on it — ballistics.)
  const L1={shelves:[{y:.42,x0:.52,x1:.92}],
            stacks:[{s:0,cx:.72,rows:[3,2,1]}]};
  // cat:{s,cx} — sleeping cat on shelf s at booth fraction cx. never counts as a can.
  const L2={shelves:[{y:.24,x0:.58,x1:.94},{y:.52,x0:.48,x1:.88},{y:.74,x0:.28,x1:.54}],
            stacks:[{s:0,cx:.76,rows:[2,2]},
                    {s:1,cx:.68,rows:[3,2,1]}],
            cat:{s:2,cx:.41}};
  const L3={shelves:[{y:.28,x0:.54,x1:.92},{y:.52,x0:.50,x1:.92},{y:.74,x0:.34,x1:.62}],
            stacks:[{s:0,cx:.73,rows:[3,2,1]},
                    {s:1,cx:.57,rows:[1,1]},
                    {s:1,cx:.85,rows:[1,1]},
                    {s:2,cx:.48,rows:[2]}],
            cat:{s:1,cx:.71}};
  const L4={shelves:[{y:.22,x0:.58,x1:.94},{y:.48,x0:.40,x1:.92},{y:.74,x0:.28,x1:.60}],
            stacks:[{s:0,cx:.76,rows:[3,2,1]},
                    {s:1,cx:.75,rows:[3,2]},
                    {s:2,cx:.44,rows:[3,2]}],
            cat:{s:1,cx:.49}};
  const defs=[L1,L2,L3,L4];
  const d=defs[Math.min(n-1,3)];
  const gapScale=n<=4?1:Math.max(0.15,1-(n-4)*0.35);
  return {def:d,gapScale};
}

function makeCan(x,baseY,shelf,id){
  const seg=(canH-canW)/2;
  const p=[];
  for(let i=0;i<3;i++){
    const y=baseY-PR-i*seg;
    p.push({x:x,y:y,px:x,py:y});
  }
  return {p,seg,shelf,id,color:PAL[id%PAL.length],down:false,tipT:0,frozen:false,sleep:0};
}

function build(n){
  level=n; phase='play'; ballsLeft=3; cansDown=0;
  clearT=0; failT=0; popT=0; shake=0; failCat=false; failClock=0;
  cans=[]; shelves=[]; parts=[]; sparks=[]; lastHit={};
  boothW=Math.min(W,H*0.72); boothX=(W-boothW)/2;
  canH=Math.min(W/7,H/12); canW=canH*0.62; PR=canW/2; BR=canW*0.45;
  G=H*2.0;
  floorY=H-Math.max(26,H*0.07);
  spot.x=boothX+boothW*0.13; spot.y=floorY-BR;   // bottom-left launch pad
  const {def,gapScale}=levelDef(n);
  for(const s of def.shelves){
    shelves.push({x0:boothX+s.x0*boothW, x1:boothX+s.x1*boothW,
                  y:s.y*H, th:Math.max(7,canH*0.18)});
  }
  cat=null;
  if(def.cat){
    const csh=shelves[def.cat.s], cr=canW*0.8, ccx=boothX+def.cat.cx*boothW;
    cat={x:ccx,y:csh.y-cr,px:ccx,py:csh.y-cr,r:cr,shelf:csh,frozen:true,asleep:true,
         sleepC:0,stirs:0,stirT:0,puffT:0,lastStir:-9};
  }
  catHintA=(level===2&&cat&&!catHintDone)?1:0;
  cansTotal=0;
  const gap=canW*0.10*gapScale;
  for(const st of def.stacks){
    const sh=shelves[st.s];
    const scx=boothX+st.cx*boothW;
    st.rows.forEach((count,ri)=>{
      const rowW=count*canW+(count-1)*gap;
      const baseY=sh.y-ri*canH;
      for(let i=0;i<count;i++){
        const x=scx-rowW/2+canW/2+i*(canW+gap);
        cans.push(makeCan(x,baseY,sh,cansTotal));
        cansTotal++;
      }
    });
  }
  for(const c of cans) for(const p of c.p) parts.push({p:p,c:c,kx:0,ky:0});
  ball.active=false; ball.settled=true; ball.settleC=0; ball.airT=0;
  // spawn FROZEN in the exact authored pose — a 3-particle stick can't balance on a
  // point contact, so live pre-settling tips the pyramid before the first throw.
  // Frozen cans are solid obstacles; they wake (and then honestly tumble) on impact.
  for(const c of cans){
    for(const p of c.p){p.px=p.x;p.py=p.y;}
    c.tipT=0; c.down=false; c.frozen=true; c.sleep=99;
  }
  cansDown=0; settling=false;
}

/* ---------- physics core ---------- */
function physStep(){
  simT+=STEP;
  const gg=G*STEP*STEP;
  for(const c of cans){
    if(c.frozen) continue;
    for(const p of c.p){
      const vx=(p.x-p.px)*0.999, vy=(p.y-p.py)*0.999;
      p.px=p.x; p.py=p.y;
      p.x+=vx; p.y+=vy+gg;
    }
  }
  integrateCat();
  if(ball.active) integrateBall();
  for(let r=0;r<2;r++){
    for(let i=0;i<3;i++) solveConstraints();
    collide();
  }
  updateCat();
  // sleep / freeze at rest
  for(const c of cans){
    if(c.frozen) continue;
    let m=0;
    for(const p of c.p){
      const ax=Math.abs(p.x-p.px), ay=Math.abs(p.y-p.py);
      if(ax>m)m=ax; if(ay>m)m=ay;
    }
    if(m<PR*0.012){ if(++c.sleep>30) c.frozen=true; }
    else c.sleep=0;
  }
  if(cat&&!cat.frozen){
    const m=Math.abs(cat.x-cat.px)+Math.abs(cat.y-cat.py);
    if(m<PR*0.012){ if(++cat.sleepC>30) cat.frozen=true; }
    else cat.sleepC=0;
  }
  if(!settling){
    detectDown();
    updateBallSettle();
    updateSparks();
    shake*=0.90;
    if(thrown&&hintA>0) hintA=Math.max(0,hintA-STEP*1.2);
    if(catHintDone&&catHintA>0) catHintA=Math.max(0,catHintA-STEP*1.2);
    popT=Math.max(0,popT-STEP*3);
    updateTimers(); // last: may rebuild the level
  }
}

function wake(c){ c.frozen=false; c.sleep=0; }

function solveConstraints(){
  for(const c of cans){
    if(c.frozen) continue;
    constrain(c.p[0],c.p[1],c.seg);
    constrain(c.p[1],c.p[2],c.seg);
    constrain(c.p[0],c.p[2],c.seg*2);
  }
}
function constrain(a,b,d){
  let dx=b.x-a.x, dy=b.y-a.y;
  const dist=Math.hypot(dx,dy)||1e-6;
  const diff=(dist-d)/dist*0.5;
  dx*=diff; dy*=diff;
  a.x+=dx; a.y+=dy;
  b.x-=dx; b.y-=dy;
}

function integrateBall(){
  ball.vy+=G*STEP;
  ball.x+=ball.vx*STEP;
  ball.y+=ball.vy*STEP;
  // floor
  if(ball.y>floorY-BR){
    ball.y=floorY-BR;
    if(ball.vy>0){
      if(ball.vy>H*0.25) fxImpact(ball.x,floorY,ball.vy,'thud','bfloor');
      ball.vy=-ball.vy*0.25;
      if(Math.abs(ball.vy)<G*STEP*3) ball.vy=0;
    }
    ball.vx*=0.995;
  }
  // walls
  if(ball.x<BR){ ball.x=BR; if(ball.vx<0) ball.vx=-ball.vx*0.4; }
  if(ball.x>W-BR){ ball.x=W-BR; if(ball.vx>0) ball.vx=-ball.vx*0.4; }
  // shelves (both sides)
  for(const s of shelves){
    const h=rectContact(ball.x,ball.y,BR,s);
    if(!h) continue;
    ball.x+=h.nx*h.pen; ball.y+=h.ny*h.pen;
    const vn=ball.vx*h.nx+ball.vy*h.ny;
    if(vn<0){
      ball.vx-=h.nx*vn*1.25; ball.vy-=h.ny*vn*1.25;
      ball.vx*=0.98; ball.vy*=0.98;
      if(-vn>H*0.15) fxImpact(ball.x-h.nx*BR,ball.y-h.ny*BR,-vn,'thud','bshelf');
    }
  }
}

// closest-point circle vs axis-aligned plank; null if no hit
function rectContact(px,py,r,s){
  const cx=Math.max(s.x0,Math.min(s.x1,px));
  const cy=Math.max(s.y,Math.min(s.y+s.th,py));
  const dx=px-cx, dy=py-cy;
  const d2=dx*dx+dy*dy;
  if(d2>0){
    if(d2>=r*r) return null;
    const d=Math.sqrt(d2);
    return {nx:dx/d,ny:dy/d,pen:r-d};
  }
  const dTop=py-s.y, dBot=s.y+s.th-py, dL=px-s.x0, dR=s.x1-px;
  const m=Math.min(dTop,dBot,dL,dR);
  if(m===dTop) return {nx:0,ny:-1,pen:dTop+r};
  if(m===dBot) return {nx:0,ny:1,pen:dBot+r};
  if(m===dL)  return {nx:-1,ny:0,pen:dL+r};
  return {nx:1,ny:0,pen:dR+r};
}
/* ---------- collisions ---------- */
function collide(){
  const cs=canW*1.3;
  hashMap.clear();
  for(let i=0;i<parts.length;i++){
    const e=parts[i], P=e.p;
    e.kx=Math.floor(P.x/cs); e.ky=Math.floor(P.y/cs);
    const k=(e.kx+1024)*4096+(e.ky+1024);
    let arr=hashMap.get(k);
    if(!arr){arr=[];hashMap.set(k,arr);}
    arr.push(i);
  }
  for(let i=0;i<parts.length;i++){
    const a=parts[i];
    for(let ox=-1;ox<=1;ox++)for(let oy=-1;oy<=1;oy++){
      const arr=hashMap.get((a.kx+ox+1024)*4096+(a.ky+oy+1024));
      if(!arr) continue;
      for(let q=0;q<arr.length;q++){
        const j=arr[q];
        if(j<=i) continue;
        collidePP(a,parts[j]);
      }
    }
  }
  if(ball.active) for(const e of parts) collideBallPart(e);
  if(cat){
    for(const e of parts) collideCatPart(e);
    if(ball.active) collideBallCat();
    if(!cat.frozen) collideCatWorld();
  }
  for(const e of parts) if(!e.c.frozen) collidePartWorld(e);
}

function collidePP(a,b){
  if(a.c===b.c) return;
  if(a.c.frozen&&b.c.frozen) return;
  const A=a.p, B=b.p;
  const dx=B.x-A.x, dy=B.y-A.y;
  const rr=PR*2;
  const d2=dx*dx+dy*dy;
  if(d2>=rr*rr||d2===0) return;
  const d=Math.sqrt(d2), nx=dx/d, ny=dy/d, ov=rr-d;
  const rvx=(B.x-B.px)-(A.x-A.px), rvy=(B.y-B.py)-(A.y-A.py);
  const vn=rvx*nx+rvy*ny; // <0 = approaching
  if(a.c.frozen&&(ov>PR*0.06||vn<-PR*0.04)) wake(a.c);
  if(b.c.frozen&&(ov>PR*0.06||vn<-PR*0.04)) wake(b.c);
  const wa=a.c.frozen?0:1, wb=b.c.frozen?0:1;
  const tw=wa+wb;
  if(tw===0) return;
  A.x-=nx*ov*(wa/tw); A.y-=ny*ov*(wa/tw);
  B.x+=nx*ov*(wb/tw); B.y+=ny*ov*(wb/tw);
  if(!settling&&vn<0){
    const spd=-vn/STEP;
    if(spd>canH*1.2)
      fxImpact((A.x+B.x)/2,(A.y+B.y)/2,spd,'clang','c'+a.c.id+'_'+b.c.id);
  }
}

function collideBallPart(e){
  const P=e.p, c=e.c;
  const dx=P.x-ball.x, dy=P.y-ball.y;
  const rr=BR+PR, d2=dx*dx+dy*dy;
  if(d2>=rr*rr||d2===0) return;
  const d=Math.sqrt(d2), nx=dx/d, ny=dy/d, ov=rr-d;
  if(c.frozen) wake(c);
  const wB=1/6, wP=1, tw=wB+wP;
  ball.x-=nx*ov*(wB/tw); ball.y-=ny*ov*(wB/tw);
  P.x+=nx*ov*(wP/tw);   P.y+=ny*ov*(wP/tw);
  const pvx=(P.x-P.px)/STEP, pvy=(P.y-P.py)/STEP;
  const rvn=(ball.vx-pvx)*nx+(ball.vy-pvy)*ny; // >0 = approaching
  if(rvn>0){
    const j=rvn*1.15/tw; // restitution 0.15 — heavy ball plows through
    ball.vx-=nx*j*wB; ball.vy-=ny*j*wB;
    P.px-=nx*j*wP*STEP; P.py-=ny*j*wP*STEP;
    if(!settling&&rvn>canH)
      fxImpact((ball.x+P.x)/2,(ball.y+P.y)/2,rvn,'clang','b'+c.id);
  }
}

function collidePartWorld(e){
  const P=e.p;
  // floor
  if(P.y>floorY-PR){
    const av=P.y-P.py; // approach speed toward floor (vy>0 = falling)
    contact(P,0,-1,P.y-(floorY-PR),0.85,0.05);
    if(!settling&&av>0&&av/STEP>canH*1.5)
      fxImpact(P.x,floorY,av/STEP,'thud','f'+e.c.id);
  }
  // walls
  if(P.x<PR) contact(P,1,0,PR-P.x,0.9,0.1);
  if(P.x>W-PR) contact(P,-1,0,P.x-(W-PR),0.9,0.1);
  // shelves (both sides)
  for(const s of shelves){
    const h=rectContact(P.x,P.y,PR,s);
    if(!h) continue;
    const av=-((P.x-P.px)*h.nx+(P.y-P.py)*h.ny);
    contact(P,h.nx,h.ny,h.pen,0.85,0.0);
    if(!settling&&av/STEP>canH*1.6)
      fxImpact(P.x-h.nx*PR,P.y-h.ny*PR,av/STEP,'thud','s'+e.c.id);
  }
}

// push particle out along n, damp tangential (friction) + normal (restitution)
function contact(P,nx,ny,pen,mu,rest){
  P.x+=nx*pen; P.y+=ny*pen;
  const vx=P.x-P.px, vy=P.y-P.py;
  let vn=vx*nx+vy*ny;
  const vtx=vx-vn*nx, vty=vy-vn*ny;
  if(vn<0) vn=-vn*rest;
  const nvx=vtx*mu+nx*vn, nvy=vty*mu+ny*vn;
  P.px=P.x-nvx; P.py=P.y-nvy;
}

/* ---------- cat: precision-demolition fail condition ---------- */
function integrateCat(){
  if(!cat||cat.frozen) return;
  const damp=cat.asleep?0.90:0.997; // sleepy cat soaks up nudges
  const vx=(cat.x-cat.px)*damp, vy=(cat.y-cat.py)*damp;
  cat.px=cat.x; cat.py=cat.y;
  cat.x+=vx; cat.y+=vy+G*STEP*STEP;
}
function collideCatPart(e){
  const P=e.p, c=e.c;
  if(c.frozen&&cat.frozen) return;
  const dx=P.x-cat.x, dy=P.y-cat.y;
  const rr=cat.r+PR, d2=dx*dx+dy*dy;
  if(d2>=rr*rr||d2===0) return;
  const d=Math.sqrt(d2), nx=dx/d, ny=dy/d, ov=rr-d;
  // relative approach speed of the can particle toward the cat (px/s)
  const appr=-(((P.x-P.px)-(cat.x-cat.px))*nx+((P.y-P.py)-(cat.y-cat.py))*ny)/STEP;
  if(c.frozen&&(ov>PR*0.06||appr*STEP>PR*0.04)) wake(c);
  if(cat.frozen&&!c.frozen){ cat.frozen=false; cat.sleepC=0; }
  if(appr>canH*1.6) wakeCat();       // hard impact — cat wakes: FAIL
  else if(appr>canH*0.5) stirCat();  // cushioned nudge — stirs, stays asleep
  const wP=c.frozen?0:1, wC=cat.frozen?0:0.5, tw=wP+wC; // cat = 2x can mass
  if(tw===0) return;
  P.x+=nx*ov*(wP/tw); P.y+=ny*ov*(wP/tw);
  cat.x-=nx*ov*(wC/tw); cat.y-=ny*ov*(wC/tw);
}
function collideBallCat(){
  const dx=cat.x-ball.x, dy=cat.y-ball.y;
  const rr=BR+cat.r, d2=dx*dx+dy*dy;
  if(d2>=rr*rr||d2===0) return;
  const d=Math.sqrt(d2), nx=dx/d, ny=dy/d, ov=rr-d;
  wakeCat();                          // direct ball hit at any speed: FAIL
  cat.frozen=false; cat.sleepC=0;
  const wB=1/6, wC=0.5, tw=wB+wC;
  ball.x-=nx*ov*(wB/tw); ball.y-=ny*ov*(wB/tw);
  cat.x+=nx*ov*(wC/tw); cat.y+=ny*ov*(wC/tw);
  const cvx=(cat.x-cat.px)/STEP, cvy=(cat.y-cat.py)/STEP;
  const rvn=(ball.vx-cvx)*nx+(ball.vy-cvy)*ny;
  if(rvn>0){
    const j=rvn*1.2/tw;
    ball.vx-=nx*j*wB; ball.vy-=ny*j*wB;
    cat.px-=nx*j*wC*STEP; cat.py-=ny*j*wC*STEP;
  }
}
function collideCatWorld(){
  if(cat.y>floorY-cat.r){
    if((cat.y-cat.py)/STEP>canH*1.6) wakeCat();
    contact(cat,0,-1,cat.y-(floorY-cat.r),0.7,0.05);
  }
  if(cat.x<cat.r) contact(cat,1,0,cat.r-cat.x,0.9,0.1);
  if(cat.x>W-cat.r) contact(cat,-1,0,cat.x-(W-cat.r),0.9,0.1);
  for(const s of shelves){
    const h=rectContact(cat.x,cat.y,cat.r,s);
    if(!h) continue;
    const av=-((cat.x-cat.px)*h.nx+(cat.y-cat.py)*h.ny)/STEP;
    if(av>canH*1.6) wakeCat();        // shelf jolt
    else if(av>canH*0.6) stirCat();
    contact(cat,h.nx,h.ny,h.pen,0.85,0);
  }
}
function updateCat(){
  if(!cat) return;
  if(cat.stirT>0) cat.stirT=Math.max(0,cat.stirT-STEP);
  if(cat.puffT>0) cat.puffT=Math.max(0,cat.puffT-STEP*1.5);
  // slid off its plinth (past an end, or below the shelf line): FAIL
  if(cat.asleep&&(cat.y>cat.shelf.y+cat.r||
     cat.x<cat.shelf.x0-cat.r*0.6||cat.x>cat.shelf.x1+cat.r*0.6)) wakeCat();
}
function wakeCat(){
  if(!cat||!cat.asleep||phase!=='play') return;
  cat.asleep=false; cat.frozen=false; cat.sleepC=0;
  phase='fail'; failCat=true; failT=0; failClock=0;
  shake=Math.min(4,shake+3);
  spawnSparks(cat.x,cat.y-cat.r,10,'#ff6b6b',0.8);
  sMewAngry();
}
function stirCat(){
  if(!cat||!cat.asleep||simT-cat.lastStir<0.6) return;
  cat.lastStir=simT;
  cat.stirs++; cat.stirT=0.9; cat.puffT=1.2;
  sMewSoft();
}

/* ---------- rules ---------- */
function detectDown(){
  for(const c of cans){
    if(c.down) continue;
    const b=c.p[0], m=c.p[1], t=c.p[2];
    let d=false;
    if(m.y>c.shelf.y+canH) d=true;                 // fell below its shelf
    if(b.y>floorY-PR-2||t.y>floorY-PR-2) d=true;   // reached floor zone
    const ax=t.x-b.x, ay=t.y-b.y;
    const len=Math.hypot(ax,ay)||1;
    if((-ay)/len<0.342){ // tilted >70 deg from vertical
      c.tipT+=STEP;
      if(c.tipT>0.5) d=true;
    } else c.tipT=0;
    if(d){
      c.down=true; cansDown++;
      onCanDown(c);
    }
  }
}

function onCanDown(c){
  popT=1;
  sDing(cansDown);
  spawnSparks(c.p[1].x,c.p[1].y,7,c.color,0.6);
  if(cansDown>=cansTotal&&phase==='play'){
    phase='clear'; clearT=0;
    sFanfare();
    shake=Math.min(4,shake+2);
  }
}

function updateBallSettle(){
  if(ball.active&&!ball.settled){
    ball.airT+=STEP;
    const sp=Math.hypot(ball.vx,ball.vy);
    if(sp<canW*0.7) ball.settleC++; else ball.settleC=0;
    if(ball.settleC>90||ball.airT>8) ball.settled=true;
  }
  if(phase==='play'&&ballsLeft===0&&ball.settled&&cansDown<cansTotal){
    let quiet=true;
    for(const c of cans){
      if(c.down) continue;
      if(c.tipT>0){ quiet=false; break; } // tip timer running — about to count
      if(c.frozen) continue;
      let m=0;
      for(const p of c.p) m=Math.max(m,Math.abs(p.x-p.px)+Math.abs(p.y-p.py));
      if(m>PR*0.03){ quiet=false; break; }
    }
    if(quiet&&cat&&!cat.frozen&&
       Math.abs(cat.x-cat.px)+Math.abs(cat.y-cat.py)>PR*0.03) quiet=false;
    if(quiet){ phase='fail'; failT=0; failCat=false; failClock=0; }
  }
}

function updateTimers(){
  if(phase==='clear'){
    clearT+=STEP;
    if(clearT>1.4) build(level+1);
  } else if(phase==='fail'){
    failT=Math.min(1,failT+STEP*3);
    failClock+=STEP;
    if(failCat&&failClock>1.4) build(level); // woke the cat — auto retry
  }
}

/* ---------- juice: sparks, shake, impact fx ---------- */
function spawnSparks(x,y,n,color,pow){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=(40+Math.random()*220)*(0.5+pow);
    sparks.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,
                 life:0.25+Math.random()*0.35,max:0.6,
                 color:color,size:1.5+Math.random()*2});
  }
  if(sparks.length>220) sparks.splice(0,sparks.length-220);
}
function updateSparks(){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx*STEP; s.y+=s.vy*STEP;
    s.vy+=G*0.6*STEP; s.vx*=0.99;
    s.life-=STEP;
    if(s.life<=0) sparks.splice(i,1);
  }
}
function fxImpact(x,y,spd,kind,key){
  if(settling) return;
  const vol=Math.min(1,spd/(W*2.2));
  if(simT-(lastHit[kind+key]||-9)>0.07){
    lastHit[kind+key]=simT;
    if(kind==='clang') sClang(vol); else sThud(vol);
  }
  if(vol>0.10){
    spawnSparks(x,y,Math.min(10,(2+vol*8)|0),
                kind==='clang'?'#ffd9a0':'#9c8468',vol);
    if(vol>0.3) shake=Math.min(4,shake+vol*2.5);
  }
}

/* ---------- audio (synth only, lazy) ---------- */
let actx=null, noiseBuf=null;
let creakOsc=null, creakGain=null;
function ensureAudio(){
  if(actx) return;
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }
  catch(err){ return; }
  const len=(actx.sampleRate*0.5)|0;
  noiseBuf=actx.createBuffer(1,len,actx.sampleRate);
  const d=noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
}
document.addEventListener('visibilitychange',()=>{
  if(actx&&document.visibilityState==='visible') actx.resume();
});
function noiseHit(t,dur,freq,vol){
  const src=actx.createBufferSource(); src.buffer=noiseBuf;
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start(t); src.stop(t+dur+0.02);
}
function sClang(vol){
  if(!actx) return;
  const t=actx.currentTime;
  const fr=800+Math.random()*800;
  const o=actx.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(fr,t);
  o.frequency.exponentialRampToValueAtTime(fr*0.78,t+0.09);
  const f=actx.createBiquadFilter(); f.type='bandpass';
  f.frequency.value=fr*1.4; f.Q.value=2.5;
  const g=actx.createGain();
  const v=Math.max(0.012,vol*0.30);
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.10);
  o.connect(f); f.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+0.12);
  noiseHit(t,0.05,3000,v*0.5);
}
function sThud(vol){
  if(!actx) return;
  const t=actx.currentTime;
  const o=actx.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(170,t);
  o.frequency.exponentialRampToValueAtTime(65,t+0.09);
  const g=actx.createGain();
  const v=Math.max(0.02,vol*0.5);
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+0.15);
  noiseHit(t,0.08,350,v*0.8);
}
function sWhump(pow){
  if(!actx) return;
  const t=actx.currentTime;
  const o=actx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(130,t);
  o.frequency.exponentialRampToValueAtTime(42,t+0.18);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.25+pow*0.35,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+0.28);
  noiseHit(t,0.12,240,0.15+pow*0.15);
}
function sDing(i){
  if(!actx) return;
  const t=actx.currentTime;
  const fr=660*Math.pow(1.0595,Math.min(i,24));
  for(let h=0;h<2;h++){
    const o=actx.createOscillator(); o.type='sine';
    o.frequency.value=fr*(h?2:1);
    const g=actx.createGain();
    g.gain.setValueAtTime(h?0.05:0.16,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t+0.28);
  }
}
function sFanfare(){
  if(!actx) return;
  const t0=actx.currentTime;
  [523.25,659.25,783.99].forEach((fr,i)=>{
    const t=t0+i*0.12;
    const o=actx.createOscillator(); o.type='triangle';
    o.frequency.value=fr;
    const g=actx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(i===2?0.6:0.28));
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t+0.7);
    if(i===2){
      const o2=actx.createOscillator(); o2.type='sine';
      o2.frequency.value=fr*2;
      const g2=actx.createGain();
      g2.gain.setValueAtTime(0.08,t);
      g2.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
      o2.connect(g2); g2.connect(actx.destination);
      o2.start(t); o2.stop(t+0.55);
    }
  });
}
function sMewSoft(){
  if(!actx) return;
  const t=actx.currentTime;
  const o=actx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(540,t);
  o.frequency.linearRampToValueAtTime(880,t+0.08);
  o.frequency.linearRampToValueAtTime(600,t+0.22);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.07,t+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.26);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+0.3);
}
function sMewAngry(){
  if(!actx) return;
  const t0=actx.currentTime;
  [[1150,620,0],[980,460,0.24]].forEach(q=>{
    const t=t0+q[2];
    const o=actx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(q[0],t);
    o.frequency.exponentialRampToValueAtTime(q[1],t+0.20);
    const f=actx.createBiquadFilter(); f.type='bandpass';
    f.frequency.value=950; f.Q.value=1.2;
    const g=actx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.24,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);
    o.connect(f); f.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t+0.28);
  });
}
function creakStart(){
  if(!actx||creakOsc) return;
  creakOsc=actx.createOscillator(); creakOsc.type='sawtooth';
  creakOsc.frequency.value=65;
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=420;
  creakGain=actx.createGain(); creakGain.gain.value=0;
  creakOsc.connect(f); f.connect(creakGain); creakGain.connect(actx.destination);
  creakOsc.start();
}
function creakUpdate(frac){
  if(!creakGain) return;
  const t=actx.currentTime;
  creakGain.gain.setTargetAtTime(0.003+frac*0.028,t,0.04);
  creakOsc.frequency.setTargetAtTime(58+frac*95,t,0.06);
}
function creakStop(){
  if(!creakOsc) return;
  const t=actx.currentTime;
  creakGain.gain.setTargetAtTime(0,t,0.02);
  creakOsc.stop(t+0.15);
  creakOsc=null; creakGain=null;
}
/* ---------- input ---------- */
function evtPos(e){
  const r=cv.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}
function maxPull(){ return Math.min(W,H)*0.38; }
// full pull must clear the top shelf even on tall portrait screens:
// against G=2H, reaching ~0.75H needs v≈1.73H — W-only caps starve phones.
function maxSpeed(){ return Math.max(W*2.8, H*2.05); }
function pullVec(){ return {x:aimStart.x-aimCur.x, y:aimStart.y-aimCur.y}; }
function pullFrac(){
  const pv=pullVec();
  return Math.min(1,Math.hypot(pv.x,pv.y)/maxPull());
}
function launchVec(){
  const pv=pullVec();
  const m=Math.hypot(pv.x,pv.y);
  const f=Math.min(1,m/maxPull());
  const sp=f*maxSpeed();
  return {vx:m?pv.x/m*sp:0, vy:m?pv.y/m*sp:0, mag:m};
}
function pulledPos(){
  const pv=pullVec();
  const m=Math.hypot(pv.x,pv.y)||1;
  const cl=Math.min(m,maxPull());
  let x=spot.x-pv.x/m*cl, y=spot.y-pv.y/m*cl;
  x=Math.max(BR,Math.min(W-BR,x));
  y=Math.max(BR,Math.min(floorY-BR,y));
  return {x:x,y:y};
}
function doThrow(vx,vy,from){
  ball.x=from?from.x:spot.x;
  ball.y=from?from.y:spot.y;
  ball.vx=vx; ball.vy=vy;
  ball.active=true; ball.settled=false; ball.settleC=0; ball.airT=0;
  ballsLeft--;
  thrown=true;
  if(catHintA>0) catHintDone=true;
  sWhump(Math.min(1,Math.hypot(vx,vy)/maxSpeed()));
}
function onDown(e){
  e.preventDefault();
  ensureAudio();
  if(actx&&actx.state==='suspended') actx.resume();
  const p=evtPos(e);
  if(p.x>W-56&&p.y<56){ build(level); return; }   // restart button
  if(phase==='fail'){ build(level); return; }      // tap anywhere to retry
  if(phase!=='play'||ballsLeft<=0||aiming) return;
  const nearBall=Math.hypot(p.x-spot.x,p.y-spot.y)<BR*3;
  if(p.y>H*0.62||nearBall){
    aiming=true; aimId=e.pointerId;
    aimStart=p; aimCur=p;
    try{ cv.setPointerCapture(e.pointerId); }catch(err){}
    ball.active=false; // next throw resets the ball to the spot
    creakStart();
  }
}
function onMove(e){
  if(!aiming||e.pointerId!==aimId) return;
  e.preventDefault();
  aimCur=evtPos(e);
  creakUpdate(pullFrac());
}
function onUp(e){
  if(!aiming||e.pointerId!==aimId) return;
  aiming=false; creakStop();
  if(phase!=='play'||ballsLeft<=0) return;
  const v=launchVec();
  if(v.mag<12) return; // tiny drag cancels
  doThrow(v.vx,v.vy,pulledPos());
}
cv.addEventListener('pointerdown',onDown);
cv.addEventListener('pointermove',onMove);
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onUp);
cv.addEventListener('contextmenu',e=>e.preventDefault());

/* ---------- drawing ---------- */
function shadeCol(hex,f){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  if(f>=0){ r+=(255-r)*f; g+=(255-g)*f; b+=(255-b)*f; }
  else { r*=1+f; g*=1+f; b*=1+f; }
  return 'rgb('+(r|0)+','+(g|0)+','+(b|0)+')';
}
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawBG(){
  ctx.fillStyle='#0b0d12';
  ctx.fillRect(-8,-8,W+16,H+16);
  const px0=Math.max(0,boothX-W*0.03), px1=Math.min(W,boothX+boothW+W*0.03);
  const pTop=H*0.045;
  ctx.fillStyle='#161a24';
  ctx.fillRect(px0,pTop,px1-px0,floorY-pTop);
  ctx.fillStyle='rgba(255,255,255,0.022)';
  const sw=(px1-px0)/9;
  for(let i=0;i<9;i+=2) ctx.fillRect(px0+i*sw,pTop,sw,floorY-pTop);
  // awning scallops
  const aH=Math.min(24,H*0.035), n=8, aw=(px1-px0)/n;
  for(let i=0;i<n;i++){
    ctx.fillStyle=i%2?'#1c202c':'#2a2f3f';
    ctx.beginPath();
    ctx.moveTo(px0+i*aw,pTop);
    ctx.lineTo(px0+(i+1)*aw,pTop);
    ctx.lineTo(px0+(i+0.5)*aw,pTop+aH);
    ctx.closePath(); ctx.fill();
  }
  // floor
  ctx.fillStyle='#0e1017';
  ctx.fillRect(0,floorY,W,H-floorY);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(0,floorY,W,1);
}
function drawShelves(){
  for(const s of shelves){
    const g=ctx.createLinearGradient(0,s.y,0,s.y+s.th);
    g.addColorStop(0,'#4d3a26');
    g.addColorStop(0.25,'#3b2d1f');
    g.addColorStop(1,'#241b12');
    ctx.fillStyle=g;
    ctx.fillRect(s.x0,s.y,s.x1-s.x0,s.th);
    ctx.fillStyle='rgba(255,220,160,0.14)';
    ctx.fillRect(s.x0,s.y,s.x1-s.x0,1);
    ctx.fillStyle='#1b140c';
    const bw=s.th*1.4;
    ctx.beginPath();
    ctx.moveTo(s.x0,s.y+s.th); ctx.lineTo(s.x0+bw,s.y+s.th); ctx.lineTo(s.x0,s.y+s.th+bw);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s.x1,s.y+s.th); ctx.lineTo(s.x1-bw,s.y+s.th); ctx.lineTo(s.x1,s.y+s.th+bw);
    ctx.closePath(); ctx.fill();
  }
}
function drawCan(c){
  const b=c.p[0], t=c.p[2];
  const mx=(b.x+t.x)/2, my=(b.y+t.y)/2;
  const ang=Math.atan2(t.y-b.y,t.x-b.x)+Math.PI/2;
  ctx.save();
  ctx.translate(mx,my); ctx.rotate(ang);
  const hw=canW/2, hh=canH/2;
  let g;
  if(c.down){
    g=ctx.createLinearGradient(-hw,0,hw,0);
    g.addColorStop(0,'#3c4049'); g.addColorStop(0.4,'#565b66'); g.addColorStop(1,'#43474f');
  } else {
    g=ctx.createLinearGradient(-hw,0,hw,0);
    g.addColorStop(0,shadeCol(c.color,-0.4));
    g.addColorStop(0.35,c.color);
    g.addColorStop(0.72,shadeCol(c.color,0.22));
    g.addColorStop(1,shadeCol(c.color,-0.2));
  }
  ctx.fillStyle=g;
  rr(-hw,-hh,canW,canH,canW*0.14);
  ctx.fill();
  // label band
  ctx.fillStyle=c.down?'rgba(150,155,165,0.5)':'#f2ead8';
  ctx.fillRect(-hw+1,-canH*0.10,canW-2,canH*0.28);
  ctx.fillStyle=c.down?'rgba(30,32,40,0.4)':'rgba(24,27,38,0.6)';
  ctx.fillRect(-hw*0.55,canH*0.005,canW*0.55,canH*0.06);
  // lid
  ctx.fillStyle=c.down?'#6a6f7a':shadeCol(c.color,0.35);
  ctx.beginPath();
  ctx.ellipse(0,-hh+1,hw*0.82,canW*0.16,0,0,Math.PI*2);
  ctx.fill();
  // bottom rim
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.fillRect(-hw+1,hh-canH*0.07,canW-2,canH*0.05);
  ctx.restore();
}
function drawBallAt(x,y){
  ctx.beginPath();
  ctx.ellipse(x,Math.min(floorY-1,y+BR*1.05),BR*0.9,BR*0.28,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fill();
  const g=ctx.createRadialGradient(x-BR*0.35,y-BR*0.4,BR*0.12,x,y,BR);
  g.addColorStop(0,'#5b6374');
  g.addColorStop(0.55,'#2b303c');
  g.addColorStop(1,'#14161d');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,BR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(x-BR*0.35,y-BR*0.42,BR*0.18,BR*0.11,-0.6,0,Math.PI*2);
  ctx.fill();
}
function drawAim(){
  const pp=pulledPos();
  const v=launchVec();
  const f=pullFrac();
  // rubber band
  ctx.strokeStyle='#6b4a2e'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(spot.x-BR*1.6,spot.y+BR*0.3); ctx.lineTo(pp.x,pp.y);
  ctx.moveTo(spot.x+BR*1.6,spot.y+BR*0.3); ctx.lineTo(pp.x,pp.y);
  ctx.stroke();
  // trajectory dots (gravity-only)
  if(v.mag>=12){
    const cr=Math.round(75+f*180), cg=Math.round(212-f*105);
    for(let i=1;i<=10;i++){
      const t=i*0.085;
      const dx=pp.x+v.vx*t, dy=pp.y+v.vy*t+0.5*G*t*t;
      if(dy>floorY) break;
      ctx.globalAlpha=1-i*0.07;
      ctx.fillStyle='rgb('+cr+','+cg+',110)';
      ctx.beginPath();
      ctx.arc(dx,dy,Math.max(1.5,4-i*0.22),0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  drawBallAt(pp.x,pp.y);
}
/* ---------- cat drawing ---------- */
function catEar(x,y,rot,r){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(rot);
  ctx.fillStyle='#877a6b';
  ctx.beginPath();
  ctx.moveTo(-r*0.17,r*0.13); ctx.lineTo(r*0.17,r*0.13); ctx.lineTo(0,-r*0.27);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#5e5348';
  ctx.beginPath();
  ctx.moveTo(-r*0.08,r*0.09); ctx.lineTo(r*0.08,r*0.09); ctx.lineTo(0,-r*0.14);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawCatAsleep(r){
  const tw=cat.stirT>0?Math.sin(cat.stirT*45)*0.2*Math.min(1,cat.stirT*2.5):0;
  const g=ctx.createRadialGradient(-r*0.25,-r*0.35,r*0.2,0,0,r);
  g.addColorStop(0,'#a89a8d');
  g.addColorStop(0.7,'#8d8073');
  g.addColorStop(1,'#6f6558');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  // curled tail
  ctx.strokeStyle='#7a6e60'; ctx.lineWidth=r*0.28; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,0,r*0.70,Math.PI*0.22,Math.PI*0.95); ctx.stroke();
  // stripes
  ctx.strokeStyle='rgba(60,52,44,0.28)'; ctx.lineWidth=r*0.11;
  ctx.beginPath(); ctx.arc(0,0,r*0.82,-Math.PI*0.62,-Math.PI*0.18); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,r*0.58,-Math.PI*0.55,-Math.PI*0.12); ctx.stroke();
  // ears (head tucked upper-left; twitch when stirred)
  catEar(-r*0.62,-r*0.72,-0.55+tw,r);
  catEar(-r*0.20,-r*0.93,0.25+tw,r);
  // closed eyes
  ctx.strokeStyle='#3c342c'; ctx.lineWidth=Math.max(1,r*0.07); ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-r*0.52,-r*0.38,r*0.12,Math.PI*0.15,Math.PI*0.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(-r*0.16,-r*0.50,r*0.12,Math.PI*0.15,Math.PI*0.85); ctx.stroke();
  // nose
  ctx.fillStyle='#c98a7a';
  ctx.beginPath(); ctx.arc(-r*0.34,-r*0.28,r*0.06,0,Math.PI*2); ctx.fill();
}
function drawCatAwake(r){
  // tail up
  ctx.strokeStyle='#7a6e60'; ctx.lineWidth=r*0.22; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(r*0.5,r*0.7);
  ctx.quadraticCurveTo(r*1.05,r*0.3,r*0.85,-r*0.55);
  ctx.stroke();
  // body sits up
  const g=ctx.createLinearGradient(0,-r*1.3,0,r);
  g.addColorStop(0,'#a89a8d'); g.addColorStop(1,'#6f6558');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(0,r*0.18,r*0.72,r*0.82,0,0,Math.PI*2); ctx.fill();
  // head + upright ears
  ctx.beginPath(); ctx.arc(0,-r*0.72,r*0.52,0,Math.PI*2); ctx.fill();
  catEar(-r*0.34,-r*1.12,-0.28,r*1.15);
  catEar(r*0.34,-r*1.12,0.28,r*1.15);
  // wide-open eyes
  ctx.fillStyle='#f6efdd';
  ctx.beginPath(); ctx.arc(-r*0.2,-r*0.76,r*0.13,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.2,-r*0.76,r*0.13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#221c16';
  ctx.beginPath(); ctx.arc(-r*0.2,-r*0.76,r*0.055,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.2,-r*0.76,r*0.055,0,Math.PI*2); ctx.fill();
  // angry brows + tiny mouth
  ctx.strokeStyle='#3c342c'; ctx.lineWidth=Math.max(1,r*0.07); ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.33,-r*0.98); ctx.lineTo(-r*0.10,-r*0.90);
  ctx.moveTo(r*0.10,-r*0.90); ctx.lineTo(r*0.33,-r*0.98);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(0,-r*0.58,r*0.09,Math.PI*0.15,Math.PI*0.85); ctx.stroke();
}
function drawCat(){
  if(!cat) return;
  const r=cat.r;
  ctx.save();
  ctx.translate(cat.x,cat.y);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0,r*0.92,r*0.95,r*0.22,0,0,Math.PI*2);
  ctx.fill();
  if(cat.asleep){
    const b=1.015+0.015*Math.sin(simT*1.6); // breathing 1.00..1.03
    ctx.scale(b,b);
    drawCatAsleep(r);
  } else {
    drawCatAwake(r);
  }
  ctx.restore();
  ctx.textBaseline='middle';
  if(cat.asleep){
    ctx.textAlign='center';
    for(let k=0;k<2;k++){
      const ph=((simT+k)%2)/2; // one z drifts up every ~2s
      const a=Math.sin(ph*Math.PI)*0.7;
      if(a<0.03) continue;
      ctx.globalAlpha=a;
      ctx.fillStyle='#cfc4b4';
      ctx.font='700 '+(r*(0.36+ph*0.2))+'px system-ui,-apple-system,sans-serif';
      ctx.fillText('z',cat.x+r*(0.55+ph*0.4+k*0.2),cat.y-r*(1.05+ph*1.15));
    }
    ctx.globalAlpha=1;
  }
  if(cat.puffT>0){
    ctx.globalAlpha=Math.min(1,cat.puffT);
    ctx.fillStyle='#e8e0d2';
    ctx.textAlign='center';
    ctx.font='700 '+(r*0.5)+'px system-ui,-apple-system,sans-serif';
    ctx.fillText('· · ·',cat.x,cat.y-r*(1.3+(1.2-cat.puffT)*0.35));
    ctx.globalAlpha=1;
  }
}
function drawHudCat(x,y,s){
  ctx.save();
  ctx.translate(x,y);
  ctx.fillStyle='#b9a89a';
  ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-s*0.85,-s*0.15); ctx.lineTo(-s*0.45,-s*1.05); ctx.lineTo(-s*0.05,-s*0.45);
  ctx.moveTo(s*0.05,-s*0.45); ctx.lineTo(s*0.45,-s*1.05); ctx.lineTo(s*0.85,-s*0.15);
  ctx.fill();
  ctx.strokeStyle='#1c202c'; ctx.lineWidth=Math.max(1,s*0.16); ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-s*0.45,s*0.02); ctx.quadraticCurveTo(-s*0.27,s*0.2,-s*0.09,s*0.02);
  ctx.moveTo(s*0.09,s*0.02); ctx.quadraticCurveTo(s*0.27,s*0.2,s*0.45,s*0.02);
  ctx.stroke();
  ctx.restore();
  if(cat.asleep){
    ctx.fillStyle='#8b93a7';
    ctx.font='700 '+(s*1.1)+'px system-ui,-apple-system,sans-serif';
    ctx.textAlign='left';
    ctx.fillText('zzz',x+s*1.35,y-s*0.7);
  }
}
function drawHUD(){
  const base=Math.min(W,H);
  const fs=Math.max(11,base*0.042);
  ctx.textBaseline='middle';
  ctx.fillStyle='#8b93a7';
  ctx.font='700 '+fs+'px system-ui,-apple-system,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('LEVEL '+level,12,24);
  ctx.textAlign='right';
  ctx.font=(fs*1.6)+'px system-ui,-apple-system,sans-serif';
  ctx.fillText('↻',W-14,25);
  // counter with pop
  ctx.save();
  ctx.translate(W/2,25);
  const sc=1+popT*0.35;
  ctx.scale(sc,sc);
  ctx.textAlign='center';
  ctx.font='800 '+Math.max(17,base*0.062)+'px system-ui,-apple-system,sans-serif';
  ctx.fillStyle=popT>0.4?'#ffce6b':'#dfe4ee';
  ctx.fillText('cans '+cansDown+'/'+cansTotal,0,0);
  ctx.restore();
  // sleeping-cat badge next to the counter (cat levels only)
  if(cat){
    const cfs=Math.max(17,base*0.062);
    ctx.font='800 '+cfs+'px system-ui,-apple-system,sans-serif';
    const cw=ctx.measureText('cans '+cansDown+'/'+cansTotal).width;
    drawHudCat(W/2+cw/2+cfs*1.3,25,cfs*0.34);
  }
  // balls-left dots
  if(phase==='play'){
    const dy=spot.y-BR-16;
    for(let i=0;i<ballsLeft;i++){
      ctx.fillStyle='#8b93a7';
      ctx.beginPath();
      ctx.arc(spot.x+(i-(ballsLeft-1)/2)*12,dy,3,0,Math.PI*2);
      ctx.fill();
    }
  }
  // hint pill
  if(hintA>0&&phase==='play'){
    ctx.globalAlpha=Math.min(0.92,hintA);
    const txt='drag back · fling';
    ctx.font='600 '+Math.max(11,base*0.04)+'px system-ui,-apple-system,sans-serif';
    const tw=ctx.measureText(txt).width;
    const bx=W/2-tw/2-12, by=spot.y-BR*2-46;
    ctx.fillStyle='rgba(22,26,36,0.92)';
    rr(bx,by,tw+24,26,13); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
    rr(bx,by,tw+24,26,13); ctx.stroke();
    ctx.fillStyle='#c9d1e2';
    ctx.textAlign='center';
    ctx.fillText(txt,W/2,by+13.5);
    ctx.globalAlpha=1;
  }
  // one-time cat warning (first cat level)
  if(catHintA>0&&phase==='play'&&cat){
    ctx.globalAlpha=Math.min(0.92,catHintA);
    const txt='don’t wake the cat';
    ctx.font='600 '+Math.max(11,base*0.04)+'px system-ui,-apple-system,sans-serif';
    const tw=ctx.measureText(txt).width;
    const cxp=Math.max(tw/2+14,Math.min(W-tw/2-14,cat.x));
    const bx=cxp-tw/2-12, by=cat.y-cat.r*2-38;
    ctx.fillStyle='rgba(22,26,36,0.92)';
    rr(bx,by,tw+24,26,13); ctx.fill();
    ctx.strokeStyle='rgba(255,206,107,0.35)'; ctx.lineWidth=1;
    rr(bx,by,tw+24,26,13); ctx.stroke();
    ctx.fillStyle='#ffce6b';
    ctx.textAlign='center';
    ctx.fillText(txt,cxp,by+13.5);
    ctx.globalAlpha=1;
  }
}
function easeOutBack(x){
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2);
}
function drawBanner(){
  const base=Math.min(W,H);
  if(phase==='clear'){
    const a=Math.min(1,clearT/0.12);
    const s=easeOutBack(Math.min(1,clearT/0.35));
    ctx.save();
    ctx.globalAlpha=a;
    ctx.translate(W/2,H*0.42);
    ctx.scale(Math.max(0.001,s),Math.max(0.001,s));
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='900 '+base*0.13+'px system-ui,-apple-system,sans-serif';
    ctx.shadowColor='#ffce6b'; ctx.shadowBlur=26;
    ctx.fillStyle='#ffce6b';
    ctx.fillText(cat?'ALL DOWN':'ALL DOWN!',0,0);
    ctx.shadowBlur=0;
    if(cat){
      ctx.font='700 '+base*0.05+'px system-ui,-apple-system,sans-serif';
      ctx.fillStyle='#b9a89a';
      ctx.fillText('— cat still dreaming —',0,base*0.085);
    }
    ctx.font='600 '+base*0.045+'px system-ui,-apple-system,sans-serif';
    ctx.fillStyle='#c9d1e2';
    ctx.fillText('level '+(level+1)+' →',0,base*(cat?0.155:0.09));
    ctx.restore();
  } else if(phase==='fail'){
    ctx.fillStyle='rgba(6,8,12,'+(0.5*failT)+')';
    ctx.fillRect(-8,-8,W+16,H+16);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(failCat){
      // red vignette + startle flash
      const vg=ctx.createRadialGradient(W/2,H/2,base*0.2,W/2,H/2,Math.max(W,H)*0.72);
      vg.addColorStop(0,'rgba(200,30,30,0)');
      vg.addColorStop(1,'rgba(200,30,30,'+(0.5*failT)+')');
      ctx.fillStyle=vg; ctx.fillRect(-8,-8,W+16,H+16);
      const flash=Math.max(0,1-failClock*3.5);
      if(flash>0){
        ctx.fillStyle='rgba(255,50,50,'+(flash*0.28)+')';
        ctx.fillRect(-8,-8,W+16,H+16);
      }
      ctx.globalAlpha=failT;
      ctx.font='900 '+base*0.082+'px system-ui,-apple-system,sans-serif';
      ctx.fillStyle='#ff6b6b';
      ctx.fillText('YOU WOKE THE CAT',W/2,H*0.40);
      ctx.font='600 '+base*0.045+'px system-ui,-apple-system,sans-serif';
      ctx.fillStyle='#c9d1e2';
      ctx.fillText('retrying…',W/2,H*0.40+base*0.09);
    } else {
      ctx.globalAlpha=failT;
      ctx.font='900 '+base*0.14+'px system-ui,-apple-system,sans-serif';
      ctx.fillStyle='#ff6b6b';
      ctx.fillText(cansDown+'/'+cansTotal,W/2,H*0.40);
      ctx.font='600 '+base*0.05+'px system-ui,-apple-system,sans-serif';
      ctx.fillStyle='#c9d1e2';
      ctx.fillText('tap anywhere to retry',W/2,H*0.40+base*0.11);
    }
    ctx.globalAlpha=1;
  }
}
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(shake>0.05)
    ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  drawBG();
  drawShelves();
  for(const c of cans) drawCan(c);
  drawCat();
  if(ball.active) drawBallAt(ball.x,ball.y);
  if(aiming) drawAim();
  else if(!ball.active&&ballsLeft>0&&phase==='play') drawBallAt(spot.x,spot.y);
  // sparks
  for(const s of sparks){
    ctx.globalAlpha=Math.max(0,s.life/s.max);
    ctx.fillStyle=s.color;
    ctx.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);
  }
  ctx.globalAlpha=1;
  drawHUD();
  drawBanner();
}

/* ---------- boot / loop ---------- */
function resize(){
  const w=window.innerWidth||300, h=window.innerHeight||560;
  const dpr=Math.min(2.5,window.devicePixelRatio||1);
  if(w===W&&h===H&&dpr===DPR) return;
  W=w; H=h; DPR=dpr;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  aiming=false; creakStop();
  build(level);
}
window.addEventListener('resize',resize);
resize();

let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000; last=now;
  if(dt>0.05) dt=0.05;
  if(dt<0) dt=0;
  acc+=dt;
  while(acc>=STEP){ physStep(); acc-=STEP; }
  draw();
}
requestAnimationFrame(frame);

/* ---------- test hooks ---------- */
window.__game={
  state:()=>({level:level,cansDown:cansDown,cansTotal:cansTotal,
              ballsLeft:ballsLeft,phase:phase,
              ball:{x:Math.round(ball.x),y:Math.round(ball.y),active:ball.active},
              dims:{W:W,H:H,spotX:Math.round(spot.x),spotY:Math.round(spot.y)},
              cat:cat?{x:Math.round(cat.x),y:Math.round(cat.y),asleep:cat.asleep,stirs:cat.stirs}:null,
              cans:cans.map(c=>({x:Math.round(c.p[0].x),y:Math.round(c.p[0].y),frozen:c.frozen,down:c.down}))}),
  stepN:(n)=>{ for(let i=0;i<n;i++) physStep(); draw(); },
  throwBall:(vx,vy)=>{
    if(phase!=='play'||ballsLeft<=0) return;
    aiming=false;
    doThrow(vx,vy,null);
  }
};
</script>
