<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Acreage</title>
<style>
  :root{
    --bg0:#0c1117; --bg1:#121a23; --ink:#e8f0e6; --dim:#8aa0a2;
    --river:#3fa9d8; --field:#9cc05a; --forest:#3f9e5e; --road:#c9a25a; --sand:#d9c089;
    --gold:#ffd66b; --good:#7fe0a0; --panel:#162029cc;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 90% at 50% 0%,#16202b 0%,var(--bg0) 70%);
    color:var(--ink); overflow:hidden; touch-action:none; user-select:none;
  }
  #app{display:flex; flex-direction:column; height:100%; max-width:560px; margin:0 auto; position:relative}
  header{
    padding:10px 14px 6px; display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .brand{display:flex; flex-direction:column; line-height:1}
  .brand h1{font-size:20px; letter-spacing:2px; font-weight:800; color:var(--ink)}
  .brand .sub{font-size:10px; letter-spacing:1px; color:var(--dim); margin-top:3px}
  .meta{display:flex; gap:6px; align-items:center}
  .pill{background:var(--panel); border:1px solid #ffffff14; border-radius:999px; padding:5px 9px; font-size:11px; color:var(--dim); display:flex; gap:5px; align-items:center}
  .pill b{color:var(--ink); font-variant-numeric:tabular-nums}
  .scorebar{display:flex; align-items:baseline; justify-content:center; gap:6px; padding:0 14px 4px}
  .scorebar .score{font-size:30px; font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums; text-shadow:0 0 18px #ffd66b44}
  .scorebar .lab{font-size:11px; color:var(--dim); letter-spacing:1px}
  #boardWrap{flex:1; position:relative; overflow:hidden; touch-action:none}
  #board{position:absolute; inset:0; width:100%; height:100%; display:block}
  .float{position:absolute; pointer-events:none; font-weight:800; font-size:15px; color:var(--gold);
    text-shadow:0 1px 4px #000a; will-change:transform,opacity; z-index:5}
  footer{padding:8px 12px calc(10px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:8px}
  .hand{display:flex; align-items:center; gap:10px; justify-content:center}
  .queue{display:flex; gap:6px; align-items:center}
  .qtile{width:34px; height:34px; border-radius:7px; opacity:.85; box-shadow:0 2px 6px #0007}
  .qtile.first{width:42px;height:42px; outline:2px solid #ffffff33}
  .current{position:relative; width:74px; height:74px; border-radius:12px; box-shadow:0 6px 18px #000a, inset 0 0 0 2px #ffffff22}
  .current canvas{border-radius:12px; display:block}
  .controls{display:flex; gap:10px; justify-content:center}
  button{
    font-family:inherit; border:none; cursor:pointer; border-radius:11px; font-weight:700; font-size:14px;
    padding:11px 16px; color:var(--ink); background:#1c2833; border:1px solid #ffffff18;
    transition:transform .08s ease, background .15s; letter-spacing:.5px;
  }
  button:active{transform:scale(.94)}
  button.primary{background:linear-gradient(180deg,#2e6b46,#235539); border-color:#52b07a55}
  button.rot{flex:0 0 auto; padding:11px 14px}
  .tipline{text-align:center; font-size:12px; color:var(--dim); min-height:16px; transition:opacity .3s}
  .tipline b{color:var(--good)}
  /* overlay */
  .overlay{position:absolute; inset:0; background:#0a0e13ee; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:24px; text-align:center;
    opacity:0; pointer-events:none; transition:opacity .35s}
  .overlay.show{opacity:1; pointer-events:auto}
  .overlay h2{font-size:26px; letter-spacing:1px}
  .overlay .biome{font-size:13px; color:var(--gold); letter-spacing:2px; text-transform:uppercase}
  .postcard{border-radius:14px; box-shadow:0 10px 40px #000a, 0 0 0 1px #ffffff1a; image-rendering:pixelated}
  .statgrid{display:flex; gap:18px; color:var(--dim); font-size:12px}
  .statgrid div b{display:block; color:var(--ink); font-size:20px; font-variant-numeric:tabular-nums}
  .ov-btns{display:flex; gap:10px}
  .atlas{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; max-width:300px}
  .atlas .slot{width:30px;height:30px;border-radius:6px; background:#ffffff10; display:flex; align-items:center; justify-content:center; font-size:14px}
  .atlas .slot.on{background:#ffffff18; box-shadow:0 0 0 1px #ffffff22 inset}
  .toast{position:absolute; top:14px; left:50%; transform:translateX(-50%); background:#0d1620ee; border:1px solid #ffffff1f;
    padding:8px 14px; border-radius:999px; font-size:12px; color:var(--ink); z-index:30; opacity:0; transition:opacity .3s; pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>ACREAGE</h1>
      <div class="sub">match the edges &middot; grow a world</div>
    </div>
    <div class="meta">
      <div class="pill">DAY <b id="dayN">1</b></div>
      <div class="pill">🔥<b id="streakN">0</b></div>
    </div>
  </header>
  <div class="scorebar">
    <span class="lab">SCORE</span>
    <span class="score" id="scoreV">0</span>
  </div>
  <div id="boardWrap">
    <canvas id="board"></canvas>
    <div class="toast" id="toast"></div>
  </div>
  <footer>
    <div class="tipline" id="tip">Rotate the tile so its river meets the one on the board, then drop it.</div>
    <div class="hand">
      <button class="rot" id="rotL" aria-label="rotate left">⟲</button>
      <div class="current" id="curWrap"><canvas id="curCanvas" width="148" height="148"></canvas></div>
      <button class="rot" id="rotR" aria-label="rotate right">⟳</button>
    </div>
    <div class="queue" id="queue"></div>
    <div class="controls">
      <button class="primary" id="dropBtn">DROP TILE</button>
    </div>
  </footer>

  <div class="overlay" id="overlay">
    <div class="biome" id="ovBiome">Delta</div>
    <h2 id="ovTitle">World Complete</h2>
    <canvas class="postcard" id="postcard" width="180" height="180"></canvas>
    <div class="statgrid">
      <div><b id="ovScore">0</b>score</div>
      <div><b id="ovBest">0</b>best run</div>
      <div><b id="ovPerf">0</b>perfect</div>
    </div>
    <div class="atlas" id="atlas"></div>
    <div class="ov-btns">
      <button class="primary" id="shareBtn">SHARE</button>
      <button id="replayBtn">REPLAY</button>
    </div>
  </div>
</div>
<script>
(()=>{
"use strict";
// ---------- terrain edge types ----------
// 0 empty/grass plain, mapped per-edge. Types: G grass/field, R river, F forest, D road, S sand
const EMPTY='G';
const TYPES=['G','R','F','D','S'];
const COL={ G:'#9cc05a', R:'#3fa9d8', F:'#3f9e5e', D:'#c9a25a', S:'#d9c089' };
const COL_D={ G:'#7ba23f', R:'#2f87b4', F:'#2e7c48', D:'#a8843f', S:'#c2a766' };
const BIOMES=['Tundra','Delta','Highland','Savanna','Orchard','Marsh','Coast'];
const BIOME_ICON={Tundra:'❄️',Delta:'🌊',Highland:'⛰️',Savanna:'🌾',Orchard:'🍃',Marsh:'🪻',Coast:'🏖️'};

// ---------- seeded RNG ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}

// ---------- daily seed ----------
const DAY0=new Date(2026,0,1).getTime();
const today=new Date(); today.setHours(0,0,0,0);
const dayNum=Math.floor((today.getTime()-DAY0)/86400000)+1;
const seedStr='acreage-'+dayNum;
const rng=mulberry32(hashStr(seedStr));
const biome=BIOMES[dayNum%BIOMES.length];

// ---------- tile bag generation ----------
// edges order: [top,right,bottom,left]
const BAG_SIZE=24;
function genBag(){
  const bag=[];
  // weight terrain mix; rivers & forests dominate so chains form
  const weights={R:3,F:3,G:2,D:2,S:1};
  const pool=[]; for(const k in weights)for(let i=0;i<weights[k];i++)pool.push(k);
  const pick=()=>pool[Math.floor(rng()*pool.length)];
  for(let i=0;i<BAG_SIZE;i++){
    // pick 1-2 dominant feature types for this tile
    const a=pick(); let b=rng()<0.55?pick():a;
    const e=[];
    for(let s=0;s<4;s++){
      const r=rng();
      e.push(r<0.42?a : r<0.78?b : (rng()<0.5?'G':pick()));
    }
    // rivers tend to be straight/curved corridors: ensure river tiles connect through
    const rc=e.filter(x=>x==='R').length;
    if(rc===1){ // make it a pair so a river never dead-ends in hand
      const idx=e.indexOf('R'); e[(idx+2)%4]='R';
    }
    bag.push(e);
  }
  // first tile: a guaranteed river running off the top, the rest grass — teaches the match
  return bag;
}
let BAG=genBag();
const START_TILE=['R','G','R','G']; // river top->bottom corridor on center

// ---------- board state (axial-ish square grid, infinite via map) ----------
const board=new Map(); // key "x,y" -> {e:[..], biome rotation index}
const key=(x,y)=>x+','+y;
const DIRS=[[0,-1],[1,0],[0,1],[-1,0]]; // top,right,bottom,left
const OPP=[2,3,0,1];

function rot(e,n){ n=((n%4)+4)%4; if(n===0)return e.slice(); const r=e.slice(); for(let i=0;i<4;i++)r[(i+n)%4]=e[i]; return r;}

// ---------- game state ----------
let score=0, placed=0, perfect=0, bagIdx=0, curRot=0;
let bestRun=0, longestRiver=0;
const handCount=BAG_SIZE;
let openCells=new Set(); // candidate empty neighbor cells
let gameOver=false;

board.set(key(0,0),{e:START_TILE.slice()});
refreshOpen();

function refreshOpen(){
  openCells.clear();
  for(const k of board.keys()){
    const [x,y]=k.split(',').map(Number);
    for(const[dx,dy]of DIRS){
      const nk=key(x+dx,y+dy);
      if(!board.has(nk))openCells.add(nk);
    }
  }
}

function curTileEdges(){ return rot(BAG[bagIdx],curRot); }

// score a placement at (x,y) with edges e. returns {matches,total,delta,closes}
function evalPlacement(x,y,e){
  let matches=0,total=0,delta=0,closures=[];
  for(let d=0;d<4;d++){
    const[dx,dy]=DIRS[d];
    const nk=key(x+dx,y+dy);
    if(board.has(nk)){
      total++;
      const ne=board.get(nk).e;
      const mine=e[d], theirs=ne[OPP[d]];
      if(mine===theirs && mine!==EMPTY){ matches++; }
      else if(mine===theirs && mine===EMPTY){ /*grass-grass neutral*/ }
    }
  }
  return {matches,total};
}

// commit tile, compute scoring incl. completed-stretch bonuses
function commit(x,y){
  const e=curTileEdges();
  board.set(key(x,y),{e});
  placed++;
  // base per-edge match scoring
  let gained=0, allMatched=true, contacts=0;
  for(let d=0;d<4;d++){
    const[dx,dy]=DIRS[d];
    const nk=key(x+dx,y+dy);
    if(board.has(nk)&&nk!==key(x,y)){
      contacts++;
      const ne=board.get(nk).e, mine=e[d], theirs=ne[OPP[d]];
      if(mine===theirs && mine!=='G'){ gained+=4; }
      else if(mine==='G'&&theirs==='G'){ gained+=1; }
      else { allMatched=false; }
    }
  }
  let perf = (contacts>0 && allMatched);
  if(perf){ gained+=contacts*3; perfect++; }
  // stretch closure bonus: for each feature touching this tile, if its connected
  // region of that type is fully enclosed (no open feature edge), pay exponential
  const closures=[];
  for(const t of ['R','F','D','S']){
    if(e.includes(t)){
      const reg=regionFor(x,y,t);
      if(reg.closed){
        const sz=reg.size;
        const bonus=Math.round(8*sz*Math.pow(1.35,sz-1));
        gained+=bonus; closures.push({t,sz,bonus});
        if(t==='R')longestRiver=Math.max(longestRiver,sz);
      }
    }
  }
  score+=gained;
  bestRun=Math.max(bestRun,gained);
  return {gained,perf,closures};
}

// region: BFS over tiles connected via matching feature edges of type t.
// closed = no edge of type t points to an empty cell.
function regionFor(sx,sy,t){
  const seen=new Set(); const stack=[key(sx,sy)]; seen.add(key(sx,sy));
  let closed=true;
  while(stack.length){
    const k=stack.pop(); const[x,y]=k.split(',').map(Number);
    const ce=board.get(k).e;
    for(let d=0;d<4;d++){
      if(ce[d]!==t)continue;
      const[dx,dy]=DIRS[d]; const nk=key(x+dx,y+dy);
      if(board.has(nk)){
        const ne=board.get(nk).e;
        if(ne[OPP[d]]===t){ if(!seen.has(nk)){seen.add(nk);stack.push(nk);} }
        else closed=false; // touches a tile but mismatched -> broken, treat open
      } else closed=false; // points to empty
    }
  }
  return {size:seen.size, closed};
}

// ---------- camera / rendering ----------
const boardWrap=document.getElementById('boardWrap');
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let cam={x:0,y:0,scale:1}, TILE=64, dpr=Math.min(2,window.devicePixelRatio||1);

function resize(){
  const w=boardWrap.clientWidth,h=boardWrap.clientHeight;
  canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
window.addEventListener('resize',resize);

// hover/ghost cell, chosen by tapping board or auto-pick best near center
let ghost=null; // {x,y}

function worldToScreen(x,y){
  const w=canvas.width/dpr, h=canvas.height/dpr;
  return {sx:w/2+(x-cam.x)*TILE*cam.scale, sy:h/2+(y-cam.y)*TILE*cam.scale};
}
function screenToWorld(sx,sy){
  const w=canvas.width/dpr, h=canvas.height/dpr;
  return {x:Math.round((sx-w/2)/(TILE*cam.scale)+cam.x), y:Math.round((sy-h/2)/(TILE*cam.scale)+cam.y)};
}

// draw one tile's terrain into a ctx at (px,py,size). edges + simple center.
function drawTile(c,px,py,size,e,opts={}){
  const s=size, half=s/2;
  // base grass
  c.fillStyle = COL.G;
  c.fillRect(px,py,s,s);
  // subtle field texture
  c.fillStyle='#00000010';
  for(let i=0;i<3;i++)c.fillRect(px,py+i*(s/3)+s*0.08,s,1);
  // draw each edge feature as a wedge toward center
  const cx=px+half, cy=py+half;
  const corners=[[px,py],[px+s,py],[px+s,py+s],[px,py+s]];
  // edge midpoints: top,right,bottom,left
  const mids=[[px+half,py],[px+s,py+half],[px+half,py+s],[px,py+half]];
  for(let d=0;d<4;d++){
    const t=e[d]; if(t==='G')continue;
    const c1=corners[d], c2=corners[(d+1)%4], m=mids[d];
    c.beginPath();
    c.moveTo(c1[0],c1[1]); c.lineTo(c2[0],c2[1]); c.lineTo(cx,cy); c.closePath();
    c.fillStyle=COL[t]; c.fill();
  }
  // center blend: pick dominant non-grass
  const counts={}; for(const t of e)counts[t]=(counts[t]||0)+1;
  let dom='G',best=0; for(const t in counts){if(t!=='G'&&counts[t]>best){best=counts[t];dom=t;}}
  if(dom!=='G'){
    c.beginPath(); c.arc(cx,cy,s*0.16,0,7); c.fillStyle=COL_D[dom]; c.fill();
  }
  // feature flourishes
  for(let d=0;d<4;d++){
    const t=e[d]; if(t==='G')continue;
    const m=mids[d];
    if(t==='R'){ // river ribbon
      c.strokeStyle='#cfeefb'; c.lineWidth=Math.max(2,s*0.07);
      c.lineCap='round'; c.beginPath(); c.moveTo(m[0],m[1]); c.lineTo(cx,cy); c.stroke();
      c.strokeStyle=COL_D.R; c.lineWidth=Math.max(1,s*0.04);
      c.beginPath(); c.moveTo(m[0],m[1]); c.lineTo(cx,cy); c.stroke();
    } else if(t==='F'){ // forest dots
      const fx=(m[0]+cx)/2, fy=(m[1]+cy)/2;
      c.fillStyle=COL_D.F; c.beginPath(); c.arc(fx,fy,s*0.07,0,7); c.fill();
      c.fillStyle='#bfe6b0'; c.beginPath(); c.arc(fx-s*0.02,fy-s*0.02,s*0.03,0,7); c.fill();
    } else if(t==='D'){ // road dashes
      c.strokeStyle='#5a4626'; c.lineWidth=Math.max(2,s*0.05);
      c.beginPath(); c.moveTo(m[0],m[1]); c.lineTo(cx,cy); c.stroke();
      c.setLineDash([s*0.06,s*0.06]); c.strokeStyle='#fff7e0'; c.lineWidth=Math.max(1,s*0.02);
      c.beginPath(); c.moveTo(m[0],m[1]); c.lineTo(cx,cy); c.stroke(); c.setLineDash([]);
    }
  }
  if(opts.outline){
    c.strokeStyle=opts.outline; c.lineWidth=opts.ow||2; c.strokeRect(px+1,py+1,s-2,s-2);
  }
}

// animation registry for newly placed tiles
const anims=new Map(); // key -> {t0}
let ripples=[]; // {x,y,t0,type}

function draw(){
  const w=canvas.width/dpr, h=canvas.height/dpr;
  ctx.clearRect(0,0,w,h);
  // vignette grid bg
  const sz=TILE*cam.scale;
  // open candidate cells (placement hints)
  for(const k of openCells){
    const[x,y]=k.split(',').map(Number);
    const{sx,sy}=worldToScreen(x,y);
    if(sx<-sz||sy<-sz||sx>w+sz||sy>h+sz)continue;
    ctx.save();
    ctx.globalAlpha=0.10;
    ctx.strokeStyle='#cfe8d8'; ctx.setLineDash([4,4]); ctx.lineWidth=1.5;
    ctx.strokeRect(sx-sz/2+3,sy-sz/2+3,sz-6,sz-6);
    ctx.restore();
  }
  ctx.setLineDash([]);
  // placed tiles
  const now=performance.now();
  for(const[k,tile]of board){
    const[x,y]=k.split(',').map(Number);
    const{sx,sy}=worldToScreen(x,y);
    if(sx<-sz||sy<-sz||sx>w+sz||sy>h+sz)continue;
    let scl=1, lift=0;
    const a=anims.get(k);
    if(a){ const p=Math.min(1,(now-a.t0)/280);
      const e=1-Math.pow(1-p,3);
      scl=0.6+0.5*e; if(p>0.6){scl=1+0.12*Math.sin((p-0.6)/0.4*Math.PI);}
      if(p>=1)anims.delete(k);
    }
    ctx.save();
    ctx.translate(sx,sy); ctx.scale(scl,scl);
    drawTile(ctx,-sz/2,-sz/2,sz,tile.e);
    ctx.strokeStyle='#0009'; ctx.lineWidth=1; ctx.strokeRect(-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
  // ripples for closures
  ripples=ripples.filter(r=>now-r.t0<700);
  for(const r of ripples){
    const{sx,sy}=worldToScreen(r.x,r.y);
    const p=(now-r.t0)/700; const rad=sz*0.4+p*sz*1.6;
    ctx.save(); ctx.globalAlpha=(1-p)*0.7; ctx.strokeStyle=COL[r.type]||'#fff';
    ctx.lineWidth=3*(1-p)+1; ctx.beginPath(); ctx.arc(sx,sy,rad,0,7); ctx.stroke(); ctx.restore();
  }
  // ghost (current tile preview at chosen cell)
  if(ghost && !gameOver){
    const{sx,sy}=worldToScreen(ghost.x,ghost.y);
    const e=curTileEdges();
    const ev=evalPlacement(ghost.x,ghost.y,e);
    const good = ev.matches>0 || ev.total===0;
    ctx.save(); ctx.globalAlpha=0.92;
    ctx.translate(sx,sy);
    const pulse=1+0.03*Math.sin(now/200);
    ctx.scale(pulse,pulse);
    drawTile(ctx,-sz/2,-sz/2,sz,e,{outline:good?'#9effb5':'#ff9a8a',ow:3});
    ctx.restore();
    // match markers on contacted edges
    for(let d=0;d<4;d++){
      const[dx,dy]=DIRS[d]; const nk=key(ghost.x+dx,ghost.y+dy);
      if(board.has(nk)){
        const ne=board.get(nk).e, mine=e[d], theirs=ne[OPP[d]];
        const mid={sx:sx+dx*sz/2, sy:sy+dy*sz/2};
        ctx.save();
        if(mine===theirs && mine!=='G'){ctx.fillStyle='#9effb5';}
        else if(mine===theirs&&mine==='G'){ctx.fillStyle='#cfe8d8';}
        else {ctx.fillStyle='#ff7a6a';}
        ctx.globalAlpha=0.9;
        ctx.beginPath(); ctx.arc(mid.sx,mid.sy,4,0,7); ctx.fill(); ctx.restore();
      }
    }
  }
}
// single render loop: redraws continuously while anything is animating
// (placed-tile pops, closure ripples, or the pulsing ghost preview).
let needsDraw=true;
function requestDraw(){ needsDraw=true; }
(function loop(){
  if(needsDraw || anims.size || ripples.length || (ghost && !gameOver)){
    draw();
    // once transient anims drain and nothing is live, idle until next requestDraw
    needsDraw = anims.size>0 || ripples.length>0 || (ghost && !gameOver);
  }
  requestAnimationFrame(loop);
})();

// ---------- current tile mini canvas + queue ----------
const curCanvas=document.getElementById('curCanvas');
const curCtx=curCanvas.getContext('2d');
function renderCurrent(){
  curCtx.clearRect(0,0,148,148);
  if(bagIdx>=BAG.length)return;
  drawTile(curCtx,4,4,140,curTileEdges());
  curCtx.strokeStyle='#0008'; curCtx.lineWidth=2; curCtx.strokeRect(4,4,140,140);
}
const queueEl=document.getElementById('queue');
function renderQueue(){
  queueEl.innerHTML='';
  const lab=document.createElement('span');
  lab.style.cssText='font-size:10px;color:var(--dim);letter-spacing:1px;margin-right:2px';
  lab.textContent='NEXT';
  queueEl.appendChild(lab);
  for(let i=1;i<=3;i++){
    const idx=bagIdx+i; if(idx>=BAG.length)break;
    const cv=document.createElement('canvas'); cv.width=84;cv.height=84;
    cv.className='qtile'+(i===1?' first':'');
    const cc=cv.getContext('2d'); drawTile(cc,2,2,80,BAG[idx]);
    queueEl.appendChild(cv);
  }
  const rem=document.createElement('span');
  rem.style.cssText='font-size:11px;color:var(--dim);margin-left:6px';
  rem.textContent=(BAG.length-bagIdx)+' left';
  queueEl.appendChild(rem);
}

// ---------- best-cell auto picker (for tap-to-drop convenience) ----------
function bestGhost(){
  // pick open cell that gives most matches with current rotation; near center tiebreak
  let best=null,bestScore=-1;
  const e=curTileEdges();
  for(const k of openCells){
    const[x,y]=k.split(',').map(Number);
    const ev=evalPlacement(x,y,e);
    const dist=Math.abs(x)+Math.abs(y);
    const sc=ev.matches*10 - dist*0.5 + (ev.total)*0.2;
    if(sc>bestScore){bestScore=sc;best={x,y};}
  }
  return best;
}

// ---------- placement flow ----------
const tipEl=document.getElementById('tip');
const scoreV=document.getElementById('scoreV');
function setTip(html){ tipEl.innerHTML=html; }

let tutorialStage=0; // 0=teach rotate/drop, then off

function tryDrop(){
  if(gameOver)return;
  if(!ghost) ghost=bestGhost();
  if(!ghost)return;
  const e=curTileEdges();
  if(!openCells.has(key(ghost.x,ghost.y))) { ghost=bestGhost(); }
  const x=ghost.x,y=ghost.y;
  const res=commit(x,y);
  anims.set(key(x,y),{t0:performance.now()});
  // ripples on closures
  for(const cl of res.closures){ ripples.push({x,y,t0:performance.now(),type:cl.t}); }
  floatScore(x,y,res);
  thunk();
  // animate score
  animateScore();
  // advance
  bagIdx++; curRot=0; ghost=null;
  refreshOpen();
  // tutorial tips
  if(tutorialStage===0 && res.gained>0){
    setTip('Nice — the river connects. <b>Long unbroken stretches pay big.</b>');
    tutorialStage=1;
  } else if(tutorialStage===1){
    setTip('Rotate so colors meet. Plan with the <b>NEXT</b> queue.');
    tutorialStage=2;
  }
  if(res.closures.length){
    const big=res.closures.reduce((a,b)=>b.bonus>a.bonus?b:a,res.closures[0]);
    toast(featureName(big.t)+' completed +'+big.bonus+'!');
  }
  renderCurrent(); renderQueue();
  if(bagIdx>=BAG.length){ endGame(); }
  else { ghost=bestGhost(); }
  requestDraw();
}
function featureName(t){return t==='R'?'River':t==='F'?'Forest':t==='D'?'Road':'Coast';}

function animateScore(){
  const start=parseInt(scoreV.textContent)||0;
  const end=score; const t0=performance.now();
  function step(){ const p=Math.min(1,(performance.now()-t0)/450);
    const e=1-Math.pow(1-p,3);
    scoreV.textContent=Math.round(start+(end-start)*e);
    if(p<1)requestAnimationFrame(step);
    else scoreV.textContent=end;
  }
  step();
  scoreV.style.transform='scale(1.18)';
  setTimeout(()=>scoreV.style.transform='scale(1)',160);
}
scoreV.style.transition='transform .16s';

// floating +N
function floatScore(x,y,res){
  const{sx,sy}=worldToScreen(x,y);
  const rect=boardWrap.getBoundingClientRect();
  const el=document.createElement('div'); el.className='float';
  el.textContent='+'+res.gained;
  if(res.closures.length){el.style.fontSize='22px'; el.style.color='#ffe08a';}
  el.style.left=(sx)+'px'; el.style.top=(sy)+'px';
  boardWrap.appendChild(el);
  const t0=performance.now();
  (function a(){ const p=Math.min(1,(performance.now()-t0)/900);
    el.style.transform='translate(-50%,'+(-30-p*40)+'px) scale('+(1+0.3*(1-p))+')';
    el.style.opacity=(1-p);
    if(p<1)requestAnimationFrame(a); else el.remove();
  })();
}

// soft thunk via WebAudio
let actx=null;
function thunk(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(180,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(70,actx.currentTime+0.12);
    g.gain.setValueAtTime(0.18,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.18);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+0.2);
  }catch(e){}
}

// toast
const toastEl=document.getElementById('toast');
let toastTimer=null;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1600); }

// ---------- rotation controls ----------
document.getElementById('rotR').onclick=()=>{curRot=(curRot+1)%4; renderCurrent(); requestDraw();};
document.getElementById('rotL').onclick=()=>{curRot=(curRot+3)%4; renderCurrent(); requestDraw();};
document.getElementById('dropBtn').onclick=tryDrop;
document.getElementById('curWrap').onclick=()=>{curRot=(curRot+1)%4; renderCurrent(); requestDraw();};

// ---------- board interaction: pan, tap-to-select-cell, pinch ----------
let dragState=null;
function pointerPos(ev){ const r=canvas.getBoundingClientRect();
  const t=ev.touches?ev.touches[0]:ev; return {x:t.clientX-r.left,y:t.clientY-r.top}; }
let pinchStart=null;

boardWrap.addEventListener('pointerdown',e=>{
  if(gameOver)return;
  const p=pointerPos(e);
  dragState={x0:p.x,y0:p.y,camx:cam.x,camy:cam.y,moved:false,t0:performance.now()};
  boardWrap.setPointerCapture(e.pointerId);
});
boardWrap.addEventListener('pointermove',e=>{
  if(!dragState)return;
  const p=pointerPos(e);
  const dx=p.x-dragState.x0, dy=p.y-dragState.y0;
  if(Math.abs(dx)+Math.abs(dy)>6)dragState.moved=true;
  if(dragState.moved){
    cam.x=dragState.camx-dx/(TILE*cam.scale);
    cam.y=dragState.camy-dy/(TILE*cam.scale);
    requestDraw();
  }
});
boardWrap.addEventListener('pointerup',e=>{
  if(!dragState)return;
  const p=pointerPos(e);
  if(!dragState.moved){
    // tap: choose nearest open cell to tap point as ghost
    const wc=screenToWorld(p.x,p.y);
    if(openCells.has(key(wc.x,wc.y))){ ghost={x:wc.x,y:wc.y}; }
    else {
      // pick closest open cell to tap
      let best=null,bd=1e9;
      for(const k of openCells){const[x,y]=k.split(',').map(Number);
        const{sx,sy}=worldToScreen(x,y); const d=(sx-p.x)**2+(sy-p.y)**2;
        if(d<bd){bd=d;best={x,y};}}
      if(best&&bd<(TILE*cam.scale)**2*1.5)ghost=best;
    }
    requestDraw();
  }
  dragState=null;
});
boardWrap.addEventListener('pointercancel',()=>dragState=null);
// wheel zoom (desktop)
boardWrap.addEventListener('wheel',e=>{e.preventDefault();
  const f=e.deltaY<0?1.1:0.9; cam.scale=Math.max(0.5,Math.min(2,cam.scale*f)); requestDraw();
},{passive:false});
// pinch
let touchDist=null;
boardWrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const a=e.touches[0],b=e.touches[1];
    const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    if(touchDist){ cam.scale=Math.max(0.5,Math.min(2,cam.scale*d/touchDist)); requestDraw(); }
    touchDist=d; dragState=null; e.preventDefault();
  }
},{passive:false});
boardWrap.addEventListener('touchend',()=>{touchDist=null;});

// ---------- localStorage progress ----------
const LS='acreage_save_v1';
function loadSave(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}} }
function writeSave(o){ try{localStorage.setItem(LS,JSON.stringify(o))}catch(e){} }
let save=loadSave();
let streak=save.streak||0;
// streak logic on load: if last played day == yesterday -> continue, ==today -> keep, else reset on completion
document.getElementById('dayN').textContent=dayNum;
document.getElementById('streakN').textContent=streak;

// ---------- end game ----------
function endGame(){
  gameOver=true; ghost=null;
  // bonus for board coverage / final connectivity
  // streak update
  const last=save.lastDay||0;
  if(last!==dayNum){
    if(last===dayNum-1)streak=(save.streak||0)+1; else streak=1;
  }
  // record biome collection
  save.biomes=save.biomes||{};
  save.biomes[biome]=Math.max(save.biomes[biome]||0,score);
  save.lastDay=dayNum; save.streak=streak;
  save.bestScore=Math.max(save.bestScore||0,score);
  writeSave(save);
  document.getElementById('streakN').textContent=streak;
  showOverlay();
  draw();
}

// ---------- postcard render ----------
function renderPostcard(cv,size){
  const c=cv.getContext('2d');
  // bounds
  let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
  for(const k of board.keys()){const[x,y]=k.split(',').map(Number);
    minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);}
  const gw=maxx-minx+1, gh=maxy-miny+1, cells=Math.max(gw,gh);
  const ts=Math.floor(size/cells);
  const ox=Math.floor((size-ts*gw)/2)-minx*ts;
  const oy=Math.floor((size-ts*gh)/2)-miny*ts;
  c.fillStyle='#0c1117'; c.fillRect(0,0,size,size);
  for(const[k,tile]of board){const[x,y]=k.split(',').map(Number);
    drawTile(c,ox+x*ts,oy+y*ts,ts,tile.e);
  }
}

// ---------- overlay ----------
const overlay=document.getElementById('overlay');
function showOverlay(){
  document.getElementById('ovBiome').textContent=BIOME_ICON[biome]+' '+biome;
  document.getElementById('ovScore').textContent=score;
  document.getElementById('ovBest').textContent=bestRun;
  document.getElementById('ovPerf').textContent=perfect;
  const pc=document.getElementById('postcard'); renderPostcard(pc,180);
  // atlas
  const atlas=document.getElementById('atlas'); atlas.innerHTML='';
  for(const b of BIOMES){
    const s=document.createElement('div'); s.className='slot'+((save.biomes&&save.biomes[b])?' on':'');
    s.textContent=(save.biomes&&save.biomes[b])?BIOME_ICON[b]:'·';
    s.title=b; atlas.appendChild(s);
  }
  setTimeout(()=>overlay.classList.add('show'),200);
}

// ---------- share ----------
function buildShare(){
  // emoji grid of the map (downsampled to dominant color per tile)
  let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
  for(const k of board.keys()){const[x,y]=k.split(',').map(Number);
    minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);}
  const E={G:'🟩',R:'🟦',F:'🌲',D:'🟫',S:'🟨'};
  let grid='';
  for(let y=miny;y<=maxy;y++){
    let row='';
    for(let x=minx;x<=maxx;x++){
      const k=key(x,y);
      if(board.has(k)){
        const e=board.get(k).e; const counts={};
        for(const t of e)counts[t]=(counts[t]||0)+1;
        let dom='G',best=0;for(const t in counts){if(counts[t]>best||(counts[t]===best&&t!=='G'&&dom==='G')){best=counts[t];dom=t;}}
        row+=E[dom]||'🟩';
      } else row+='⬛';
    }
    grid+=row+'\n';
  }
  const txt='Acreage Day '+dayNum+' · '+BIOME_ICON[biome]+' '+biome+'\nScore '+score+' 🔥'+streak+'\n'+grid+'play: acreage';
  return txt;
}
document.getElementById('shareBtn').onclick=async()=>{
  const txt=buildShare();
  try{
    if(navigator.share){ await navigator.share({text:txt}); }
    else if(navigator.clipboard){ await navigator.clipboard.writeText(txt); toast('Result copied!'); }
    else { prompt('Copy your result:',txt); }
  }catch(e){ try{await navigator.clipboard.writeText(txt); toast('Result copied!');}catch(_){prompt('Copy:',txt);} }
};
document.getElementById('replayBtn').onclick=()=>{ location.reload(); };

// ---------- init ----------
function init(){
  resize();
  renderCurrent(); renderQueue();
  ghost=bestGhost();
  // center cam slightly
  cam.x=0; cam.y=0; cam.scale=1;
  draw();
}
window.addEventListener('load',init);
// also init now in case load already fired
setTimeout(()=>{ if(!canvas.width)resize(); else { renderCurrent(); renderQueue(); ghost=ghost||bestGhost(); draw(); } },0);
})();
</script>
