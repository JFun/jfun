<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cascade</title>
<style>
  :root{
    --bg0:#070b13; --bg1:#0d1726; --ink:#dce8f5; --muted:#6f86a3;
    --cell:#101d30; --cell2:#152339; --line:#1d3252;
    --water:#3fc7ff; --water2:#1f8fd6; --gold:#ffd86b; --good:#54e6a8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:radial-gradient(120% 90% at 50% -10%,#142338 0%,var(--bg1) 38%,var(--bg0) 100%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow-x:hidden; touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
  }
  .wrap{width:100%; max-width:440px; padding:14px 14px 26px; display:flex; flex-direction:column; gap:12px;}
  header{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .title{font-weight:800; font-size:26px; letter-spacing:.5px;
    background:linear-gradient(180deg,#eaf6ff,#7fd4ff); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .sub{font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:.3px;}
  .meta{text-align:right; font-size:11px; color:var(--muted); line-height:1.5;}
  .meta b{color:var(--ink); font-weight:700;}
  .howto{font-size:12px; color:var(--muted); text-align:center; min-height:16px; transition:opacity .4s;}
  .stage{position:relative; width:100%; border-radius:16px; overflow:hidden;
    background:linear-gradient(180deg,#0c1626,#0a1320); border:1px solid var(--line);
    box-shadow:inset 0 0 40px rgba(0,0,0,.5), 0 10px 30px rgba(0,0,0,.35);
    display:flex; justify-content:center; padding:6px 0;}
  #game{display:block; touch-action:none;}
  .hand{display:flex; gap:10px; justify-content:center; min-height:72px; align-items:center; flex-wrap:wrap;}
  .tile{
    width:62px; height:62px; border-radius:12px; position:relative; cursor:grab;
    background:linear-gradient(180deg,var(--cell2),var(--cell));
    border:1px solid var(--line); box-shadow:0 4px 14px rgba(0,0,0,.4);
    transition:transform .12s, box-shadow .12s, opacity .2s; flex:0 0 auto;
  }
  .tile:active{cursor:grabbing;}
  .tile.used{opacity:.18; pointer-events:none;}
  .tile.sel{transform:translateY(-4px) scale(1.06); box-shadow:0 0 0 2px var(--water),0 8px 20px rgba(63,199,255,.4);}
  .tile canvas{width:100%; height:100%; border-radius:12px;}
  .tile .ct{position:absolute; bottom:3px; right:5px; font-size:10px; color:var(--water); font-weight:700;}
  .bar{display:flex; gap:8px;}
  .btn{flex:1; padding:11px; border-radius:12px; border:1px solid var(--line); cursor:pointer;
    background:linear-gradient(180deg,#16263d,#0f1c2e); color:var(--ink); font-weight:700; font-size:14px;
    transition:transform .1s, box-shadow .15s;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:linear-gradient(180deg,#1f6fa6,#155a8a); border-color:#2f8fcf;
    box-shadow:0 4px 16px rgba(31,143,214,.35);}
  .gallery{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; padding-top:2px;}
  .foun{width:30px; height:30px; border-radius:8px; background:var(--cell); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:14px; opacity:.35;}
  .foun.have{opacity:1; border-color:var(--gold); box-shadow:0 0 10px rgba(255,216,107,.3);}
  .overlay{position:fixed; inset:0; background:rgba(4,8,14,.86); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:30;}
  .overlay.show{display:flex; animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .card{width:100%; max-width:360px; background:linear-gradient(180deg,#11203360,#0b1422);
    border:1px solid var(--line); border-radius:18px; padding:22px; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .card h2{margin:0 0 4px; font-size:24px;}
  .card .res{font-family:ui-monospace,Menlo,monospace; font-size:22px; letter-spacing:3px; margin:14px 0; line-height:1.5;}
  .card p{color:var(--muted); font-size:13px; margin:8px 0;}
  .star{color:var(--gold); font-size:20px;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#0f1c2e; border:1px solid var(--line); color:var(--ink); padding:10px 18px; border-radius:30px;
    font-size:13px; opacity:0; transition:.3s; z-index:40; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="title">Cascade</div>
      <div class="sub">Route the water. Fill every basin.</div>
    </div>
    <div class="meta">
      Day <b id="day">1</b><br>
      Streak <b id="streak">0</b> &#128293;<br>
      Par <b id="par">–</b>
    </div>
  </header>

  <div class="howto" id="howto">Tap a slope below, then tap a cell to place it.</div>

  <div class="stage"><canvas id="game"></canvas></div>

  <div class="hand" id="hand"></div>

  <div class="bar">
    <button class="btn" id="reset">Clear</button>
    <button class="btn primary" id="share" style="display:none">Share</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <div class="star" id="stars"></div>
    <h2 id="winTitle">Filled!</h2>
    <p id="winSub"></p>
    <div class="res" id="winRes"></div>
    <p id="winPar"></p>
    <div class="bar" style="margin-top:14px">
      <button class="btn" id="again">Replay</button>
      <button class="btn primary" id="shareWin">Share</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- deterministic RNG ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function seedFromDate(d){return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}

/* ---------- grid / sim constants ----------
   Tile types on the board:
     0 empty, 1 left-slope(\), 2 right-slope(/), 3 basin(U), 4 splitter(^), 5 wall(#)
   Water sim: a stream of droplets enters at SPOUT column at top.
   Cellular fall: at each cell, water decides to move down/left/right based on tile.
*/
const EMPTY=0, LSLOPE=1, RSLOPE=2, BASIN=3, SPLIT=4, WALL=5;

/* Day configs: each day adds one wrinkle (Witness-style ramp, Mon→Sat). */
const DAYS=[
  {cols:5,rows:5,basins:1,walls:0,intro:"Tap a slope under the falling water."},
  {cols:5,rows:6,basins:2,walls:0,intro:"Two basins. Spill from a full one feeds the next."},
  {cols:6,rows:6,basins:2,walls:1,intro:"A wall blocks the drop. Slope around it."},
  {cols:6,rows:7,basins:2,walls:2,intro:"Thread the stream past both walls."},
  {cols:6,rows:7,basins:3,walls:2,intro:"Three basins. Plan backward from the lowest."},
  {cols:7,rows:8,basins:3,walls:3,intro:"Keep the overflow flowing — fill them all."},
];

/* ---------- simulation ----------
   Returns: {fill: filledBasinCount, path:Set of visited cells, basinsFilled:Set, spout, frames}
   Each droplet falls cell by cell. A basin holds water (capacity = its 'cap').
   When a basin is full it overflows: water spills out the lower side and keeps falling.
*/
function simulate(grid, cols, rows, spoutCol, dropCount){
  // basin levels
  const level = {}; // "r,c" -> filled units
  const CAP = 3;
  const visited = new Set();
  const flowKey = {}; // record max water seen for animation weight
  const basins = [];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++) if(grid[r][c]===BASIN) basins.push(r*cols+c);

  function step(r,c){
    // walk one droplet from (r,c) downward; returns when it exits grid or pools
    let guard=0;
    while(guard++<rows*cols*4){
      if(c<0||c>=cols||r>=rows) return; // ran off edge
      visited.add(r*cols+c);
      flowKey[r*cols+c]=(flowKey[r*cols+c]||0)+1;
      const t=grid[r][c];
      if(t===WALL){
        // blocked: try to slide off to a lower neighbor; otherwise dead
        return;
      }
      if(t===BASIN){
        const k=r*cols+c;
        if((level[k]||0)<CAP){ level[k]=(level[k]||0)+1; return; }
        // overflow: spill to a side that's open then continue falling from there
        // prefer the side with empty/slope below
        let dirs=[c+1,c-1];
        let moved=false;
        for(const nc of dirs){
          if(nc>=0&&nc<cols){ c=nc; moved=true; break; }
        }
        if(!moved) return;
        r=r+1; continue;
      }
      if(t===LSLOPE){ // \  pushes water left-down
        // can we go down-left?
        const nc=c-1;
        if(nc>=0){ c=nc; r=r+1; continue; }
        return;
      }
      if(t===RSLOPE){ // / pushes water right-down
        const nc=c+1;
        if(nc<cols){ c=nc; r=r+1; continue; }
        return;
      }
      if(t===SPLIT){ // ^ split into two streams (handled outside by spawning)
        // mark and split: send left and right children
        splitSpawns.push([r+1,c-1]);
        splitSpawns.push([r+1,c+1]);
        return;
      }
      // empty: fall straight down
      r=r+1;
    }
  }

  let splitSpawns=[];
  for(let i=0;i<dropCount;i++){
    splitSpawns=[];
    step(0,spoutCol);
    // process splits breadth-first
    let q=splitSpawns.slice(); splitSpawns=[];
    let g2=0;
    while(q.length && g2++<200){
      const [r,c]=q.shift();
      step(r,c);
      if(splitSpawns.length){ q=q.concat(splitSpawns); splitSpawns=[]; }
    }
  }

  let filled=0; const filledSet=new Set();
  for(const b of basins){ if((level[b]||0)>=CAP){filled++; filledSet.add(b);} }
  return {filled, total:basins.length, visited, level, CAP, filledSet, basins, flowKey};
}

/* ---------- generator (reverse construction) ----------
   We BUILD a known-good solution by laying a single zig-zag water route from the
   spout, dropping a basin at each "landing" cell. Because there is exactly one
   stream and basins sit ON the route, the route is provably solvable by the sim.
   Walls are placed only on empty cells away from the route. Then we strip the
   route tiles back off to make the base board the player starts from, and the
   removed tiles define the hand + par. The sim is both generator and verifier.
*/
function buildDay(seedNum, cfg){
  const {cols,rows}=cfg;
  let best=null;
  for(let attempt=0; attempt<600 && !best; attempt++){
    const rng=mulberry32((seedNum*2654435761 ^ (attempt*40503)) >>> 0);
    const sol=Array.from({length:rows},()=>Array(cols).fill(EMPTY));
    const spout=1+Math.floor(rng()*(cols-2));
    const basinCells=[];
    let c=spout, r=0, ok=true;
    // Lay a route downward; at chosen rows drop a basin and bounce the stream sideways.
    let placedBasins=0;
    let guard=0;
    while(r<rows-1 && placedBasins<cfg.basins && guard++<rows*3){
      // decide whether THIS row gets a basin (need enough rows left for remaining basins)
      const rowsLeft=(rows-1)-r;
      const basinsLeft=cfg.basins-placedBasins;
      const dropHere = (r>=1) && (rng()<0.6 || rowsLeft<=basinsLeft+1);
      if(dropHere){
        // place basin at (r,c)
        if(sol[r][c]!==EMPTY){ ok=false; break; }
        sol[r][c]=BASIN; basinCells.push([r,c]); placedBasins++;
        // overflow direction: bounce toward whichever side has room
        let dir = (c<=1)?1 : (c>=cols-2)? -1 : (rng()<0.5?1:-1);
        let nc=c+dir;
        if(nc<0||nc>=cols){ dir=-dir; nc=c+dir; }
        // place a slope BELOW the basin's spill side to redirect the overflow stream
        // overflow leaves basin to side `dir`, falls one row, then a slope steers it back toward center for the next basin
        r=r+1;
        if(r<rows){
          // a guiding slope to send the overflow stream to column nc continuing down
          // slope at (r, nc): LSLOPE if we want to go further left, RSLOPE further right
          c=nc;
        }
      } else {
        r=r+1; // empty fall, leave a gap the player must fill with a straight... actually leave EMPTY (free fall)
      }
    }
    if(!ok || placedBasins<cfg.basins) continue;
    // Now lay STEERING slopes: connect spout column to the first basin column, and
    // each basin's overflow column to the next basin column, with slope tiles.
    // We rebuild route geometry from basinCells to guarantee the sim threads it.
    const sol2=Array.from({length:rows},()=>Array(cols).fill(EMPTY));
    for(const [br,bc] of basinCells) sol2[br][bc]=BASIN;
    let cur=spout, curR=0, fail=false;
    for(let bi=0; bi<basinCells.length; bi++){
      const [br,bc]=basinCells[bi];
      // steer from (curR,cur) down to land on (br,bc): place slopes that walk column cur->bc
      let cc=cur, rr=curR;
      let g2=0;
      while(rr<br && g2++<rows*2){
        if(cc===bc){ rr++; continue; }            // free-fall straight down
        if(sol2[rr][cc]!==EMPTY && sol2[rr][cc]!==BASIN){ fail=true; break; }
        if(sol2[rr][cc]===BASIN){ fail=true; break; }
        if(cc<bc){ sol2[rr][cc]=RSLOPE; cc++; rr++; }   // /
        else { sol2[rr][cc]=LSLOPE; cc--; rr++; }       // \
      }
      if(fail) break;
      if(rr!==br || cc!==bc){ fail=true; break; }
      // after this basin overflows, the SIM moves the stream to (br+1, bc+1) — it
      // always spills RIGHT-first then falls (see simulate's overflow rule). We mirror
      // that exactly so generator geometry == sim behavior, guaranteeing verification.
      if(bi<basinCells.length-1){
        let scol = (bc+1<cols)? bc+1 : bc-1;     // matches sim: c+1 preferred
        cur=scol; curR=br+1;
        if(curR<rows && sol2[curR] && sol2[curR][scol]===BASIN){ fail=true; break; }
      }
    }
    if(fail) continue;
    // place walls on empty, non-route cells (cosmetic obstacles that the route avoids)
    let wleft=cfg.walls, wt=0;
    while(wleft>0 && wt++<60){
      const wr=1+Math.floor(rng()*(rows-1));
      const wc=Math.floor(rng()*cols);
      if(sol2[wr][wc]!==EMPTY) continue;
      sol2[wr][wc]=WALL; wleft--;
    }
    // verify with the sim
    const res=simulate(sol2,cols,rows,spout, cfg.basins*6+12);
    if(res.filled>=basinCells.length && basinCells.length>=cfg.basins){
      best={grid:sol2, spout, basinCells, cols, rows};
    }
  }
  if(!best){ // guaranteed fallback: spout straight into one basin
    const {cols,rows}=cfg;
    const sol=Array.from({length:rows},()=>Array(cols).fill(EMPTY));
    const spout=Math.floor(cols/2);
    sol[2][spout]=BASIN;
    best={grid:sol, spout, basinCells:[[2,spout]], cols, rows};
  }
  // build the player's starting base: basins + walls only (slopes stripped → become the hand)
  best.base=best.grid.map(row=>row.map(t=> (t===BASIN||t===WALL)? t : EMPTY ));
  return best;
}

/* compute par from solution: count non-basin, non-wall placed tiles */
function parFromSolution(sol,base,cols,rows){
  let p=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(base[r][c]===EMPTY && sol[r][c]!==EMPTY) p++;
  }
  return Math.max(1,p);
}

/* ---------- game state ---------- */
let DAY, CFG, PUZ, board, base, COLS, ROWS, SPOUT, PAR, hand, placedCount, won;
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let CELL=56, OX=0, OY=0;

let selType=null;

function initDay(){
  const dnum=( (seedFromDate(new Date()) % DAYS.length) );
  DAY = dnum; // 0..5
  CFG = DAYS[DAY];
  const built = buildDay(seedFromDate(new Date()), CFG);
  PUZ=built;
  COLS=built.cols; ROWS=built.rows; SPOUT=built.spout;
  base=built.base.map(r=>r.slice());
  board=built.base.map(r=>r.slice()); // start = base (basins+walls only)
  PAR=parFromSolution(built.grid, built.base, COLS, ROWS);
  placedCount=0; won=false;

  // hand: count tile types used in solution (minus what's pre-placed)
  const need={};
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=built.grid[r][c];
    if(base[r][c]===EMPTY && (t===LSLOPE||t===RSLOPE||t===BASIN||t===SPLIT)){
      need[t]=(need[t]||0)+1;
    }
  }
  // give a slightly generous hand for freedom
  hand=[];
  if((need[LSLOPE]||0)+(need[RSLOPE]||0)===0){ need[LSLOPE]=1; }
  for(const t of [LSLOPE,RSLOPE,SPLIT,BASIN]){
    let n=need[t]||0;
    if(t===LSLOPE||t===RSLOPE) n=Math.max(n,1);
    if(n>0) hand.push({type:+t, count:n});
  }
  // add a spare slope or two for exploration
  const spareT = Math.random()<0.5?LSLOPE:RSLOPE;
  const existing=hand.find(h=>h.type===spareT);
  if(existing) existing.count+=1; else hand.push({type:spareT,count:1});

  document.getElementById('day').textContent=DAY+1;
  document.getElementById('par').textContent=PAR;
  document.getElementById('streak').textContent=loadStreak();
  document.getElementById('howto').textContent=CFG.intro;
  document.getElementById('howto').style.opacity=1;

  selType=null;
  layout();
  renderHand();
  renderGallery();
  draw();
}

function layout(){
  const stageW=Math.min(412, document.querySelector('.stage').clientWidth||412);
  CELL=Math.floor(Math.min((stageW-8)/COLS, 70));
  const w=CELL*COLS, h=CELL*(ROWS+0.6);
  const dpr=Math.min(window.devicePixelRatio||1,2.5);
  cv.width=Math.floor(w*dpr); cv.height=Math.floor(h*dpr);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  OX=0; OY=CELL*0.6;
}

/* ---------- hand UI ---------- */
function renderHand(){
  const el=document.getElementById('hand'); el.innerHTML='';
  hand.forEach((h,i)=>{
    if(h.count<=0) return;
    const d=document.createElement('div');
    d.className='tile'+(selType===h.type?' sel':'');
    const tc=document.createElement('canvas'); tc.width=124; tc.height=124;
    drawTile(tc.getContext('2d'),h.type,124);
    d.appendChild(tc);
    const ct=document.createElement('div'); ct.className='ct'; ct.textContent='×'+h.count;
    d.appendChild(ct);
    d.onclick=()=>{
      selType = (selType===h.type? null : h.type);
      if(placedCount===0 && !won){
        const ho=document.getElementById('howto');
        ho.textContent = selType!=null ? 'Now tap a glowing cell to drop the tile in.' : CFG.intro;
        ho.style.opacity=1;
      }
      renderHand(); draw();
    };
    el.appendChild(d);
  });
  if(hand.every(h=>h.count<=0)){
    el.innerHTML='<div style="color:var(--muted);font-size:12px">No tiles left — Clear to retry.</div>';
  }
}

/* draw a tile glyph into a square ctx */
function drawTile(c,type,S){
  c.clearRect(0,0,S,S);
  const p=S*0.16;
  c.lineCap='round'; c.lineJoin='round';
  c.strokeStyle='#5fd6ff'; c.lineWidth=S*0.11;
  c.shadowColor='rgba(63,199,255,.5)'; c.shadowBlur=S*0.08;
  c.beginPath();
  if(type===LSLOPE){ c.moveTo(S-p,p); c.lineTo(p,S-p); }
  else if(type===RSLOPE){ c.moveTo(p,p); c.lineTo(S-p,S-p); }
  else if(type===BASIN){
    c.moveTo(p,p*1.1); c.lineTo(p,S-p); c.lineTo(S-p,S-p); c.lineTo(S-p,p*1.1);
    c.strokeStyle='#7be0a8';
  }
  else if(type===SPLIT){ c.moveTo(p,S-p); c.lineTo(S/2,p); c.lineTo(S-p,S-p); }
  c.stroke();
  c.shadowBlur=0;
}

/* ---------- canvas grid interaction ---------- */
function cellAt(px,py){
  const c=Math.floor((px-OX)/CELL), r=Math.floor((py-OY)/CELL);
  if(r<0||r>=ROWS||c<0||c>=COLS) return null;
  return {r,c};
}
let pointerCell=null;
function placeAt(r,c){
  if(won) return;
  if(base[r][c]!==EMPTY) return; // can't replace basins/walls
  if(r===0) return; // spout row reserved
  const h=selType!=null?hand.find(x=>x.type===selType):null;
  if(board[r][c]!==EMPTY){
    // tapping a placed tile removes it (return to hand)
    const t=board[r][c];
    board[r][c]=EMPTY;
    const hh=hand.find(x=>x.type===t); if(hh)hh.count++; else hand.push({type:t,count:1});
    placedCount--;
    renderHand(); draw(); return;
  }
  if(!h || h.count<=0){ toast('Pick a slope tile below first'); return; }
  board[r][c]=h.type; h.count--; placedCount++;
  pop(r,c);
  renderHand();
  document.getElementById('howto').textContent='Fill every glowing basin before the water runs off the edge.';
  document.getElementById('howto').style.opacity=1;
  draw();
  checkWin();
}

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const px=(e.clientX-rect.left), py=(e.clientY-rect.top);
  const cell=cellAt(px,py);
  if(cell) placeAt(cell.r,cell.c);
},{passive:false});
cv.addEventListener('pointermove',e=>{
  const rect=cv.getBoundingClientRect();
  const px=(e.clientX-rect.left), py=(e.clientY-rect.top);
  const cell=cellAt(px,py);
  pointerCell=cell; // hover preview
},{passive:true});
cv.addEventListener('pointerleave',()=>{pointerCell=null;});

/* ---------- win check ---------- */
function checkWin(){
  const res=simulate(board,COLS,ROWS,SPOUT,(PUZ.basinCells.length)*5+10);
  if(res.total>0 && res.filled>=res.total){
    won=true;
    setTimeout(()=>onWin(),520);
  }
}

/* ---------- main render w/ water animation ---------- */
let anim=0;
function draw(){
  const res=simulate(board,COLS,ROWS,SPOUT,(PUZ.basinCells.length)*5+10);
  const w=CELL*COLS, h=CELL*(ROWS+0.6);
  ctx.clearRect(0,0,w+OX*2,h);

  // spout
  drawSpout();

  // entry-column glow under the spout — fades once the player makes a move
  if(placedCount===0 && !won){
    const gx=OX+SPOUT*CELL;
    const g=ctx.createLinearGradient(0,OY,0,OY+CELL*ROWS);
    const a=0.10+0.06*Math.sin(anim*0.08);
    g.addColorStop(0,'rgba(63,199,255,'+a+')');
    g.addColorStop(1,'rgba(63,199,255,0)');
    ctx.fillStyle=g; ctx.fillRect(gx,OY,CELL,CELL*ROWS);
  }

  // grid cells
  const sel = selType!=null && !won;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=OX+c*CELL, y=OY+r*CELL;
    // cell base
    ctx.fillStyle = (r%2+c%2)%2? '#0e1a2c':'#0c1726';
    roundRect(x+1,y+1,CELL-2,CELL-2,8); ctx.fill();
    // when a tile is selected, ring every legal empty cell so the first move is obvious
    if(sel && r>0 && base[r][c]===EMPTY && board[r][c]===EMPTY){
      ctx.strokeStyle='rgba(63,199,255,'+(0.22+0.12*Math.sin(anim*0.1+r+c))+')';
      ctx.lineWidth=1.5; roundRect(x+3,y+3,CELL-6,CELL-6,7); ctx.stroke();
    }
    // hover highlight
    if(pointerCell&&pointerCell.r===r&&pointerCell.c===c&&base[r][c]===EMPTY&&!won&&r>0){
      ctx.fillStyle = board[r][c]!==EMPTY?'rgba(255,120,120,.10)':'rgba(63,199,255,.12)';
      roundRect(x+1,y+1,CELL-2,CELL-2,8); ctx.fill();
    }
    drawCellGlyph(r,c,x,y,res);
  }

  // water particles flowing along visited path
  drawWater(res);

  anim++;
}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawSpout(){
  const x=OX+SPOUT*CELL+CELL/2, y=OY-CELL*0.55;
  ctx.fillStyle='#243a55';
  roundRect(x-CELL*0.34,y,CELL*0.68,CELL*0.5,5); ctx.fill();
  ctx.fillStyle='#1a2c42'; roundRect(x-CELL*0.34,y+CELL*0.34,CELL*0.68,CELL*0.16,4); ctx.fill();
  // dripping highlight
  ctx.fillStyle='rgba(63,199,255,.9)';
  ctx.fillRect(x-2, y+CELL*0.46, 4, CELL*0.2);
}

function drawCellGlyph(r,c,x,y,res){
  const t=board[r][c];
  const cx=x+CELL/2, cy=y+CELL/2, p=CELL*0.22;
  ctx.lineCap='round'; ctx.lineJoin='round';
  if(t===WALL){
    ctx.fillStyle='#33445a'; roundRect(x+5,y+5,CELL-10,CELL-10,6); ctx.fill();
    ctx.strokeStyle='#1d2c3e'; ctx.lineWidth=2;
    for(let i=-1;i<2;i++){ctx.beginPath();ctx.moveTo(x+8,cy+i*9);ctx.lineTo(x+CELL-8,cy+i*9);ctx.stroke();}
    return;
  }
  if(t===BASIN){
    drawBasin(r,c,x,y,res); return;
  }
  if(t===LSLOPE||t===RSLOPE){
    ctx.strokeStyle='#5fd6ff'; ctx.lineWidth=CELL*0.13;
    ctx.shadowColor='rgba(63,199,255,.45)'; ctx.shadowBlur=8;
    ctx.beginPath();
    if(t===LSLOPE){ctx.moveTo(x+CELL-p,y+p);ctx.lineTo(x+p,y+CELL-p);}
    else {ctx.moveTo(x+p,y+p);ctx.lineTo(x+CELL-p,y+CELL-p);}
    ctx.stroke(); ctx.shadowBlur=0; return;
  }
  if(t===SPLIT){
    ctx.strokeStyle='#9b8bff'; ctx.lineWidth=CELL*0.12;
    ctx.shadowColor='rgba(155,139,255,.5)'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(x+p,y+CELL-p); ctx.lineTo(cx,y+p); ctx.lineTo(x+CELL-p,y+CELL-p);
    ctx.stroke(); ctx.shadowBlur=0; return;
  }
}

function drawBasin(r,c,x,y,res){
  const k=r*COLS+c;
  const lvl=(res.level[k]||0)/res.CAP;
  const full=lvl>=1;
  // basin walls
  ctx.strokeStyle=full?'#54e6a8':'#7be0a8';
  ctx.lineWidth=CELL*0.10;
  ctx.shadowColor=full?'rgba(84,230,168,.7)':'rgba(123,224,168,.3)';
  ctx.shadowBlur=full?14:5;
  const p=CELL*0.18;
  ctx.beginPath();
  ctx.moveTo(x+p,y+p); ctx.lineTo(x+p,y+CELL-p); ctx.lineTo(x+CELL-p,y+CELL-p); ctx.lineTo(x+CELL-p,y+p);
  ctx.stroke(); ctx.shadowBlur=0;
  // water fill
  if(lvl>0){
    const innerH=(CELL-2*p)*lvl;
    const wob=Math.sin(anim*0.12+c)*1.5*(full?0:1);
    const grad=ctx.createLinearGradient(0,y+CELL-p-innerH,0,y+CELL-p);
    grad.addColorStop(0, full?'rgba(120,255,210,.95)':'rgba(120,220,255,.9)');
    grad.addColorStop(1, full?'rgba(40,200,150,.95)':'rgba(40,160,220,.9)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(x+p+1, y+CELL-p-innerH+wob);
    ctx.lineTo(x+p+1, y+CELL-p);
    ctx.lineTo(x+CELL-p-1, y+CELL-p);
    ctx.lineTo(x+CELL-p-1, y+CELL-p-innerH-wob);
    ctx.closePath(); ctx.fill();
    if(full){
      ctx.fillStyle='rgba(255,255,255,'+(0.15+0.1*Math.sin(anim*0.1+c))+')';
      ctx.fillRect(x+p+2,y+CELL-p-innerH, CELL-2*p-4, 2);
    }
  }
}

/* animate water droplets along the live path */
function drawWater(res){
  if(!res.visited.size) return;
  ctx.save();
  res.visited.forEach(k=>{
    const r=Math.floor(k/COLS), c=k%COLS;
    if(board[r][c]===BASIN) return;
    const x=OX+c*CELL, y=OY+r*CELL;
    const weight=Math.min((res.flowKey[k]||1)/4,1);
    // flowing droplets
    for(let i=0;i<3;i++){
      const ph=(anim*0.05 + i*0.33 + (r*0.21+c*0.13))%1;
      const t=board[r][c];
      let dx=CELL/2, dy=ph*CELL;
      if(t===LSLOPE){ dx=CELL*(1-ph); }
      else if(t===RSLOPE){ dx=CELL*ph; }
      else if(t===SPLIT){ dx=CELL/2 + (i%2?1:-1)*CELL*0.3*ph; }
      const rad=CELL*0.07*(0.6+weight*0.6);
      ctx.fillStyle='rgba(120,220,255,'+(0.25+0.5*weight)+')';
      ctx.beginPath(); ctx.arc(x+dx,y+dy,rad,0,7); ctx.fill();
    }
    // faint stream line
    ctx.strokeStyle='rgba(63,199,255,'+(0.10+0.18*weight)+')';
    ctx.lineWidth=CELL*0.16*weight+2;
    ctx.beginPath();
    const t=board[r][c];
    if(t===LSLOPE){ctx.moveTo(x+CELL,y);ctx.lineTo(x,y+CELL);}
    else if(t===RSLOPE){ctx.moveTo(x,y);ctx.lineTo(x+CELL,y+CELL);}
    else if(t===SPLIT){ctx.moveTo(x+CELL/2,y);ctx.lineTo(x+CELL/2,y+CELL/2);}
    else {ctx.moveTo(x+CELL/2,y);ctx.lineTo(x+CELL/2,y+CELL);}
    ctx.stroke();
  });
  ctx.restore();
}

/* ---------- particle pops ---------- */
let pops=[];
function pop(r,c){ pops.push({x:OX+c*CELL+CELL/2,y:OY+r*CELL+CELL/2,t:0}); }

/* ---------- animation loop ---------- */
function loop(){ draw(); drawPops(); requestAnimationFrame(loop); }
function drawPops(){
  for(let i=pops.length-1;i>=0;i--){
    const p=pops[i]; p.t+=0.05;
    if(p.t>=1){pops.splice(i,1);continue;}
    const R=CELL*0.5*p.t;
    ctx.strokeStyle='rgba(63,199,255,'+(1-p.t)+')'; ctx.lineWidth=3*(1-p.t)+1;
    ctx.beginPath(); ctx.arc(p.x,p.y,R,0,7); ctx.stroke();
  }
}

/* ---------- win ---------- */
function onWin(){
  const moves=placedCount;
  const stars = moves<=PAR?3 : moves<=PAR+1?2 : 1;
  saveResult(stars,moves);
  // gallery fountain on at-or-under par
  if(moves<=PAR) unlockFountain(DAY);
  const ov=document.getElementById('overlay');
  document.getElementById('stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('winTitle').textContent = moves<=PAR?'Elegant!':'Filled!';
  document.getElementById('winSub').textContent = moves+' tiles · par '+PAR;
  document.getElementById('winRes').innerHTML = buildGlyph().replace(/\n/g,'<br>');
  document.getElementById('winPar').textContent = moves<=PAR? 'At or under par — fountain earned!' : 'Beat par to earn the fountain.';
  ov.classList.add('show');
  document.getElementById('share').style.display='block';
  burst();
  renderGallery();
}

function burst(){
  for(let i=0;i<PUZ.basinCells.length;i++){
    const [r,c]=PUZ.basinCells[i];
    for(let j=0;j<6;j++) pops.push({x:OX+c*CELL+CELL/2,y:OY+r*CELL+CELL/2,t:Math.random()*0.4});
  }
}

/* ---------- emoji share glyph (spoiler-safe) ----------
   Reveals performance, NOT the layout: a spout, a stream whose length = tiles used,
   and one filled basin per basin solved. Two players' grids are never inferable. */
function buildGlyph(){
  const r=loadResult();
  const moves=(r?r.moves:placedCount);
  const nb=PUZ.basinCells.length;
  let s='🚰\n';
  // stream length capped for share; under par adds a sparkle, over par a fork
  const len=Math.min(moves,8);
  for(let i=0;i<len;i++) s+='💧';
  if(moves<=PAR) s+='✨';
  s+='\n';
  s+= '🟦'.repeat(nb);
  return s;
}

function shareText(){
  const r=loadResult();
  const moves=r?r.moves:placedCount, stars=r?r.stars:0;
  const head=`Cascade Day ${DAY+1}  ${'★'.repeat(stars)}${'☆'.repeat(3-stars)}`;
  const body=buildGlyph();
  const tail=`${moves}/${PAR} tiles · streak ${loadStreak()}🔥`;
  return `${head}\n${body}\n${tail}`;
}
function doShare(){
  const txt=shareText();
  if(navigator.share){ navigator.share({text:txt}).catch(()=>copyShare(txt)); }
  else copyShare(txt);
}
function copyShare(txt){
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast('Result copied!'),()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy'); toast('Result copied!');}catch(e){toast('Copy failed');}
  document.body.removeChild(ta);
}

/* ---------- storage ---------- */
const LS='cascade_v1';
function store(){ try{return JSON.parse(localStorage.getItem(LS))||{};}catch(e){return {};} }
function save(o){ try{localStorage.setItem(LS,JSON.stringify(o));}catch(e){} }
function todayKey(){ return seedFromDate(new Date()); }
function saveResult(stars,moves){
  const s=store();
  s.results=s.results||{};
  const prev=s.results[todayKey()];
  if(!prev || moves<prev.moves){ s.results[todayKey()]={stars,moves}; }
  // streak
  const y=new Date(); y.setDate(y.getDate()-1);
  const yk=seedFromDate(y);
  if(s.lastWin!==todayKey()){
    if(s.lastWin===yk) s.streak=(s.streak||0)+1; else s.streak=1;
    s.lastWin=todayKey();
  }
  save(s);
  document.getElementById('streak').textContent=s.streak||1;
}
function loadResult(){ const r=store().results; return (r&&r[todayKey()])||null; }
function loadStreak(){
  const s=store();
  if(!s.lastWin) return 0;
  const yk=seedFromDate(new Date(Date.now()-864e5));
  // streak is "alive" only if the last win was today or yesterday
  return (s.lastWin===todayKey()||s.lastWin===yk)? (s.streak||0) : 0;
}
function unlockFountain(day){ const s=store(); s.fountains=s.fountains||{}; s.fountains[day]=true; save(s); }
function fountains(){ return store().fountains||{}; }

/* ---------- gallery ---------- */
const FGLYPHS=['⛲','🌊','💧','🏞️','🚰','💦'];
function renderGallery(){
  const el=document.getElementById('gallery'); el.innerHTML='';
  const have=fountains();
  for(let i=0;i<DAYS.length;i++){
    const d=document.createElement('div');
    d.className='foun'+(have[i]?' have':'');
    d.textContent=have[i]?FGLYPHS[i]:'·';
    d.title='Day '+(i+1);
    el.appendChild(d);
  }
}

/* ---------- toast ---------- */
let toT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toT); toT=setTimeout(()=>t.classList.remove('show'),1600); }

/* ---------- buttons ---------- */
document.getElementById('reset').onclick=()=>{
  // return all placed to hand
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(base[r][c]===EMPTY && board[r][c]!==EMPTY){
      const t=board[r][c]; board[r][c]=EMPTY;
      const hh=hand.find(x=>x.type===t); if(hh)hh.count++;
    }
  }
  placedCount=0; won=false; selType=null;
  const ho=document.getElementById('howto'); ho.textContent=CFG.intro; ho.style.opacity=1;
  renderHand(); draw();
};
document.getElementById('share').onclick=doShare;
document.getElementById('shareWin').onclick=doShare;
document.getElementById('again').onclick=()=>{
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('reset').onclick(); // clear board to chase a better-than-par run
};

/* ---------- boot ---------- */
window.addEventListener('resize',()=>{ layout(); });
initDay();
loop();
</script>
