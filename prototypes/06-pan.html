<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pan — guess the detail</title>
<style>
  :root{
    --bg:#14141a; --panel:#1c1c24; --ink:#ece9e3; --muted:#9a978f;
    --line:#2d2d38; --accent:#c9a36b; --good:#6fcf97; --bad:#e07a6b;
    --frame:#f4f1ea; --shadow:rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(120% 90% at 50% -10%,#1b1b24 0%,#101015 70%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;display:flex;justify-content:center;
    padding:16px 14px 40px;
  }
  .app{width:100%;max-width:440px}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  h1{font-size:26px;letter-spacing:.18em;font-weight:600;margin:0;text-transform:uppercase}
  .meta{font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
  .meta b{color:var(--accent);font-weight:600}
  .how{font-size:12.5px;color:var(--muted);margin:2px 0 14px;line-height:1.4}

  .stage{
    position:relative;width:100%;aspect-ratio:1/1;border-radius:14px;
    overflow:hidden;background:#0a0a0d;
    border:6px solid var(--frame);
    box-shadow:0 18px 40px -12px var(--shadow),0 0 0 1px rgba(0,0,0,.4) inset;
  }
  .stage svg{display:block;width:100%;height:100%}
  .pic{transform-origin:0 0}
  .zlabel{
    position:absolute;left:10px;top:10px;font-size:11px;letter-spacing:.12em;
    background:rgba(0,0,0,.5);color:var(--frame);padding:4px 9px;border-radius:20px;
    text-transform:uppercase;backdrop-filter:blur(2px);pointer-events:none;
  }
  .pips{position:absolute;right:10px;top:10px;display:flex;gap:5px;pointer-events:none}
  .pip{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25)}
  .pip.on{background:var(--accent)}
  .flash{
    position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  }
  .flash.go{animation:fl .5s ease-out}
  @keyframes fl{0%{opacity:0}12%{opacity:.6}100%{opacity:0}}

  .controls{margin-top:14px}
  .guessrow{display:flex;gap:8px}
  input[type=text]{
    flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);font-size:16px;padding:13px 14px;border-radius:11px;outline:none;
  }
  input[type=text]:focus{border-color:var(--accent)}
  button{
    font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer;
    border-radius:11px;padding:13px 16px;transition:transform .1s,filter .15s;
  }
  button:active{transform:scale(.96)}
  .btn-guess{background:var(--accent);color:#23180a}
  .btn-zoom{margin-top:8px;width:100%;background:var(--panel);color:var(--ink);border:1px solid var(--line);letter-spacing:.04em}
  .btn-zoom:disabled,.btn-guess:disabled{opacity:.4;cursor:default}

  .status{margin-top:10px;font-size:13px;min-height:18px;text-align:center;color:var(--muted)}
  .status.good{color:var(--good)}
  .status.bad{color:var(--bad)}

  .result{display:none;margin-top:14px;text-align:center}
  .result.show{display:block}
  .grade{font-size:40px;font-weight:700;letter-spacing:.04em}
  .grade small{display:block;font-size:13px;font-weight:400;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:2px}
  .gridstr{font-size:22px;letter-spacing:3px;margin:8px 0 4px}
  .actions{display:flex;gap:8px;justify-content:center;margin-top:10px}
  .btn-share{background:var(--accent);color:#23180a}
  .btn-next{background:var(--panel);color:var(--ink);border:1px solid var(--line)}

  .shelf{margin-top:26px}
  .shelf h2{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .shelf h2:after{content:"";flex:1;height:1px;background:var(--line)}
  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .card{
    aspect-ratio:1/1;border-radius:9px;overflow:hidden;position:relative;cursor:pointer;
    border:4px solid var(--frame);background:#0a0a0d;
    box-shadow:0 6px 14px -6px var(--shadow);
    perspective:600px;
  }
  .card .inner{position:absolute;inset:0;transition:transform .6s cubic-bezier(.3,.7,.3,1);transform-style:preserve-3d}
  .card.flip .inner{transform:rotateY(180deg)}
  .card .face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden}
  .card .back{transform:rotateY(180deg)}
  .card svg{width:100%;height:100%;display:block}
  .card .tag{position:absolute;bottom:0;left:0;right:0;font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:rgba(0,0,0,.55);color:var(--frame);padding:2px 0;text-align:center}
  .card.empty{border-color:var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center}
  .card.empty span{color:var(--line);font-size:26px;font-weight:700}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:#000;color:#fff;font-size:13px;padding:10px 16px;border-radius:24px;opacity:0;
    transition:.3s;pointer-events:none;z-index:9}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Pan</h1>
    <div class="meta">Day <b id="dayN">1</b><br>Streak <b id="streak">0</b> &#128293;</div>
  </header>
  <p class="how">One detail. One guess. The fewer zoom-outs, the higher your grade.</p>

  <div class="stage">
    <svg id="picWrap" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <g class="pic" id="pic"></g>
    </svg>
    <div class="zlabel" id="zlabel">Macro &middot; 1&times;</div>
    <div class="pips" id="pips"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="controls">
    <div class="guessrow">
      <input type="text" id="guess" placeholder="What is it?" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="btn-guess" id="submit">Guess</button>
    </div>
    <button class="btn-zoom" id="zoomout">Zoom out one notch &#8634;</button>
    <div class="status" id="status">&nbsp;</div>
  </div>

  <div class="result" id="result">
    <div class="grade" id="grade">A<small id="gradeSub">solved</small></div>
    <div class="gridstr" id="gridstr"></div>
    <div class="actions">
      <button class="btn-share" id="share">Share</button>
      <button class="btn-next" id="next">Next sample &#8594;</button>
    </div>
  </div>

  <div class="shelf">
    <h2>Gallery of details</h2>
    <div class="gallery" id="gallery"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

// ---------- daily seed ----------
function seedFromDate(d){
  var s = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  return s>>>0;
}
function mulberry32(a){
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
var EPOCH = new Date(2026,5,28); // day-1 reference
var today = new Date();
var dayNumber = Math.max(1, Math.round((new Date(today.getFullYear(),today.getMonth(),today.getDate()) - EPOCH)/86400000)+1);

// ---------- procedural "images" ----------
// Each image: name, accepted answers, focus point (where the macro crop lands),

function cassette(){
  return ''+
  '<rect width="100" height="100" fill="#20232b"/>'+
  '<rect x="14" y="26" width="72" height="48" rx="4" fill="#2b2f3a"/>'+
  '<rect x="14" y="26" width="72" height="48" rx="4" fill="none" stroke="#3c4150" stroke-width="1"/>'+
  // label
  '<rect x="20" y="31" width="60" height="17" rx="2" fill="#e9e4d6"/>'+
  '<rect x="23" y="35" width="40" height="2.4" fill="#b94a3b"/>'+
  '<rect x="23" y="40" width="50" height="1.8" fill="#9aa0b0"/>'+
  '<rect x="23" y="43.5" width="34" height="1.8" fill="#9aa0b0"/>'+
  // window
  '<rect x="30" y="52" width="40" height="14" rx="2" fill="#11131a"/>'+
  // reels
  '<circle cx="40" cy="59" r="6.4" fill="#3a3f4d"/>'+
  '<circle cx="60" cy="59" r="6.4" fill="#3a3f4d"/>'+
  '<circle cx="40" cy="59" r="2.6" fill="#1b1d24"/>'+
  '<circle cx="60" cy="59" r="2.6" fill="#1b1d24"/>'+
  '<g stroke="#5a6172" stroke-width="1">'+
  '<line x1="40" y1="53.5" x2="40" y2="56"/><line x1="40" y1="62" x2="40" y2="64.5"/>'+
  '<line x1="34.5" y1="59" x2="37" y2="59"/><line x1="43" y1="59" x2="45.5" y2="59"/>'+
  '<line x1="60" y1="53.5" x2="60" y2="56"/><line x1="60" y1="62" x2="60" y2="64.5"/>'+
  '<line x1="54.5" y1="59" x2="57" y2="59"/><line x1="63" y1="59" x2="65.5" y2="59"/></g>'+
  // tape between reels
  '<rect x="46" y="64" width="8" height="2" fill="#0c0d12"/>'+
  // bottom holes
  '<circle cx="24" cy="70" r="1.6" fill="#11131a"/>'+
  '<circle cx="50" cy="70" r="1.6" fill="#11131a"/>'+
  '<circle cx="76" cy="70" r="1.6" fill="#11131a"/>';
}
function cactus(){
  return ''+
  '<rect width="100" height="100" fill="#f0d9b5"/>'+
  '<rect y="0" width="100" height="50" fill="#f6e4c8"/>'+
  '<rect y="68" width="100" height="32" fill="#d9b98a"/>'+
  '<circle cx="78" cy="20" r="12" fill="#f7c873" opacity=".7"/>'+
  // pot
  '<path d="M38 72 L62 72 L59 92 L41 92 Z" fill="#c0673b"/>'+
  '<rect x="36" y="68" width="28" height="6" rx="1" fill="#a8542c"/>'+
  // cactus body
  '<rect x="45" y="30" width="10" height="42" rx="5" fill="#5a8f4a"/>'+
  '<rect x="36" y="44" width="7" height="16" rx="3.5" fill="#5a8f4a"/>'+
  '<rect x="36" y="44" width="7" height="6" rx="3.5" fill="#5a8f4a"/>'+
  '<rect x="57" y="38" width="7" height="20" rx="3.5" fill="#5a8f4a"/>'+
  '<rect x="57" y="38" width="7" height="6" rx="3.5" fill="#5a8f4a"/>'+
  // ridges
  '<g stroke="#4a7a3d" stroke-width=".7">'+
  '<line x1="50" y1="32" x2="50" y2="70"/><line x1="47" y1="33" x2="47" y2="70"/><line x1="53" y1="33" x2="53" y2="70"/></g>'+
  // flower
  '<circle cx="50" cy="30" r="4" fill="#e8567a"/>'+
  '<circle cx="50" cy="30" r="1.6" fill="#f7c873"/>'+
  // spines
  '<g stroke="#dff0c0" stroke-width=".5">'+
  '<line x1="45" y1="40" x2="43" y2="39"/><line x1="55" y1="40" x2="57" y2="39"/>'+
  '<line x1="45" y1="50" x2="43" y2="49"/><line x1="55" y1="52" x2="57" y2="51"/>'+
  '<line x1="45" y1="60" x2="43" y2="59"/><line x1="55" y1="60" x2="57" y2="59"/></g>';
}
function sailboat(){
  return ''+
  '<rect width="100" height="100" fill="#0f2b3d"/>'+
  '<rect y="0" width="100" height="55" fill="#e8945c"/>'+
  '<rect y="0" width="100" height="30" fill="#d97b4a"/>'+
  '<rect y="55" width="100" height="45" fill="#123446"/>'+
  '<circle cx="68" cy="24" r="9" fill="#ffd9a0"/>'+
  // water shimmer
  '<rect y="55" width="100" height="45" fill="#0d2a3a"/>'+
  '<g fill="#e8945c" opacity=".35">'+
  '<rect x="10" y="62" width="20" height="1.4"/><rect x="50" y="70" width="26" height="1.4"/><rect x="20" y="80" width="30" height="1.4"/><rect x="60" y="88" width="18" height="1.4"/></g>'+
  // mast + sails
  '<line x1="50" y1="22" x2="50" y2="62" stroke="#2b1d12" stroke-width="1.4"/>'+
  '<path d="M50 24 L50 58 L30 58 Z" fill="#f4f1ea"/>'+
  '<path d="M50 28 L50 58 L66 58 Z" fill="#dcd8cd"/>'+
  // hull
  '<path d="M30 60 L70 60 L62 68 L38 68 Z" fill="#7a3b22"/>'+
  '<rect x="30" y="59" width="40" height="2" fill="#9a4c2c"/>';
}
function vinyl(){
  return ''+
  '<rect width="100" height="100" fill="#14141a"/>'+
  '<rect x="12" y="12" width="76" height="76" rx="2" fill="#2a2118"/>'+
  '<rect x="12" y="12" width="76" height="76" rx="2" fill="none" stroke="#3a2e20" stroke-width="1"/>'+
  // record
  '<circle cx="50" cy="50" r="34" fill="#0b0b0d"/>'+
  '<g stroke="#1c1c22" stroke-width=".6" fill="none">'+
  '<circle cx="50" cy="50" r="30"/><circle cx="50" cy="50" r="27"/><circle cx="50" cy="50" r="24"/><circle cx="50" cy="50" r="21"/><circle cx="50" cy="50" r="18"/></g>'+
  '<circle cx="50" cy="50" r="36" fill="none" stroke="#26262e" stroke-width="1"/>'+
  // sheen
  '<path d="M30 32 A34 34 0 0 1 70 32 L66 36 A28 28 0 0 0 34 36 Z" fill="#ffffff" opacity=".06"/>'+
  // label
  '<circle cx="50" cy="50" r="13" fill="#c9533f"/>'+
  '<circle cx="50" cy="50" r="13" fill="none" stroke="#a8432f" stroke-width="1"/>'+
  '<path d="M50 40 A10 10 0 0 1 60 50" fill="none" stroke="#f0d9b5" stroke-width=".8"/>'+
  '<circle cx="50" cy="50" r="1.6" fill="#14141a"/>';
}

var IMAGES = [
  {name:'lighthouse', answers:['lighthouse','light house'], focus:{x:50,y:24}, paint:lighthouse},
  {name:'hot air balloon', answers:['balloon','hot air balloon','hotair balloon','air balloon'], focus:{x:50,y:30}, paint:hotair},
  {name:'cassette tape', answers:['cassette','tape','cassette tape','mixtape','mix tape'], focus:{x:40,y:59}, paint:cassette},
  {name:'cactus', answers:['cactus','succulent','potted cactus'], focus:{x:50,y:30}, paint:cactus},
  {name:'sailboat', answers:['sailboat','boat','sail boat','yacht','ship'], focus:{x:50,y:42}, paint:sailboat},
  {name:'vinyl record', answers:['vinyl','record','vinyl record','lp','album'], focus:{x:50,y:50}, paint:vinyl}
];

// ---------- zoom config ----------
// 5 notches. notch 0 = max macro (smallest visible window), notch 4 = full frame.
// scale = how much we magnify. window size = 100/scale.
var SCALES = [6.5, 4.0, 2.5, 1.6, 1.0]; // step 1..5
var STEP_NAMES = ['Extreme','Macro','Tight','Wide','Full frame'];

// ---------- state ----------
var state = {
  imgIndex: 0,
  notch: 0,        // current zoom-out count (0 = most zoomed in)
  solved: false,
  done: false,     // solved OR ran out
  guessNotch: -1,  // notch at which solved
};

var pic = document.getElementById('pic');
var picWrap = document.getElementById('picWrap');
var zlabel = document.getElementById('zlabel');
var pips = document.getElementById('pips');
var flash = document.getElementById('flash');
var guessInput = document.getElementById('guess');
var statusEl = document.getElementById('status');
var resultEl = document.getElementById('result');
var gallery = document.getElementById('gallery');
var toastEl = document.getElementById('toast');

// persistent-ish across "next sample" in one session
var sessionPlayed = 0;

function currentImg(){ return IMAGES[state.imgIndex]; }

function renderPicture(){
  pic.innerHTML = currentImg().paint();
}

// Crop window (in 0..100 SVG user units) for a given notch, centred on focus.
function cropFor(notch){
  var img = currentImg();
  var scale = SCALES[notch];
  var win = 100/scale;
  var tx = img.focus.x - win/2, ty = img.focus.y - win/2;
  tx = Math.max(0, Math.min(100-win, tx));
  ty = Math.max(0, Math.min(100-win, ty));
  return {x:tx, y:ty, w:win, h:win, scale:scale};
}

// Current animated viewBox (so a new tween can start from wherever we are).
var viewBox = {x:0, y:0, w:100, h:100};
var zoomRAF = 0;
function setViewBox(v){
  viewBox = v;
  picWrap.setAttribute('viewBox', v.x.toFixed(3)+' '+v.y.toFixed(3)+' '+v.w.toFixed(3)+' '+v.h.toFixed(3));
}
function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }

function applyZoom(animate){
  var target = cropFor(state.notch);
  zlabel.textContent = STEP_NAMES[state.notch] + ' · ' + target.scale.toFixed(1) + '×';
  if(zoomRAF){ cancelAnimationFrame(zoomRAF); zoomRAF = 0; }
  if(!animate){
    setViewBox({x:target.x, y:target.y, w:target.w, h:target.h});
    return;
  }
  var from = {x:viewBox.x, y:viewBox.y, w:viewBox.w, h:viewBox.h};
  var dur = 820, t0 = -1;
  function frame(now){
    if(t0<0) t0 = now;            // anchor to the first frame's clock
    var p = Math.min(1, (now - t0)/dur);
    var e = easeOutCubic(p);
    setViewBox({
      x: from.x + (target.x-from.x)*e,
      y: from.y + (target.y-from.y)*e,
      w: from.w + (target.w-from.w)*e,
      h: from.h + (target.h-from.h)*e
    });
    if(p<1){ zoomRAF = requestAnimationFrame(frame); }
    else { zoomRAF = 0; setViewBox({x:target.x,y:target.y,w:target.w,h:target.h}); }
  }
  zoomRAF = requestAnimationFrame(frame);
}

function renderPips(){
  pips.innerHTML='';
  for(var i=0;i<5;i++){
    var d=document.createElement('div');
    d.className='pip'+(i<=state.notch?' on':'');
    pips.appendChild(d);
  }
}

function doFlash(){
  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');
}

function setStatus(msg, cls){
  statusEl.textContent = msg || ' ';
  statusEl.className = 'status' + (cls?(' '+cls):'');
}

function normalize(s){
  return s.toLowerCase().trim().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ');
}
function isCorrect(guess){
  var g = normalize(guess);
  if(!g) return false;
  return currentImg().answers.some(function(a){
    var na = normalize(a);
    if(g===na) return true;
    // accept the answer appearing inside a longer guess ("a red lighthouse")
    if(na.length>=4 && g.indexOf(na)>=0) return true;
    // accept a guess that is the meaningful head of the answer ("light" for "lighthouse")
    if(g.length>=4 && na.indexOf(g)>=0) return true;
    return false;
  });
}

var GRADES = ['S','A','B','C','D']; // by guessNotch 0..4
var GRADE_WORDS = ['Legendary','Sharp eye','Solid','Squeaked it','Down to the wire'];

function gradeFor(notch){ return GRADES[notch]; }

function finish(solved){
  state.solved = solved;
  state.done = true;
  if(solved) state.guessNotch = state.notch;
  // animate to the full reveal for the payoff
  state.notch = 4;
  applyZoom(true);
  renderPips();
  doFlash();
  guessInput.disabled = true;
  document.getElementById('submit').disabled = true;
  document.getElementById('zoomout').disabled = true;

  var gradeEl = document.getElementById('grade');
  var subEl = document.getElementById('gradeSub');
  if(solved){
    setStatus('It was a '+currentImg().name+'.', 'good');
    gradeEl.firstChild.nodeValue = gradeFor(state.guessNotch);
    subEl.textContent = GRADE_WORDS[state.guessNotch];
  }else{
    setStatus('Out of zooms — it was a '+currentImg().name+'.', 'bad');
    gradeEl.firstChild.nodeValue = '—';
    subEl.textContent = 'Missed';
  }
  document.getElementById('gridstr').textContent = buildGrid();
  resultEl.classList.add('show');
  addToGallery(solved);
  bumpStreak(solved);
}

function buildGrid(){
  // spoiler-safe: a row of 5 squares, one per zoom step.
  // green = the step you guessed at, white = steps you saw before that, dark = unreached
  var out='';
  for(var i=0;i<5;i++){
    if(state.solved){
      if(i<state.guessNotch) out+='⬜';      // saw, skipped
      else if(i===state.guessNotch) out+='🟩'; // nailed here
      else out+='⬛';
    }else{
      out += '⬜';
    }
  }
  if(!state.solved) out = '🟥🟥🟥🟥🟥';
  return out;
}

function buildShareText(){
  var g = state.solved ? gradeFor(state.guessNotch) : 'X';
  return 'Pan #'+dayNumber+' '+g+'/S\n'+buildGrid()+'\n(I knew it from the corner)';
}

// ---------- gallery ----------
function addToGallery(solved){
  var img = currentImg();
  // macro crop for the front face = the extreme step (notch 0), via viewBox
  var c = cropFor(0);
  var vb = c.x.toFixed(3)+' '+c.y.toFixed(3)+' '+c.w.toFixed(3)+' '+c.h.toFixed(3);
  var paint = img.paint();

  var card=document.createElement('div');
  card.className='card';
  var front='<div class="face front"><svg viewBox="'+vb+'" preserveAspectRatio="xMidYMid slice">'+paint+'</svg><div class="tag">macro</div></div>';
  var back='<div class="face back"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">'+paint+'</svg><div class="tag">'+(solved?gradeFor(state.guessNotch):'missed')+'</div></div>';
  card.innerHTML='<div class="inner">'+front+back+'</div>';
  card.addEventListener('click',function(){ card.classList.toggle('flip'); });
  // replace the first empty slot
  var empty=gallery.querySelector('.card.empty');
  if(empty) gallery.replaceChild(card, empty); else gallery.appendChild(card);
}
function seedGallery(){
  gallery.innerHTML='';
  for(var i=0;i<6;i++){
    var e=document.createElement('div');
    e.className='card empty';
    e.innerHTML='<span>?</span>';
    gallery.appendChild(e);
  }
}

// ---------- streak (persisted, once per day) ----------
var LS_KEY = 'pan.v1';
function loadSave(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(raw){ var o = JSON.parse(raw); if(o && typeof o==='object') return o; }
  }catch(e){}
  return {streak:0, lastDay:0, dailyDone:false, dailyDay:0};
}
function writeSave(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(save)); }catch(e){}
}
var save = loadSave();
var streak = save.streak|0;

// On boot, decide whether the streak survived the gap since last play.
function initStreak(){
  if(save.lastDay && dayNumber - save.lastDay > 1){
    streak = 0; save.streak = 0;            // missed a day → broken
  }
  // Has today's daily already been completed (e.g. page refresh)?
  if(save.dailyDay !== dayNumber){ save.dailyDone = false; save.dailyDay = dayNumber; }
  writeSave();
  document.getElementById('streak').textContent = streak;
}

// Only the FIRST completion of the daily puzzle moves the streak.
function bumpStreak(solved){
  var isDaily = (state.imgIndex === dailyIdx) && !save.dailyDone;
  if(isDaily){
    save.dailyDone = true;
    save.dailyDay = dayNumber;
    save.lastDay = dayNumber;
    if(solved){ streak++; } else { streak = 0; }
    save.streak = streak;
    writeSave();
  }
  document.getElementById('streak').textContent = streak;
}

// ---------- toast ----------
function toast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(function(){toastEl.classList.remove('show');},1600);
}

// ---------- round flow ----------
function startRound(index, animateIn){
  state.imgIndex = index % IMAGES.length;
  state.notch = 0;
  state.solved=false; state.done=false; state.guessNotch=-1;
  renderPicture();
  applyZoom(false);
  renderPips();
  guessInput.disabled=false; guessInput.value='';
  document.getElementById('submit').disabled=false;
  document.getElementById('zoomout').disabled=false;
  resultEl.classList.remove('show');
  setStatus(' ');
  if(animateIn){
    // settle-in: start a touch tighter than notch 0, then ease out to it
    var t = cropFor(0);
    var pad = t.w*0.16;
    setViewBox({x:t.x+pad/2, y:t.y+pad/2, w:t.w-pad, h:t.h-pad});
    applyZoom(true);
  }
}

function onGuess(){
  if(state.done) return;
  if(isCorrect(guessInput.value)){
    finish(true);
  }else{
    // wrong guess = forced zoom out one notch, with the mechanical thunk feel
    setStatus('Not quite. Camera racks back…','bad');
    rackOut(true);
  }
}

function rackOut(fromWrong){
  if(state.done) return;
  if(state.notch>=4){
    // already at full frame, no zooms left
    finish(false);
    return;
  }
  state.notch++;
  applyZoom(true);
  renderPips();
  doFlash();
  if(!fromWrong) setStatus(STEP_NAMES[state.notch]+' — '+(4-state.notch)+' zoom'+((4-state.notch)===1?'':'s')+' left');
  if(state.notch>=4){
    // reached full frame without solving: one last guess allowed at full
    setStatus('Full frame. Last guess!');
  }
}

// ---------- wire up ----------
document.getElementById('submit').addEventListener('click', onGuess);
guessInput.addEventListener('keydown', function(e){ if(e.key==='Enter') onGuess(); });
document.getElementById('zoomout').addEventListener('click', function(){ if(!state.done) rackOut(false); });
document.getElementById('share').addEventListener('click', function(){
  var txt=buildShareText();
  if(navigator.share){
    navigator.share({text:txt}).catch(function(){copyShare(txt);});
  }else copyShare(txt);
});
function copyShare(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('Result copied');},function(){fallbackCopy(txt);});
  }else fallbackCopy(txt);
}
function fallbackCopy(txt){
  var ta=document.createElement('textarea');
  ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('Result copied');}catch(e){toast('Copy failed');}
  document.body.removeChild(ta);
}
document.getElementById('next').addEventListener('click', function(){
  sessionPlayed++;
  // deterministic next from the daily seed so it still feels "daily-ish"
  var rng=mulberry32(seedFromDate(today)+sessionPlayed*97);
  var idx=Math.floor(rng()*IMAGES.length);
  if(idx===state.imgIndex) idx=(idx+1)%IMAGES.length;
  startRound(idx, true);
});

// ---------- boot ----------
document.getElementById('dayN').textContent = dayNumber;
seedGallery();
// pick today's image deterministically — this is THE daily puzzle
var bootRng = mulberry32(seedFromDate(today));
var dailyIdx = Math.floor(bootRng()*IMAGES.length);
initStreak();
startRound(dailyIdx, false);
// focus only on devices with a real keyboard so mobile doesn't pop the keyboard immediately
if(!('ontouchstart' in window)) guessInput.focus();

})();
</script>
