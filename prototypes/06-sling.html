<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>SLING</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden; background: #0b0d12;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #c {
    position: fixed; inset: 0; display: block;
    touch-action: none;
  }
  #hud {
    position: fixed; top: 10px; left: 12px; z-index: 2;
    color: #eef1f8; pointer-events: none;
    font: 600 13px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    text-shadow: 0 1px 4px rgba(0,0,0,.65);
  }
  #holeLbl { font-size: 15px; font-weight: 800; letter-spacing: .1em; }
  #strokeLbl { color: #aeb6d0; }
  #bestLbl { font-size: 10px; color: #7d87a6; letter-spacing: .05em; }
  #restart {
    position: fixed; top: 10px; right: 12px; z-index: 3;
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid #323a52; background: rgba(27,32,48,.85);
    color: #aeb6d0; font-size: 19px; line-height: 1; padding: 0;
    touch-action: manipulation; cursor: pointer;
    transition: background .18s, color .18s, border-color .18s, transform .18s;
  }
  #restart.armed {
    background: #c9333f; border-color: #ff5964; color: #fff;
    transform: scale(1.08);
  }
  #hint {
    position: fixed; left: 50%; bottom: 14%; z-index: 2;
    transform: translateX(-50%);
    background: rgba(27,32,48,.85); border: 1px solid #323a52;
    color: #c6cde2; font: 600 13px system-ui, -apple-system, sans-serif;
    padding: 8px 15px; border-radius: 999px;
    pointer-events: none; white-space: nowrap;
    transition: opacity .7s;
  }
  #hint.off { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="holeLbl">HOLE 1</div>
  <div id="strokeLbl">strokes 0 (+0)</div>
  <div id="bestLbl"></div>
</div>
<button id="restart" aria-label="restart run">&#8635;</button>
<div id="hint">drag back &middot; release</div>
<script>
"use strict";
/* ============================== helpers ============================== */
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }
function lerp(a, b, t){ return a + (b - a) * t; }
function easeInOut(t){ return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }

/* ============================== DOM ============================== */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const holeLbl = document.getElementById('holeLbl');
const strokeLbl = document.getElementById('strokeLbl');
const bestLbl = document.getElementById('bestLbl');
const restartBtn = document.getElementById('restart');
const hintEl = document.getElementById('hint');

/* ============================== state ============================== */
const DT = 1 / 120;
const SLIDE_DUR = 0.8;
let W = 0, H = 0, dpr = 1;
let G = 0, MAXV = 0, K = 0, CANCEL = 0, BR = 8;
let ROLL_A = 14, REST_V = 8, SINK_V = 30, ROLL_CAP = 18;
const ROLL_DRAG = 0.4, REST_E = 0.38, TFRIC = 0.86;
let skyGrad = null;

let hole = 1, strokesTotal = 0, strokesHole = 0;
let mode = 'play';                 // 'play' | 'sunk' | 'slide'
let sunkT = 0, slideT = 0, sinkT = 0;
let time = 0;
let scene = null, nextScene = null;
let stars = [];
let particles = [], trail = [], trailTick = 0;
let flagHop = 0;
let toastT = -1, toastMsg = '';
let drag = null;
let firstShot = false;
let best = loadBest();

const ball = {
  x: 0, y: 0, vx: 0, vy: 0, r: 8, s: 0,
  resting: true, rolling: false, restT: 0,
  squash: 0, squashAng: -Math.PI / 2
};

/* ============================== audio ============================== */
let AC = null, master = null, noiseBuf = null;
let rollGain = null, rollLast = -1;
let drawOsc = null, drawGain = null;
let lastThump = 0;

function ensureAudio(){
  if (AC){ if (AC.state === 'suspended') AC.resume(); return; }
  try {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return;
    AC = new Ctor();
    master = AC.createGain();
    master.gain.value = 0.5;
    master.connect(AC.destination);
    const len = Math.floor(AC.sampleRate * 0.7);
    noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    // continuous roll rumble (gain 0 until rolling fast)
    const src = AC.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    const lp = AC.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 180;
    rollGain = AC.createGain(); rollGain.gain.value = 0;
    src.connect(lp); lp.connect(rollGain); rollGain.connect(master);
    src.start();
    rollLast = 0;
  } catch (e) { AC = null; }
}
function noiseHit(t, dur, gain, cutoff){
  if (!AC) return;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff;
  const g = AC.createGain();
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t); src.stop(t + dur + 0.02);
}
function tone(freq, t, dur, gain, type){
  if (!AC) return;
  const o = AC.createOscillator(); o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.03);
}
function playThwock(pow){
  if (!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(300 + 140 * pow, t);
  o.frequency.exponentialRampToValueAtTime(82, t + 0.1);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.14 + 0.3 * pow, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.17);
  noiseHit(t, 0.04, 0.1 + 0.1 * pow, 1500);
}
function playThump(vol){
  if (!AC || vol < 0.03) return;
  const t = AC.currentTime;
  if (t - lastThump < 0.04) return;
  lastThump = t;
  vol = clamp(vol, 0, 1);
  const o = AC.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(120 + 50 * vol, t);
  o.frequency.exponentialRampToValueAtTime(58, t + 0.09);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.3 * vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.13);
  noiseHit(t, 0.05, 0.16 * vol, 340);
}
function playSink(){
  if (!AC) return;
  const t = AC.currentTime;
  noiseHit(t, 0.05, 0.16, 620);          // cup rattle
  noiseHit(t + 0.06, 0.05, 0.12, 520);
  noiseHit(t + 0.115, 0.06, 0.08, 420);
  tone(659, t + 0.16, 0.3, 0.16, 'sine');  // two-note chime
  tone(988, t + 0.3, 0.38, 0.18, 'sine');
}
function startDrawTone(){
  if (!AC) return;
  stopDrawTone();
  drawOsc = AC.createOscillator(); drawOsc.type = 'sine';
  drawOsc.frequency.value = 150;
  drawGain = AC.createGain(); drawGain.gain.value = 0.0001;
  drawOsc.connect(drawGain); drawGain.connect(master);
  drawOsc.start();
}
function updateDrawTone(fr){
  if (!AC || !drawOsc) return;
  const t = AC.currentTime;
  drawOsc.frequency.setTargetAtTime(150 + 430 * fr * fr, t, 0.03);
  drawGain.gain.setTargetAtTime(0.006 + 0.024 * fr, t, 0.04);
}
function stopDrawTone(){
  if (!AC || !drawOsc) return;
  const t = AC.currentTime;
  try {
    drawGain.gain.setTargetAtTime(0.0001, t, 0.02);
    drawOsc.stop(t + 0.1);
  } catch (e) {}
  drawOsc = null; drawGain = null;
}
function updateRollSound(){
  if (!AC || !rollGain) return;
  let target = 0;
  if (mode === 'play' && ball.rolling && !ball.resting){
    const s = Math.abs(ball.s);
    if (s > W * 0.12) target = Math.min(0.06, s / MAXV * 0.16);
  }
  if (Math.abs(target - rollLast) > 0.004){
    rollGain.gain.setTargetAtTime(target, AC.currentTime, 0.08);
    rollLast = target;
  }
}
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && AC && AC.state === 'suspended') AC.resume();
});

/* ============================== terrain ============================== */
function genScene(hn){
  const seed = (Math.imul(hn, 2654435761) >>> 0) || 0x9e3779b9;
  const rnd = mulberry32(seed);
  const cols = Math.max(72, Math.round(W / 4));
  const dx = W / cols;
  const N = cols + 1;
  const amp = H * (0.085 + Math.min(0.085, (hn - 1) * 0.0055));
  const yBase = H * 0.66;
  // 3 octaves of cosine-interpolated value noise
  const octs = [];
  let per = W / 2.3, a = amp;
  for (let o = 0; o < 3; o++){
    const cnt = Math.ceil(W / per) + 3;
    const vals = new Array(cnt);
    for (let i = 0; i < cnt; i++) vals[i] = rnd();
    octs.push({ per, a, vals });
    per *= 0.5; a *= 0.5;
  }
  const h = new Float32Array(N);
  for (let i = 0; i < N; i++){
    const x = i * dx;
    let y = yBase;
    for (const o of octs){
      const xx = x / o.per, i0 = Math.floor(xx), t = xx - i0;
      const c = (1 - Math.cos(Math.PI * t)) * 0.5;
      y += ((o.vals[i0] * (1 - c) + o.vals[i0 + 1] * c) - 0.5) * 2 * o.a;
    }
    h[i] = clamp(y, H * 0.30, H * 0.90);   // always >=25% sky
  }
  // pick flattest spot in [0.6W, 0.9W] for the pocket
  const r = BR;
  const win = Math.max(2, Math.round(2.6 * r / dx));
  const iLo = Math.max(win + 1, Math.floor(0.60 * W / dx));
  const iHi = Math.min(N - 2 - win, Math.ceil(0.90 * W / dx));
  let bi = iLo, bscore = Infinity;
  for (let i = iLo; i <= iHi; i++){
    let sc = 0;
    for (let j = i - win; j <= i + win; j++){
      const g = Math.abs(h[j + 1] - h[j - 1]) / (2 * dx);
      if (g > sc) sc = g;
    }
    if (h[i] > H * 0.96 - 3.6 * r) sc += 1000;  // need room to carve down
    if (sc < bscore){ bscore = sc; bi = i; }
  }
  const px = bi * dx;
  const baseY = h[bi];
  const halfW = 2.5 * r;
  const depth = Math.max(2.2 * r, Math.min(3.6 * r, H * 0.99 - baseY));
  // carve U-notch pocket into the heightfield itself
  for (let i = 0; i < N; i++){
    const u = (i * dx - px) / halfW;
    const au = Math.abs(u);
    if (au >= 1) continue;
    const w = au <= 0.45 ? 1 : 0.5 * (1 + Math.cos(Math.PI * (au - 0.45) / 0.55));
    h[i] = h[i] + (baseY + depth - h[i]) * w;
  }
  const scn = { h, dx, N, pocket: { x: px, halfW, depth, baseY, poleX: Math.min(W - 2, px + halfW + r * 0.25), poleY: 0 } };
  scn.pocket.poleY = groundOf(scn, scn.pocket.poleX);
  return scn;
}
function groundOf(s, x){
  const fx = clamp(x / s.dx, 0, s.N - 1.001);
  const i = Math.floor(fx), t = fx - i;
  return s.h[i] * (1 - t) + s.h[i + 1] * t;
}
function groundAt(x){ return groundOf(scene, x); }
function slopeAt(x){
  return (groundOf(scene, x + 3) - groundOf(scene, x - 3)) / 6;
}
function genStars(){
  const rnd = mulberry32(1234);
  stars = [];
  for (let i = 0; i < 44; i++){
    stars.push({
      x: rnd() * W, y: rnd() * H * 0.55,
      s: 0.6 + rnd() * 1.5, a: 0.15 + rnd() * 0.45, tw: rnd() * 6.283
    });
  }
}

/* ============================== physics ============================== */
function stepPhysics(){
  time += DT;
  if (toastT >= 0) toastT += DT;
  if (flagHop > 0) flagHop = Math.max(0, flagHop - DT * 1.6);
  if (ball.squash > 0) ball.squash = Math.max(0, ball.squash - DT * 6);
  updateParticles();
  for (let i = trail.length - 1; i >= 0; i--){
    trail[i].life -= DT * 2.4;
    if (trail[i].life <= 0) trail.splice(i, 1);
  }
  if (mode === 'slide'){
    slideT += DT;
    if (slideT >= SLIDE_DUR) finishSlide();
    return;
  }
  if (!ball.resting){
    if (ball.rolling) rollStep(); else flyStep();
    if (!ball.resting && !ball.rolling){
      trailTick++;
      if ((trailTick & 1) === 0){
        trail.push({ x: ball.x, y: ball.y, life: 1 });
        if (trail.length > 36) trail.shift();
      }
    }
  }
  if (mode === 'sunk'){
    sunkT += DT;
    if (sunkT >= 0.55) startSlide();
    return;
  }
  // sink check: inside notch + slow, sustained 0.4s
  const p = scene.pocket;
  const spd = ball.resting ? 0 : Math.hypot(ball.vx, ball.vy);
  if (Math.abs(ball.x - p.x) < p.halfW * 0.62 &&
      ball.y > p.baseY + p.depth * 0.2 && spd < SINK_V){
    sinkT += DT;
    if (sinkT >= 0.4) doSink();
  } else {
    sinkT = 0;
  }
}
function flyStep(){
  const sp = Math.hypot(ball.vx, ball.vy);
  const n = clamp(Math.ceil(sp * DT / (ball.r * 0.8)), 1, 4);  // tunneling guard
  const h = DT / n;
  for (let k = 0; k < n; k++){
    ball.vy += G * h;
    ball.x += ball.vx * h;
    ball.y += ball.vy * h;
    // soft edge walls: no lost balls
    if (ball.x < ball.r){ ball.x = ball.r; if (ball.vx < 0) ball.vx *= -0.4; }
    else if (ball.x > W - ball.r){ ball.x = W - ball.r; if (ball.vx > 0) ball.vx *= -0.4; }
    const gy = groundAt(ball.x);
    if (ball.y > gy - ball.r){
      const d = slopeAt(ball.x);
      const inv = 1 / Math.hypot(d, 1);
      const nx = d * inv, ny = -inv;          // outward normal (points up, out of ground)
      ball.y = gy - ball.r;
      const vn = ball.vx * nx + ball.vy * ny;
      if (vn < 0){                             // moving into the surface
        const impact = -vn;
        const vtx = ball.vx - vn * nx, vty = ball.vy - vn * ny;
        const bounce = impact * REST_E;
        ball.vx = vtx * TFRIC + nx * bounce;
        ball.vy = vty * TFRIC + ny * bounce;
        onImpact(impact, nx, ny);
        if (bounce < ROLL_CAP){                // capture into rolling
          const tl = Math.hypot(1, d);
          const tx = 1 / tl, ty = d / tl;
          ball.s = ball.vx * tx + ball.vy * ty;
          ball.vx = ball.s * tx; ball.vy = ball.s * ty;
          ball.rolling = true;
          ball.restT = 0;
          break;
        }
      }
    }
  }
}
function rollStep(){
  const n = clamp(Math.ceil(Math.abs(ball.s) * DT / (ball.r * 0.8)), 1, 4);
  const h = DT / n;
  for (let k = 0; k < n; k++){
    const d = slopeAt(ball.x);
    const il = 1 / Math.hypot(1, d);
    const tx = il, ty = d * il;
    let s = ball.s + G * ty * h;               // gravity along slope
    const res = (ROLL_DRAG * Math.abs(s) + ROLL_A) * h;  // rolling resistance
    s = Math.abs(s) <= res ? 0 : s - Math.sign(s) * res;
    let nxp = ball.x + s * tx * h;
    if (nxp < ball.r){ nxp = ball.r; s = Math.abs(s) * 0.4; }
    else if (nxp > W - ball.r){ nxp = W - ball.r; s = -Math.abs(s) * 0.4; }
    const predY = ball.y + s * ty * h;
    const gy2 = groundAt(nxp) - ball.r;
    if (gy2 - predY > Math.max(1.4, Math.abs(s) * h)){   // ground drops away -> flight
      ball.rolling = false;
      ball.x = nxp; ball.y = predY;
      ball.vx = s * tx; ball.vy = s * ty; ball.s = 0;
      return;
    }
    ball.x = nxp; ball.y = gy2; ball.s = s;
    ball.vx = s * tx; ball.vy = s * ty;
    if (Math.abs(s) < REST_V){
      ball.restT++;
      // gentle slope: rest quickly. Steep slope (e.g. wedged against a wall): still
      // rest after ~0.75s of stillness so the run can never softlock.
      if (ball.restT >= (Math.abs(d) < 0.36 ? 20 : 90)){
        ball.resting = true; ball.rolling = false;
        ball.vx = ball.vy = ball.s = 0;
        return;
      }
    } else {
      ball.restT = 0;
    }
  }
}
function onImpact(impact, nx, ny){
  if (impact < MAXV * 0.05) return;
  playThump(impact / (MAXV * 0.9));
  ball.squash = Math.min(1, impact / (MAXV * 0.55));
  ball.squashAng = Math.atan2(ny, nx);
  const cnt = clamp(2 + Math.floor(impact / MAXV * 16), 2, 10);
  for (let i = 0; i < cnt; i++){
    const a = Math.atan2(ny, nx) + (Math.random() - 0.5) * 1.7;
    const sp = (0.15 + Math.random() * 0.5) * impact * 0.4;
    particles.push({
      x: ball.x, y: ball.y + ball.r * 0.6,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, dec: 2.2 + Math.random() * 1.6,
      size: 1.4 + Math.random() * 2.2,
      col: Math.random() < 0.5 ? '#8f97b3' : '#6d7694', grav: 0.35
    });
  }
}
function updateParticles(){
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.vy += p.grav * G * DT;
    p.vx *= (1 - 1.4 * DT);
    p.x += p.vx * DT; p.y += p.vy * DT;
    p.life -= p.dec * DT;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

/* ============================== flow ============================== */
function placeBallFrac(fx){
  ball.x = fx * W;
  ball.y = groundAt(ball.x) - ball.r;
  ball.vx = ball.vy = ball.s = 0;
  ball.resting = true; ball.rolling = false;
  ball.restT = 0; ball.squash = 0;
  trail.length = 0;
}
function doLaunch(vx, vy){
  const sp = Math.hypot(vx, vy);
  if (sp > MAXV){ vx *= MAXV / sp; vy *= MAXV / sp; }
  ball.vx = vx; ball.vy = vy;
  ball.resting = false; ball.rolling = false;
  ball.restT = 0; ball.s = 0;
  strokesHole++; strokesTotal++;
  sinkT = 0;
  if (!firstShot){ firstShot = true; hintEl.classList.add('off'); }
  playThwock(Math.min(1, sp / MAXV));
  updateHUD();
}
function doSink(){
  mode = 'sunk'; sunkT = 0; sinkT = 0;
  toastMsg = 'HOLE ' + hole + ' · ' + strokesHole + (strokesHole === 1 ? ' stroke' : ' strokes');
  toastT = 0;
  flagHop = 1;
  playSink();
  for (let i = 0; i < 26; i++){                          // radial burst
    const a = (i / 26) * 6.283 + Math.random() * 0.3;
    const sp = W * (0.25 + Math.random() * 0.55);
    particles.push({
      x: ball.x, y: ball.y - ball.r,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - W * 0.2,
      life: 1, dec: 1.5 + Math.random(),
      size: 1.6 + Math.random() * 2.4,
      col: i % 3 === 0 ? '#ffd76a' : (i % 3 === 1 ? '#ff5964' : '#eef1f8'), grav: 0.28
    });
  }
  const reached = hole + 1;
  if (!best || reached > best.hole){
    best = { hole: reached, strokes: strokesTotal };
    saveBest();
  }
  updateHUD();
}
function startSlide(){
  nextScene = genScene(hole + 1);
  mode = 'slide'; slideT = 0;
  trail.length = 0;
}
function finishSlide(){
  scene = nextScene; nextScene = null;
  hole++; strokesHole = 0;
  mode = 'play'; sinkT = 0;
  placeBallFrac(0.12);
  particles.length = 0;
  updateHUD();
}
function restartRun(){
  if (drag){ stopDrawTone(); drag = null; }
  hole = 1; strokesTotal = 0; strokesHole = 0;
  mode = 'play'; sunkT = 0; slideT = 0; sinkT = 0;
  toastT = -1; flagHop = 0;
  scene = genScene(1); nextScene = null;
  particles.length = 0; trail.length = 0;
  placeBallFrac(0.12);
  updateHUD();
}

/* ============================== persistence ============================== */
function loadBest(){
  try {
    const s = localStorage.getItem('sling-best');
    if (s){
      const b = JSON.parse(s);
      if (b && typeof b.hole === 'number' && b.hole >= 1) return b;
    }
  } catch (e) {}
  return null;
}
function saveBest(){
  try { localStorage.setItem('sling-best', JSON.stringify(best)); } catch (e) {}
}
function updateHUD(){
  holeLbl.textContent = 'HOLE ' + hole;
  strokeLbl.textContent = 'strokes ' + strokesTotal + ' (+' + strokesHole + ')';
  bestLbl.textContent = best ? ('best: hole ' + best.hole + ' · ' + best.strokes) : '';
}

/* ============================== input ============================== */
window.addEventListener('pointerdown', ensureAudio, true);
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (drag) return;
  if (mode !== 'play' || !ball.resting) return;
  drag = { id: e.pointerId, sx: e.clientX, sy: e.clientY, cx: e.clientX, cy: e.clientY };
  try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  startDrawTone();
});
canvas.addEventListener('pointermove', (e) => {
  if (!drag || e.pointerId !== drag.id) return;
  drag.cx = e.clientX; drag.cy = e.clientY;
  const len = Math.hypot(drag.sx - drag.cx, drag.sy - drag.cy);
  updateDrawTone(Math.min(1, len * K / MAXV));
});
canvas.addEventListener('pointerup', (e) => {
  if (!drag || e.pointerId !== drag.id) return;
  const dx = drag.sx - e.clientX, dy = drag.sy - e.clientY;
  drag = null;
  stopDrawTone();
  const len = Math.hypot(dx, dy);
  if (len < CANCEL) return;                       // tiny drag: no stroke
  if (mode !== 'play' || !ball.resting) return;
  const sp = Math.min(MAXV, len * K);
  doLaunch(dx / len * sp, dy / len * sp);
});
canvas.addEventListener('pointercancel', (e) => {
  if (drag && e.pointerId === drag.id){ drag = null; stopDrawTone(); }
});
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

let armed = false, armTimer = 0;
restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  ensureAudio();
  if (!armed){
    armed = true;
    restartBtn.classList.add('armed');
    armTimer = setTimeout(() => {
      armed = false;
      restartBtn.classList.remove('armed');
    }, 2000);
  } else {
    clearTimeout(armTimer);
    armed = false;
    restartBtn.classList.remove('armed');
    restartRun();
  }
});

/* ============================== rendering ============================== */
function circle(x, y, r){
  ctx.beginPath();
  ctx.arc(x, y, r, 0, 6.2832);
  ctx.fill();
}
function rr(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
function powColor(fr){
  const g = [89, 255, 160], a = [255, 207, 90], r = [255, 89, 100];
  let c;
  if (fr < 0.5){ const t = fr * 2; c = [lerp(g[0], a[0], t), lerp(g[1], a[1], t), lerp(g[2], a[2], t)]; }
  else { const t = (fr - 0.5) * 2; c = [lerp(a[0], r[0], t), lerp(a[1], r[1], t), lerp(a[2], r[2], t)]; }
  return 'rgb(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ')';
}
function drawStars(off){
  ctx.fillStyle = '#cdd6f4';
  for (const st of stars){
    let x = (st.x + off * 0.25) % W;
    if (x < 0) x += W;
    ctx.globalAlpha = st.a * (0.7 + 0.3 * Math.sin(time * 1.6 + st.tw));
    ctx.fillRect(x, st.y, st.s, st.s);
  }
  ctx.globalAlpha = 1;
}
function drawScene(s, off, isCurrent){
  ctx.save();
  ctx.translate(off, 0);
  // terrain silhouette
  ctx.beginPath();
  ctx.moveTo(-2, H + 2);
  for (let i = 0; i < s.N; i++) ctx.lineTo(i * s.dx, s.h[i]);
  ctx.lineTo(W + 2, H + 2);
  ctx.closePath();
  ctx.fillStyle = '#1b2030';
  ctx.fill();
  // top edge line
  ctx.beginPath();
  ctx.moveTo(0, s.h[0]);
  for (let i = 1; i < s.N; i++) ctx.lineTo(i * s.dx, s.h[i]);
  ctx.strokeStyle = '#323a52';
  ctx.lineWidth = 2;
  ctx.stroke();
  // flag
  const p = s.pocket;
  const lift = isCurrent ? Math.sin(flagHop * Math.PI) * BR * 1.3 : 0;
  const poleH = BR * 5.4;
  const baseY = p.poleY;
  const topY = baseY - poleH - lift;
  ctx.strokeStyle = '#d8dbe6';
  ctx.lineWidth = Math.max(2, BR * 0.2);
  ctx.beginPath();
  ctx.moveTo(p.poleX, baseY);
  ctx.lineTo(p.poleX, topY);
  ctx.stroke();
  const wave = Math.sin(time * 3.2 + (isCurrent ? 0 : 2.1)) * BR * 0.16;
  ctx.fillStyle = '#ff5964';
  ctx.beginPath();
  ctx.moveTo(p.poleX, topY);
  ctx.lineTo(p.poleX + BR * 2.1 + wave, topY + BR * 0.6 + wave);
  ctx.lineTo(p.poleX, topY + BR * 1.2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawBall(off){
  ctx.save();
  ctx.translate(ball.x + off, ball.y);
  ctx.rotate(ball.squashAng);
  const k = 0.4 * ball.squash;
  ctx.scale(1 - k, 1 + k);              // compress along normal, stretch tangentially
  ctx.shadowColor = 'rgba(238,241,248,0.55)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#eef1f8';
  circle(0, 0, ball.r);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  circle(-ball.r * 0.3, -ball.r * 0.3, ball.r * 0.3);
  ctx.restore();
}
function drawParticles(off){
  for (const p of particles){
    ctx.globalAlpha = clamp(p.life, 0, 1) * 0.85;
    ctx.fillStyle = p.col;
    circle(p.x + off, p.y, p.size * (0.4 + 0.6 * p.life));
  }
  ctx.globalAlpha = 1;
}
function drawAim(){
  if (!drag || mode !== 'play' || !ball.resting) return;
  const dxv = drag.sx - drag.cx, dyv = drag.sy - drag.cy;
  const len = Math.hypot(dxv, dyv);
  if (len < 1) return;
  const ux = dxv / len, uy = dyv / len;
  if (len < CANCEL){                                    // in cancel zone: dim stub
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#7d87a6';
    for (let dpos = ball.r + 5; dpos < ball.r + 26; dpos += 7)
      circle(ball.x + ux * dpos, ball.y + uy * dpos, 2);
    ctx.globalAlpha = 1;
    return;
  }
  const sp = Math.min(MAXV, len * K);
  const fr = sp / MAXV;
  const col = powColor(fr);
  const L = ball.r + 8 + fr * W * 0.3;
  ctx.fillStyle = col;
  for (let dpos = ball.r + 5; dpos < L; dpos += 7)      // dotted power line
    circle(ball.x + ux * dpos, ball.y + uy * dpos, 2.2);
  const ex = ball.x + ux * L, ey = ball.y + uy * L;      // arrowhead
  const aw = 8, ang = Math.atan2(uy, ux);
  ctx.strokeStyle = col;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(ex + Math.cos(ang + 2.6) * aw, ey + Math.sin(ang + 2.6) * aw);
  ctx.lineTo(ex, ey);
  ctx.lineTo(ex + Math.cos(ang - 2.6) * aw, ey + Math.sin(ang - 2.6) * aw);
  ctx.stroke();
  // predicted arc: same integrator, first ~0.5s, no collision
  let px = ball.x, py = ball.y, pvx = ux * sp, pvy = uy * sp;
  ctx.fillStyle = '#eef1f8';
  ctx.globalAlpha = 0.32;
  for (let i = 0; i < 60; i++){
    pvy += G * DT; px += pvx * DT; py += pvy * DT;
    if ((i % 5) === 4){
      if (py > groundAt(clamp(px, 0, W)) - ball.r * 0.5) break;
      circle(px, py, 2.2);
    }
  }
  ctx.globalAlpha = 1;
}
function drawToast(){
  if (toastT < 0) return;
  if (toastT > 1.9){ toastT = -1; return; }
  const t = toastT;
  const a = t < 0.2 ? t / 0.2 : (t > 1.4 ? Math.max(0, 1 - (t - 1.4) / 0.5) : 1);
  const rise = (1 - Math.min(1, t / 0.25)) * 10;
  const fs = clamp(W * 0.055, 15, 24);
  ctx.font = '700 ' + fs + 'px system-ui, -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(toastMsg).width;
  const pw = tw + fs * 1.8, ph = fs * 2.1;
  const cx = W / 2, cy = H * 0.3 + rise;
  ctx.globalAlpha = a;
  ctx.fillStyle = 'rgba(23,28,44,0.92)';
  rr(cx - pw / 2, cy - ph / 2, pw, ph, ph / 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(90,100,140,0.8)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#eef1f8';
  ctx.fillText(toastMsg, cx, cy + 1);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}
function render(){
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);
  let offA = 0, offB = 0;
  const sliding = mode === 'slide';
  if (sliding){
    const e = easeInOut(Math.min(1, slideT / SLIDE_DUR));
    offA = -e * W;
    offB = W - e * W;
  }
  drawStars(offA);
  drawScene(scene, offA, true);
  if (sliding && nextScene) drawScene(nextScene, offB, false);
  ctx.fillStyle = '#eef1f8';
  for (const tp of trail){
    ctx.globalAlpha = 0.25 * tp.life;
    circle(tp.x + offA, tp.y, ball.r * 0.45 * tp.life);
  }
  ctx.globalAlpha = 1;
  drawParticles(offA);
  drawBall(offA);
  drawAim();
  drawToast();
  updateRollSound();
}

/* ============================== resize + init ============================== */
function resize(){
  const hadWorld = !!scene;
  const wasPlay = mode === 'play';
  const fx = (hadWorld && W > 0) ? ball.x / W : 0.12;
  W = Math.max(120, window.innerWidth);
  H = Math.max(200, window.innerHeight);
  dpr = clamp(window.devicePixelRatio || 1, 1, 3);
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  G = H * 1.9;
  MAXV = W * 2.6;
  K = MAXV / (W * 0.35);
  CANCEL = W * 0.04;
  ROLL_A = W * 0.047;
  REST_V = Math.max(3.5, W * 0.027);
  SINK_V = W * 0.12;
  ROLL_CAP = W * 0.06;
  BR = Math.max(6, Math.min(W / 34, H / 26));
  ball.r = BR;
  skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0b0d12');
  skyGrad.addColorStop(0.65, '#0d1019');
  skyGrad.addColorStop(1, '#131829');
  genStars();
  if (!wasPlay){                    // mid-transition: complete the hole advance
    hole += 1; strokesHole = 0;
    mode = 'play'; nextScene = null; toastT = -1;
  }
  scene = genScene(hole);
  placeBallFrac(wasPlay && hadWorld ? clamp(fx, 0.03, 0.95) : 0.12);
  particles.length = 0;
  sinkT = 0;
  updateHUD();
}
window.addEventListener('resize', resize);
resize();

/* fixed-timestep loop (1/120s), decoupled from rAF, dt clamped to 50ms */
let acc = 0, lastT = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min(50, now - lastT);
  lastT = now;
  acc += dt / 1000;
  while (acc >= DT){
    stepPhysics();
    acc -= DT;
  }
  render();
}
requestAnimationFrame(frame);

/* ============================== automation hook ============================== */
window.__game = {
  state: () => ({
    hole: hole,
    strokesTotal: strokesTotal,
    strokesHole: strokesHole,
    ballResting: ball.resting,
    x: ball.x
  }),
  stepN: (n) => {
    for (let i = 0; i < n; i++) stepPhysics();
    render();
  },
  shoot: (vx, vy) => {
    if (mode !== 'play') return false;
    doLaunch(vx, vy);
    return true;
  }
};
</script>
</body>
