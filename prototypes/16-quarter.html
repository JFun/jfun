<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>QUARTER</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden; background: #0b0d12;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #c { position: fixed; inset: 0; display: block; touch-action: none; }
  #hud {
    position: fixed; top: 10px; left: 12px; z-index: 2;
    color: #eef1f8; pointer-events: none;
    font: 800 15px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    letter-spacing: .08em; text-shadow: 0 1px 4px rgba(0,0,0,.65);
  }
  #turns {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 2;
    color: #aeb6d0; pointer-events: none; white-space: nowrap;
    font: 600 13px system-ui, -apple-system, sans-serif;
    letter-spacing: .1em; text-shadow: 0 1px 4px rgba(0,0,0,.65);
  }
  #restart {
    position: fixed; top: 8px; right: 12px; z-index: 3;
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid #323a52; background: rgba(27,32,48,.85);
    color: #aeb6d0; font-size: 19px; line-height: 1; padding: 0;
    touch-action: manipulation; cursor: pointer;
    transition: background .18s, color .18s, transform .12s;
  }
  #restart:active { transform: scale(.9); }
  #hint {
    position: fixed; left: 50%; bottom: 4%; z-index: 2;
    transform: translateX(-50%);
    background: rgba(27,32,48,.85); border: 1px solid #323a52;
    color: #c6cde2; font: 600 13px system-ui, -apple-system, sans-serif;
    padding: 8px 15px; border-radius: 999px; letter-spacing: .04em;
    pointer-events: none; white-space: nowrap;
    transition: opacity .7s;
  }
  #hint.off { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><span id="lvlLbl">LEVEL 1</span></div>
<div id="turns"><span id="turnLbl">turn 0 &middot; par 2</span></div>
<button id="restart" aria-label="restart level">&#8635;</button>
<div id="hint">tap a side to turn</div>
<script>
"use strict";
/* ============================== helpers ============================== */
function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }
function lerp(a, b, t){ return a + (b - a) * t; }
function easeInOutCubic(p){ p = clamp(p, 0, 1); return p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2; }
function easeOutBack(p){ p = clamp(p, 0, 1); const c = 1.70158, x = p - 1; return 1 + (c + 1) * x * x * x + c * x * x; }

/* ============================== DOM ============================== */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const lvlLbl = document.getElementById('lvlLbl');
const turnLbl = document.getElementById('turnLbl');
const restartBtn = document.getElementById('restart');
const hintEl = document.getElementById('hint');

/* ============================== constants ============================== */
/* Physics lives entirely in BOARD SPACE: a fixed N x N grid of CS-px cells.
   The screen only scales/rotates that space, so resize never touches the sim
   and __game.state() coords are stable board coords. */
const DT = 1 / 120;
const HP = Math.PI / 2;
const N = 9, CS = 64, S = N * CS;
const MR = CS * 0.30;            // marble radius (0.6 cell diameter)
const BOR = CS * 0.42;           // boulder radius
const GRAV = CS * 55;            // gravity accel, board units/s^2
const MAXV = CS * 26;            // hard speed clamp
const WELLR = CS * 0.85;         // goal dimple pull radius
const WELLK = CS * 26;           // dimple pull strength
const CAPR = CS * 0.45;          // capture radius
const CAPSP = CS * 7;            // must be slower than this to sink
const TWEEN = 0.35;              // quarter-turn duration, s
const F = "-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif";
const LEVELS_TOTAL = 3;

/* ============================== levels ==============================
   '#' wall tile · '.' open · 'I' open+ice (near-zero friction, no resting)
   'M' marble spawn · 'G' goal hole · 'B' boulder · 'Q' boulder ON the goal */
const LEVELS = [
  { par: 2, rows: [        // L1 — U corridor: fall, roll right, rise. Par [R,R].
    "#########",
    "##M###G##",
    "##.###.##",
    "##.###.##",
    "##.###.##",
    "##.###.##",
    "##.....##",
    "#########",
    "#########"]},
  { par: 5, rows: [        // L2 — boulder plugs the goal; dump it in the pit next to it. Verified min: RLLLL.
    "#########",
    "##M######",
    "##.######",
    "##.######",
    "##.######",
    "##.######",
    "##....Q##",
    "#####.###",
    "#########"]},
  { par: 3, rows: [        // L3 — ice run + S-bend: down, skate right, up, left. Par [R,R,R].
    "#########",
    "##M#G..##",
    "##.###.##",
    "##.###.##",
    "##.###.##",
    "##.###.##",
    "##IIIII##",
    "#########",
    "#########"]}
];

/* ============================== state ============================== */
let W = 300, H = 560, dpr = 1;
let board = { cx: 150, cy: 280, size: 260, inner: 246 };
let chevY = 500;

let level = 1, par = 2, turns = 0;
let phase = 'play';              // 'play' | 'won'
let winT = 0, winTurns = 0, winStars = 0;
let capT = 0;                    // slow-in-hole dwell timer (win at 0.3s)
let sink = null;                 // { fx, fy, t } capture snap animation
let time = 0;
let firstTap = false;

let theta = 0;                   // current board rotation (radians, renderer + gravity)
let qCount = 0;                  // accumulated quarter turns (theta = qCount*HP when idle)
let rot = null;                  // { from, to, t, dur } active tween
let queue = [];                  // buffered taps (max 1)

let walls = new Uint8Array(N * N);   // 0 open, 1 wall, 2 ice
let goal = { x: 0, y: 0 };
let bodies = [];                 // [0] marble, [1] boulder (optional)

let parts = [];                  // board-space particles
let flashL = 0, flashR = 0;      // screen edge flashes on tap
let shake = 0, shakeX = 0, shakeY = 0;

function cellIdx(c, r){ return r * N + c; }
function cellOf(b){
  const c = clamp(Math.floor(b.x / CS), 0, N - 1);
  const r = clamp(Math.floor(b.y / CS), 0, N - 1);
  return walls[cellIdx(c, r)];
}
function isIceCell(b){ return cellOf(b) === 2; }

/* ============================== fx pools ============================== */
let rings = [];
function burst(x, y, n, col, spd){
  for (let i = 0; i < n; i++){
    if (parts.length > 160) parts.shift();
    const a = Math.random() * 6.2832;
    const s = (0.25 + Math.random() * 0.75) * spd;
    parts.push({
      x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, dec: 1.7 + Math.random() * 1.8,
      size: CS * (0.045 + Math.random() * 0.075), col: col
    });
  }
}
function ringFx(x, y, r0, r1, col, life){
  if (rings.length > 20) rings.shift();
  rings.push({ x: x, y: y, r0: r0, r1: r1, col: col, t: 0, life: life || 0.45 });
}

/* ============================== audio ============================== */
let AC = null, master = null, noiseBuf = null, lastThump = 0;
function ensureAudio(){
  if (AC){ if (AC.state !== 'running') AC.resume().catch(() => {}); return; }
  try {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return;
    AC = new Ctor();
    master = AC.createGain();
    master.gain.value = 0.5;
    master.connect(AC.destination);
    const len = Math.floor(AC.sampleRate * 0.4);
    noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  } catch (e) { AC = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && AC && AC.state !== 'running') AC.resume().catch(() => {});
});
function noiseHit(t, dur, gain, cutoff, type){
  if (!AC) return;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const f = AC.createBiquadFilter(); f.type = type || 'lowpass'; f.frequency.value = cutoff;
  const g = AC.createGain();
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t); src.stop(t + dur + 0.02);
}
function tone(freq, t, dur, gain, type, slide){
  if (!AC) return;
  const o = AC.createOscillator(); o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, slide), t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.03);
}
function playTurn(dir){
  if (!AC) return;
  const t = AC.currentTime;
  // airy whoosh, pitched by direction
  const src = AC.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.1;
  const up = dir === 'R';
  f.frequency.setValueAtTime(up ? 340 : 720, t);
  f.frequency.exponentialRampToValueAtTime(up ? 760 : 320, t + TWEEN);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.11, t + 0.06);
  g.gain.exponentialRampToValueAtTime(0.0001, t + TWEEN + 0.05);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t); src.stop(t + TWEEN + 0.1);
  tone(up ? 220 : 330, t, 0.12, 0.05, 'triangle', up ? 330 : 220);
}
function playThump(vol, mat){
  if (!AC || vol < 0.04) return;
  const t = AC.currentTime;
  if (t - lastThump < 0.03) return;
  lastThump = t;
  vol = clamp(vol, 0, 1);
  if (mat === 'boulder'){
    tone(90 + 40 * vol, t, 0.13, 0.32 * vol, 'sine', 46);
    noiseHit(t, 0.07, 0.22 * vol, 300);
  } else if (mat === 'clack'){
    tone(640 + 320 * vol, t, 0.07, 0.15 + 0.1 * vol, 'triangle');
    noiseHit(t, 0.03, 0.1 * vol, 2400, 'highpass');
  } else {
    tone(130 + 60 * vol, t, 0.09, 0.26 * vol, 'sine', 60);
    noiseHit(t, 0.045, 0.15 * vol, 900);
  }
}
function playCapture(){
  if (!AC) return;
  const t = AC.currentTime;
  noiseHit(t, 0.06, 0.15, 700);
  tone(659, t + 0.05, 0.28, 0.17, 'sine');
  tone(988, t + 0.18, 0.34, 0.19, 'sine');
  tone(1319, t + 0.32, 0.42, 0.15, 'sine');
}

/* ============================== level building ============================== */
function makeBody(kind, c, r){
  const rad = kind === 'boulder' ? BOR : MR;
  return {
    kind: kind, x: (c + 0.5) * CS, y: (r + 0.5) * CS,
    spawnX: (c + 0.5) * CS, spawnY: (r + 0.5) * CS,
    vx: 0, vy: 0, r: rad, m: kind === 'boulder' ? 3 : 1,
    rot: 0, contact: false, restT: 0, resting: false
  };
}
function buildLevel(n){
  n = clamp(n | 0, 1, LEVELS_TOTAL);
  level = n;
  const L = LEVELS[n - 1];
  par = L.par;
  walls.fill(0);
  bodies = [];
  let mSpawn = null, bSpawn = null;
  goal = { x: 0, y: 0 };
  for (let r = 0; r < N; r++){
    const row = L.rows[r];
    for (let c = 0; c < N; c++){
      const ch = row.charAt(c);
      if (ch === '#') walls[cellIdx(c, r)] = 1;
      else if (ch === 'I') walls[cellIdx(c, r)] = 2;
      else if (ch === 'M') mSpawn = [c, r];
      else if (ch === 'G') goal = { x: (c + 0.5) * CS, y: (r + 0.5) * CS };
      else if (ch === 'B') bSpawn = [c, r];
      else if (ch === 'Q'){ bSpawn = [c, r]; goal = { x: (c + 0.5) * CS, y: (r + 0.5) * CS }; }
    }
  }
  bodies.push(makeBody('marble', mSpawn[0], mSpawn[1]));
  if (bSpawn) bodies.push(makeBody('boulder', bSpawn[0], bSpawn[1]));
  turns = 0; qCount = 0; theta = 0; rot = null; queue = [];
  phase = 'play'; winT = 0; capT = 0; sink = null;
  parts.length = 0; rings.length = 0;
  shake = 0; flashL = 0; flashR = 0;
  updateHUD();
}
function updateHUD(){
  lvlLbl.textContent = 'LEVEL ' + level;
  turnLbl.textContent = 'turn ' + turns + ' · par ' + par;
}

/* ============================== turning ============================== */
function startTurn(d){
  const dq = d === 'R' ? 1 : -1;
  const from = qCount * HP;
  qCount += dq;
  rot = { from: from, to: qCount * HP, t: 0, dur: TWEEN };
  turns++;
  updateHUD();
  playTurn(d);
  if (d === 'R') flashR = 1; else flashL = 1;
  if (!firstTap){ firstTap = true; hintEl.classList.add('off'); }
}
/* One buffered tap max: returns false when a turn is running AND one is queued. */
function doTurn(d){
  d = d === 'L' ? 'L' : 'R';
  if (phase !== 'play') return false;
  if (rot){
    if (queue.length >= 1) return false;
    queue.push(d);
    if (!firstTap){ firstTap = true; hintEl.classList.add('off'); }
    return true;
  }
  startTurn(d);
  return true;
}

/* ============================== physics ============================== */
function onImpact(b, impact, px, py){
  if (impact < CS * 2) return;
  const vol = clamp(impact / (CS * 18), 0, 1);
  playThump(vol, b.kind === 'boulder' ? 'boulder' : 'wall');
  if (impact > CS * 5){
    burst(px, py, clamp(2 + Math.floor(vol * 7), 2, 8), b.kind === 'boulder' ? '#9d8b7b' : '#8fa3cc', impact * 0.32);
    shake = Math.min(4, vol * 5);
  }
}
function collideCells(b, h, quiet){
  const c0 = clamp(Math.floor((b.x - b.r) / CS), 0, N - 1);
  const c1 = clamp(Math.floor((b.x + b.r) / CS), 0, N - 1);
  const r0 = clamp(Math.floor((b.y - b.r) / CS), 0, N - 1);
  const r1 = clamp(Math.floor((b.y + b.r) / CS), 0, N - 1);
  for (let r = r0; r <= r1; r++){
    for (let c = c0; c <= c1; c++){
      if (walls[cellIdx(c, r)] !== 1) continue;
      const bx = c * CS, by = r * CS;
      const px = clamp(b.x, bx, bx + CS), py = clamp(b.y, by, by + CS);
      let dx = b.x - px, dy = b.y - py;
      let d = Math.hypot(dx, dy);
      if (d >= b.r) continue;
      if (d < 1e-9){ dx = -Math.sin(theta); dy = -Math.cos(theta); d = 1; } // degenerate: push against gravity
      const nx = dx / d, ny = dy / d;
      b.x = px + nx * b.r; b.y = py + ny * b.r;
      const vn = b.vx * nx + b.vy * ny;
      if (vn < 0){
        const rest = b.kind === 'boulder' ? 0.08 : 0.25;
        b.vx -= (1 + rest) * vn * nx;
        b.vy -= (1 + rest) * vn * ny;
        const scr = b.kind === 'boulder' ? 5 : (isIceCell(b) ? 0.25 : 3);
        const tx = -ny, ty = nx;
        const vt = b.vx * tx + b.vy * ty;
        const k = Math.max(0, 1 - scr * h);
        b.vx += tx * vt * (k - 1); b.vy += ty * vt * (k - 1);
        if (!quiet) onImpact(b, -vn, px, py);
      }
      b.contact = true;
    }
  }
  // outer bounds (border cells are walls in every level; this is the belt AND braces)
  const lo = b.r, hi = S - b.r;
  if (b.x < lo){ b.x = lo; if (b.vx < 0) b.vx = -b.vx * 0.25; b.contact = true; }
  else if (b.x > hi){ b.x = hi; if (b.vx > 0) b.vx = -b.vx * 0.25; b.contact = true; }
  if (b.y < lo){ b.y = lo; if (b.vy < 0) b.vy = -b.vy * 0.25; b.contact = true; }
  else if (b.y > hi){ b.y = hi; if (b.vy > 0) b.vy = -b.vy * 0.25; b.contact = true; }
}
function dimple(b){
  const dx = goal.x - b.x, dy = goal.y - b.y;
  const d = Math.hypot(dx, dy);
  if (d < WELLR && d > 1e-6){
    const a = WELLK * (1 - d / WELLR) * DT;
    b.vx += dx / d * a;
    b.vy += dy / d * a;
  }
}
function integrateBody(b, gx, gy){
  const sp0 = Math.hypot(b.vx, b.vy);
  const sub = clamp(Math.ceil((sp0 + GRAV * DT) * DT / (b.r * 0.5)), 1, 6);
  const h = DT / sub;
  for (let k = 0; k < sub; k++){
    b.vx += gx * h; b.vy += gy * h;
    const sp = Math.hypot(b.vx, b.vy);
    if (sp > MAXV){ const s = MAXV / sp; b.vx *= s; b.vy *= s; }
    b.x += b.vx * h; b.y += b.vy * h;
    collideCells(b, h, false);
  }
  if (b.kind === 'marble') dimple(b);
  // rolling angle: tangential speed relative to gravity-down
  const ux = Math.sin(theta), uy = Math.cos(theta);
  const vt = -b.vx * uy + b.vy * ux;
  b.rot += vt / b.r * DT;
}
function pairCollide(loud){
  if (bodies.length < 2) return;
  const a = bodies[0], b = bodies[1];
  let dx = b.x - a.x, dy = b.y - a.y;
  let d = Math.hypot(dx, dy);
  const minD = a.r + b.r;
  if (d >= minD) return;
  if (d < 1e-9){ dx = 1; dy = 0; d = 1; }
  const nx = dx / d, ny = dy / d;
  const overlap = minD - d;
  const ima = 1 / a.m, imb = 1 / b.m, s = ima + imb;
  a.x -= nx * overlap * (ima / s); a.y -= ny * overlap * (ima / s);
  b.x += nx * overlap * (imb / s); b.y += ny * overlap * (imb / s);
  const rvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
  if (rvn < 0){
    const e = Math.abs(rvn) < CS * 1.2 ? 0 : 0.2;   // restitution slop: gentle contacts don't buzz
    const j = -(1 + e) * rvn / s;
    a.vx -= j * ima * nx; a.vy -= j * ima * ny;
    b.vx += j * imb * nx; b.vy += j * imb * ny;
    if (loud && Math.abs(rvn) > CS * 2.5){
      playThump(clamp(Math.abs(rvn) / (CS * 14), 0, 1), 'clack');
      burst((a.x + b.x) / 2, (a.y + b.y) / 2, 5, '#cfe0ff', Math.abs(rvn) * 0.3);
    }
  }
  a.contact = true; b.contact = true;
}
function postBody(b){
  const ice = isIceCell(b);
  let fk, fc;
  if (b.kind === 'boulder'){ fk = 1.5; fc = ice ? CS * 1.5 : CS * 10; }
  else { fk = ice ? 0.12 : 0.5; fc = ice ? CS * 0.15 : CS * 4; }
  if (!b.contact){ fk = 0.05; fc = 0; }        // airborne: nearly free
  const sp = Math.hypot(b.vx, b.vy);
  if (sp > 0){
    const drop = (fk * sp + fc) * DT;
    const ns = Math.max(0, sp - drop);
    const k = ns / sp;
    b.vx *= k; b.vy *= k;
  }
  // anti-jitter: slow grounded bodies bleed out fast (ice keeps its slide)
  const sp2 = Math.hypot(b.vx, b.vy);
  if (b.contact && sp2 < CS * 0.5){
    const damp = ice ? (sp2 < CS * 0.1 ? 2 : 0) : 8;
    if (damp > 0){ const k2 = Math.max(0, 1 - damp * DT); b.vx *= k2; b.vy *= k2; }
  }
  if (sp2 < CS * 0.3) b.restT += DT; else b.restT = 0;
  b.resting = b.restT > 0.2;
}
function winCheck(){
  const m = bodies[0];
  const d = Math.hypot(m.x - goal.x, m.y - goal.y);
  const sp = Math.hypot(m.vx, m.vy);
  if (d < CAPR && sp < CAPSP){
    capT += DT;
    const k = Math.max(0, 1 - 6 * DT);            // settle assist while hovering the hole
    m.vx *= k; m.vy *= k;
    if (capT >= 0.3) doWin();
  } else {
    capT = 0;
  }
}
function watchdog(){
  // NaN / escape guard: the game must never hang on a lost body
  for (const b of bodies){
    if (!isFinite(b.x) || !isFinite(b.y) || !isFinite(b.vx) || !isFinite(b.vy) ||
        b.x < -CS || b.x > S + CS || b.y < -CS || b.y > S + CS){
      b.x = b.spawnX; b.y = b.spawnY; b.vx = 0; b.vy = 0; b.restT = 0;
    }
  }
}
function doWin(){
  if (phase === 'won') return;
  phase = 'won'; winT = 0;
  winTurns = turns;
  winStars = turns <= par ? 3 : (turns <= par + 1 ? 2 : 1);
  const m = bodies[0];
  sink = { fx: m.x, fy: m.y, t: 0 };
  m.vx = 0; m.vy = 0;
  queue.length = 0;
  playCapture();
  burst(goal.x, goal.y, 22, '#ffce6b', CS * 8);
  burst(goal.x, goal.y, 10, '#eef1f8', CS * 5);
  ringFx(goal.x, goal.y, CAPR, CS * 2.6, '#ffce6b', 0.6);
}
function nextLevel(){
  buildLevel(level >= LEVELS_TOTAL ? 1 : level + 1);
}

/* ============================== fixed step ============================== */
function stepOnce(){
  time += DT;
  if (shake > 0){
    shake = Math.max(0, shake - DT * 20);
    shakeX = (Math.random() - 0.5) * shake;
    shakeY = (Math.random() - 0.5) * shake;
  } else { shakeX = shakeY = 0; }
  if (flashL > 0) flashL = Math.max(0, flashL - DT * 3.2);
  if (flashR > 0) flashR = Math.max(0, flashR - DT * 3.2);
  // particles (board space, pulled by current gravity)
  const gux = Math.sin(theta), guy = Math.cos(theta);
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.vx += gux * GRAV * 0.22 * DT;
    p.vy += guy * GRAV * 0.22 * DT;
    p.vx *= (1 - 1.8 * DT); p.vy *= (1 - 1.8 * DT);
    p.x += p.vx * DT; p.y += p.vy * DT;
    p.life -= p.dec * DT;
    if (p.life <= 0) parts.splice(i, 1);
  }
  for (let i = rings.length - 1; i >= 0; i--){
    rings[i].t += DT;
    if (rings[i].t >= rings[i].life) rings.splice(i, 1);
  }
  // rotation tween — physics stays LIVE underneath; angle quantizes at the end
  if (rot){
    rot.t += DT;
    const p = clamp(rot.t / rot.dur, 0, 1);
    theta = lerp(rot.from, rot.to, easeInOutCubic(p));
    if (rot.t >= rot.dur || rot.t > 1.5){    // >1.5s = stall watchdog, force-complete
      theta = rot.to;                        // exact 90° multiple, zero drift
      rot = null;
      if (queue.length && phase === 'play') startTurn(queue.shift());
    }
  }
  if (phase === 'won'){
    winT += DT;
    if (sink) sink.t += DT;
    if (winT >= 1.2) nextLevel();
    return;
  }
  // bodies
  const gx = Math.sin(theta) * GRAV, gy = Math.cos(theta) * GRAV;
  for (const b of bodies){ b.contact = false; integrateBody(b, gx, gy); }
  for (let pass = 0; pass < 2; pass++){
    pairCollide(pass === 0);
    for (const b of bodies) collideCells(b, DT * 0.5, true);
  }
  for (const b of bodies) postBody(b);
  winCheck();
  watchdog();
}
/* ============================== input ============================== */
window.addEventListener('pointerdown', ensureAudio, true);

let activePtr = -1;
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  ensureAudio();
  activePtr = e.pointerId;
  try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  if (phase === 'won'){ nextLevel(); return; }
  doTurn(e.clientX < W / 2 ? 'L' : 'R');
});
canvas.addEventListener('pointermove', (e) => { /* taps only — nothing to track */ });
canvas.addEventListener('pointerup', (e) => {
  if (e.pointerId === activePtr){
    activePtr = -1;
    try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
  }
});
canvas.addEventListener('pointercancel', (e) => { if (e.pointerId === activePtr) activePtr = -1; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft'){ ensureAudio(); if (phase === 'won') nextLevel(); else doTurn('L'); e.preventDefault(); }
  else if (e.key === 'ArrowRight'){ ensureAudio(); if (phase === 'won') nextLevel(); else doTurn('R'); e.preventDefault(); }
});

restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  ensureAudio();
  buildLevel(level);
});

/* ============================== rendering ============================== */
function circle(x, y, r){ ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill(); }
function rrPath(x, y, w, h, r){
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawPlate(){
  // plate base
  ctx.fillStyle = '#10131c';
  rrPath(0, 0, S, S, CS * 0.3);
  ctx.fill();
  // faint cell grid
  ctx.strokeStyle = 'rgba(148,166,210,0.05)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 1; i < N; i++){
    ctx.moveTo(i * CS, 4); ctx.lineTo(i * CS, S - 4);
    ctx.moveTo(4, i * CS); ctx.lineTo(S - 4, i * CS);
  }
  ctx.stroke();
  // tiles
  for (let r = 0; r < N; r++){
    for (let c = 0; c < N; c++){
      const v = walls[cellIdx(c, r)];
      const x = c * CS, y = r * CS;
      if (v === 1){
        ctx.fillStyle = '#1d2334';
        rrPath(x + 2.5, y + 2.5, CS - 5, CS - 5, 10);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        rrPath(x + 6, y + 5, CS - 12, 5, 2.5);
        ctx.fill();
      } else if (v === 2){
        ctx.fillStyle = 'rgba(110,168,255,0.14)';
        rrPath(x + 3, y + 3, CS - 6, CS - 6, 9);
        ctx.fill();
        ctx.strokeStyle = 'rgba(200,230,255,0.35)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + CS * 0.24, y + CS * 0.70); ctx.lineTo(x + CS * 0.46, y + CS * 0.30);
        ctx.moveTo(x + CS * 0.55, y + CS * 0.74); ctx.lineTo(x + CS * 0.78, y + CS * 0.34);
        ctx.stroke();
      }
    }
  }
}
function drawGoal(){
  const pulse = phase === 'play' ? 0.5 + 0.5 * Math.sin(time * 3.2) : 1;
  const R = CS * 0.5;
  const g = ctx.createRadialGradient(goal.x, goal.y, R * 0.1, goal.x, goal.y, R);
  g.addColorStop(0, '#03040a');
  g.addColorStop(0.75, '#0a0d18');
  g.addColorStop(1, 'rgba(255,206,107,0.24)');
  ctx.fillStyle = g;
  circle(goal.x, goal.y, R);
  ctx.strokeStyle = 'rgba(255,206,107,' + (0.55 + 0.35 * pulse).toFixed(3) + ')';
  ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.arc(goal.x, goal.y, R, 0, 6.2832); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,206,107,' + (0.12 + 0.16 * pulse).toFixed(3) + ')';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(goal.x, goal.y, R + 6 + pulse * 3, 0, 6.2832); ctx.stroke();
}
function drawMarble(m){
  let x = m.x, y = m.y, sc = 1;
  if (sink){
    const p = Math.min(1, sink.t / 0.25);
    const e = 1 - Math.pow(1 - p, 3);
    x = lerp(sink.fx, goal.x, e);
    y = lerp(sink.fy, goal.y, e);
    sc = 1 - 0.45 * e;
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-theta);                 // gloss stays screen-up-left while the board spins
  ctx.scale(sc, sc);
  ctx.shadowColor = 'rgba(110,168,255,0.55)';
  ctx.shadowBlur = 14;
  const g = ctx.createRadialGradient(-m.r * 0.35, -m.r * 0.4, m.r * 0.12, 0, 0, m.r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.55, '#d9e4f8');
  g.addColorStop(1, '#7f92c2');
  ctx.fillStyle = g;
  circle(0, 0, m.r);
  ctx.shadowBlur = 0;
  // rolling dots (board-frame spin re-applied so they tumble)
  ctx.rotate(theta + m.rot);
  ctx.fillStyle = 'rgba(90,110,160,0.5)';
  for (let i = 0; i < 3; i++){
    const a = i * 2.094;
    circle(Math.cos(a) * m.r * 0.55, Math.sin(a) * m.r * 0.55, m.r * 0.13);
  }
  ctx.rotate(-theta - m.rot);
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  circle(-m.r * 0.3, -m.r * 0.34, m.r * 0.26);
  ctx.restore();
}
function drawBoulder(b){
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rot);
  const g = ctx.createRadialGradient(-b.r * 0.3, -b.r * 0.35, b.r * 0.15, 0, 0, b.r);
  g.addColorStop(0, '#8d7f70');
  g.addColorStop(0.65, '#665b50');
  g.addColorStop(1, '#453d35');
  ctx.fillStyle = g;
  circle(0, 0, b.r);
  // facets so the roll reads
  ctx.strokeStyle = 'rgba(20,16,12,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-b.r * 0.55, -b.r * 0.15); ctx.lineTo(-b.r * 0.05, -b.r * 0.5);
  ctx.moveTo(b.r * 0.15, b.r * 0.05); ctx.lineTo(b.r * 0.55, -b.r * 0.28);
  ctx.moveTo(-b.r * 0.3, b.r * 0.42); ctx.lineTo(b.r * 0.12, b.r * 0.5);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  circle(-b.r * 0.28, -b.r * 0.32, b.r * 0.22);
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, 0, b.r - 1.2, 0, 6.2832); ctx.stroke();
  ctx.restore();
}
function drawParts(){
  for (const p of parts){
    ctx.globalAlpha = clamp(p.life, 0, 1) * 0.85;
    ctx.fillStyle = p.col;
    circle(p.x, p.y, p.size * (0.4 + 0.6 * p.life));
  }
  ctx.globalAlpha = 1;
  for (const r of rings){
    const q = clamp(r.t / r.life, 0, 1), e = q * (2 - q);
    ctx.globalAlpha = (1 - q) * 0.9;
    ctx.strokeStyle = r.col;
    ctx.lineWidth = Math.max(1.5, 6 * (1 - q));
    ctx.beginPath(); ctx.arc(r.x, r.y, lerp(r.r0, r.r1, e), 0, 6.2832); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawBoard(){
  const inner = board.inner;
  const ix = board.cx - inner / 2, iy = board.cy - inner / 2;
  // recess behind the rotating plate
  ctx.save();
  rrPath(ix, iy, inner, inner, inner * 0.06);
  ctx.clip();
  ctx.fillStyle = '#06080d';
  ctx.fillRect(ix, iy, inner, inner);
  const rg = ctx.createRadialGradient(board.cx, board.cy, inner * 0.1, board.cx, board.cy, inner * 0.75);
  rg.addColorStop(0, 'rgba(110,168,255,0.05)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(ix, iy, inner, inner);
  // rotate ONLY the board content — background and chrome stay fixed
  ctx.translate(board.cx + shakeX, board.cy + shakeY);
  const sc = inner / S;
  ctx.scale(sc, sc);
  ctx.rotate(theta);
  ctx.translate(-S / 2, -S / 2);
  drawPlate();
  drawGoal();
  drawParts();
  for (let i = bodies.length - 1; i >= 0; i--){
    if (bodies[i].kind === 'boulder') drawBoulder(bodies[i]);
    else drawMarble(bodies[i]);
  }
  ctx.restore();
  // fixed frame on top
  const ft = (board.size - inner) / 2;
  ctx.strokeStyle = '#2a3149';
  ctx.lineWidth = ft;
  rrPath(ix - ft / 2, iy - ft / 2, inner + ft, inner + ft, inner * 0.06 + ft / 2);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(148,166,210,0.28)';
  ctx.lineWidth = 1.5;
  rrPath(ix - ft, iy - ft, inner + ft * 2, inner + ft * 2, inner * 0.06 + ft);
  ctx.stroke();
}
function arcArrow(x, y, r, cw, alpha, hot){
  ctx.save();
  ctx.translate(x, y);
  if (!cw) ctx.scale(-1, 1);            // mirror the CW glyph for the CCW side
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = hot > 0 ? '#ffce6b' : '#6ea8ff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const a0 = -2.3, a1 = 0.55;
  ctx.beginPath(); ctx.arc(0, 0, r, a0, a1); ctx.stroke();
  const ex = Math.cos(a1) * r, ey = Math.sin(a1) * r;
  const dir = a1 + HP;                  // tangent, direction of sweep
  ctx.beginPath();
  ctx.moveTo(ex + Math.cos(dir - 2.6) * r * 0.55, ey + Math.sin(dir - 2.6) * r * 0.55);
  ctx.lineTo(ex, ey);
  ctx.lineTo(ex + Math.cos(dir + 2.6) * r * 0.55, ey + Math.sin(dir + 2.6) * r * 0.55);
  ctx.stroke();
  ctx.restore();
}
function drawChevrons(){
  const r = Math.max(11, Math.min(16, W * 0.045));
  const base = firstTap ? 0.16 : 0.4 + 0.22 * Math.sin(time * 3);
  arcArrow(W * 0.18, chevY, r, false, clamp(base + flashL, 0, 1), flashL);
  arcArrow(W * 0.82, chevY, r, true, clamp(base + flashR, 0, 1), flashR);
  // queued-tap dot
  if (queue.length){
    ctx.fillStyle = '#ffce6b';
    ctx.globalAlpha = 0.9;
    circle(queue[0] === 'L' ? W * 0.18 : W * 0.82, chevY + r + 10, 3);
    ctx.globalAlpha = 1;
  }
}
function drawEdgeFlashes(){
  if (flashL > 0){
    const g = ctx.createLinearGradient(0, 0, W * 0.16, 0);
    g.addColorStop(0, 'rgba(110,168,255,' + (0.22 * flashL).toFixed(3) + ')');
    g.addColorStop(1, 'rgba(110,168,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W * 0.16, H);
  }
  if (flashR > 0){
    const g = ctx.createLinearGradient(W, 0, W - W * 0.16, 0);
    g.addColorStop(0, 'rgba(110,168,255,' + (0.22 * flashR).toFixed(3) + ')');
    g.addColorStop(1, 'rgba(110,168,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(W - W * 0.16, 0, W * 0.16, H);
  }
}
function drawStars(cx, cy, s, n){
  for (let i = 0; i < 3; i++){
    const on = i < n;
    const sx = cx + (i - 1) * s * 2.4;
    ctx.save();
    ctx.translate(sx, cy);
    ctx.scale(on ? 1 : 0.72, on ? 1 : 0.72);
    ctx.beginPath();
    for (let k = 0; k < 5; k++){
      const a1 = -Math.PI / 2 + k * (Math.PI * 2 / 5);
      const a2 = a1 + Math.PI / 5;
      ctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      ctx.lineTo(Math.cos(a2) * s * 0.44, Math.sin(a2) * s * 0.44);
    }
    ctx.closePath();
    ctx.fillStyle = on ? '#ffce6b' : 'rgba(120,130,160,0.35)';
    if (on){ ctx.shadowColor = 'rgba(255,206,107,0.6)'; ctx.shadowBlur = 12; }
    ctx.fill();
    ctx.restore();
  }
}
function drawBanner(){
  if (phase !== 'won') return;
  const t = winT;
  const a = t < 0.15 ? t / 0.15 : 1;
  const sc = 0.6 + 0.4 * easeOutBack(clamp(t / 0.4, 0, 1));
  ctx.save();
  ctx.globalAlpha = a;
  ctx.translate(W / 2, board.cy - board.size * 0.06);
  ctx.scale(sc, sc);
  ctx.textAlign = 'center';
  const bw = Math.min(W, 460);
  ctx.font = '900 ' + (bw * 0.13).toFixed(1) + 'px ' + F;
  ctx.shadowColor = 'rgba(255,206,107,0.6)'; ctx.shadowBlur = 22;
  ctx.fillStyle = '#eef1f8';
  ctx.fillText('IN!', 0, 0);
  ctx.shadowBlur = 0;
  ctx.font = '700 ' + (bw * 0.048).toFixed(1) + 'px ' + F;
  ctx.fillStyle = '#aeb6d0';
  const diff = winTurns - par;
  const tag = diff < 0 ? 'under par!' : (diff === 0 ? 'on par' : '+' + diff + ' over');
  ctx.fillText(winTurns + (winTurns === 1 ? ' turn' : ' turns') + ' · par ' + par + ' · ' + tag, 0, bw * 0.10);
  drawStars(0, bw * 0.20, bw * 0.05, winStars);
  ctx.restore();
}

let bgGrad = null;
function render(){
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0b0d12';
  ctx.fillRect(0, 0, W, H);
  if (bgGrad){ ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H); }
  drawEdgeFlashes();
  drawBoard();
  drawChevrons();
  drawBanner();
}

/* ============================== resize + init ============================== */
function resize(){
  W = Math.max(120, window.innerWidth || 300);
  H = Math.max(200, window.innerHeight || 560);
  dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const topPad = Math.max(52, H * 0.09);
  const botPad = Math.max(54, H * 0.10);
  let size = Math.min(W * 0.94, H - topPad - botPad);
  size = Math.max(140, size);
  const ft = Math.max(7, size * 0.028);
  board = { cx: W / 2, cy: topPad + (H - topPad - botPad) / 2, size: size, inner: size - ft * 2 };
  chevY = Math.min(H - 34, board.cy + size / 2 + Math.max(26, H * 0.045));
  bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, 'rgba(110,168,255,0.045)');
  bgGrad.addColorStop(0.55, 'rgba(0,0,0,0)');
  bgGrad.addColorStop(1, 'rgba(255,206,107,0.035)');
}
window.addEventListener('resize', resize);
resize();
buildLevel(1);

/* ============================== fixed-timestep loop ============================== */
let acc = 0, lastT = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min(50, now - lastT);
  lastT = now;
  acc += dt / 1000;
  let guard = 0;
  while (acc >= DT && guard < 600){ stepOnce(); acc -= DT; guard++; }
  render();
}
requestAnimationFrame(frame);

/* ============================== automation hooks ============================== */
window.__game = {
  state: () => ({
    level: level,
    par: par,
    turns: turns,
    rotating: !!rot,
    marble: { x: bodies[0].x, y: bodies[0].y, resting: bodies[0].resting },
    won: phase === 'won',
    phase: phase
  }),
  stepN: (n) => {
    for (let i = 0; i < n; i++) stepOnce();
    render();
  },
  reset: () => { buildLevel(level); render(); },
  goto: (n) => { buildLevel(n); render(); },
  turn: (d) => doTurn(d)
};
</script>
</body>
