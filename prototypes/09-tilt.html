<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tilt</title>
<style>
  :root{
    --bg:#0a0b12; --panel:#12141f; --line:#222538; --ink:#e8ecff; --dim:#7b82a8;
    --gold:#ffcf5c; --good:#5cffb0; --bad:#ff6b8a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #161a2e 0%, var(--bg) 60%);
    color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow:hidden; user-select:none; touch-action:none;
  }
  #wrap{width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center;
    padding:max(10px,env(safe-area-inset-top)) 14px 14px; gap:10px; height:100vh; justify-content:space-between}
  header{width:100%; display:flex; flex-direction:column; align-items:center; gap:3px; flex:0 0 auto}
  .title{font-weight:800; letter-spacing:.18em; font-size:26px;
    background:linear-gradient(90deg,#ffcf5c,#ff8fb0,#7cc8ff); -webkit-background-clip:text;
    background-clip:text; color:transparent; text-transform:uppercase}
  .sub{font-size:11px; color:var(--dim); letter-spacing:.04em; text-align:center}
  .meta{width:100%; display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--dim); padding:0 2px}
  .meta b{color:var(--ink); font-weight:700}
  .pill{background:var(--panel); border:1px solid var(--line); border-radius:999px;
    padding:5px 11px; font-size:12px; color:var(--ink); display:flex; gap:6px; align-items:center}
  .pill .lab{color:var(--dim)}
  #stage{position:relative; width:100%; flex:1 1 auto; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; min-height:0}
  .boards{display:flex; gap:14px; align-items:flex-start; justify-content:center; width:100%}
  .bwrap{display:flex; flex-direction:column; align-items:center; gap:6px}
  .blabel{font-size:10px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase}
  canvas{display:block; touch-action:none; border-radius:14px}
  #tray{background:linear-gradient(160deg,#1b1f33,#11131f);
    box-shadow:0 12px 40px -12px #000, inset 0 1px 0 #ffffff14;
    border:1px solid #2a2f4a; transition:transform .12s cubic-bezier(.2,.8,.3,1)}
  #pic{background:#0c0e18; border:1px solid var(--line)}
  .hint{font-size:12px; color:var(--gold); height:16px; text-align:center; transition:opacity .3s}
  footer{width:100%; display:flex; flex-direction:column; gap:8px; flex:0 0 auto}
  .row{display:flex; gap:8px}
  button{flex:1; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    font-size:13px; font-weight:600; padding:11px; border-radius:12px; cursor:pointer;
    transition:transform .08s, background .15s; font-family:inherit}
  button:active{transform:scale(.96)}
  button.primary{background:linear-gradient(90deg,#3a4cff,#7c4dff); border-color:#5a5cff}
  button:disabled{opacity:.4}
  .arrows{display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr);
    gap:6px; width:160px; margin:0 auto}
  .arrows button{font-size:18px; padding:8px 0}
  .arrows .up{grid-column:2; grid-row:1}
  .arrows .lf{grid-column:1; grid-row:2}
  .arrows .dn{grid-column:2; grid-row:2}
  .arrows .rt{grid-column:3; grid-row:2}
  .ctr{font-size:9px; color:var(--dim); grid-column:2; grid-row:1; display:flex;
    align-items:flex-end; justify-content:center; padding-bottom:3px}
  /* overlay */
  #ov{position:fixed; inset:0; background:#05060bdd; backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; z-index:20; padding:20px}
  #ov.show{display:flex}
  .card{width:100%; max-width:360px; background:var(--panel); border:1px solid var(--line);
    border-radius:20px; padding:22px; text-align:center; box-shadow:0 24px 80px -20px #000;
    animation:pop .35s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{from{transform:scale(.85); opacity:0}to{transform:scale(1); opacity:1}}
  .card h2{font-size:22px; margin-bottom:4px}
  .card .creature{font-size:13px; color:var(--gold); margin-bottom:10px; letter-spacing:.05em}
  .grid{font-size:20px; line-height:1.25; letter-spacing:3px; margin:12px 0;
    font-family:"Courier New",monospace; white-space:pre}
  .stats{display:flex; justify-content:space-around; margin:12px 0; font-size:12px; color:var(--dim)}
  .stats b{display:block; color:var(--ink); font-size:18px; font-weight:800}
  .collection{display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin:14px 0}
  .cslot{aspect-ratio:1; border-radius:8px; background:#0c0e18; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:16px}
  .cslot.got{border-color:#3a4cff; box-shadow:0 0 10px -2px #3a4cff}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#1a1d2e; border:1px solid var(--line); padding:9px 16px; border-radius:999px;
    font-size:13px; opacity:0; transition:.3s; z-index:30; pointer-events:none}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div class="title">Tilt</div>
    <div class="sub">Swipe to tilt the tray — every marble rolls at once into its matching hole</div>
  </header>

  <div class="meta">
    <span class="pill"><span class="lab">Day</span><b id="dayN">1</b></span>
    <span class="pill"><span class="lab">Moves</span><b id="moves">0</b><span class="lab">/ par</span><b id="par">0</b></span>
    <span class="pill"><span class="lab">Streak</span><b id="streak">0</b>🔥</span>
  </div>

  <div id="stage">
    <div class="boards">
      <div class="bwrap">
        <div class="blabel">Tray</div>
        <canvas id="tray"></canvas>
      </div>
      <div class="bwrap">
        <div class="blabel">Picture</div>
        <canvas id="pic"></canvas>
      </div>
    </div>
    <div class="hint" id="hint">Swipe right to start.</div>
  </div>

  <footer>
    <div class="arrows">
      <div class="ctr">tilt</div>
      <button class="up" data-d="U">▲</button>
      <button class="lf" data-d="L">◀</button>
      <button class="dn" data-d="D">▼</button>
      <button class="rt" data-d="R">▶</button>
    </div>
    <div class="row">
      <button id="undo">↶ Undo</button>
      <button id="reset">⟳ Restart</button>
      <button id="next" class="primary">Result ▸</button>
    </div>
  </footer>
</div>

<div id="ov"><div class="card" id="card"></div></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
const $=s=>document.querySelector(s);

/* ---------- deterministic daily RNG ---------- */
const EPOCH=new Date(2026,0,1);
const today=new Date();
const DAY=Math.max(1,Math.floor((Date.UTC(today.getFullYear(),today.getMonth(),today.getDate())-Date.UTC(2026,0,1))/86400000)+1);
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------- palette + creatures (8x8 pixel sprites) ---------- */
/* color codes: . empty  r red g green b blue y yellow o orange p purple w white */
const PAL={r:'#ff5d6c',g:'#5cffa0',b:'#5cb6ff',y:'#ffe05c',o:'#ff9d4d',p:'#c07dff',w:'#f3f6ff'};
const CREATURES=[
 {name:"Fox",emoji:"🦊",rows:[
  "..o..o..",
  ".oooooo.",
  ".owoowo.",
  ".oo..oo.",
  ".oowwoo.",
  "..oooo..",
  "...ww...",
  "........"]},
 {name:"Frog",emoji:"🐸",rows:[
  ".g....g.",
  "gwg..gwg",
  ".gggggg.",
  ".gggggg.",
  ".gg..gg.",
  ".gggggg.",
  "..g..g..",
  "........"]},
 {name:"Crab",emoji:"🦀",rows:[
  "r......r",
  ".r....r.",
  "..rrrr..",
  ".rwrrwr.",
  ".rrrrrr.",
  "..rrrr..",
  ".r.rr.r.",
  "r......r"]},
 {name:"Bee",emoji:"🐝",rows:[
  "..y..y..",
  "..yyyy..",
  ".ywyywy.",
  ".yyyyyy.",
  ".oooooo.",
  ".yyyyyy.",
  "..oooo..",
  "...yy..."]},
 {name:"Owl",emoji:"🦉",rows:[
  ".o....o.",
  ".oooooo.",
  ".owoowo.",
  ".oboobo.",
  ".oooooo.",
  ".oooooo.",
  "..o..o..",
  "..o..o.."]},
 {name:"Fish",emoji:"🐟",rows:[
  "........",
  "..bbbb.b",
  ".bbbbbbb",
  "bwbbbbb.",
  "bbbbbbb.",
  ".bbbbb.b",
  "..bbbb.b",
  "........"]},
 {name:"Cat",emoji:"🐱",rows:[
  ".p....p.",
  ".pp..pp.",
  ".pppppp.",
  ".pwppwp.",
  ".pppppp.",
  ".pppppp.",
  "..pppp..",
  "........"]},
 {name:"Mushroom",emoji:"🍄",rows:[
  "..rrrr..",
  ".rwrrwr.",
  "rrrwrrrr",
  "rrrrrrwr",
  ".rrrrrr.",
  "...ww...",
  "...ww...",
  "..wwww.."]},
];

/* ---------- normalize sprite into target cells ---------- */
function spriteCells(sp){
  const cells=[];
  for(let y=0;y<8;y++){
    const row=sp.rows[y];
    for(let x=0;x<8;x++){
      const c=row[x];
      if(c && c!=='.' && PAL[c]) cells.push({x,y,c});
    }
  }
  return cells;
}

/* ---------- tilt physics on grid N x N ----------
   state: array of marbles {x,y,c,fixed}. holes: map "x,y"->color.
   A marble is FIXED once it lands in its matching hole (snaps to picture).
   Tilt moves every loose marble one step at a time in dir until blocked by:
     - wall
     - another marble (loose or fixed)
   When a loose marble's next cell IS its matching hole AND hole empty -> it stops & becomes fixed there.
   Actually simpler: process like 2048 — sort by travel order, each marble slides max.
*/
const N=8;
const DIRS={U:[0,-1],D:[0,1],L:[-1,0],R:[1,0]};

function key(x,y){return x+','+y;}

function cloneState(s){
  return {marbles:s.marbles.map(m=>({x:m.x,y:m.y,c:m.c,fixed:m.fixed}))};
}

/* occupancy of a cell (returns marble or null) */
function occAt(st,x,y){
  for(const m of st.marbles) if(m.x===x&&m.y===y) return m;
  return null;
}

/* Resolve a tilt. holes is map. Returns {moved:bool, anim:[{m, path:[{x,y}], landed:bool}]} */
function tilt(st,dir,holes){
  const [dx,dy]=DIRS[dir];
  // process order: marbles furthest in travel direction first
  const order=st.marbles.map((m,i)=>i).sort((a,b)=>{
    const ma=st.marbles[a], mb=st.marbles[b];
    if(dx!==0) return dx>0? mb.x-ma.x : ma.x-mb.x;
    return dy>0? mb.y-ma.y : ma.y-mb.y;
  });
  const anim=[];
  let movedAny=false;
  for(const idx of order){
    const m=st.marbles[idx];
    if(m.fixed){anim.push({m,path:[{x:m.x,y:m.y}],landed:true,fixed:true}); continue;}
    const path=[{x:m.x,y:m.y}];
    let cx=m.x, cy=m.y, landed=false;
    while(true){
      const nx=cx+dx, ny=cy+dy;
      if(nx<0||nx>=N||ny<0||ny>=N) break;            // wall
      if(occAt(st,nx,ny)) break;                      // blocked by marble
      // move into nx,ny
      cx=nx; cy=ny; path.push({x:cx,y:cy});
      // check if this cell is a matching empty hole -> snap & fix
      const h=holes[key(cx,cy)];
      if(h===m.c){ landed=true; break; }
    }
    if(cx!==m.x||cy!==m.y) movedAny=true;
    m.x=cx; m.y=cy;
    if(landed) m.fixed=true;
    anim.push({m,path,landed});
  }
  return {moved:movedAny,anim};
}

function isSolved(st,holeCount){
  let f=0; for(const m of st.marbles) if(m.fixed) f++;
  return f===holeCount;
}

/* ---------- puzzle generation: build forward from solved, verify backward ----------
   Strategy: pick a subset of sprite cells as HOLES (with their colors).
   Place marbles AT their holes (fixed) to represent solved, then "un-tilt"? hard.
   Instead: generative-then-solve. Place holes from sprite. Scatter one marble per hole
   (matching color) on empty cells. Run BFS over tilt-states to ensure solvable & get par.
*/
function genPuzzle(seed){
  const rng=mulberry(seed);
  // choose creature for the day
  const ci=Math.floor(rng()*CREATURES.length);
  const creature=CREATURES[ci];
  const allCells=spriteCells(creature);

  // Try a target hole count, shrinking until something solvable is found.
  for(let nHoles=5; nHoles>=3; nHoles--){
    // shuffle a fresh copy of cells per nHoles for variety
    const cells=allCells.slice();
    const sh=mulberry(seed*7+nHoles*101);
    for(let i=cells.length-1;i>0;i--){const j=Math.floor(sh()*(i+1));[cells[i],cells[j]]=[cells[j],cells[i]];}
    const holesArr=cells.slice(0,nHoles);
    const holes={}; for(const h of holesArr) holes[key(h.x,h.y)]=h.c;

    for(let attempt=0;attempt<300;attempt++){
      const rng2=mulberry(seed*131+attempt*977+nHoles*53+7);
      const occ=new Set(Object.keys(holes));
      const marbles=[];
      let ok=true;
      for(const h of holesArr){
        let placed=false;
        for(let t=0;t<80;t++){
          const x=Math.floor(rng2()*N), y=Math.floor(rng2()*N);
          const k=key(x,y);
          if(holes[k]) continue;        // not starting on any hole
          if(occ.has(k)) continue;
          marbles.push({x,y,c:h.c,fixed:false});
          occ.add(k); placed=true; break;
        }
        if(!placed){ok=false;break;}
      }
      if(!ok) continue;
      const init={marbles};
      const res=solveBFS(init,holes,holesArr.length,12);
      // keep puzzles with a bit of depth (par >= 2) so it's not trivial
      if(res && res.length>=2){
        return {creature,holes,holesArr,init:cloneState(init),par:res.length,solution:res};
      }
    }
  }

  // GUARANTEED-SOLVABLE fallback (construct, then VERIFY — never ship a lie).
  // Place holes from the sprite, then put each marble so a single slide toward a
  // wall drops it into its matching hole. We re-run the solver and only accept a
  // layout the BFS can actually finish; otherwise we keep shrinking.
  for(let nHoles=4; nHoles>=2; nHoles--){
    for(let attempt=0;attempt<60;attempt++){
      const cells=allCells.slice();
      const fh=mulberry(seed*9311+attempt*733+nHoles*17+1);
      for(let i=cells.length-1;i>0;i--){const j=Math.floor(fh()*(i+1));[cells[i],cells[j]]=[cells[j],cells[i]];}
      const ha=cells.slice(0,nHoles);
      const holes={}; for(const h of ha) holes[key(h.x,h.y)]=h.c;
      const occ=new Set(Object.keys(holes));
      const marbles=[]; let ok=true;
      for(const h of ha){
        // candidate offsets: one step toward each wall direction
        const cand=[[h.x+1,h.y],[h.x-1,h.y],[h.x,h.y+1],[h.x,h.y-1]];
        let placed=false;
        for(const [mx,my] of cand){
          if(mx<0||mx>=N||my<0||my>=N) continue;
          const k=key(mx,my);
          if(holes[k]||occ.has(k)) continue;
          marbles.push({x:mx,y:my,c:h.c,fixed:false}); occ.add(k); placed=true; break;
        }
        if(!placed){ok=false;break;}
      }
      if(!ok) continue;
      const init={marbles};
      const res=solveBFS(init,holes,ha.length,16);
      if(res){ return {creature,holes,holesArr:ha,init:cloneState(init),par:res.length,solution:res}; }
    }
  }

  // Last resort: a single marble adjacent to its hole — trivially one slide away,
  // and still verified before returning.
  const cells=allCells.slice();
  const fh=mulberry(seed*4129+3);
  for(let i=cells.length-1;i>0;i--){const j=Math.floor(fh()*(i+1));[cells[i],cells[j]]=[cells[j],cells[i]];}
  for(const h of cells){
    const cand=[[h.x+1,h.y],[h.x-1,h.y],[h.x,h.y+1],[h.x,h.y-1]];
    for(const [mx,my] of cand){
      if(mx<0||mx>=N||my<0||my>=N) continue;
      const holes={}; holes[key(h.x,h.y)]=h.c;
      if(key(mx,my)===key(h.x,h.y)) continue;
      const init={marbles:[{x:mx,y:my,c:h.c,fixed:false}]};
      const res=solveBFS(init,holes,1,8);
      if(res){ return {creature,holes,holesArr:[h],init:cloneState(init),par:res.length,solution:res}; }
    }
  }
  // Should be unreachable: every sprite has at least one cell with a free neighbour.
  return null;
}

/* BFS over tilt states; returns sequence of dirs or null */
function stateKey(st){
  return st.marbles.map(m=>m.x+''+m.y+(m.fixed?'F':'')).join('|');
}
function solveBFS(init,holes,holeCount,maxDepth){
  const start=cloneState(init);
  if(isSolved(start,holeCount)) return [];
  const seen=new Set([stateKey(start)]);
  let frontier=[{st:start,path:[]}];
  for(let depth=0;depth<maxDepth;depth++){
    const next=[];
    for(const node of frontier){
      for(const d of ['U','D','L','R']){
        const ns=cloneState(node.st);
        const r=tilt(ns,d,holes);
        if(!r.moved) continue;
        const k=stateKey(ns);
        if(seen.has(k)) continue;
        seen.add(k);
        const path=node.path.concat(d);
        if(isSolved(ns,holeCount)) return path;
        next.push({st:ns,path});
      }
    }
    if(next.length===0) break;
    if(seen.size>120000) break;
    frontier=next;
  }
  return null;
}

/* ====================== GAME STATE ====================== */
let P, state, history, moveCount, won, solved, firstHintShown=false;
const DIR_EMOJI={U:'⬆️',D:'⬇️',L:'⬅️',R:'➡️'};
let moveTrail=[];

const trayC=$('#tray'), tctx=trayC.getContext('2d');
const picC=$('#pic'), pctx=picC.getContext('2d');
let CELL=40, R=15;

function sizeBoards(){
  const avail=Math.min(window.innerWidth-28, 480-28);
  // two boards side by side: tray bigger, pic smaller
  const total=avail;
  const traySize=Math.floor(total*0.62);
  const picSize=Math.floor(total*0.30);
  CELL=Math.floor(traySize/N);
  const tpx=CELL*N;
  trayC.width=tpx; trayC.height=tpx; trayC.style.width=tpx+'px'; trayC.style.height=tpx+'px';
  const pcell=Math.floor(picSize/N); const ppx=pcell*N;
  picC.width=ppx; picC.height=ppx; picC.style.width=ppx+'px'; picC.style.height=ppx+'px';
  R=CELL*0.36;
  draw();
}

/* ---------- load / save daily ---------- */
const SK='tilt-save-v1';
function loadSave(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};}}
function writeSave(o){try{localStorage.setItem(SK,JSON.stringify(o));}catch(e){}}

function newGame(){
  // Daily seed; if generation ever fails (it shouldn't), nudge the seed until a
  // verified-solvable puzzle comes back so we never boot into a broken board.
  let s=DAY*1009+17, p=null, guard=0;
  while(!p && guard++<40){ p=genPuzzle(s); s+=977; }
  P=p||genPuzzle(12345); // final safety net (a known-good constant seed)
  state=cloneState(P.init);
  history=[]; moveCount=0; won=false; solved=false; moveTrail=[]; firstHintShown=false;
  updateHUD();
  draw();
  showOnboarding();
}

/* Obvious first-move teaching: name the one rule that matters. */
function showOnboarding(){
  const h=$('#hint');
  h.innerHTML='Swipe the tray &mdash; <b>every marble rolls together</b>';
  h.style.opacity=1;
}

function updateHUD(){
  $('#dayN').textContent=DAY;
  $('#moves').textContent=moveCount;
  $('#par').textContent=P.par;
  const sv=loadSave();
  $('#streak').textContent=sv.streak||0;
}

/* ---------- drawing ---------- */
function roundedHole(ctx,x,y,c,r){
  ctx.save();
  ctx.beginPath();
  ctx.arc(x,y,r*1.04,0,7);
  ctx.fillStyle='#05060b';
  ctx.fill();
  ctx.lineWidth=2;
  ctx.strokeStyle=c+'66';
  ctx.stroke();
  ctx.restore();
}
function marbleGrad(ctx,x,y,c,r){
  const g=ctx.createRadialGradient(x-r*0.35,y-r*0.4,r*0.1,x,y,r);
  g.addColorStop(0,'#ffffff');
  g.addColorStop(0.18,shade(c,40));
  g.addColorStop(0.7,c);
  g.addColorStop(1,shade(c,-55));
  return g;
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* animation state for marbles: render positions interpolated */
let renderPos=null; // map index -> {x,y in px}
function cellCenter(x,y){return [x*CELL+CELL/2, y*CELL+CELL/2];}

function draw(flash){
  // tray grid
  tctx.clearRect(0,0,trayC.width,trayC.height);
  // subtle grid
  tctx.strokeStyle='#ffffff08';
  for(let i=1;i<N;i++){
    tctx.beginPath();tctx.moveTo(i*CELL,4);tctx.lineTo(i*CELL,trayC.height-4);tctx.stroke();
    tctx.beginPath();tctx.moveTo(4,i*CELL);tctx.lineTo(trayC.width-4,i*CELL);tctx.stroke();
  }
  // holes
  for(const k in P.holes){
    const [x,y]=k.split(',').map(Number);
    const [cx,cy]=cellCenter(x,y);
    // already filled?
    const filled=state.marbles.some(m=>m.fixed&&m.x===x&&m.y===y);
    if(!filled) roundedHole(tctx,cx,cy,PAL[P.holes[k]],R);
  }
  // marbles
  state.marbles.forEach((m,i)=>{
    let px,py;
    if(renderPos&&renderPos[i]){px=renderPos[i].x;py=renderPos[i].y;}
    else {const c=cellCenter(m.x,m.y);px=c[0];py=c[1];}
    const col=PAL[m.c];
    // shadow
    tctx.beginPath();tctx.arc(px,py+R*0.25,R*0.9,0,7);tctx.fillStyle='#00000040';tctx.fill();
    // marble body
    tctx.beginPath();tctx.arc(px,py,m.fixed?R*1.0:R,0,7);
    tctx.fillStyle=marbleGrad(tctx,px,py,col,m.fixed?R*1.0:R);
    tctx.fill();
    if(m.fixed){
      tctx.lineWidth=2.5;tctx.strokeStyle=col;tctx.stroke();
      // glow ring
      tctx.beginPath();tctx.arc(px,py,R*1.25,0,7);tctx.strokeStyle=col+'40';tctx.lineWidth=3;tctx.stroke();
    }
    // highlight glint
    tctx.beginPath();tctx.arc(px-R*0.32,py-R*0.36,R*0.18,0,7);tctx.fillStyle='#ffffffcc';tctx.fill();
  });
  drawPic();
}

function drawPic(){
  const pcell=picC.width/N;
  pctx.clearRect(0,0,picC.width,picC.height);
  pctx.fillStyle='#0c0e18';pctx.fillRect(0,0,picC.width,picC.height);
  // grid
  pctx.strokeStyle='#ffffff06';
  for(let i=1;i<N;i++){
    pctx.beginPath();pctx.moveTo(i*pcell,0);pctx.lineTo(i*pcell,picC.height);pctx.stroke();
    pctx.beginPath();pctx.moveTo(0,i*pcell);pctx.lineTo(picC.width,i*pcell);pctx.stroke();
  }
  // show full sprite faintly as target outline, lit cells solid
  const cells=spriteCells(P.creature);
  for(const c of cells){
    const isHole=P.holes[key(c.x,c.y)]!==undefined;
    const filled=isHole && state.marbles.some(m=>m.fixed&&m.x===c.x&&m.y===c.y);
    pctx.fillStyle = filled ? PAL[c.c] : (isHole? PAL[c.c]+'22' : PAL[c.c]+'18');
    pctx.fillRect(c.x*pcell+0.5,c.y*pcell+0.5,pcell-1,pcell-1);
    if(filled){
      pctx.strokeStyle=PAL[c.c];pctx.lineWidth=1;pctx.strokeRect(c.x*pcell+0.5,c.y*pcell+0.5,pcell-1,pcell-1);
    }
  }
}

/* ---------- animation of a tilt ---------- */
let animating=false;
function animateTilt(anim,onDone){
  animating=true;
  const start=performance.now();
  const DUR=Math.min(260, 90+ Math.max(...anim.map(a=>a.path.length))*40);
  renderPos={};
  // precompute pixel paths
  const paths=anim.map(a=>{
    const idx=state.marbles.indexOf(a.m);
    return {idx, pts:a.path.map(p=>cellCenter(p.x,p.y)), landed:a.landed&&!a.fixed};
  });
  let clackPlayed=false;
  function frame(now){
    let t=(now-start)/DUR; if(t>1)t=1;
    const e=1-Math.pow(1-t,2.4); // ease-out
    for(const p of paths){
      const seg=e*(p.pts.length-1);
      const i=Math.min(p.pts.length-2, Math.floor(seg));
      const f=seg-i;
      if(p.pts.length===1){renderPos[p.idx]={x:p.pts[0][0],y:p.pts[0][1]};continue;}
      const a=p.pts[i], b=p.pts[Math.min(i+1,p.pts.length-1)];
      renderPos[p.idx]={x:a[0]+(b[0]-a[0])*f, y:a[1]+(b[1]-a[1])*f};
    }
    draw();
    if(t<1) requestAnimationFrame(frame);
    else {
      renderPos=null; animating=false;
      // pops for landed
      for(const p of paths){ if(p.landed){ const last=p.pts[p.pts.length-1]; popAt(last[0],last[1], PAL[state.marbles[p.idx].c]); } }
      draw();
      onDone&&onDone(paths.some(p=>p.landed));
    }
  }
  requestAnimationFrame(frame);
}

/* particle pops drawn on tray after settle */
let pops=[];
function popAt(x,y,color){
  for(let i=0;i<10;i++){
    const a=Math.random()*7, sp=2+Math.random()*3;
    pops.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});
  }
  if(pops.length<=10) runPops();
  buzz(18);
}
function runPops(){
  if(pops.length===0) return;
  draw();
  pops.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.05;});
  pops=pops.filter(p=>p.life>0);
  tctx.save();
  for(const p of pops){
    tctx.globalAlpha=p.life;
    tctx.beginPath();tctx.arc(p.x,p.y,R*0.22*p.life+1,0,7);tctx.fillStyle=p.color;tctx.fill();
  }
  tctx.restore();
  requestAnimationFrame(runPops);
}

/* ---------- a move ---------- */
function doTilt(dir){
  if(animating||won) return;
  const before=cloneState(state);
  const probe=cloneState(state);
  const r=tilt(probe,dir,P.holes);
  if(!r.moved){ buzz(8); flashHint("Nothing rolled that way."); return; }
  // apply to real state via same tilt (recompute anim against real state)
  const r2=tilt(state,dir,P.holes); // mutates state, returns anim with refs to state.marbles
  history.push(before);
  moveCount++; moveTrail.push(dir);
  // tilt the tray visually
  tiltTray(dir);
  $('#hint').style.opacity=0;
  animateTilt(r2.anim,(landed)=>{
    updateHUD();
    if(isSolved(state,P.holesArr.length)){ winGame(); return; }
    // keep the loop legible: show holes remaining, reinforce the rule once.
    const left=P.holesArr.length - state.marbles.filter(m=>m.fixed).length;
    const h=$('#hint');
    if(!firstHintShown && moveCount===1){
      firstHintShown=true;
      h.innerHTML='See? <b>all marbles moved.</b> Fill every hole &mdash; '+left+' left';
    } else {
      h.textContent = landed ? (left+' hole'+(left===1?'':'s')+' to go!') : left+' hole'+(left===1?'':'s')+' left';
    }
    h.style.opacity=1;
  });
}
function tiltTray(dir){
  const map={U:'perspective(600px) rotateX(7deg)',D:'perspective(600px) rotateX(-7deg)',
    L:'perspective(600px) rotateY(-7deg)',R:'perspective(600px) rotateY(7deg)'};
  trayC.style.transform=map[dir];
  setTimeout(()=>{trayC.style.transform='';},150);
}
function flashHint(t){const h=$('#hint');h.textContent=t;h.style.opacity=1;}

function buzz(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }

/* ---------- win ---------- */
function winGame(){
  won=true; solved=true;
  buzz([30,40,60]);
  // record save
  const sv=loadSave();
  const underPar=moveCount<=P.par;
  if(sv.lastDay!==DAY){
    // Streak = consecutive days SOLVED (any move count). Gaps reset it.
    sv.streak=(sv.lastDay===DAY-1 ? (sv.streak||0) : 0) + 1;
    sv.lastDay=DAY;
    sv.solvedDays=sv.solvedDays||{};
    sv.solvedDays[DAY]={creature:P.creature.name,emoji:P.creature.emoji,moves:moveCount,par:P.par,star:underPar};
  }
  writeSave(sv);
  // celebratory burst
  let burst=0;const bi=setInterval(()=>{
    popAt(Math.random()*trayC.width,Math.random()*trayC.height*0.6, Object.values(PAL)[Math.floor(Math.random()*7)]);
    if(++burst>8) clearInterval(bi);
  },70);
  setTimeout(showResult,700);
}

/* ---------- result overlay ---------- */
function buildGrid(){
  // spoiler-safe: emoji trail of tilt directions
  const trail=moveTrail.map(d=>DIR_EMOJI[d]).join('');
  return trail;
}
function showResult(){
  const sv=loadSave();
  const underPar=moveCount<=P.par;
  const trail=buildGrid();
  // collection
  const order=CREATURES;
  let coll='';
  for(let i=0;i<CREATURES.length;i++){
    const cr=CREATURES[i];
    let got=false;
    if(sv.solvedDays){for(const k in sv.solvedDays){ if(sv.solvedDays[k].creature===cr.name){got=true;break;} }}
    coll+=`<div class="cslot ${got?'got':''}">${got?cr.emoji:'❔'}</div>`;
  }
  const verdict=underPar? `<span style="color:var(--good)">Under par! +streak</span>`
                        : `<span style="color:var(--gold)">Solved</span>`;
  $('#card').innerHTML=`
    <h2>${P.creature.emoji} It's a ${P.creature.name}!</h2>
    <div class="creature">${verdict}</div>
    <div class="grid">${chunkTrail(trail)}</div>
    <div class="stats">
      <div><b>${moveCount}</b>moves</div>
      <div><b>${P.par}</b>par</div>
      <div><b>${sv.streak||0}</b>streak 🔥</div>
    </div>
    <div class="blabel" style="margin-top:6px">Collection</div>
    <div class="collection">${coll}</div>
    <div class="row">
      <button id="share" class="primary">Share Result</button>
      <button id="close2">Close</button>
    </div>`;
  $('#ov').classList.add('show');
  $('#share').onclick=share;
  $('#close2').onclick=()=>$('#ov').classList.remove('show');
}
function chunkTrail(t){
  // emoji are 2 code units; chunk into rows of ~8 arrows
  const arr=Array.from(t);
  let out='';
  for(let i=0;i<arr.length;i+=8){ out+=arr.slice(i,i+8).join('')+'\n'; }
  return out.trim()||'—';
}

function share(){
  const sv=loadSave();
  const underPar=moveCount<=P.par;
  const txt=`Tilt — Day ${DAY} ${P.creature.emoji}\n${moveCount}/${P.par} moves ${underPar?'⭐':''}  🔥${sv.streak||0}\n${chunkTrail(buildGrid())}\nplay tilt`;
  if(navigator.share){
    navigator.share({text:txt}).catch(()=>copy(txt));
  } else copy(txt);
}
function copy(txt){
  try{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('Result copied!');
  }catch(e){ toast('Copy failed'); }
}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}

/* ---------- controls ---------- */
function undo(){
  if(animating||won||history.length===0) return;
  state=history.pop(); moveCount--; moveTrail.pop();
  updateHUD(); draw(); buzz(8);
}
function restart(){
  if(animating) return;
  state=cloneState(P.init); history=[]; moveCount=0; won=false; moveTrail=[]; firstHintShown=false;
  updateHUD(); draw(); showOnboarding();
}

document.querySelectorAll('.arrows button').forEach(b=>{
  b.addEventListener('click',()=>doTilt(b.dataset.d));
});
$('#undo').onclick=undo;
$('#reset').onclick=restart;
$('#next').onclick=()=>{
  if(solved){showResult();return;}
  toast('Solve the picture first!');
};

/* swipe + keyboard on tray */
let sx=0,sy=0,sw=false;
function onStart(e){const p=pt(e);sx=p.x;sy=p.y;sw=true;}
function onEnd(e){
  if(!sw)return;sw=false;const p=pt(e);
  const dx=p.x-sx, dy=p.y-sy;
  if(Math.abs(dx)<18&&Math.abs(dy)<18)return;
  if(Math.abs(dx)>Math.abs(dy)) doTilt(dx>0?'R':'L');
  else doTilt(dy>0?'D':'U');
}
function pt(e){const t=e.changedTouches?e.changedTouches[0]:e;return {x:t.clientX,y:t.clientY};}
trayC.addEventListener('touchstart',e=>{e.preventDefault();onStart(e);},{passive:false});
trayC.addEventListener('touchend',e=>{e.preventDefault();onEnd(e);},{passive:false});
trayC.addEventListener('mousedown',onStart);
window.addEventListener('mouseup',onEnd);
window.addEventListener('keydown',e=>{
  const m={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R',w:'U',s:'D',a:'L',d:'R'};
  if(m[e.key]){e.preventDefault();doTilt(m[e.key]);}
  if(e.key==='z') undo();
});

window.addEventListener('resize',sizeBoards);

/* ---------- boot ---------- */
newGame();
sizeBoards();
// If today's picture is already done, advertise it (daily/collection hook) and
// let the player reopen the result. They can still Restart to replay for fun.
(function(){
  const sv=loadSave();
  if(sv.lastDay===DAY && sv.solvedDays && sv.solvedDays[DAY]){
    solved=true; // unlocks the Result button without forcing a re-solve
    const h=$('#hint');
    h.innerHTML="Today's "+P.creature.emoji+" is solved &mdash; tap <b>Result</b> or Restart to replay";
    h.style.opacity=1;
  }
})();
})();
</script>
