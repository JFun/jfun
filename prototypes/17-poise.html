<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>POISE</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0d12;
    font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  #cv{position:fixed;inset:0;display:block;touch-action:none}
  #lvl{position:fixed;top:10px;left:12px;color:#8f98ab;font-size:12px;font-weight:700;
    letter-spacing:2px;pointer-events:none;z-index:5;text-shadow:0 1px 2px #000}
  #rst{position:fixed;top:6px;right:8px;width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#cfd6e4;
    font-size:19px;line-height:36px;text-align:center;z-index:5;cursor:pointer;padding:0}
  #rst:active{background:rgba(255,255,255,.18)}
  #hint{position:fixed;top:52px;left:50%;transform:translateX(-50%);
    background:rgba(20,24,34,.82);border:1px solid rgba(255,255,255,.12);color:#e8ddc8;
    font-size:13px;letter-spacing:1px;padding:7px 16px;border-radius:20px;z-index:5;
    pointer-events:none;transition:opacity .6s;white-space:nowrap}
  #hint.hide{opacity:0}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="lvl">LEVEL 1/3</div>
<button id="rst" aria-label="restart">&#8635;</button>
<div id="hint">drag weights onto hooks</div>
<script>
"use strict";
/* ================================ POISE ================================
   Calder hanging-mobile balancing. Verlet particles: beams = 2-particle
   rods with an elevated pivot particle (triangle hanger = metacentric
   stability), strings/cords = only-pull constraints, weights = point
   masses hung on snap-hooks. Win = all weights hung, every beam level.
======================================================================== */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const lvlEl=document.getElementById('lvl'), hintEl=document.getElementById('hint');
const DT=1/120, LVL_TOL=6, MAXT=0.5, NLEV=3;
const PAL=[
  {b:'#ffce6b',d:'#c78f2a'},   // amber
  {b:'#6ea8ff',d:'#3a6fd8'},   // sky
  {b:'#ff6b6b',d:'#d13c4b'},   // coral
  {b:'#4bd48a',d:'#22995f'},   // mint
  {b:'#9d7bff',d:'#6b4fd8'},   // violet
];
const MINT=[75,212,138], CORAL=[255,107,107];

let W=0,H=0,DPR=1,U=300,G=900;
let CORD=48,SNAPR=36,HDROP=13,HEL=15,ceilY=30,slotY=0,trayY=0;
let level=0, phase='play', winT=0;
let particles=[],cons=[],beamsArr=[],hooksArr=[],weights=[],anchors=[];
let dragW=null, activePtr=-1, ptr={x:0,y:0}, dragT={x:0,y:0};
let simT=0, stepCount=0;
let settleN=0, settled=false, unsettledRun=0, forceCalm=false, nudgeA=0;
let everActed=false;
let sparks=[], rings=[], confetti=[];

/* ============================== audio ============================== */
let actx=null, master=null;
function ensureAudio(){
  if(actx) return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    const comp=actx.createDynamicsCompressor();
    master=actx.createGain(); master.gain.value=0.5;
    master.connect(comp); comp.connect(actx.destination);
  }catch(e){ actx=null; }
}
document.addEventListener('visibilitychange',()=>{
  if(actx&&document.visibilityState==='visible'&&actx.state!=='running') actx.resume();
});
function tone(type,f0,f1,dur,vol,when){
  if(!actx) return;
  const t0=actx.currentTime+(when||0);
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type;
  o.frequency.setValueAtTime(Math.max(1,f0),t0);
  if(f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t0+dur);
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+dur+0.03);
}
function sGrab(){ tone('square',1100,1500,0.05,0.09); }
function sUnhook(){ tone('square',900,580,0.06,0.09); }
function sSnap(w){
  tone('square',2000,1500,0.022,0.10);
  tone('sine',520/Math.sqrt(w),360/Math.sqrt(w),0.09,0.10+0.06*w);
}
function sBack(){ tone('sine',420,240,0.12,0.06); }
function sDing(){ tone('triangle',1046,1046,0.22,0.08); }
function sWin(){
  [523,659,784,1046].forEach((f,i)=>tone('triangle',f,f,0.20,0.22,i*0.09));
}

/* ============================== world build ============================== */
function addPt(x,y,m){
  particles.push({x,y,px:x,py:y,im:m>0?1/m:0,wref:null});
  return particles.length-1;
}
function addRod(a,b,rest){
  const c={a,b,rest,type:'rod',off:false,k:''};
  cons.push(c); return c;
}
function addCord(a,b,rest,k){
  const c={a,b,rest,type:'cord',off:false,k:k||''};
  cons.push(c); return c;
}
function makeBeam(Ax,y,len,f,M){
  // self-balanced masses: mA*f = mB*(1-f)  ->  tapered bar hangs level bare
  const a=addPt(Ax,y,M*(1-f));
  const b=addPt(Ax+len,y,M*f);
  const piv=addPt(Ax+f*len,y-HEL,0.3);
  addRod(a,b,len);
  addRod(piv,a,Math.hypot(f*len,HEL));
  addRod(piv,b,Math.hypot((1-f)*len,HEL));
  const bm={a,b,piv,f,len,M,clamped:false,wasLevel:true,dingCd:0};
  beamsArr.push(bm); return bm;
}
function addHook(bm,end,kind){
  hooksArr.push({p:end==='a'?bm.a:bm.b,bm,kind,free:kind==='hook',occ:null});
}
function addWeight(wv,shape,palIdx){
  const r=U*0.05*Math.sqrt(wv);
  const pi=addPt(0,0,wv);
  const wo={pi,w:wv,r,shape,pal:PAL[palIdx],state:'queue',
            hook:null,cord:null,sx:0,sy:0,retT:0,fx:0,fy:0};
  particles[pi].wref=wo;
  weights.push(wo); return wo;
}
function hookPos(h){
  const p=particles[h.p];
  return {x:p.x,y:p.y+HDROP};
}
function beamTilt(bm){
  const A=particles[bm.a],B=particles[bm.b];
  return Math.atan2(B.y-A.y,B.x-A.x)*180/Math.PI;
}
function footOf(bm){
  const A=particles[bm.a],B=particles[bm.b];
  return {x:A.x+(B.x-A.x)*bm.f,y:A.y+(B.y-A.y)*bm.f};
}
function computeAllLevel(){
  for(const bm of beamsArr) if(Math.abs(beamTilt(bm))>LVL_TOL) return false;
  return true;
}
function hungCount(){
  let n=0;
  for(const w of weights) if(w.state==='hung') n++;
  return n;
}

function buildLevel(i){
  particles=[];cons=[];beamsArr=[];hooksArr=[];weights=[];anchors=[];
  sparks=[];rings=[];confetti=[];
  dragW=null;activePtr=-1;
  phase='play';winT=0;settleN=0;settled=false;
  unsettledRun=0;forceCalm=false;nudgeA=0;
  U=Math.min(W,H*0.72);
  G=H*1.5;
  CORD=U*0.16; SNAPR=Math.max(36,U*0.12);
  HDROP=U*0.045; HEL=U*0.05;
  ceilY=0.055*H;
  const X=f=>W/2+(f-0.5)*U;
  switch(i){
    case 0:{ // one beam, equal arms, two equal weights
      const len=0.62*U,f=0.5,y=0.30*H;
      const ax=X(0.5);
      const an=addPt(ax,ceilY,0); anchors.push(an);
      const bm=makeBeam(ax-f*len,y,len,f,1.0);
      addCord(an,bm.piv,(y-HEL)-ceilY,'main');
      addHook(bm,'a','hook'); addHook(bm,'b','hook');
      addWeight(1,'circle',0); addWeight(1,'star',1);
    }break;
    case 1:{ // unequal arms: pivot 1/3 along -> heavy 2 on the SHORT arm
      const len=0.62*U,f=1/3,y=0.30*H;
      const Ax=X(0.5)-len/2;
      const an=addPt(Ax+f*len,ceilY,0); anchors.push(an);
      const bm=makeBeam(Ax,y,len,f,1.0);
      addCord(an,bm.piv,(y-HEL)-ceilY,'main');
      addHook(bm,'a','hook'); addHook(bm,'b','hook');
      addWeight(2,'pear',2); addWeight(1,'circle',3);
    }break;
    case 2:{ // two tiers: small beam hangs from big beam's left hook
      const lenB=0.64*U,fB=0.4,yB=0.20*H;
      const Ax=X(0.24);
      const an=addPt(Ax+fB*lenB,ceilY,0); anchors.push(an);
      const big=makeBeam(Ax,yB,lenB,fB,1.0);
      addCord(an,big.piv,(yB-HEL)-ceilY,'main');
      const lenS=0.30*U,fS=0.5,sub=U*0.24;
      const yS=yB+sub+HEL;
      const small=makeBeam(Ax-fS*lenS,yS,lenS,fS,0.7);
      addCord(big.a,small.piv,sub,'sub');
      addHook(big,'a','link'); addHook(big,'b','hook');
      addHook(small,'a','hook'); addHook(small,'b','hook');
      addWeight(1,'circle',0); addWeight(2,'pear',4); addWeight(1,'star',1);
    }break;
  }
  // queue tray slots
  const n=weights.length;
  let rmax=0;
  for(const w of weights) if(w.r>rmax) rmax=w.r;
  slotY=H*0.865;
  const sp=Math.min(U*0.26,rmax*2.9);
  for(let k=0;k<n;k++){
    const w=weights[k];
    w.sx=W/2+(k-(n-1)/2)*sp; w.sy=slotY;
    const p=particles[w.pi];
    p.x=p.px=w.sx; p.y=p.py=w.sy;
  }
  trayY=slotY+rmax*1.25+U*0.02;
  updateHUD();
}

/* ============================== actions ============================== */
function nearestFreeHook(x,y){
  let h=null,d=1e9;
  for(const k of hooksArr){
    if(!k.free) continue;
    const q=hookPos(k);
    const dd=Math.hypot(q.x-x,q.y-y);
    if(dd<d){ d=dd; h=k; }
  }
  return {h,d};
}
function attachWeight(w,h,tele){
  if(!h.free) return false;
  h.free=false; h.occ=w; w.hook=h; w.state='hung';
  const hp=particles[h.p], p=particles[w.pi];
  if(tele){
    p.x=p.px=hp.x; p.y=p.py=hp.y+CORD;
  }else{
    let vx=p.x-p.px, vy=p.y-p.py;
    const vm=U*0.015, vl=Math.hypot(vx,vy);
    if(vl>vm){ vx*=vm/vl; vy*=vm/vl; }
    p.px=p.x-vx; p.py=p.y-vy;
  }
  w.cord=addCord(h.p,w.pi,CORD,'weight');
  const q=hookPos(h);
  spawnRing(q.x,q.y,w.pal.b);
  spawnSparks(q.x,q.y,6,w.pal.b);
  sSnap(w.w);
  settleN=0; settled=false; unsettledRun=0;
  return true;
}
function detachWeight(w){
  const h=w.hook;
  if(!h) return;
  h.occ=null; h.free=(h.kind==='hook');
  if(w.cord){ w.cord.off=true; w.cord=null; }
  w.hook=null;
  settleN=0; settled=false; unsettledRun=0;
}
function startReturn(w){
  const p=particles[w.pi];
  w.state='return'; w.retT=0; w.fx=p.x; w.fy=p.y;
  sBack();
}
function tryGrab(x,y){
  if(phase!=='play'||dragW) return null;
  let best=null,bd=1e9;
  for(const w of weights){
    const p=particles[w.pi];
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<w.r*1.2+U*0.06&&d<bd){ bd=d; best=w; }
  }
  if(!best) return null;
  if(best.state==='hung'){ detachWeight(best); sUnhook(); }
  best.state='drag'; dragW=best;
  ptr.x=x; ptr.y=y; dragT.x=x; dragT.y=y;
  const p=particles[best.pi];
  p.px=p.x; p.py=p.y;
  if(!everActed){ everActed=true; hintEl.classList.add('hide'); }
  sGrab();
  return best;
}
function releaseDrag(){
  const w=dragW;
  if(!w) return;
  dragW=null; activePtr=-1;
  const p=particles[w.pi];
  const nh=nearestFreeHook(p.x,p.y);
  if(nh.h&&nh.d<SNAPR) attachWeight(w,nh.h,false);
  else startReturn(w);
}
function winLevel(){
  if(phase!=='play') return;
  phase='win'; winT=0;
  sWin();
  spawnConfetti();
}

/* ============================== fx ============================== */
function spawnRing(x,y,col){ rings.push({x,y,t:0,col}); }
function spawnSparks(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=U*(0.4+Math.random()*0.9);
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-U*0.4,
      life:0.3+Math.random()*0.25,age:0,col});
  }
}
function spawnConfetti(){
  const cols=['#ffce6b','#6ea8ff','#ff6b6b','#4bd48a','#9d7bff'];
  for(const bm of beamsArr){
    const F=footOf(bm);
    for(let i=0;i<26;i++){
      const a=-Math.PI/2+(Math.random()-0.5)*1.8, sp=U*(0.8+Math.random()*1.4);
      confetti.push({x:F.x+(Math.random()-0.5)*bm.len*0.5,y:F.y,
        vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        rot:Math.random()*6.3,vr:(Math.random()-0.5)*14,
        life:0.9+Math.random()*0.6,age:0,
        col:cols[i%cols.length],sz:U*(0.008+Math.random()*0.012)});
    }
  }
}
function stepFX(){
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];
    p.age+=DT;
    if(p.age>=p.life){ sparks.splice(i,1); continue; }
    p.vy+=G*0.8*DT; p.vx*=0.99;
    p.x+=p.vx*DT; p.y+=p.vy*DT;
  }
  for(let i=rings.length-1;i>=0;i--){
    rings[i].t+=DT;
    if(rings[i].t>0.5) rings.splice(i,1);
  }
  for(let i=confetti.length-1;i>=0;i--){
    const p=confetti[i];
    p.age+=DT;
    if(p.age>=p.life){ confetti.splice(i,1); continue; }
    p.vy+=G*0.55*DT; p.vx*=0.99;
    p.x+=p.vx*DT; p.y+=p.vy*DT; p.rot+=p.vr*DT;
  }
}

/* ============================== simulation ============================== */
function clampBeam(bm){
  const A=particles[bm.a], B=particles[bm.b];
  const ang=Math.atan2(B.y-A.y,B.x-A.x);
  bm.clamped=false;
  if(Math.abs(ang)<=MAXT) return;
  bm.clamped=true;
  const d=(ang>0?MAXT:-MAXT)-ang;
  const F=footOf(bm);
  const cs=Math.cos(d), sn=Math.sin(d);
  for(const pi of [bm.a,bm.b]){
    const p=particles[pi];
    let ox=p.x-F.x, oy=p.y-F.y;
    p.x=F.x+ox*cs-oy*sn; p.y=F.y+ox*sn+oy*cs;
    ox=p.px-F.x; oy=p.py-F.y;
    p.px=F.x+ox*cs-oy*sn; p.py=F.y+ox*sn+oy*cs;
  }
}
function pivotGuard(bm){
  // pivot particle must stay on the "above beam" side of the axis
  const A=particles[bm.a], B=particles[bm.b], P=particles[bm.piv];
  const dx=B.x-A.x, dy=B.y-A.y;
  const cross=dx*(P.y-A.y)-dy*(P.x-A.x);
  if(cross<=0) return;                    // above (screen y down): ok
  const L2=dx*dx+dy*dy;
  if(L2<1e-9) return;
  const refl=(px,py)=>{
    const vx=px-A.x, vy=py-A.y;
    const t=(vx*dx+vy*dy)/L2;
    const qx=A.x+dx*t, qy=A.y+dy*t;
    return [2*qx-px,2*qy-py];
  };
  let r=refl(P.x,P.y); P.x=r[0]; P.y=r[1];
  r=refl(P.px,P.py); P.px=r[0]; P.py=r[1];
}
function step(){
  stepCount++; simT+=DT;
  stepFX();
  if(!everActed&&simT>8){ everActed=true; hintEl.classList.add('hide'); }
  for(const bm of beamsArr) if(bm.dingCd>0) bm.dingCd--;
  if(phase==='win'){
    winT++;
    if(winT>=144){ level=(level+1)%NLEV; buildLevel(level); return; }
  }
  // drag spring target with hook magnetism
  if(dragW){
    let tx=ptr.x, ty=ptr.y;
    const nh=nearestFreeHook(tx,ty);
    if(nh.h&&nh.d<SNAPR*1.35){
      const q=hookPos(nh.h);
      const m=0.45*(1-nh.d/(SNAPR*1.35));
      tx+=(q.x-tx)*m; ty+=(q.y+dragW.r*0.5-ty)*m;
    }
    dragT.x=tx; dragT.y=ty;
  }
  // integrate
  const damp=forceCalm?0.96:0.995;
  const g2=G*DT*DT;
  for(const p of particles){
    if(p.im===0) continue;
    const w=p.wref;
    if(w){
      if(w.state==='hung'){
        const vx=(p.x-p.px)*damp, vy=(p.y-p.py)*damp;
        p.px=p.x; p.py=p.y;
        p.x+=vx; p.y+=vy+g2;
      }else if(w.state==='drag'){
        const vx=(p.x-p.px)*0.7, vy=(p.y-p.py)*0.7;
        p.px=p.x; p.py=p.y;
        const K=0.2/(DT*DT);
        p.x+=vx+K*(dragT.x-p.x)*DT*DT;
        p.y+=vy+K*(dragT.y-p.y)*DT*DT+g2*0.3;
      }
      // queue / return: kinematic
    }else{
      const vx=(p.x-p.px)*damp, vy=(p.y-p.py)*damp;
      p.px=p.x; p.py=p.y;
      p.x+=vx; p.y+=vy+g2;
    }
  }
  // return-to-tray animation (kinematic arc)
  for(const w of weights){
    if(w.state!=='return') continue;
    w.retT+=DT;
    const k=Math.min(1,w.retT/0.35);
    const e=k*k*(3-2*k);
    const p=particles[w.pi];
    p.x=p.px=w.fx+(w.sx-w.fx)*e;
    p.y=p.py=w.fy+(w.sy-w.fy)*e-Math.sin(Math.PI*e)*U*0.05;
    if(k>=1) w.state='queue';
  }
  // relax constraints (beams stiff via iterations; cords only pull)
  for(let it=0;it<8;it++){
    for(const c of cons){
      if(c.off) continue;
      const a=particles[c.a], b=particles[c.b];
      const dx=b.x-a.x, dy=b.y-a.y;
      const d=Math.hypot(dx,dy);
      if(d<1e-9) continue;
      if(c.type==='cord'&&d<c.rest) continue;
      const im=a.im+b.im;
      if(im===0) continue;
      const k=(d-c.rest)/d/im;
      a.x+=dx*k*a.im; a.y+=dy*k*a.im;
      b.x-=dx*k*b.im; b.y-=dy*k*b.im;
    }
  }
  for(const bm of beamsArr){ clampBeam(bm); pivotGuard(bm); }
  // angular damping: beams + cord swing (settles in ~2-3s, never forever)
  for(const bm of beamsArr){
    const A=particles[bm.a], B=particles[bm.b];
    const k=bm.clamped?0.22:0.035;
    const rvx=((A.x-A.px)-(B.x-B.px))*k*0.5;
    const rvy=((A.y-A.py)-(B.y-B.py))*k*0.5;
    A.px+=rvx; A.py+=rvy; B.px-=rvx; B.py-=rvy;
  }
  for(const w of weights){
    if(w.state!=='hung') continue;
    const P=particles[w.hook.p], p=particles[w.pi];
    const k=0.02;
    p.px+=((p.x-p.px)-(P.x-P.px))*k;
    p.py+=((p.y-p.py)-(P.y-P.py))*k;
  }
  // settle detection
  let mx=0;
  for(const p of particles){
    if(p.im===0) continue;
    const w=p.wref;
    if(w&&w.state!=='hung') continue;
    const s=Math.hypot(p.x-p.px,p.y-p.py);
    if(s>mx) mx=s;
  }
  if(dragW) settleN=0;
  else if(mx<U*0.0005) settleN++;
  else settleN=0;
  settled=settleN>=50;
  if(settled){ forceCalm=false; unsettledRun=0; }
  else if(!dragW&&phase==='play'){
    unsettledRun++;
    if(unsettledRun>900) forceCalm=true;   // watchdog: force calm, never hang
  }
  // bubble ding when a beam finds level
  const hc=hungCount();
  for(const bm of beamsArr){
    const lv=Math.abs(beamTilt(bm))<=LVL_TOL;
    if(lv&&!bm.wasLevel&&hc>0&&bm.dingCd<=0){
      sDing(); bm.dingCd=60;
      const F=footOf(bm);
      spawnRing(F.x,F.y,'#4bd48a');
    }
    bm.wasLevel=lv;
  }
  // win + lopsided nudge
  if(phase==='play'){
    const allHung=hc===weights.length;
    const allLv=computeAllLevel();
    if(allHung&&settled&&allLv) winLevel();
    const tgt=(allHung&&settled&&!allLv)?1:0;
    nudgeA+=(tgt-nudgeA)*0.02;
  }
}

/* ============================== rendering ============================== */
function lerpCol(c1,c2,t){
  const r=Math.round(c1[0]+(c2[0]-c1[0])*t);
  const g=Math.round(c1[1]+(c2[1]-c1[1])*t);
  const b=Math.round(c1[2]+(c2[2]-c1[2])*t);
  return 'rgb('+r+','+g+','+b+')';
}
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawBG(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#10141d'); bg.addColorStop(0.55,'#0c0f16'); bg.addColorStop(1,'#0a0c11');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const rl=ctx.createRadialGradient(W/2,0,0,W/2,0,H*0.7);
  rl.addColorStop(0,'rgba(125,145,195,0.10)'); rl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rl; ctx.fillRect(0,0,W,H);
  // ceiling bar
  ctx.fillStyle='#1b2130';
  ctx.fillRect(0,0,W,ceilY);
  ctx.fillStyle='#2c3550';
  ctx.fillRect(0,ceilY-Math.max(2,U*0.008),W,Math.max(2,U*0.008));
  for(const an of anchors){
    const p=particles[an];
    ctx.beginPath(); ctx.arc(p.x,p.y,U*0.016,0,7); ctx.fillStyle='#3a4360'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,U*0.007,0,7); ctx.fillStyle='#0b0d12'; ctx.fill();
  }
}
function drawStrings(){
  ctx.lineCap='round';
  const lw=Math.max(1.5,U*0.007);
  for(const c of cons){
    if(c.off||c.type!=='cord') continue;
    const a=particles[c.a], b=particles[c.b];
    let x1=a.x,y1=a.y,rest=c.rest;
    if(c.k==='weight'){                 // drawn from the hook ring, not the beam end
      const q=hookPos({p:c.a}); x1=q.x; y1=q.y; rest=c.rest-HDROP;
    }
    ctx.strokeStyle='#9aa2b5'; ctx.lineWidth=lw;
    const d=Math.hypot(b.x-x1,b.y-y1);
    ctx.beginPath(); ctx.moveTo(x1,y1);
    if(d<rest-2){
      ctx.quadraticCurveTo((x1+b.x)/2,(y1+b.y)/2+(rest-d)*0.5,b.x,b.y);
    }else ctx.lineTo(b.x,b.y);
    ctx.stroke();
  }
  // hanger wires: pivot particle to beam ends
  ctx.lineWidth=Math.max(1,U*0.004);
  ctx.strokeStyle='rgba(154,162,181,0.65)';
  for(const bm of beamsArr){
    const A=particles[bm.a], B=particles[bm.b], P=particles[bm.piv];
    ctx.beginPath(); ctx.moveTo(P.x,P.y); ctx.lineTo(A.x,A.y);
    ctx.moveTo(P.x,P.y); ctx.lineTo(B.x,B.y); ctx.stroke();
  }
}
function drawBeams(){
  for(const bm of beamsArr){
    const A=particles[bm.a], B=particles[bm.b];
    const dx=B.x-A.x, dy=B.y-A.y;
    const L=Math.hypot(dx,dy)||1;
    let nx=-dy/L, ny=dx/L;
    if(ny>0){ nx=-nx; ny=-ny; }          // perp points screen-up
    const bt=U*0.016;
    const tA=bt*(0.55+1.1*(1-bm.f));      // taper matches mass share
    const tB=bt*(0.55+1.1*bm.f);
    const tilt=beamTilt(bm);
    const k=Math.min(1,Math.abs(tilt)/14);
    const tint=lerpCol(MINT,CORAL,k);
    ctx.beginPath();
    ctx.moveTo(A.x+nx*tA,A.y+ny*tA);
    ctx.lineTo(B.x+nx*tB,B.y+ny*tB);
    ctx.lineTo(B.x-nx*tB,B.y-ny*tB);
    ctx.lineTo(A.x-nx*tA,A.y-ny*tA);
    ctx.closePath();
    ctx.fillStyle='#232a3a'; ctx.fill();
    ctx.lineWidth=2; ctx.lineJoin='round';
    ctx.strokeStyle=tint; ctx.stroke();
    ctx.beginPath(); ctx.arc(A.x,A.y,tA,0,7); ctx.fillStyle='#232a3a'; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=tint; ctx.stroke();
    ctx.beginPath(); ctx.arc(B.x,B.y,tB,0,7); ctx.fillStyle='#232a3a'; ctx.fill();
    ctx.stroke();
    // bubble level vial below the pivot
    const F=footOf(bm);
    const ang=Math.atan2(dy,dx);
    const hl=U*0.055, vh=U*0.016;
    ctx.save();
    ctx.translate(F.x,F.y); ctx.rotate(ang);
    ctx.translate(0,Math.max(tA,tB)+vh+2);
    rrect(-hl,-vh,hl*2,vh*2,vh);
    ctx.fillStyle='rgba(10,13,20,0.85)'; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,0.16)'; ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.28)';
    ctx.beginPath();
    ctx.moveTo(-vh*1.15,-vh); ctx.lineTo(-vh*1.15,vh);
    ctx.moveTo(vh*1.15,-vh); ctx.lineTo(vh*1.15,vh);
    ctx.stroke();
    const u=-Math.max(-1,Math.min(1,tilt/10))*(hl-vh*1.1);
    ctx.beginPath(); ctx.arc(u,0,vh*0.72,0,7);
    ctx.fillStyle=tint; ctx.fill();
    ctx.restore();
  }
}
function drawHooks(){
  const rr=U*0.022;
  const dragP=dragW?particles[dragW.pi]:null;
  let nh=null;
  if(dragP) nh=nearestFreeHook(dragP.x,dragP.y);
  for(const h of hooksArr){
    const p=particles[h.p];
    const q=hookPos(h);
    if(h.kind==='link'){
      ctx.beginPath(); ctx.arc(p.x,p.y,U*0.010,0,7);
      ctx.fillStyle='#5a6480'; ctx.fill();
      continue;
    }
    // stem
    ctx.lineWidth=Math.max(1.5,U*0.006);
    ctx.strokeStyle='#66708a';
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y-rr); ctx.stroke();
    if(h.free){
      let glow=0;
      if(dragP){
        glow=0.3+0.15*Math.sin(simT*6);
        if(nh&&nh.h===h&&nh.d<SNAPR*1.35) glow=0.85;
      }
      if(glow>0){
        ctx.beginPath(); ctx.arc(q.x,q.y,rr*2.1,0,7);
        ctx.fillStyle='rgba(255,206,107,'+(glow*0.22).toFixed(3)+')'; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(q.x,q.y,rr,0,7);
      ctx.lineWidth=Math.max(2,U*0.008);
      ctx.strokeStyle=glow>0.5?'#ffce6b':(glow>0?'#c9a25e':'#66708a');
      ctx.stroke();
    }else{
      ctx.beginPath(); ctx.arc(q.x,q.y,rr*0.8,0,7);
      ctx.lineWidth=Math.max(2,U*0.008);
      ctx.strokeStyle='#8f98ab'; ctx.stroke();
      ctx.beginPath(); ctx.arc(q.x,q.y,rr*0.3,0,7);
      ctx.fillStyle='#8f98ab'; ctx.fill();
    }
  }
}
function weightPath(shape,r){
  ctx.beginPath();
  if(shape==='circle'){
    ctx.arc(0,0,r,0,7);
  }else if(shape==='star'){
    const R=r*1.18, ir=R*0.5;
    for(let k=0;k<10;k++){
      const rad=(k&1)?ir:R;
      const a=-Math.PI/2+k*Math.PI/5;
      if(k===0) ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
      else ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    ctx.closePath();
  }else{ // pear
    ctx.moveTo(0,-r);
    ctx.bezierCurveTo(r*0.55,-r, r*0.95,-r*0.2, r*0.95,r*0.25);
    ctx.bezierCurveTo(r*0.95,r*0.8, r*0.45,r, 0,r);
    ctx.bezierCurveTo(-r*0.45,r, -r*0.95,r*0.8, -r*0.95,r*0.25);
    ctx.bezierCurveTo(-r*0.95,-r*0.2, -r*0.55,-r, 0,-r);
    ctx.closePath();
  }
}
function drawWeight(w,scale){
  const p=particles[w.pi];
  const r=w.r*(scale||1);
  ctx.save();
  ctx.translate(p.x,p.y);
  weightPath(w.shape,r);
  ctx.fillStyle=w.pal.b; ctx.fill();
  ctx.lineWidth=r*0.14; ctx.lineJoin='round';
  ctx.strokeStyle=w.pal.d; ctx.stroke();
  ctx.beginPath();
  ctx.arc(-r*0.32,-r*0.36,r*0.16,0,7);
  ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.fill();
  ctx.fillStyle='rgba(10,12,16,0.72)';
  ctx.font='800 '+(r*0.85)+'px system-ui,-apple-system,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(''+w.w,0,w.shape==='pear'?r*0.28:r*0.05);
  ctx.restore();
}
function drawTray(){
  ctx.lineCap='round';
  ctx.lineWidth=Math.max(2.5,U*0.010);
  ctx.strokeStyle='#2a3142';
  ctx.beginPath();
  ctx.moveTo(W/2-U*0.42,trayY); ctx.lineTo(W/2+U*0.42,trayY);
  ctx.stroke();
  for(const w of weights){
    ctx.beginPath();
    ctx.ellipse(w.sx,trayY,w.r*0.9,Math.max(2.5,w.r*0.16),0,0,7);
    ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fill();
  }
}
function drawFX(){
  ctx.globalCompositeOperation='lighter';
  for(const p of sparks){
    const al=1-p.age/p.life;
    ctx.globalAlpha=al*0.9;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,U*0.008,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  for(const rg of rings){
    const k=rg.t/0.5;
    ctx.globalAlpha=(1-k)*0.8;
    ctx.lineWidth=Math.max(1.5,U*0.008)*(1-k)+0.5;
    ctx.strokeStyle=rg.col;
    ctx.beginPath(); ctx.arc(rg.x,rg.y,U*0.02+k*U*0.11,0,7); ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  for(const p of confetti){
    ctx.save();
    ctx.globalAlpha=Math.min(1,(p.life-p.age)/0.3);
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.col;
    ctx.fillRect(-p.sz,-p.sz*0.6,p.sz*2,p.sz*1.2);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}
function drawNudge(){
  if(nudgeA<0.02) return;
  const txt='re-hang to balance';
  const fs=Math.max(11,U*0.045);
  ctx.font='600 '+fs+'px system-ui,-apple-system,sans-serif';
  const tw=ctx.measureText(txt).width;
  const pw=tw+fs*1.8, ph=fs*1.9;
  const x=W/2-pw/2, y=H*0.70;
  ctx.globalAlpha=nudgeA;
  rrect(x,y,pw,ph,ph/2);
  ctx.fillStyle='rgba(20,24,34,0.85)'; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle='rgba(255,107,107,0.5)'; ctx.stroke();
  ctx.fillStyle='#ffb9b9';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(txt,W/2,y+ph/2+0.5);
  ctx.globalAlpha=1;
}
function easeOutBack(t){
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}
function drawWin(){
  if(phase!=='win') return;
  const p=Math.min(1,winT/26);
  ctx.fillStyle='rgba(11,13,18,'+(p*0.45).toFixed(3)+')';
  ctx.fillRect(0,0,W,H);
  const s=easeOutBack(p);
  const big=Math.max(22,U*0.11);
  ctx.save();
  ctx.translate(W/2,H*0.42);
  ctx.scale(s,s);
  ctx.globalAlpha=Math.min(1,winT/10);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='800 '+big+'px system-ui,-apple-system,sans-serif';
  ctx.fillStyle='#ffce6b';
  ctx.fillText('BALANCED',0,0);
  ctx.font='600 '+(big*0.4)+'px system-ui,-apple-system,sans-serif';
  ctx.fillStyle='rgba(235,240,250,0.85)';
  ctx.fillText('every beam level',0,big*0.85);
  ctx.restore();
  ctx.globalAlpha=1;
}
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawStrings();
  drawBeams();
  drawHooks();
  drawTray();
  for(const w of weights) if(w!==dragW) drawWeight(w,1);
  if(dragW){
    drawWeight(dragW,1.1);
    const p=particles[dragW.pi];
    ctx.beginPath(); ctx.arc(p.x,p.y,dragW.r*1.45,0,7);
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.stroke();
  }
  drawFX();
  drawNudge();
  drawWin();
}

/* ============================== input ============================== */
function evtPos(e){
  const r=cv.getBoundingClientRect();
  return [e.clientX-r.left,e.clientY-r.top];
}
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  ensureAudio();
  if(actx&&actx.state!=='running') actx.resume();
  if(activePtr!==-1) return;
  const [x,y]=evtPos(e);
  const g=tryGrab(x,y);
  if(g){
    activePtr=e.pointerId;
    try{ cv.setPointerCapture(e.pointerId); }catch(_){}
  }
});
cv.addEventListener('pointermove',e=>{
  if(e.pointerId!==activePtr||!dragW) return;
  const [x,y]=evtPos(e);
  ptr.x=x; ptr.y=y;
});
function onUp(e){
  if(e.pointerId!==activePtr) return;
  releaseDrag();
}
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onUp);
cv.addEventListener('contextmenu',e=>e.preventDefault());
document.getElementById('rst').addEventListener('click',()=>{ buildLevel(level); });

/* ============================== hud / boot ============================== */
function updateHUD(){
  lvlEl.textContent='LEVEL '+(level+1)+'/'+NLEV;
}
function resize(){
  const w=Math.max(200,window.innerWidth), h=Math.max(300,window.innerHeight);
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  cv.width=Math.round(w*DPR); cv.height=Math.round(h*DPR);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  if(w!==W||h!==H){ W=w; H=h; buildLevel(level); }
}
window.addEventListener('resize',resize);
let acc=0, lastT=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let ms=now-lastT; lastT=now;
  if(ms>50) ms=50;
  acc+=ms/1000;
  while(acc>=DT){ step(); acc-=DT; }
  draw();
}
window.__game={
  state:()=>({
    level:level+1,
    queueLeft:weights.filter(w=>w.state!=='hung').length,
    beams:beamsArr.map(bm=>{
      const t=beamTilt(bm);
      return {tiltDeg:Math.round(t*100)/100,level:Math.abs(t)<=LVL_TOL};
    }),
    allLevel:computeAllLevel(),
    settled,
    phase
  }),
  stepN:(n)=>{ for(let i=0;i<n;i++) step(); draw(); },
  reset:()=>{ buildLevel(level); draw(); },
  goto:(l)=>{ level=Math.max(1,Math.min(NLEV,l|0))-1; buildLevel(level); draw(); },
  hangAt:(hi)=>{
    if(phase!=='play') return false;
    const h=hooksArr[hi];
    if(!h||!h.free) return false;
    let w=dragW;
    if(!w){
      for(const cand of weights){
        if(cand.state!=='hung'){ w=cand; break; }
      }
    }
    if(!w) return false;
    if(dragW===w){ dragW=null; activePtr=-1; }
    return attachWeight(w,h,true);
  },
  unhang:(hi)=>{
    const h=hooksArr[hi];
    if(!h||!h.occ) return false;
    const w=h.occ;
    detachWeight(w);
    startReturn(w);
    return true;
  },
  hooks:()=>hooksArr.map(h=>{
    const q=hookPos(h);
    return {x:q.x,y:q.y,free:h.free};
  })
};
resize();
draw();
requestAnimationFrame(frame);
</script>
