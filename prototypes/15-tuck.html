<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>TUCK</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0d12;
    font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  #cv{position:fixed;inset:0;display:block;touch-action:none}
  #lvl{position:fixed;top:10px;left:12px;color:#8f98ab;font-size:12px;font-weight:700;
    letter-spacing:2px;pointer-events:none;z-index:5;text-shadow:0 1px 2px #000}
  #rst{position:fixed;top:6px;right:8px;width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#cfd6e4;
    font-size:19px;line-height:36px;text-align:center;z-index:5;cursor:pointer;padding:0}
  #rst:active{background:rgba(255,255,255,.18)}
  #hint{position:fixed;top:52px;left:50%;transform:translateX(-50%);
    background:rgba(20,24,34,.82);border:1px solid rgba(255,255,255,.12);color:#e8ddc8;
    font-size:13px;letter-spacing:1px;padding:7px 16px;border-radius:20px;z-index:5;
    pointer-events:none;transition:opacity .6s;white-space:nowrap}
  #hint.hide{opacity:0}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="lvl">LEVEL 1</div>
<button id="rst" aria-label="restart">&#8635;</button>
<div id="hint">tap a pin</div>
<script>
"use strict";
/* ============================ globals ============================ */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const DT=1/120, COLS=12, ROWS=14, NLV=3;
let W=0,H=0,DPR=1;
let SPX=16, clothW=180, clothX0=0, pinY=0, G=900, PR=9;
let FLOORY=0, bedTop=0, bedL=0, bedR=0, bedBot=0;
let level=0, phase='play', phaseTimer=0, stepCount=0;
let P=[], cons=[], pins=[], hook=null, cat=null, samples=[];
let cov=0, dispCov=0, settleSteps=0, stepsSinceAction=0;
let anyReleased=false, everReleased=false, flumped=false;
let rings=[], sparks=[], hearts=[], zzz=[], zTimer=0;
const covThreshK=1.25, WINCOV=0.85;

/* ============================ audio ============================ */
let actx=null, master=null, noiseBuf=null;
function ensureAudio(){
  if(actx) return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain(); master.gain.value=0.5; master.connect(actx.destination);
    const len=Math.floor(actx.sampleRate*0.8);
    noiseBuf=actx.createBuffer(1,len,actx.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  }catch(e){ actx=null; }
}
document.addEventListener('visibilitychange',()=>{
  if(actx&&document.visibilityState==='visible') actx.resume();
});
function playPop(){
  if(!actx) return;
  const t0=actx.currentTime;
  const o=actx.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(840,t0);
  o.frequency.exponentialRampToValueAtTime(300,t0+0.11);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.22,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.13);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+0.15);
  const s=actx.createBufferSource(); s.buffer=noiseBuf;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2500;
  const ng=actx.createGain();
  ng.gain.setValueAtTime(0.12,t0); ng.gain.exponentialRampToValueAtTime(0.001,t0+0.04);
  s.connect(hp); hp.connect(ng); ng.connect(master); s.start(t0); s.stop(t0+0.05);
}
function playSnag(){
  if(!actx) return;
  const t0=actx.currentTime;
  const o=actx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(1250,t0);
  o.frequency.exponentialRampToValueAtTime(760,t0+0.07);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.14,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.09);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+0.1);
}
function playFlump(imp){
  if(!actx) return;
  const t0=actx.currentTime;
  const s=actx.createBufferSource(); s.buffer=noiseBuf;
  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=320;
  const g=actx.createGain();
  const v=Math.min(0.34,0.1+imp*0.25);
  g.gain.setValueAtTime(v,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.2);
  s.connect(lp); lp.connect(g); g.connect(master); s.start(t0); s.stop(t0+0.22);
}
function playPurr(){
  if(!actx) return;
  const t0=actx.currentTime;
  const o=actx.createOscillator(); o.type='sine'; o.frequency.value=64;
  const g=actx.createGain(); g.gain.value=0.0001;
  g.gain.setValueAtTime(0.001,t0);
  g.gain.linearRampToValueAtTime(0.16,t0+0.08);
  g.gain.setValueAtTime(0.16,t0+0.8); g.gain.linearRampToValueAtTime(0.0001,t0+1.05);
  const lfo=actx.createOscillator(); lfo.frequency.value=9;
  const lg=actx.createGain(); lg.gain.value=0.09;
  lfo.connect(lg); lg.connect(g.gain);
  o.connect(g); g.connect(master);
  o.start(t0); lfo.start(t0); o.stop(t0+1.1); lfo.stop(t0+1.1);
  const c=actx.createOscillator(); c.type='triangle'; c.frequency.value=987.77;
  const cg=actx.createGain();
  cg.gain.setValueAtTime(0.0001,t0); cg.gain.linearRampToValueAtTime(0.12,t0+0.02);
  cg.gain.exponentialRampToValueAtTime(0.001,t0+0.55);
  c.connect(cg); cg.connect(master); c.start(t0); c.stop(t0+0.6);
}
function playSad(){
  if(!actx) return;
  const t0=actx.currentTime;
  const o=actx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(196,t0); o.frequency.linearRampToValueAtTime(139,t0+0.32);
  const lp=actx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(750,t0); lp.frequency.linearRampToValueAtTime(240,t0+0.32);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.09,t0); g.gain.linearRampToValueAtTime(0.0001,t0+0.36);
  o.connect(lp); lp.connect(g); g.connect(master); o.start(t0); o.stop(t0+0.38);
}

/* ============================ math ============================ */
function bounce(p,nx,ny,e,fr){
  const vx=p.x-p.px, vy=p.y-p.py;
  const vn=vx*nx+vy*ny;
  if(vn>=0) return 0;
  const vtx=vx-vn*nx, vty=vy-vn*ny;
  const nvx=vtx*fr-vn*e*nx, nvy=vty*fr-vn*e*ny;
  p.px=p.x-nvx; p.py=p.y-nvy;
  return -vn;
}
function collideCircle(p,pr,cx,cy,R,fr){
  const dx=p.x-cx, dy=p.y-cy, rr=R+pr;
  const d2=dx*dx+dy*dy;
  if(d2>=rr*rr) return 0;
  const d=Math.sqrt(d2)||1e-6;
  const nx=dx/d, ny=dy/d;
  p.x=cx+nx*rr; p.y=cy+ny*rr;
  return bounce(p,nx,ny,0,fr);
}

/* ============================ world building ============================ */
function idx(r,c){ return r*COLS+c; }
function buildLevel(i){
  P=[]; cons=[]; pins=[]; hook=null; samples=[];
  rings=[]; sparks=[]; hearts=[]; zzz=[]; zTimer=0;
  phase='play'; phaseTimer=0;
  cov=0; dispCov=0; settleSteps=0; stepsSinceAction=0;
  anyReleased=false; flumped=false;
  clothW=Math.min(W*0.62,H*0.35);
  SPX=clothW/(COLS-1);
  PR=Math.max(8,SPX*0.42);
  G=H*1.7;
  FLOORY=H*0.965; bedTop=H*0.80; bedBot=H*0.895;
  bedL=W*0.07; bedR=W*0.93;
  pinY=Math.max(H*0.10,52);
  let clothCX=0.5*W, pinCols=[0,COLS-1], catCMx=0.5*W, RbK=0.30;
  if(i===1){ clothCX=0.40*W; pinCols=[0,4,7,COLS-1]; catCMx=clothCX+clothW*0.35; RbK=0.24; }
  if(i===2){ RbK=0.27; }
  clothX0=clothCX-clothW/2;
  // cloth grid (hangs flat below the pin row)
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++){
      const x=clothX0+c*SPX, y=pinY+r*SPX;
      P.push({x,y,px:x,py:y,im:1});
    }
  const D=SPX*Math.SQRT2;
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++){
      if(c<COLS-1) cons.push({a:idx(r,c),b:idx(r,c+1),rest:SPX,k:1});
      if(r<ROWS-1) cons.push({a:idx(r,c),b:idx(r+1,c),rest:SPX,k:1});
      if(c<COLS-1&&r<ROWS-1){
        cons.push({a:idx(r,c),b:idx(r+1,c+1),rest:D,k:0.45});
        cons.push({a:idx(r,c+1),b:idx(r+1,c),rest:D,k:0.45});
      }
    }
  for(const c of pinCols){
    const pi=idx(0,c);
    P[pi].im=0;
    pins.push({x:P[pi].x,y:P[pi].y,pIdx:pi,released:false,popT:-999});
  }
  // cat: body + head circles resting on the bed
  const Rb=clothW*RbK, Rh=Rb*0.62;
  const catX=catCMx-Rb*0.33;
  const by=bedTop-Rb*0.92, bx=catX;
  const hx=catX+Rb*1.05, hy=bedTop-Rb*1.15;
  cat={circles:[[bx,by,Rb],[hx,hy,Rh]],bx,by,Rb,hx,hy,Rh};
  // coverage samples along the exposed top surface of the silhouette
  const left=Math.min(bx-Rb,hx-Rh)+2, right=Math.max(bx+Rb,hx+Rh)-2;
  for(let k=0;k<40;k++){
    const x=left+(right-left)*(k+0.5)/40;
    let ty=1e9;
    for(const [cx2,cy2,r] of cat.circles){
      const dx=x-cx2;
      if(Math.abs(dx)<r){
        const y=cy2-Math.sqrt(r*r-dx*dx);
        if(y<ty) ty=y;
      }
    }
    if(ty<1e8) samples.push({x,y:ty+2});
  }
  if(i===2){
    const clothBot=pinY+(ROWS-1)*SPX;
    let topMost=1e9;
    for(const s of samples) if(s.y<topMost) topMost=s.y;
    hook={x:clothCX-clothW*0.20,
      y:clothBot+Math.max(SPX*2.4,(topMost-clothBot)*0.5),
      r:SPX*0.3, capR:SPX*0.8, hold:-1, armed:true};
  }
  updateHUD();
}

/* ============================ actions ============================ */
function doReleasePin(i){
  const pn=pins[i];
  if(!pn||pn.released||phase!=='play') return false;
  pn.released=true; pn.popT=stepCount;
  P[pn.pIdx].im=1;
  anyReleased=true; stepsSinceAction=0;
  rings.push({x:pn.x,y:pn.y,age:0,col:'#ffce6b'});
  for(let k=0;k<7;k++){
    const a=Math.random()*6.28, sp=(0.15+Math.random()*0.4)*H;
    sparks.push({x:pn.x,y:pn.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:18+Math.random()*14,max:32,col:'#ffe2a0'});
  }
  playPop();
  if(!everReleased){
    everReleased=true;
    document.getElementById('hint').classList.add('hide');
  }
  return true;
}
function releaseHook(){
  if(!hook||hook.hold<0||phase!=='play') return false;
  P[hook.hold].im=1;
  hook.hold=-1; hook.armed=false; stepsSinceAction=0;
  rings.push({x:hook.x,y:hook.y,age:0,col:'#6ea8ff'});
  playPop();
  return true;
}
function winLevel(){
  if(phase!=='play') return;
  phase='win'; phaseTimer=0;
  for(let k=0;k<9;k++)
    hearts.push({x:cat.bx+(Math.random()-0.5)*cat.Rb*2,
      y:cat.by-cat.Rb*0.4-Math.random()*cat.Rb,
      vy:-(0.05+Math.random()*0.07)*H, age:0, max:120+Math.random()*50,
      s:5+Math.random()*4, wob:Math.random()*6.28});
  playPurr();
  updateHUD();
}
function failLevel(){
  if(phase!=='play') return;
  phase='fail'; phaseTimer=0;
  playSad();
}
function nextLevel(){
  level=(level+1)%NLV;
  buildLevel(level);
}

/* ============================ coverage / settle ============================ */
function computeCoverage(){
  if(!samples.length) return 0;
  const r=SPX*covThreshK, r2=r*r;
  let n=0;
  for(const s of samples){
    for(let i=0;i<P.length;i++){
      const dx=P[i].x-s.x;
      if(dx>r||dx<-r) continue;
      const dy=P[i].y-s.y;
      if(dx*dx+dy*dy<r2){ n++; break; }
    }
  }
  return n/samples.length;
}
function isSettled(){ return settleSteps>=60; }

/* ============================ simulation ============================ */
function stepFX(){
  for(let i=rings.length-1;i>=0;i--){
    rings[i].age++;
    if(rings[i].age>26) rings.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];
    p.x+=p.vx*DT; p.y+=p.vy*DT; p.vy+=G*DT*0.6; p.vx*=0.985; p.life--;
    if(p.life<=0) sparks.splice(i,1);
  }
  for(let i=hearts.length-1;i>=0;i--){
    const h=hearts[i];
    h.age++; h.y+=h.vy*DT; h.x+=Math.sin(h.age*0.08+h.wob)*0.3;
    if(h.age>h.max) hearts.splice(i,1);
  }
  zTimer++;
  if(zTimer>240&&phase!=='win'&&cat){
    zTimer=0;
    zzz.push({x:cat.hx+cat.Rh*0.6,y:cat.hy-cat.Rh*0.9,age:0});
  }
  for(let i=zzz.length-1;i>=0;i--){
    const z=zzz[i];
    z.age++;
    if(z.age>300) zzz.splice(i,1);
  }
}
function step(){
  stepCount++;
  stepFX();
  // integrate
  const g=G*DT*DT, vmax=SPX*0.5;
  for(const p of P){
    if(p.im===0){ p.px=p.x; p.py=p.y; continue; }
    let vx=(p.x-p.px)*0.995, vy=(p.y-p.py)*0.995;
    const sp=Math.hypot(vx,vy);
    if(sp>vmax){ vx*=vmax/sp; vy*=vmax/sp; }
    else if(sp<0.5){ vx*=0.94; vy*=0.94; }
    p.px=p.x; p.py=p.y;
    p.x+=vx; p.y+=vy+g;
  }
  // relax constraints (3 iters, clamped)
  for(let it=0;it<3;it++){
    for(const c of cons){
      const a=P[c.a], b=P[c.b];
      const dx=b.x-a.x, dy=b.y-a.y;
      const d=Math.hypot(dx,dy);
      if(d<1e-9) continue;
      let diff=d-c.rest;
      if(diff>c.rest) diff=c.rest;
      else if(diff<-c.rest*0.5) diff=-c.rest*0.5;
      const im=a.im+b.im;
      if(im===0) continue;
      const k=diff/d/im*c.k;
      a.x+=dx*k*a.im; a.y+=dy*k*a.im;
      b.x-=dx*k*b.im; b.y-=dy*k*b.im;
    }
  }
  // hook capture (first falling particle in radius)
  if(hook&&hook.armed&&hook.hold<0&&anyReleased){
    const cr2=hook.capR*hook.capR;
    for(let i=0;i<P.length;i++){
      const p=P[i];
      if(p.im===0) continue;
      const dx=p.x-hook.x, dy=p.y-hook.y;
      if(dx*dx+dy*dy<cr2&&p.y-p.py>SPX*0.03){
        hook.hold=i; p.im=0;
        p.x=hook.x; p.y=hook.y+hook.r*0.4; p.px=p.x; p.py=p.y;
        rings.push({x:hook.x,y:hook.y,age:0,col:'#6ea8ff'});
        playSnag();
        break;
      }
    }
  }
  // collisions
  const pr=SPX*0.18;
  let catHit=0;
  for(const p of P){
    if(p.im===0) continue;
    for(const [cx2,cy2,r] of cat.circles){
      const imp=collideCircle(p,pr,cx2,cy2,r,0.78);
      if(imp>catHit) catHit=imp;
    }
    if(hook) collideCircle(p,pr,hook.x,hook.y,hook.r,0.85);
    if(p.x>bedL&&p.x<bedR&&p.y>bedTop-pr&&p.py<bedTop+pr*2){
      p.y=bedTop-pr; bounce(p,0,-1,0,0.55);
    }
    if(p.y>FLOORY-pr){ p.y=FLOORY-pr; bounce(p,0,-1,0,0.5); }
    if(p.x<pr){ p.x=pr; bounce(p,1,0,0,0.7); }
    if(p.x>W-pr){ p.x=W-pr; bounce(p,-1,0,0,0.7); }
  }
  if(catHit>SPX*0.12&&!flumped&&anyReleased){
    flumped=true;
    playFlump(catHit/SPX);
  }
  // settle tracking
  let mv2=0;
  for(const p of P){
    const vx=p.x-p.px, vy=p.y-p.py;
    const v2=vx*vx+vy*vy;
    if(v2>mv2) mv2=v2;
  }
  const sv=Math.max(0.02,SPX*0.006);
  if(mv2<sv*sv) settleSteps++; else settleSteps=0;
  // coverage
  if(stepCount%2===0) cov=computeCoverage();
  dispCov+=(cov-dispCov)*0.08;
  // adjudication
  if(phase==='play'&&anyReleased){
    stepsSinceAction++;
    const settled=isSettled();
    if(settled&&cov>=WINCOV){ winLevel(); }
    else{
      const allR=pins.every(pn=>pn.released);
      if(allR){
        const blocked=hook&&hook.hold>=0;
        if((settled&&!blocked)||stepsSinceAction>=1500){
          if(cov>=WINCOV) winLevel(); else failLevel();
        }
      }
    }
  }
  if(phase==='win'){
    phaseTimer++;
    if(phaseTimer>=144) nextLevel();
  }
  if(phase==='fail') phaseTimer++;
}

/* ============================ rendering ============================ */
function easeOutBack(k){
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(k-1,3)+c1*Math.pow(k-1,2);
}
function catPath(s){
  const {bx,by,Rb,hx,hy,Rh}=cat;
  ctx.beginPath();
  ctx.arc(bx,by+Rb*(1-s),Rb*s,0,7);
  ctx.moveTo(hx+Rh,hy);
  ctx.arc(hx,hy,Rh,0,7);
  // ears
  const e=Rh*0.55;
  for(const dir of [-1,1]){
    const ex=hx+dir*Rh*0.62, ey=hy-Rh*0.72;
    ctx.moveTo(ex-e*0.5,ey+e*0.35);
    ctx.lineTo(ex+dir*e*0.18,ey-e*0.85);
    ctx.lineTo(ex+e*0.55,ey+e*0.4);
    ctx.closePath();
  }
}
function drawCat(){
  const br=1+0.02*Math.sin(stepCount*DT*2.1);
  const {bx,by,Rb,hx,hy,Rh}=cat;
  // tail
  ctx.strokeStyle='#2b3140'; ctx.lineWidth=Math.max(4,Rb*0.16); ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(bx-Rb*0.85,by+Rb*0.55);
  ctx.quadraticCurveTo(bx-Rb*1.5,by+Rb*0.55,bx-Rb*1.42,by-Rb*0.05);
  ctx.stroke();
  catPath(br);
  ctx.fillStyle='#343b4d'; ctx.fill();
  ctx.strokeStyle='#20242f'; ctx.lineWidth=2; ctx.stroke();
  // warm gold tint rises with coverage
  if(dispCov>0.02){
    catPath(br);
    ctx.fillStyle='rgba(255,206,107,'+(dispCov*0.30).toFixed(3)+')';
    ctx.fill();
  }
  // face: closed eyes + nose + smile
  ctx.strokeStyle='#12151d'; ctx.lineWidth=Math.max(1.5,Rh*0.09); ctx.lineCap='round';
  for(const dir of [-1,1]){
    ctx.beginPath();
    ctx.arc(hx+dir*Rh*0.38,hy-Rh*0.05,Rh*0.2,Math.PI*0.15,Math.PI*0.85);
    ctx.stroke();
  }
  ctx.fillStyle='#ff8f8f';
  ctx.beginPath(); ctx.arc(hx,hy+Rh*0.3,Rh*0.09,0,7); ctx.fill();
  // zzz
  ctx.fillStyle='#8f98ab'; ctx.textAlign='center';
  for(const z of zzz){
    const t=z.age/300;
    ctx.globalAlpha=t<0.15?t/0.15:Math.max(0,1-(t-0.15)/0.85);
    ctx.font='700 '+(10+t*14)+'px sans-serif';
    ctx.fillText('z',z.x+t*SPX*1.6+Math.sin(z.age*0.05)*3,z.y-t*SPX*3.2);
  }
  ctx.globalAlpha=1;
}
function drawBed(){
  ctx.fillStyle='#1a1620';
  ctx.fillRect(bedL+8,bedBot,10,FLOORY-bedBot);
  ctx.fillRect(bedR-18,bedBot,10,FLOORY-bedBot);
  const rr=8;
  ctx.fillStyle='#33283c';
  ctx.beginPath();
  ctx.moveTo(bedL+rr,bedTop);
  ctx.lineTo(bedR-rr,bedTop); ctx.arcTo(bedR,bedTop,bedR,bedTop+rr,rr);
  ctx.lineTo(bedR,bedBot-rr); ctx.arcTo(bedR,bedBot,bedR-rr,bedBot,rr);
  ctx.lineTo(bedL+rr,bedBot); ctx.arcTo(bedL,bedBot,bedL,bedBot-rr,rr);
  ctx.lineTo(bedL,bedTop+rr); ctx.arcTo(bedL,bedTop,bedL+rr,bedTop,rr);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#4a3a58';
  ctx.fillRect(bedL,bedTop,bedR-bedL,3);
  ctx.strokeStyle='rgba(255,107,107,0.35)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bedL+6,bedTop+9); ctx.lineTo(bedR-6,bedTop+9); ctx.stroke();
  ctx.strokeStyle='#272e42'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,FLOORY); ctx.lineTo(W,FLOORY); ctx.stroke();
}
function drawCloth(){
  const A0=SPX*SPX;
  ctx.lineJoin='round';
  for(let r=0;r<ROWS-1;r++){
    const stripe=(r%3===0)?5:0;
    for(let c=0;c<COLS-1;c++){
      const p00=P[idx(r,c)], p10=P[idx(r,c+1)], p11=P[idx(r+1,c+1)], p01=P[idx(r+1,c)];
      const ax=p10.x-p00.x, ay=p10.y-p00.y, bx2=p01.x-p00.x, by2=p01.y-p00.y;
      const area=(ax*by2-ay*bx2)/A0;
      let fill;
      if(area>=0){
        const t=Math.min(1,area);
        fill='hsl(258,52%,'+(26+27*t+stripe)+'%)';
      }else{
        const t=Math.min(1,-area);
        fill='hsl(250,40%,'+(17+6*t+stripe*0.5)+'%)';
      }
      ctx.fillStyle=fill; ctx.strokeStyle=fill; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(p00.x,p00.y); ctx.lineTo(p10.x,p10.y);
      ctx.lineTo(p11.x,p11.y); ctx.lineTo(p01.x,p01.y);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
  // hem highlight on the bottom edge
  ctx.strokeStyle='rgba(214,196,255,0.5)'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(P[idx(ROWS-1,0)].x,P[idx(ROWS-1,0)].y);
  for(let c=1;c<COLS;c++) ctx.lineTo(P[idx(ROWS-1,c)].x,P[idx(ROWS-1,c)].y);
  ctx.stroke();
}
function drawPins(){
  for(const pn of pins){
    if(pn.released){
      ctx.beginPath(); ctx.arc(pn.x,pn.y,PR*0.4,0,7);
      ctx.fillStyle='#1a1f2c'; ctx.fill();
      ctx.strokeStyle='#39445f'; ctx.lineWidth=1.5; ctx.stroke();
      continue;
    }
    const pulse=1+0.07*Math.sin(stepCount*DT*3.2);
    const gl=ctx.createRadialGradient(pn.x,pn.y,0,pn.x,pn.y,PR*3);
    gl.addColorStop(0,'rgba(255,206,107,0.30)'); gl.addColorStop(1,'rgba(255,206,107,0)');
    ctx.fillStyle=gl;
    ctx.beginPath(); ctx.arc(pn.x,pn.y,PR*3,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(pn.x,pn.y,PR*pulse,0,7);
    ctx.fillStyle='#ffce6b'; ctx.fill();
    ctx.strokeStyle='#8a6320'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(pn.x-PR*0.28,pn.y-PR*0.28,PR*0.3,0,7);
    ctx.fillStyle='rgba(255,244,220,0.85)'; ctx.fill();
  }
}
function drawHook(){
  if(!hook) return;
  const holding=hook.hold>=0;
  const col=hook.armed||holding?'#6ea8ff':'#4a5468';
  if(holding){
    const pr2=hook.r*2.4+Math.sin(stepCount*DT*5)*3;
    ctx.strokeStyle='rgba(110,168,255,0.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(hook.x,hook.y,pr2,0,7); ctx.stroke();
  }
  const gl=ctx.createRadialGradient(hook.x,hook.y,0,hook.x,hook.y,hook.r*3.4);
  gl.addColorStop(0,'rgba(110,168,255,0.22)'); gl.addColorStop(1,'rgba(110,168,255,0)');
  ctx.fillStyle=gl;
  ctx.beginPath(); ctx.arc(hook.x,hook.y,hook.r*3.4,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(hook.x,hook.y,hook.r,0,7);
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle='#22314e'; ctx.lineWidth=2; ctx.stroke();
  ctx.strokeStyle=col; ctx.lineWidth=Math.max(2,hook.r*0.5); ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(hook.x,hook.y+hook.r*1.6,hook.r*0.9,Math.PI*1.05,Math.PI*1.95);
  ctx.stroke();
}
function drawFX(){
  ctx.globalCompositeOperation='lighter';
  for(const rg of rings){
    const t=rg.age/26;
    ctx.strokeStyle=rg.col; ctx.globalAlpha=(1-t)*0.8;
    ctx.lineWidth=3*(1-t)+1;
    ctx.beginPath(); ctx.arc(rg.x,rg.y,4+t*PR*4,0,7); ctx.stroke();
  }
  for(const p of sparks){
    ctx.globalAlpha=Math.min(1,p.life/p.max*1.6);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,2.2,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  for(const h of hearts){
    const a=Math.min(1,(h.max-h.age)/40);
    ctx.globalAlpha=a; ctx.fillStyle='#ff6b6b';
    const s=h.s;
    ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(Math.sin(h.age*0.06+h.wob)*0.25);
    ctx.beginPath();
    ctx.moveTo(0,s*0.35);
    ctx.bezierCurveTo(-s,-s*0.4,-s*0.4,-s,0,-s*0.35);
    ctx.bezierCurveTo(s*0.4,-s,s,-s*0.4,0,s*0.35);
    ctx.fill(); ctx.restore();
  }
  ctx.globalAlpha=1;
}
function drawMeter(){
  const bw=Math.min(W*0.44,230), bh=7;
  const bx=W/2-bw/2, by=17;
  ctx.fillStyle='rgba(255,255,255,0.09)';
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(bx,by,bw,bh,bh/2); else ctx.rect(bx,by,bw,bh);
  ctx.fill();
  const fw=bw*Math.max(0,Math.min(1,dispCov));
  if(fw>1){
    ctx.fillStyle=cov>=WINCOV?'#4bd48a':'#ffce6b';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(bx,by,fw,bh,bh/2); else ctx.rect(bx,by,fw,bh);
    ctx.fill();
  }
  const tx=bx+bw*WINCOV;
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(tx,by-2.5); ctx.lineTo(tx,by+bh+2.5); ctx.stroke();
  ctx.fillStyle=cov>=WINCOV?'#4bd48a':'#8f98ab';
  ctx.font='700 10px sans-serif'; ctx.textAlign='left';
  ctx.fillText(Math.round(cov*100)+'%',bx+bw+7,by+bh);
}
function drawBanner(){
  if(phase!=='win'&&phase!=='fail') return;
  const k=Math.min(1,phaseTimer/16);
  const s=easeOutBack(k);
  ctx.fillStyle='rgba(6,8,12,'+(0.35*k).toFixed(3)+')';
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2,H*0.42); ctx.scale(s,s);
  const main=phase==='win'?(level===NLV-1?'all tucked in!':'tucked in!'):'the cat is cold';
  const sub=phase==='win'?Math.round(cov*100)+'% cozy':'tap to retry';
  const col=phase==='win'?'#4bd48a':'#ff6b6b';
  ctx.font='800 '+Math.max(22,W*0.075)+'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.fillStyle=col; ctx.fillText(main,0,-12);
  ctx.shadowBlur=0;
  ctx.font='600 '+Math.max(12,W*0.035)+'px sans-serif';
  ctx.fillStyle='#cfd6e4'; ctx.fillText(sub,0,Math.max(18,W*0.055));
  ctx.restore();
}
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#12101c'); bg.addColorStop(0.6,'#0c0e15'); bg.addColorStop(1,'#0b0d12');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const rl=ctx.createRadialGradient(W*0.5,H*0.08,0,W*0.5,H*0.08,H*0.7);
  rl.addColorStop(0,'rgba(255,190,120,0.10)'); rl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rl; ctx.fillRect(0,0,W,H);
  drawBed();
  drawCat();
  drawHook();
  drawCloth();
  drawPins();
  drawFX();
  drawMeter();
  drawBanner();
}

/* ============================ input ============================ */
function evtPos(e){
  const r=cv.getBoundingClientRect();
  return [e.clientX-r.left,e.clientY-r.top];
}
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  ensureAudio();
  if(actx&&actx.state!=='running') actx.resume();
  try{ cv.setPointerCapture(e.pointerId); }catch(_){}
  const [x,y]=evtPos(e);
  if(phase==='fail'){ buildLevel(level); return; }
  if(phase!=='play') return;
  const HITR=Math.max(26,PR*2.6);
  let best=-1, bd=HITR*HITR;
  for(let i=0;i<pins.length;i++){
    if(pins[i].released) continue;
    const dx=pins[i].x-x, dy=pins[i].y-y;
    const d2=dx*dx+dy*dy;
    if(d2<bd){ bd=d2; best=i; }
  }
  if(best>=0){ doReleasePin(best); return; }
  if(hook&&hook.hold>=0){
    const dx=hook.x-x, dy=hook.y-y;
    if(dx*dx+dy*dy<HITR*HITR) releaseHook();
  }
});
cv.addEventListener('pointermove',e=>{ if(e.pressure!==undefined) e.preventDefault(); });
cv.addEventListener('pointerup',()=>{});
cv.addEventListener('pointercancel',()=>{});
cv.addEventListener('contextmenu',e=>e.preventDefault());
document.getElementById('rst').addEventListener('click',()=>{ buildLevel(level); });

/* ============================ hud / boot ============================ */
function updateHUD(){
  document.getElementById('lvl').textContent='LEVEL '+(level+1);
}
function resize(){
  const w=Math.max(200,window.innerWidth), h=Math.max(300,window.innerHeight);
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  cv.width=Math.round(w*DPR); cv.height=Math.round(h*DPR);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  if(w!==W||h!==H){ W=w; H=h; buildLevel(level); }
}
window.addEventListener('resize',resize);
let acc=0, lastT=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let ms=now-lastT; lastT=now;
  if(ms>50) ms=50;
  acc+=ms/1000;
  while(acc>=DT){ step(); acc-=DT; }
  draw();
}
window.__game={
  state:()=>({level:level+1,
    pinsLeft:pins.filter(p=>!p.released).length,
    coverage:cov, settled:isSettled(), phase}),
  stepN:(n)=>{ for(let i=0;i<n;i++) step(); draw(); },
  reset:()=>{ buildLevel(level); },
  goto:(lv)=>{ level=Math.max(0,Math.min(NLV-1,(lv|0)-1)); buildLevel(level); },
  releasePin:(i)=>{
    if(i<0||i>=pins.length) return false;
    doReleasePin(i);
    return true;
  },
  pins:()=>pins.map(p=>({x:p.x,y:p.y,released:p.released})),
  coverage:()=>computeCoverage(),
  releaseHook:()=>releaseHook()
};
resize();
requestAnimationFrame(frame);
</script>
