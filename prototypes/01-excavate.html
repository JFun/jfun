<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Excavate</title>
<style>
  :root{
    --bg:#0a0c12; --bg2:#11141d; --ink:#eef2ff; --muted:#8b93ad;
    --gold:#ffce5c; --hot:#ff5a4d; --warm:#ff9e3d; --cool:#3d9bff; --cold:#5d6b9e;
    --good:#3ddc97; --line:#1d2333;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #1a1f31 0%, var(--bg) 55%);
    color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:14px 12px calc(14px + env(safe-area-inset-bottom)); overflow-x:hidden;
    user-select:none; -webkit-user-select:none;
  }
  .wrap{width:100%; max-width:440px; display:flex; flex-direction:column; gap:12px}
  header{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .title{font-weight:800; font-size:26px; letter-spacing:.5px; display:flex; align-items:baseline; gap:8px}
  .title .pick{color:var(--gold)}
  .day{font-size:12px; color:var(--muted); text-align:right; line-height:1.4}
  .day b{color:var(--ink)}
  .how{font-size:12.5px; color:var(--muted); text-align:center; margin:-4px 0 0; min-height:16px; transition:color .3s}
  .how em{color:var(--gold); font-style:normal; font-weight:700}

  .stats{display:flex; gap:8px}
  .stat{flex:1; background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:8px 6px; text-align:center}
  .stat .v{font-size:20px; font-weight:800; line-height:1.1}
  .stat .l{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:2px}
  .stat.lowbudget .v{color:var(--hot)}
  .stat .v.flash{animation:flash .4s ease}
  @keyframes flash{0%{transform:scale(1.4); color:var(--gold)} 100%{transform:scale(1)}}

  .boardwrap{position:relative; width:100%; aspect-ratio:1/1; border-radius:18px; overflow:hidden;
    box-shadow:0 18px 50px -20px #000, inset 0 0 0 1px var(--line); background:#05060a}
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block}
  #grid{position:absolute; inset:0; display:grid; touch-action:manipulation}
  .tile{position:relative; cursor:pointer; transition:transform .12s; transform-style:preserve-3d}
  .cap{position:absolute; inset:0; border-radius:7px; margin:2.2%;
    background:linear-gradient(160deg,#252c40,#171b28);
    box-shadow:inset 0 1px 0 #ffffff14, inset 0 -3px 6px #0007, 0 3px 8px -2px #000a;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    transition:opacity .28s ease, transform .35s cubic-bezier(.2,1.4,.4,1);
    border:1px solid #ffffff10;}
  .cap .dot{width:34%; height:34%; border-radius:50%; filter:blur(.4px);
    box-shadow:0 0 10px currentColor, inset 0 0 6px #0006; opacity:.92; transition:background .3s, color .3s}
  .cap .word{position:absolute; bottom:5%; font-size:8px; font-weight:800; letter-spacing:.4px;
    text-transform:uppercase; color:#0c0f18; mix-blend-mode:screen; opacity:0}
  .tile.open .cap{opacity:0; transform:rotateX(82deg) translateZ(8px); pointer-events:none}
  .tile.hint .cap{animation:pulse 1.1s ease infinite}
  @keyframes pulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.07)}}
  .tile:active .cap{transform:scale(.94)}
  .ring{position:absolute; inset:0; border-radius:9px; margin:2.2%; pointer-events:none; opacity:0;
    box-shadow:0 0 0 2px var(--gold), 0 0 18px 2px var(--gold); }
  .tile.subject .ring.show{opacity:1; animation:ringpop .6s ease}
  @keyframes ringpop{0%{transform:scale(.6); opacity:0} 60%{transform:scale(1.12); opacity:1} 100%{transform:scale(1); opacity:1}}

  .guessbar{display:flex; gap:8px}
  .guessbar select{flex:1; appearance:none; -webkit-appearance:none; background:var(--bg2);
    color:var(--ink); border:1px solid var(--line); border-radius:12px; padding:13px 14px; font-size:15px; font-weight:600;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 18px) 19px,calc(100% - 13px) 19px; background-size:5px 5px,5px 5px; background-repeat:no-repeat}
  .btn{border:none; border-radius:12px; padding:13px 18px; font-size:15px; font-weight:800; cursor:pointer;
    background:linear-gradient(180deg,var(--gold),#e9a92e); color:#1a1304; box-shadow:0 6px 16px -6px var(--gold); transition:transform .1s, filter .2s}
  .btn:active{transform:scale(.95)}
  .btn:disabled{filter:grayscale(.7) brightness(.7); cursor:default}
  .btn.ghost{background:var(--bg2); color:var(--ink); border:1px solid var(--line); box-shadow:none}

  .gallery{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; min-height:0}
  .gchip{width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
    background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:17px; position:relative}
  .gchip.got{background:linear-gradient(160deg,#1d2740,#141a2c); border-color:#2a3658}
  .gchip.got::after{content:'';position:absolute;right:-2px;bottom:-2px;width:9px;height:9px;border-radius:50%;
    background:var(--good); box-shadow:0 0 6px var(--good)}

  /* overlay */
  .ov{position:fixed; inset:0; background:#060810ee; backdrop-filter:blur(6px); display:flex;
    align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:20}
  .ov.show{opacity:1; pointer-events:auto}
  .card{width:100%; max-width:360px; background:linear-gradient(180deg,#161b29,#10131d);
    border:1px solid var(--line); border-radius:20px; padding:22px; text-align:center; transform:translateY(14px) scale(.97); transition:transform .35s cubic-bezier(.2,1.3,.4,1)}
  .ov.show .card{transform:none}
  .card h2{margin:0 0 4px; font-size:24px}
  .card .sub{color:var(--muted); font-size:14px; margin-bottom:14px}
  .card .score{font-size:46px; font-weight:900; color:var(--gold); line-height:1; margin:6px 0}
  .card .par{font-size:13px; color:var(--muted); margin-bottom:14px}
  .card .par .under{color:var(--good); font-weight:700}
  .card .par .over{color:var(--hot); font-weight:700}
  .emoji{font-size:17px; line-height:1.5; letter-spacing:1px; margin:10px 0 16px; word-break:break-all}
  .cardbtns{display:flex; gap:8px}
  .cardbtns .btn{flex:1; padding:14px 0}
  .toast{position:fixed; bottom:calc(20px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(20px);
    background:#1c2334; border:1px solid var(--line); color:var(--ink); padding:10px 16px; border-radius:30px; font-size:13px;
    opacity:0; transition:all .3s; z-index:30; pointer-events:none}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .fx{position:fixed; inset:0; pointer-events:none; z-index:25}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Ex<span class="pick">cavate</span></div>
    <div class="day"><b id="dayN">Day 1</b><br><span id="streak">streak 0 · par —</span></div>
  </header>
  <div class="how" id="how">Dig the <em>hottest</em> tile to uncover the buried photo.</div>

  <div class="stats">
    <div class="stat" id="budgetStat"><div class="v" id="budget">6</div><div class="l">Digs Left</div></div>
    <div class="stat"><div class="v" id="opened">0</div><div class="l">Opened</div></div>
    <div class="stat"><div class="v" id="par">3</div><div class="l">Par</div></div>
  </div>

  <div class="boardwrap">
    <canvas id="photo"></canvas>
    <div id="grid"></div>
  </div>

  <div class="guessbar">
    <select id="guess"></select>
    <button class="btn" id="guessBtn">Name it</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<div class="ov" id="ov"><div class="card">
  <h2 id="ovTitle">Excavated!</h2>
  <div class="sub" id="ovSub"></div>
  <div class="score" id="ovScore">0</div>
  <div class="par" id="ovPar"></div>
  <div class="emoji" id="ovEmoji"></div>
  <div class="cardbtns">
    <button class="btn ghost" id="shareBtn">Share</button>
    <button class="btn" id="nextBtn">Next Day</button>
  </div>
</div></div>

<canvas class="fx" id="fx"></canvas>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
const N = 6;                         // grid is N x N
const TILES = N*N;
const $ = id => document.getElementById(id);

// ---------- deterministic RNG ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function dateSeed(off){const d=new Date();d.setDate(d.getDate()+off);return (d.getFullYear()*373+ (d.getMonth()+1)*31 + d.getDate())>>>0;}

// ---------- subject bank: procedural "photos" ----------
// each = name, emoji, palette, and a draw() that paints a salient subject on ctx
const BANK = [
  {name:"Cat", emoji:"🐱", sky:["#2a2438","#46324f"], draw:catDraw},
  {name:"Sailboat", emoji:"⛵", sky:["#13314f","#2e6fa0"], draw:boatDraw},
  {name:"Hot-air Balloon", emoji:"🎈", sky:["#1c2b4a","#4a6dbb"], draw:balloonDraw},
  {name:"Lighthouse", emoji:"🗼", sky:["#102032","#274a6b"], draw:lighthouseDraw},
  {name:"Mushroom", emoji:"🍄", sky:["#15301f","#2c5a3a"], draw:mushroomDraw},
  {name:"Rocket", emoji:"🚀", sky:["#0c1430","#23306a"], draw:rocketDraw},
  {name:"Flower", emoji:"🌻", sky:["#243016","#4a6620"], draw:flowerDraw},
  {name:"Owl", emoji:"🦉", sky:["#1f1a2e","#3a2f50"], draw:owlDraw},
  {name:"Fish", emoji:"🐠", sky:["#08263a","#136086"], draw:fishDraw},
  {name:"Cactus", emoji:"🌵", sky:["#3a2a14","#6b4e22"], draw:cactusDraw},
  {name:"Whale", emoji:"🐳", sky:["#0a2438","#155277"], draw:whaleDraw},
  {name:"Strawberry", emoji:"🍓", sky:["#2a1622","#4f2a3a"], draw:strawberryDraw},
];

// distractors so guessing matters
const DISTRACT=["Dog","Tree","House","Car","Star","Moon","Apple","Bird","Crab","Tent","Bell","Kite","Snail","Acorn","Pear","Frog"];

// ---------- per-day puzzle ----------
let day, seed, rng, subject, subjPx, budget, opened, openedSet, parDigs, guessed, won, finished;
let cx, gridCells=[], hintLevel=[], saliency=[], subjectTile=0;

function buildDay(off){
  day = off+1;
  seed = dateSeed(off);
  rng = mulberry32(seed);
  subject = BANK[Math.floor(rng()*BANK.length)];
  // subject focal point in tile coords. day1 near center+easy, later days farther.
  const spread = Math.min(0.18 + off*0.04, 0.42);
  const cxN = 0.5 + (rng()*2-1)*spread;
  const cyN = 0.5 + (rng()*2-1)*spread;
  subjPx = {x:cxN, y:cyN};

  // compute saliency = distance from each tile center to subject focal (lower=hotter)
  saliency=[]; let maxD=0;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const tx=(c+0.5)/N, ty=(r+0.5)/N;
    const d=Math.hypot(tx-cxN,ty-cyN);
    saliency.push(d); maxD=Math.max(maxD,d);
  }
  // hint level 0(cold)..4(hottest) per tile, normalised
  hintLevel = saliency.map(d=>{
    const t=1-d/maxD;                  // 1 at subject, 0 farthest
    return Math.max(0,Math.min(4, Math.round(t*4 + (t>0.93?1:0))));
  });
  // single canonical "subject tile" = the hottest (min-saliency) cell.
  // used for both the day-1 pulse hint and the end-of-game gold ring so they always agree.
  subjectTile=0; for(let i=0;i<TILES;i++){ if(saliency[i]<saliency[subjectTile]) subjectTile=i; }
  // par = how many digs an expert needs: tiles within hottest band to confirm subject
  const hot = hintLevel.filter(h=>h>=4).length;
  parDigs = Math.max(2, Math.min(4, 2 + Math.round((off>0? (off>3?2:1):0) + (hot>3?1:0))));
  budget = parDigs + 3;                 // generous-but-scarce budget

  opened=0; openedSet=new Set(); guessed=false; won=false; finished=false;

  renderPhoto();
  buildGrid();
  // freebie onboarding on day 1: pre-open a warm neighbour so a photo patch shows,
  // then pulse the hottest (subject) tile as the screaming-obvious next dig.
  if(off===0){
    const si=subjectTile;
    // pick a 4-neighbour of the subject to pre-open (a warm patch, not the subject itself)
    const sr=Math.floor(si/N), sc2=si%N; let ni=-1;
    for(const[dr,dc]of[[0,1],[1,0],[0,-1],[-1,0]]){
      const nr=sr+dr,nc=sc2+dc; if(nr<0||nc<0||nr>=N||nc>=N)continue;
      ni=nr*N+nc; break;
    }
    if(ni<0) ni=si;            // fallback: subject is in a corner with no in-bounds neighbour
    digTile(ni,true);          // reveals a patch (free, no budget spent)
    gridCells[si].classList.add("hint");   // pulse the actual hottest tile
  }
  refreshHud();
  buildGuessOptions();
}

// ---------- photo rendering ----------
function renderPhoto(){
  const cv=$("photo"); const dpr=Math.min(2,window.devicePixelRatio||1);
  const sz=cv.clientWidth||440; cv.width=sz*dpr; cv.height=sz*dpr;
  cx=cv.getContext("2d"); cx.setTransform(dpr,0,0,dpr,0,0); cx._sz=sz;
  // background gradient
  const g=cx.createLinearGradient(0,0,0,sz);
  g.addColorStop(0,subject.sky[0]); g.addColorStop(1,subject.sky[1]);
  cx.fillStyle=g; cx.fillRect(0,0,sz,sz);
  // soft vignette + grain dots for "photo" texture
  const vr=cx.createRadialGradient(sz*subjPx.x,sz*subjPx.y,sz*0.05,sz*0.5,sz*0.5,sz*0.75);
  vr.addColorStop(0,"#ffffff14"); vr.addColorStop(1,"#00000055");
  cx.fillStyle=vr; cx.fillRect(0,0,sz,sz);
  const gr=mulberry32(seed^0x9e37);
  for(let i=0;i<120;i++){cx.fillStyle="rgba(255,255,255,"+(gr()*0.04)+")";cx.beginPath();cx.arc(gr()*sz,gr()*sz,gr()*1.5,0,7);cx.fill();}
  // subject drawn at focal point
  cx.save(); cx.translate(sz*subjPx.x, sz*subjPx.y); const s=sz*0.34; subject.draw(cx,s,gr); cx.restore();
}

// ---------- grid ----------
function buildGrid(){
  const grid=$("grid"); grid.innerHTML="";
  grid.style.gridTemplate=`repeat(${N},1fr)/repeat(${N},1fr)`;
  gridCells=[];
  const cols=["var(--cold)","var(--cool)","var(--warm)","var(--hot)","var(--hot)"];
  for(let i=0;i<TILES;i++){
    const t=document.createElement("div"); t.className="tile"; t.dataset.i=i;
    const cap=document.createElement("div"); cap.className="cap";
    const dot=document.createElement("div"); dot.className="dot";
    const hl=hintLevel[i];
    dot.style.color=cols[hl];
    dot.style.background=cols[hl];
    cap.appendChild(dot);
    const ring=document.createElement("div"); ring.className="ring";
    t.appendChild(cap); t.appendChild(ring);
    t.addEventListener("click",()=>onTile(i));
    grid.appendChild(t); gridCells.push(t);
  }
}

function isSubjectTile(i){
  return i===subjectTile;
}

function onTile(i){
  if(finished) return;
  if(openedSet.has(i)) return;
  if(budget<=0){ toast("No digs left — name it!"); return; }
  digTile(i,false);
  // teach-by-playing: react to what they found
  if(hintLevel[i]>=4 && !won) hint("Hot patch — you're on the subject. <em>Name it</em> for a big score.");
  else if(hintLevel[i]<=1) hint("Cold quadrant ruled out. The subject is elsewhere — follow the warmth.");
  refreshHud();
}

function digTile(i,freebie){
  if(openedSet.has(i)) return;
  openedSet.add(i); if(!freebie){opened++; budget--;}
  const t=gridCells[i]; t.classList.add("open");
  // remove pulse hint markers
  if(!freebie) clearPulses();
  popAt(i, hintLevel[i]);
}
function clearPulses(){gridCells.forEach(t=>t.classList.remove("hint"));}

// ---------- HUD ----------
function refreshHud(){
  $("budget").textContent=budget;
  $("opened").textContent=opened;
  $("par").textContent=parDigs;
  $("dayN").textContent="Day "+day;
  const st=load();
  $("streak").textContent="streak "+st.streak+" · par "+parDigs;
  $("budgetStat").classList.toggle("lowbudget",budget<=1);
  $("guessBtn").disabled=finished;
}

function buildGuessOptions(){
  const sel=$("guess"); sel.innerHTML="";
  const opts=new Set([subject.name]);
  const dr=mulberry32(seed^0x55);
  const pool=[...DISTRACT, ...BANK.map(b=>b.name).filter(n=>n!==subject.name)];
  while(opts.size<6){ opts.add(pool[Math.floor(dr()*pool.length)]); }
  const arr=[...opts]; for(let i=arr.length-1;i>0;i--){const j=Math.floor(dr()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  const ph=document.createElement("option"); ph.value=""; ph.textContent="What is it?"; sel.appendChild(ph);
  arr.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;sel.appendChild(o);});
}

// ---------- scoring / win ----------
function score(){
  // reward fewer digs heavily; base 1000, minus 120 per dig over... but floor it
  const base=1000;
  const digPenalty=opened*110;
  const parBonus = opened<=parDigs ? (parDigs-opened)*150+250 : 0;
  return Math.max(50, base - digPenalty + parBonus);
}

function doGuess(){
  if(finished) return;
  const v=$("guess").value;
  if(!v){ toast("Pick a name from the list."); return; }
  if(v===subject.name){
    won=true; finishGame(true);
  }else{
    toast("Not "+v+". Keep reading the gradient.");
    flash($("opened"));
    // wrong guess costs a dig of "credibility"
    budget=Math.max(0,budget-1); refreshHud();
    if(budget<=0){ finishGame(false); }
  }
}

function finishGame(win){
  finished=true; won=win;
  bloomReveal();
  // mark subject tile
  for(let i=0;i<TILES;i++){ if(isSubjectTile(i)){ gridCells[i].classList.add("subject"); const r=gridCells[i].querySelector(".ring"); r.classList.add("show"); } }
  const sc = win?score():0;
  // persist
  const st=load();
  if(!st.days[day]){
    st.days[day]={solved:win,digs:opened,score:sc};
    if(win){
      st.gallery=st.gallery||{}; st.gallery[subject.name]=subject.emoji;
      // streak counts consecutive days solved at-or-under par; an over-par win holds the streak
      if(opened<=parDigs){ st.streak=(st.streak||0)+1; }
    } else { st.streak=0; }
    st.lastScore=sc;
    save(st);
  }
  buildGallery();
  setTimeout(()=>showOverlay(win,sc),650);
  confetti(win);
}

function showOverlay(win,sc){
  $("ovTitle").textContent = win? "Excavated!" : "Out of digs";
  $("ovSub").textContent = win? "It was a "+subject.name+" "+subject.emoji : "It was a "+subject.name+" "+subject.emoji+" — better luck tomorrow";
  $("ovScore").textContent = sc;
  const par=$("ovPar");
  if(win){
    if(opened<=parDigs) par.innerHTML=`Solved in <b>${opened}</b> digs · <span class="under">${parDigs-opened===0?'on par':(parDigs-opened)+' under par'}</span>`;
    else par.innerHTML=`Solved in <b>${opened}</b> digs · <span class="over">${opened-parDigs} over par</span>`;
  } else par.innerHTML="";
  $("ovEmoji").textContent = shareGrid(false);
  $("ov").classList.add("show");
}

// ---------- share grid ----------
function shareGrid(forClipboard){
  // spoiler-safe: open vs closed, no subject reveal
  let rows=[];
  for(let r=0;r<N;r++){ let s=""; for(let c=0;c<N;c++){ const i=r*N+c; s+= openedSet.has(i)?"🟫":"⬛"; } rows.push(s); }
  const grid=rows.join("\n");
  if(!forClipboard) return grid;
  const tag=won?(opened<=parDigs?"⛏️ under par":"⛏️"):"💤";
  return `Excavate · Day ${day}\n${won?"Solved in "+opened+" digs":"Missed"} ${tag}\n${grid}\nexcavate.game`;
}

function share(){
  const txt=shareGrid(true);
  if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast("Result copied!"),()=>toast(txt)); }
  else toast("Copied!");
}

// ---------- gallery ----------
function buildGallery(){
  const g=$("gallery"); g.innerHTML=""; const st=load(); st.gallery=st.gallery||{};
  BANK.forEach(b=>{
    const c=document.createElement("div"); c.className="gchip";
    if(st.gallery[b.name]){ c.classList.add("got"); c.textContent=b.emoji; }
    else c.textContent="·";
    g.appendChild(c);
  });
}

// ---------- juice: pops, bloom, confetti ----------
function popAt(i,level){
  const t=gridCells[i]; const rect=t.getBoundingClientRect();
  const cxp=rect.left+rect.width/2, cyp=rect.top+rect.height/2;
  const cols=["#5d6b9e","#3d9bff","#ff9e3d","#ff5a4d","#ff5a4d"];
  spawnParticles(cxp,cyp,8+level*2,cols[level]);
}
function bloomReveal(){
  const cv=$("photo"); cv.animate([{filter:"saturate(.6) brightness(.85)"},{filter:"saturate(1.25) brightness(1.12)"},{filter:"saturate(1) brightness(1)"}],{duration:900,easing:"ease"});
  // open all tiles
  for(let i=0;i<TILES;i++){ setTimeout(()=>gridCells[i].classList.add("open"), (Math.floor(i/N)+i%N)*25); }
}

const fx=$("fx"); let fctx, parts=[];
function fxResize(){fx.width=innerWidth*devicePixelRatio;fx.height=innerHeight*devicePixelRatio;fctx=fx.getContext("2d");fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
window.addEventListener("resize",()=>{fxResize();});
function spawnParticles(x,y,n,col){ for(let i=0;i<n;i++){const a=Math.random()*7,sp=1+Math.random()*4;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,col,r:2+Math.random()*3});} if(!raf)raf=requestAnimationFrame(tick);}
function confetti(win){ const cx2=innerWidth/2,cy2=innerHeight*0.4; const cols=win?["#ffce5c","#3ddc97","#3d9bff","#ff9e3d"]:["#5d6b9e","#8b93ad"]; for(let i=0;i<(win?70:24);i++){const a=Math.random()*7,sp=2+Math.random()*7;parts.push({x:cx2,y:cy2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1.4,col:cols[i%cols.length],r:3+Math.random()*4,g:0.15});} if(!raf)raf=requestAnimationFrame(tick);}
let raf=0;
function tick(){ fctx.clearRect(0,0,innerWidth,innerHeight); let alive=false;
  for(const p of parts){ if(p.life<=0)continue; alive=true; p.vy+=(p.g||0.18); p.x+=p.vx; p.y+=p.vy; p.life-=0.02;
    fctx.globalAlpha=Math.max(0,p.life); fctx.fillStyle=p.col; fctx.beginPath(); fctx.arc(p.x,p.y,p.r,0,7); fctx.fill(); }
  fctx.globalAlpha=1; parts=parts.filter(p=>p.life>0);
  if(alive) raf=requestAnimationFrame(tick); else raf=0;
}

// ---------- helpers ----------
let hintTimer;
function hint(html){ $("how").innerHTML=html; }
function flash(el){ el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),400); }
let toastTimer;
function toast(msg){ const t=$("toast"); t.innerHTML=msg.replace(/<[^>]+>/g,''); t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1700); }

// ---------- persistence ----------
const KEY="excavate_v1";
function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||fresh(); }catch(e){ return fresh(); } }
function fresh(){ return {streak:0,days:{},gallery:{},lastScore:0}; }
function save(s){ try{ localStorage.setItem(KEY,JSON.stringify(s)); }catch(e){} }

// ---------- subject draw functions (procedural art) ----------
function blob(cx,fill,pts){cx.fillStyle=fill;cx.beginPath();cx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)cx.lineTo(pts[i][0],pts[i][1]);cx.closePath();cx.fill();}
function circle(cx,x,y,r,fill){cx.fillStyle=fill;cx.beginPath();cx.arc(x,y,r,0,7);cx.fill();}
function eye(cx,x,r){circle(cx,x,0,r,"#fff");circle(cx,x,0,r*0.55,"#111");circle(cx,x-r*0.2,-r*0.2,r*0.18,"#fff");}

function catDraw(cx,s){ cx.fillStyle="#5a4636";
  // ears
  blob(cx,"#5a4636",[[-s*.55,-s*.55],[-s*.3,-s*.05],[-s*.75,-s*.1]]);
  blob(cx,"#5a4636",[[s*.55,-s*.55],[s*.3,-s*.05],[s*.75,-s*.1]]);
  circle(cx,0,0,s*.6,"#6b5340"); circle(cx,0,s*.05,s*.55,"#7a6049");
  eye(cx,-s*.22,s*.13); eye(cx,s*.22,s*.13);
  blob(cx,"#e58a8a",[[0,s*.22],[-s*.08,s*.3],[s*.08,s*.3]]);
  cx.strokeStyle="#caa";cx.lineWidth=s*.03;cx.beginPath();
  for(const d of[-1,1]){cx.moveTo(d*s*.1,s*.28);cx.lineTo(d*s*.5,s*.2);cx.moveTo(d*s*.1,s*.32);cx.lineTo(d*s*.52,s*.32);}cx.stroke();
}
function boatDraw(cx,s){ blob(cx,"#fff",[[0,-s*.7],[0,s*.1],[s*.55,s*.1]]);
  blob(cx,"#e74c3c",[[ -s*.1,-s*.6],[-s*.1,s*.05],[-s*.6,s*.05]]);
  cx.fillStyle="#6b4a2a";cx.fillRect(-s*.02,-s*.7,s*.05,s*.85);
  blob(cx,"#3a2a1a",[[-s*.7,s*.1],[s*.7,s*.1],[s*.5,s*.4],[-s*.5,s*.4]]);
}
function balloonDraw(cx,s){ const g=cx.createRadialGradient(-s*.2,-s*.3,s*.1,0,0,s*.7);g.addColorStop(0,"#ffd36b");g.addColorStop(1,"#e8743b");
  cx.fillStyle=g;cx.beginPath();cx.ellipse(0,-s*.1,s*.55,s*.7,0,0,7);cx.fill();
  cx.strokeStyle="#c85a2a";cx.lineWidth=s*.04;for(const d of[-.45,0,.45]){cx.beginPath();cx.moveTo(d*s*.7,-s*.1);cx.lineTo(d*s,-s*.1);cx.stroke();}
  cx.strokeStyle="#caa";cx.lineWidth=s*.02;cx.beginPath();cx.moveTo(-s*.2,s*.55);cx.lineTo(-s*.3,s*.85);cx.moveTo(s*.2,s*.55);cx.lineTo(s*.3,s*.85);cx.stroke();
  cx.fillStyle="#6b4a2a";cx.fillRect(-s*.18,s*.55,s*.36,s*.3);
}
function lighthouseDraw(cx,s){ blob(cx,"#eee",[[-s*.25,s*.7],[s*.25,s*.7],[s*.15,-s*.5],[-s*.15,-s*.5]]);
  cx.fillStyle="#e74c3c";cx.fillRect(-s*.2,-s*.2,s*.4,s*.18);cx.fillRect(-s*.18,s*.2,s*.36,s*.16);
  circle(cx,0,-s*.5,s*.18,"#ffec99");cx.fillStyle="#444";cx.fillRect(-s*.22,-s*.6,s*.44,s*.1);
}
function mushroomDraw(cx,s){ cx.fillStyle="#e9d8b8";cx.beginPath();cx.ellipse(0,s*.3,s*.28,s*.45,0,0,7);cx.fill();
  cx.fillStyle="#d23b3b";cx.beginPath();cx.arc(0,0,s*.6,Math.PI,0);cx.fill();
  for(const[x,y,r]of[[-.3,-.2,.1],[.2,-.3,.08],[.35,-.1,.07],[-.05,-.4,.06]])circle(cx,x*s,y*s,r*s,"#fff");
}
function rocketDraw(cx,s){ blob(cx,"#eee",[[0,-s*.7],[s*.22,-s*.1],[s*.22,s*.4],[-s*.22,s*.4],[-s*.22,-s*.1]]);
  circle(cx,0,-s*.1,s*.12,"#5bc0ff");blob(cx,"#e74c3c",[[s*.22,s*.1],[s*.45,s*.45],[s*.22,s*.4]]);
  blob(cx,"#e74c3c",[[-s*.22,s*.1],[-s*.45,s*.45],[-s*.22,s*.4]]);
  blob(cx,"#ff9e3d",[[-s*.12,s*.4],[s*.12,s*.4],[0,s*.7]]);
}
function flowerDraw(cx,s){ for(let i=0;i<8;i++){const a=i/8*7;circle(cx,Math.cos(a)*s*.4,Math.sin(a)*s*.4,s*.2,"#ffd23b");}
  circle(cx,0,0,s*.26,"#7a4a1a");cx.fillStyle="#3a8a2a";cx.fillRect(-s*.05,s*.4,s*.1,s*.5);
}
function owlDraw(cx,s){ circle(cx,0,0,s*.55,"#7a5a3a");circle(cx,0,s*.05,s*.5,"#9a7a52");
  circle(cx,-s*.2,-s*.05,s*.2,"#fff");circle(cx,s*.2,-s*.05,s*.2,"#fff");
  circle(cx,-s*.2,-s*.05,s*.1,"#222");circle(cx,s*.2,-s*.05,s*.1,"#222");
  blob(cx,"#ff9e3d",[[0,s*.05],[-s*.06,s*.16],[s*.06,s*.16]]);
  blob(cx,"#7a5a3a",[[-s*.5,-s*.5],[-s*.2,-s*.15],[-s*.55,-s*.1]]);
  blob(cx,"#7a5a3a",[[s*.5,-s*.5],[s*.2,-s*.15],[s*.55,-s*.1]]);
}
function fishDraw(cx,s){ const g=cx.createLinearGradient(-s,0,s,0);g.addColorStop(0,"#ff9e3d");g.addColorStop(1,"#ffd23b");
  cx.fillStyle=g;cx.beginPath();cx.ellipse(0,0,s*.5,s*.32,0,0,7);cx.fill();
  blob(cx,"#e8743b",[[s*.4,0],[s*.7,-s*.25],[s*.7,s*.25]]);
  cx.fillStyle="#fff";circle(cx,-s*.25,-s*.05,s*.09,"#fff");circle(cx,-s*.25,-s*.05,s*.045,"#111");
  cx.strokeStyle="#e8743b";cx.lineWidth=s*.04;for(const x of[-.05,.1,.25]){cx.beginPath();cx.moveTo(x*s,-s*.25);cx.lineTo(x*s,s*.25);cx.stroke();}
}
function cactusDraw(cx,s){ cx.fillStyle="#3a8a4a";roundRect(cx,-s*.15,-s*.5,s*.3,s*1,s*.15);
  roundRect(cx,-s*.5,-s*.1,s*.35,s*.2,s*.1);roundRect(cx,-s*.5,-s*.3,s*.2,s*.25,s*.1);
  roundRect(cx,s*.15,0,s*.35,s*.2,s*.1);roundRect(cx,s*.3,-s*.25,s*.2,s*.25,s*.1);
  for(const[x,y]of[[-.3,.1],[.3,.05],[0,-.2],[0,.3]]){circle(cx,x*s,y*s,s*.06,"#ffd23b");}
}
function whaleDraw(cx,s){ cx.fillStyle="#5b9bd5";cx.beginPath();cx.ellipse(0,0,s*.55,s*.35,0,0,7);cx.fill();
  blob(cx,"#5b9bd5",[[-s*.45,0],[-s*.75,-s*.25],[-s*.75,s*.25]]);
  cx.fillStyle="#cfe6ff";cx.beginPath();cx.ellipse(s*.05,s*.12,s*.4,s*.18,0,0,7);cx.fill();
  circle(cx,s*.3,-s*.08,s*.06,"#111");
  cx.strokeStyle="#cfe6ff";cx.lineWidth=s*.05;cx.beginPath();cx.moveTo(s*.2,-s*.3);cx.quadraticCurveTo(s*.3,-s*.6,s*.4,-s*.45);cx.stroke();
}
function strawberryDraw(cx,s){ blob(cx,"#e23b4b",[[0,s*.6],[s*.45,-s*.1],[s*.2,-s*.4],[-s*.2,-s*.4],[-s*.45,-s*.1]]);
  cx.fillStyle="#3a8a3a";for(let i=-1;i<=1;i++){blob(cx,"#3a8a3a",[[i*s*.18,-s*.4],[i*s*.18-s*.1,-s*.55],[i*s*.18+s*.1,-s*.55]]);}
  cx.fillStyle="#ffe17a";for(let i=0;i<10;i++){circle(cx,(i%3-1)*s*.22+( (i*37)%5-2)*s*.04,(Math.floor(i/3)-1)*s*.22+s*.05,s*.035,"#ffe17a");}
}
function roundRect(cx,x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);cx.arcTo(x+w,y+h,x,y+h,r);cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath();cx.fill();}

// ---------- overlay buttons ----------
let viewOffset=0;
$("guessBtn").addEventListener("click",doGuess);
$("shareBtn").addEventListener("click",share);
$("nextBtn").addEventListener("click",()=>{
  $("ov").classList.remove("show");
  viewOffset++;
  setTimeout(()=>{ buildDay(viewOffset); buildGallery(); },300);
});

// ---------- boot ----------
function boot(){
  fxResize();
  // figure out which day the player is on (today + any already-played future from this session start at 0)
  buildDay(0);
  buildGallery();
}
window.addEventListener("load",boot);
// re-render photo crisp on resize
let rt; window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(()=>{ if(cx) renderPhoto(); },200);});
})();
