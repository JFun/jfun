<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mosaic — daily stained glass</title>
<style>
  :root{
    --bg:#0a0c14; --bg2:#11141f; --ink:#e9ecf5; --dim:#8b91a8;
    --gold:#e7c073; --lead:#1d2233; --leadhi:#39415e;
    --glow:#ffe8a8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:
      radial-gradient(140% 90% at 50% -10%, #1a1f33 0%, var(--bg) 55%, #05060c 100%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow-x:hidden; user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  .wrap{width:100%; max-width:520px; padding:14px 14px 28px; display:flex; flex-direction:column; gap:12px;}
  header{display:flex; align-items:flex-end; justify-content:space-between; gap:8px;}
  .ttl{font-weight:800; font-size:26px; letter-spacing:.5px;
    background:linear-gradient(180deg,#fff,#cda75c); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .sub{font-size:11.5px; color:var(--dim); margin-top:2px; letter-spacing:.3px;}
  .meta{text-align:right; font-size:12px; color:var(--dim); line-height:1.5;}
  .meta b{color:var(--gold); font-weight:700;}
  .howto{font-size:12px; color:var(--dim); text-align:center; letter-spacing:.2px; min-height:16px;}
  .howto b{color:var(--ink); font-weight:600;}

  .stage{position:relative; width:100%; display:flex; flex-direction:column; gap:14px; align-items:center;}
  canvas{display:block; touch-action:none;}
  #board{
    border-radius:14px;
    box-shadow:0 12px 40px -12px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.04);
    background:#06070d;
  }
  .tray-wrap{width:100%;}
  .tray-lbl{font-size:10.5px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase; margin:0 0 6px 2px;}
  #tray{
    border-radius:12px;
    background:linear-gradient(180deg,#0e111c,#0a0c14);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), inset 0 8px 24px -16px rgba(0,0,0,.9);
  }

  .bar{display:flex; gap:8px; width:100%;}
  button{
    flex:1; appearance:none; border:0; cursor:pointer; font:inherit; font-weight:700;
    padding:12px 10px; border-radius:12px; color:var(--ink); font-size:13.5px; letter-spacing:.3px;
    background:linear-gradient(180deg,#1c2236,#141828);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), 0 6px 16px -10px #000;
    transition:transform .08s ease, filter .15s ease;
  }
  button:active{transform:translateY(1px) scale(.985);}
  button.primary{background:linear-gradient(180deg,#e9c477,#b98b39); color:#1a1306;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25), 0 8px 20px -10px rgba(220,170,80,.6);}
  button:disabled{opacity:.4; cursor:default;}

  .toast{position:fixed; left:50%; top:14px; transform:translateX(-50%) translateY(-20px);
    background:rgba(20,24,38,.96); color:var(--ink); padding:9px 16px; border-radius:30px;
    font-size:13px; font-weight:600; box-shadow:0 8px 30px -8px #000, inset 0 0 0 1px rgba(255,255,255,.07);
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:50;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .collect{width:100%;}
  .collect h3{font-size:10.5px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase; margin:4px 0 8px 2px; font-weight:700;}
  .wall{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .pane{aspect-ratio:1/1.5; border-radius:5px 5px 2px 2px; background:#10131e;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05); position:relative; overflow:hidden;}
  .pane canvas{position:absolute; inset:0; width:100%; height:100%; border-radius:inherit;}
  .pane.empty::after{content:""; position:absolute; inset:0; background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.015) 0 4px, transparent 4px 8px);}
  .pane.today{box-shadow:inset 0 0 0 1.5px var(--gold), 0 0 14px -2px rgba(231,192,115,.4);}

  /* Win overlay */
  .ov{position:fixed; inset:0; background:rgba(5,6,12,.72); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .ov.show{display:flex;}
  .card{width:100%; max-width:360px; background:linear-gradient(180deg,#141828,#0c0f1a);
    border-radius:20px; padding:22px; text-align:center;
    box-shadow:0 30px 80px -20px #000, inset 0 0 0 1px rgba(255,255,255,.07);}
  .card h2{margin:2px 0 2px; font-size:22px; background:linear-gradient(180deg,#fff,#cda75c);
    -webkit-background-clip:text; background-clip:text; color:transparent;}
  .card .res{font-size:13px; color:var(--dim); margin:0 0 14px;}
  .card .res b{color:var(--gold);}
  #winPanel{border-radius:12px; box-shadow:0 14px 40px -10px rgba(231,192,115,.4); margin:0 auto 16px;}
  .grid-emoji{font-size:18px; letter-spacing:2px; line-height:1.3; margin:0 0 16px; font-family:"Segoe UI Emoji",system-ui;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="ttl">MOSAIC</div>
      <div class="sub">Pack the glass. Light the picture.</div>
    </div>
    <div class="meta">
      <div>Day <b id="dayN">—</b></div>
      <div>Streak <b id="streak">0</b> 🔥</div>
    </div>
  </header>

  <div class="howto" id="howto">Drag a shard into the frame. <b>Tap it to rotate.</b></div>

  <div class="stage">
    <canvas id="board"></canvas>
    <div class="tray-wrap">
      <div class="tray-lbl">Shards · <span id="left">0</span> left</div>
      <canvas id="tray"></canvas>
    </div>
    <div class="bar">
      <button id="undo">↶ Undo</button>
      <button id="reset">Reset</button>
      <button id="hint">Hint</button>
    </div>
  </div>

  <div class="collect">
    <h3>Cathedral Wall — this week</h3>
    <div class="wall" id="wall"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="ov" id="ov">
  <div class="card">
    <h2 id="winTtl">Panel Complete</h2>
    <p class="res" id="winRes"></p>
    <canvas id="winPanel" width="180" height="270"></canvas>
    <div class="grid-emoji" id="winGrid"></div>
    <div class="bar">
      <button class="primary" id="share">Share result</button>
      <button id="close">Close</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   MOSAIC — daily stained-glass packing puzzle
   The solution IS the seeded cut, so every board is solvable.
   ============================================================ */

// ---------- deterministic RNG ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

// ---------- daily seed ----------
const EPOCH = Date.UTC(2024,0,1);
const now = new Date();
const todayUTC = Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate());
const DAY_NUM = Math.floor((todayUTC-EPOCH)/86400000);
const DOW = ((DAY_NUM%7)+7)%7;              // 0..6 (deterministic "day of week")
const SEED = hashStr("mosaic-"+DAY_NUM);

// difficulty ramp: more & thinner shards across the week
// grid size + target shard count
const RAMP = [
  {g:5, n:4 },  // Mon-ish
  {g:5, n:5 },
  {g:6, n:6 },
  {g:6, n:7 },
  {g:7, n:8 },
  {g:7, n:10},
  {g:8, n:12},  // hardest
];
const CFG = RAMP[DOW];
const GW = CFG.g, GH = CFG.g, TARGET = CFG.n;

// ---------- palettes (procedural stained-glass) ----------
const PALETTES = [
  ["#e5564e","#f2a341","#ffd86b","#4fb286","#3b86c9","#7a5cc4","#d76aa8"],
  ["#ff6b6b","#ffa94d","#ffd43b","#69db7c","#4dabf7","#9775fa","#f783ac"],
  ["#c0392b","#d68910","#27ae60","#2980b9","#8e44ad","#16a085","#e67e22"],
];

// ============================================================
//  BUILD THE PUZZLE: seeded connected partition of the grid
// ============================================================
function buildPuzzle(seed){
  const rng = mulberry32(seed);
  const cells = GW*GH;
  const owner = new Int16Array(cells).fill(-1);
  const N = TARGET;
  // seed N random start cells
  const starts=[];
  const all=[...Array(cells).keys()];
  for(let i=all.length-1;i>0;i--){const j=(rng()*(i+1))|0;[all[i],all[j]]=[all[j],all[i]];}
  for(let i=0;i<N;i++){starts.push(all[i]); owner[all[i]]=i;}
  // multi-source frontier growth → connected, roughly balanced regions
  let frontier = starts.map((c,i)=>({c,i}));
  let remaining = cells - N;
  while(remaining>0 && frontier.length){
    // pick a random frontier cell, grow into a random empty neighbor
    const fi=(rng()*frontier.length)|0;
    const {c,i}=frontier[fi];
    const nbrs=neighbors(c).filter(n=>owner[n]===-1);
    if(nbrs.length===0){frontier.splice(fi,1); continue;}
    const nb=nbrs[(rng()*nbrs.length)|0];
    owner[nb]=i; remaining--;
    frontier.push({c:nb,i});
  }
  // any stragglers (rare): attach to a neighbor's region
  for(let c=0;c<cells;c++){
    if(owner[c]===-1){
      const nb=neighbors(c).find(n=>owner[n]>=0);
      owner[c]= nb!==undefined? owner[nb] : 0;
    }
  }
  // collect per-region cells, normalize to local coords + record solution anchor
  const regions=[];
  for(let i=0;i<N;i++) regions.push([]);
  for(let c=0;c<cells;c++) regions[owner[c]].push([c%GW, (c/GW)|0]);

  const pal = PALETTES[seed % PALETTES.length];
  const shards = regions.map((rc,idx)=>{
    let minx=99,miny=99,maxx=-9,maxy=-9;
    for(const[x,y]of rc){minx=Math.min(minx,x);miny=Math.min(miny,y);maxx=Math.max(maxx,x);maxy=Math.max(maxy,y);}
    const local = rc.map(([x,y])=>[x-minx,y-miny]);
    return {
      id:idx,
      colour:pal[idx%pal.length],
      solCells: rc.map(([x,y])=>[x,y]),     // absolute solution cells
      solAnchor:[minx,miny],                // top-left of solution bbox
      base:local,                           // rotation-0 local cells
      size:rc.length,
    };
  });
  // make sure no degenerate puzzle
  return {shards, owner};
}
function neighbors(c){
  const x=c%GW, y=(c/GW)|0, out=[];
  if(x>0)out.push(c-1); if(x<GW-1)out.push(c+1);
  if(y>0)out.push(c-GW); if(y<GH-1)out.push(c+GW);
  return out;
}

// rotate a local cell set by 90°*k, re-normalize to (0,0)
function rotateCells(cells,k){
  let r=cells.map(([x,y])=>[x,y]);
  for(let t=0;t<((k%4)+4)%4;t++) r=r.map(([x,y])=>[-y,x]);
  let minx=99,miny=99;
  for(const[x,y]of r){minx=Math.min(minx,x);miny=Math.min(miny,y);}
  return r.map(([x,y])=>[x-minx,y-miny]);
}
function cellsBBox(cells){
  let maxx=0,maxy=0; for(const[x,y]of cells){maxx=Math.max(maxx,x);maxy=Math.max(maxy,y);}
  return [maxx+1,maxy+1];
}

// ============================================================
//  STATE
// ============================================================
const PUZ = buildPuzzle(SEED);
// pieces: each shard scattered to tray, with a rotation that is NOT the solution (juicy)
const rngScatter = mulberry32(SEED^0x9e37);
let pieces = PUZ.shards.map(s=>{
  let rot=(rngScatter()*4)|0;
  // avoid handing the player the answer rotation on the first/only obvious piece (Mon keep one easy)
  return {
    ...s,
    rot,
    cells: rotateCells(s.base,rot),
    placed:false,
    placedAt:null,   // [gx,gy] of top-left when placed
    light:0,         // 0..1 lit animation
  };
});

// occupancy grid of placed cells → pieceId or -1
let occ = new Int16Array(GW*GH).fill(-1);
let history=[];      // stack of placed piece ids for undo
let solved=false;

// metrics persisted
const LS_KEY="mosaic_v1";
function loadSave(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return {};}}
function writeSave(o){try{localStorage.setItem(LS_KEY,JSON.stringify(o));}catch(e){}}
let save=loadSave();
let streak = save.streak||0;
let lastDay = save.lastDay;
let wallDone = save.wall||{};   // {dayNum:true}

// ============================================================
//  LAYOUT / SIZING
// ============================================================
const boardC=document.getElementById('board'), bx=boardC.getContext('2d');
const trayC=document.getElementById('tray'), tx=trayC.getContext('2d');
let CELL=0, PAD=0, BW=0, OX=0, OY=0;        // board geometry (device px)
let DPR=Math.min(devicePixelRatio||1,2.5);
let TRAYH=0, TRAYW=0;

function layout(){
  const wrapW = Math.min(520, window.innerWidth-28);
  // board square
  const boardCss = Math.min(wrapW, window.innerHeight*0.46);
  PAD = Math.round(boardCss*0.06);
  CELL = Math.floor((boardCss-PAD*2)/GW);
  BW = CELL*GW + PAD*2;
  boardC.style.width=BW+"px"; boardC.style.height=BW+"px";
  boardC.width=Math.round(BW*DPR); boardC.height=Math.round(BW*DPR);
  bx.setTransform(DPR,0,0,DPR,0,0);
  OX=PAD; OY=PAD;

  // tray
  TRAYW = wrapW;
  TRAYH = Math.round(CELL*2.6);
  trayC.style.width=TRAYW+"px"; trayC.style.height=TRAYH+"px";
  trayC.width=Math.round(TRAYW*DPR); trayC.height=Math.round(TRAYH*DPR);
  tx.setTransform(DPR,0,0,DPR,0,0);

  packTray();
  draw();
}

// place unplaced pieces left→right in the tray, recording hit rects
let traySlots=[];  // {id,x,y,scale,w,h}
function packTray(){
  traySlots=[];
  const unplaced=pieces.filter(p=>!p.placed && p.id!==dragId);
  const tcell=Math.max(10, CELL*0.62);
  let cx=12;
  const gap=14;
  for(const p of unplaced){
    const[bw,bh]=cellsBBox(p.cells);
    const w=bw*tcell, h=bh*tcell;
    traySlots.push({id:p.id, x:cx, y:(TRAYH-h)/2, scale:tcell, w, h});
    cx+=w+gap;
  }
  // if overflow, shrink uniformly
  const total=cx;
  if(total>TRAYW){
    const sc=(TRAYW-12)/total;
    let nx=12;
    for(let i=0;i<traySlots.length;i++){
      const s=traySlots[i];
      s.scale*=sc; s.w*=sc; s.h*=sc;
      s.x=nx; s.y=(TRAYH-s.h)/2;
      nx+=s.w+gap*sc;
    }
  }
}

// ============================================================
//  DRAWING
// ============================================================
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return `rgb(${r},${g},${b})`;
}

// draw one cell of glass at board px (gx*CELL etc), lit ∈0..1
function glassCell(ctx, px, py, sz, colour, lit, leadCol){
  // lead came border
  ctx.fillStyle=leadCol;
  ctx.fillRect(px,py,sz,sz);
  const inset=Math.max(1.5, sz*0.07);
  const gx=px+inset, gy=py+inset, gs=sz-inset*2;
  // base glass darkened when unlit, glowing when lit
  const base = lit;
  const grad=ctx.createLinearGradient(gx,gy,gx,gy+gs);
  const top = mixGlow(colour, base, 24);
  const bot = mixGlow(colour, base, -22);
  grad.addColorStop(0, top); grad.addColorStop(1, bot);
  ctx.fillStyle=grad;
  ctx.fillRect(gx,gy,gs,gs);
  // glossy highlight
  ctx.fillStyle=`rgba(255,255,255,${0.06+0.16*lit})`;
  ctx.beginPath();
  ctx.moveTo(gx,gy); ctx.lineTo(gx+gs*0.55,gy); ctx.lineTo(gx,gy+gs*0.55); ctx.closePath();
  ctx.fill();
  if(lit>0.01){
    ctx.save();
    ctx.globalAlpha=0.5*lit;
    ctx.fillStyle=mixGlow(colour,1,40);
    ctx.fillRect(gx,gy,gs,gs);
    ctx.restore();
  }
}
function mixGlow(hex,lit,delta){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  // unlit → toward dark slate; lit → full colour + brighten
  const k=0.22+0.78*lit;       // brightness factor
  r=r*k + 14*(1-lit); g=g*k + 16*(1-lit); b=b*k + 24*(1-lit);
  r+=delta*lit; g+=delta*lit; b+=delta*lit;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return `rgb(${r|0},${g|0},${b|0})`;
}

function draw(){
  bx.clearRect(0,0,BW,BW);
  // frame
  bx.fillStyle="#05060c";
  roundRect(bx,0,0,BW,BW,12); bx.fill();
  // lead frame border
  bx.strokeStyle="#2a3046"; bx.lineWidth=Math.max(2,PAD*0.4);
  roundRect(bx,PAD*0.4,PAD*0.4,BW-PAD*0.8,BW-PAD*0.8,8); bx.stroke();

  // empty cavity grid (subtle) + parity hint dots
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const px=OX+x*CELL, py=OY+y*CELL;
    if(occ[idx(x,y)]<0){
      bx.fillStyle="rgba(255,255,255,.025)";
      bx.fillRect(px+1,py+1,CELL-2,CELL-2);
      bx.strokeStyle="rgba(255,255,255,.05)"; bx.lineWidth=1;
      bx.strokeRect(px+.5,py+.5,CELL-1,CELL-1);
    }
  }

  // placed pieces
  for(const p of pieces){
    if(!p.placed) continue;
    const[ax,ay]=p.placedAt;
    for(const[cx,cy]of p.cells){
      const px=OX+(ax+cx)*CELL, py=OY+(ay+cy)*CELL;
      glassCell(bx,px,py,CELL,p.colour,p.light,"#161a28");
    }
  }

  // ghost preview while dragging over the board
  if(dragId!=null && ghost){
    const dp=pieces.find(p=>p.id===dragId);
    const ok=ghost.valid;
    for(const[cx,cy]of dp.cells){
      const px=OX+(ghost.gx+cx)*CELL, py=OY+(ghost.gy+cy)*CELL;
      bx.save();
      bx.globalAlpha=0.55;
      glassCell(bx,px,py,CELL,ok?dp.colour:"#444a5e",ok?0.85:0.2,"#161a28");
      bx.restore();
      bx.strokeStyle=ok?"rgba(255,232,168,.9)":"rgba(255,90,90,.9)";
      bx.lineWidth=2;
      bx.strokeRect(px+1,py+1,CELL-2,CELL-2);
    }
  }

  drawTray();
  drawFloating();
}

function drawTray(){
  tx.clearRect(0,0,TRAYW,TRAYH);
  for(let si=0;si<traySlots.length;si++){
    const s=traySlots[si];
    const p=pieces.find(pp=>pp.id===s.id);
    if(!p) continue;
    // onboarding: pulse a soft glow behind the first shard until the first placement
    if(!howtoHidden && si===0){
      const pulse=0.5+0.5*Math.sin(performance.now()/360);
      tx.save();
      tx.shadowColor="rgba(231,192,115,"+(0.35+0.45*pulse)+")";
      tx.shadowBlur=14+10*pulse;
      tx.fillStyle="rgba(231,192,115,0.001)";
      tx.fillRect(s.x-2,s.y-2,s.w+4,s.h+4);
      tx.restore();
    }
    const lit=(!howtoHidden && si===0)?(0.12+0.12*(0.5+0.5*Math.sin(performance.now()/360))):0.0;
    for(const[cx,cy]of p.cells){
      const px=s.x+cx*s.scale, py=s.y+cy*s.scale;
      glassCell(tx,px,py,s.scale,p.colour,lit,"#1a1f30");
    }
  }
}

// floating dragged piece (drawn on board canvas as overlay layer = separate canvas? we draw on board)
let floatPos=null;
function drawFloating(){
  if(dragId==null||!floatPos) return;
  // we draw the floating piece in document space via a fixed overlay
  fx.clearRect(0,0,overlay.width/DPR,overlay.height/DPR);
  const p=pieces.find(pp=>pp.id===dragId);
  const sc=CELL;
  for(const[cx,cy]of p.cells){
    const px=floatPos.x+cx*sc - (dragOff.x), py=floatPos.y+cy*sc - (dragOff.y);
    glassCell(fx,px,py,sc,p.colour,0.7,"#161a28");
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function idx(x,y){return y*GW+x;}

// ============================================================
//  FLOATING OVERLAY (for the dragged piece, document-positioned)
// ============================================================
const overlay=document.createElement('canvas');
overlay.style.cssText="position:fixed;left:0;top:0;pointer-events:none;z-index:40;";
document.body.appendChild(overlay);
const fx=overlay.getContext('2d');
function sizeOverlay(){
  overlay.style.width=window.innerWidth+"px"; overlay.style.height=window.innerHeight+"px";
  overlay.width=Math.round(window.innerWidth*DPR); overlay.height=Math.round(window.innerHeight*DPR);
  fx.setTransform(DPR,0,0,DPR,0,0);
}

// ============================================================
//  INTERACTION
// ============================================================
let dragId=null;          // piece being dragged
let dragOff={x:0,y:0};    // grab offset within piece (px)
let ghost=null;           // {gx,gy,valid}
let pressInfo=null;       // for tap-vs-drag detection
let trayTapCandidate=null;

function evPt(e){
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX, y:t.clientY};
}

function trayHit(localX,localY){
  for(let i=traySlots.length-1;i>=0;i--){
    const s=traySlots[i];
    if(localX>=s.x && localX<=s.x+s.w && localY>=s.y && localY<=s.y+s.h){
      // refine: only if inside an actual cell
      const cx=Math.floor((localX-s.x)/s.scale), cy=Math.floor((localY-s.y)/s.scale);
      const p=pieces.find(pp=>pp.id===s.id);
      if(p && p.cells.some(([a,b])=>a===cx&&b===cy)) return {slot:s,p,cx,cy};
    }
  }
  return null;
}

function boardLocal(pt){
  const r=boardC.getBoundingClientRect();
  return {x:pt.x-r.left, y:pt.y-r.top};
}

function startDrag(p, grabClientX, grabClientY, grabCellX, grabCellY){
  dragId=p.id;
  // dragOff = pixel distance from the piece's top-left cell origin to the grab point,
  // measured at BOARD scale so the piece tracks the finger once it grows to full size.
  dragOff={x: grabCellX*CELL + CELL*0.5, y: grabCellY*CELL + CELL*0.5};
  floatPos={x:grabClientX, y:grabClientY};
  packTray();
  updateGhost(grabClientX,grabClientY);
  draw();
}

function updateGhost(clientX,clientY){
  floatPos={x:clientX,y:clientY};
  const p=pieces.find(pp=>pp.id===dragId);
  // piece origin in client space:
  const originX=clientX-dragOff.x, originY=clientY-dragOff.y;
  const bl=boardLocal({x:originX,y:originY});
  const gx=Math.round((bl.x-OX)/CELL), gy=Math.round((bl.y-OY)/CELL);
  ghost = canPlace(p,gx,gy) ? {gx,gy,valid:true} : {gx,gy,valid:false, off:true};
  // if origin is far outside board, hide ghost
  const[bw,bh]=cellsBBox(p.cells);
  if(gx<-1||gy<-1||gx>GW||gy>GH) ghost=null;
}

function canPlace(p,gx,gy){
  for(const[cx,cy]of p.cells){
    const x=gx+cx, y=gy+cy;
    if(x<0||y<0||x>=GW||y>=GH) return false;
    if(occ[idx(x,y)]>=0) return false;
  }
  return true;
}

function placePiece(p,gx,gy,fromUndo){
  p.placed=true; p.placedAt=[gx,gy]; p.light=0;
  for(const[cx,cy]of p.cells) occ[idx(gx+cx,gy+cy)]=p.id;
  if(!fromUndo) history.push(p.id);
  animateLight(p);
  // is it seated in its true solution position+shape? (for the "perfect/tightness" metric)
  packTray();
  refreshHUD();
  checkSolved();
}

function liftPlaced(p){
  for(const[cx,cy]of p.cells) occ[idx(p.placedAt[0]+cx,p.placedAt[1]+cy)]=-1;
  p.placed=false; p.placedAt=null; p.light=0;
}

// ----- light animation -----
let anims=[];
function animateLight(p){
  anims.push({p,t:0});
}
function tickAnims(dt){
  let live=false;
  for(const a of anims){
    a.t+=dt/220;
    a.p.light=Math.min(1, easeOut(a.t));
    if(a.t<1) live=true;
  }
  anims=anims.filter(a=>a.t<1.05);
  return live;
}
function easeOut(t){t=Math.min(1,t);return 1-Math.pow(1-t,3);}

// ============================================================
//  POINTER EVENTS
// ============================================================
let downPt=null, downTarget=null, moved=false, draggingPlaced=null;

function onDown(e){
  if(solved) return;
  const pt=evPt(e);
  downPt=pt; moved=false; draggingPlaced=null; downTarget=null;

  // 1) tray hit?
  const tr=trayC.getBoundingClientRect();
  if(pt.x>=tr.left&&pt.x<=tr.right&&pt.y>=tr.top&&pt.y<=tr.bottom){
    const th=trayHit(pt.x-tr.left, pt.y-tr.top);
    if(th){ downTarget={type:'tray', th}; e.preventDefault(); return; }
  }
  // 2) placed piece on board?
  const bl=boardLocal(pt);
  const gx=Math.floor((bl.x-OX)/CELL), gy=Math.floor((bl.y-OY)/CELL);
  if(gx>=0&&gy>=0&&gx<GW&&gy<GH){
    const pid=occ[idx(gx,gy)];
    if(pid>=0){ downTarget={type:'placed', pid, gx,gy}; e.preventDefault(); return; }
  }
}

function onMove(e){
  if(downTarget==null && dragId==null) return;
  const pt=evPt(e);
  if(downPt){
    const dist=Math.hypot(pt.x-downPt.x, pt.y-downPt.y);
    if(dist>6) moved=true;
  }
  // begin a drag once movement crosses threshold
  if(dragId==null && moved && downTarget){
    if(downTarget.type==='tray'){
      const {th}=downTarget;
      startDrag(th.p, pt.x, pt.y, th.cx, th.cy);
    }else if(downTarget.type==='placed'){
      const p=pieces.find(pp=>pp.id===downTarget.pid);
      // grab cell relative to piece origin
      const gcx=downTarget.gx-p.placedAt[0], gcy=downTarget.gy-p.placedAt[1];
      liftPlaced(p);
      // remove from history if top
      const hi=history.lastIndexOf(p.id); if(hi>=0) history.splice(hi,1);
      startDrag(p, pt.x, pt.y, gcx, gcy);
      hideHowto();
    }
  }
  if(dragId!=null){
    updateGhost(pt.x,pt.y);
    draw();
    e.preventDefault();
  }
}

function onUp(e){
  const pt=evPt(e);
  // TAP (no movement) → rotate
  if(!moved && downTarget){
    if(downTarget.type==='tray'){ rotatePiece(downTarget.th.p); }
    else if(downTarget.type==='placed'){
      // rotate a placed piece in place if it still fits, else lift+rotate to tray
      const p=pieces.find(pp=>pp.id===downTarget.pid);
      rotatePlacedInPlace(p);
    }
    downTarget=null; downPt=null; return;
  }
  if(dragId!=null){
    const p=pieces.find(pp=>pp.id===dragId);
    let did=false;
    if(ghost && ghost.valid){
      placePiece(p,ghost.gx,ghost.gy,false);
      glassClick();
      hideHowto();
      did=true;
    }else{
      // return to tray (stays unplaced)
      p.placed=false; p.placedAt=null;
    }
    dragId=null; ghost=null; floatPos=null;
    fx.clearRect(0,0,overlay.width/DPR,overlay.height/DPR);
    packTray(); draw();
    if(!did){/* bounced back */}
  }
  downTarget=null; downPt=null;
}

function rotatePiece(p){
  if(p.placed) return;
  p.rot=(p.rot+1)%4;
  p.cells=rotateCells(p.base,p.rot);
  packTray(); draw();
  tick("rot");
}
function rotatePlacedInPlace(p){
  const at=p.placedAt;
  liftPlaced(p);
  const oldRot=p.rot, oldCells=p.cells;
  p.rot=(p.rot+1)%4; p.cells=rotateCells(p.base,p.rot);
  if(canPlace(p,at[0],at[1])){
    placePiece(p,at[0],at[1],true);
    glassClick();
  }else{
    // can't rotate where it sits → just lift it back to tray rotated
    p.rot=oldRot; p.cells=oldCells; p.placed=false; p.placedAt=null;
    const hi=history.lastIndexOf(p.id); if(hi>=0) history.splice(hi,1);
    rotatePiece(p);
    toast("No room to rotate there — sent back to tray");
  }
  packTray(); refreshHUD(); draw();
}

// ============================================================
//  WIN / METRICS
// ============================================================
function checkSolved(){
  if(pieces.some(p=>!p.placed)) return;
  // all placed; if every cell occupied → complete
  for(let i=0;i<occ.length;i++) if(occ[i]<0) return;
  if(solved) return;
  solved=true;
  setTimeout(winSequence, 360);
}

function tightnessPct(){
  // % of placed pieces seated exactly in their true solution slot (shape+pos+rot)
  let exact=0;
  for(const p of pieces){
    if(!p.placed) continue;
    if(matchesSolution(p)) exact++;
  }
  return Math.round(100*exact/pieces.length);
}
function matchesSolution(p){
  // build absolute occupied set
  const set=new Set(p.cells.map(([cx,cy])=>idx(p.placedAt[0]+cx,p.placedAt[1]+cy)));
  if(set.size!==p.solCells.length) return false;
  for(const[x,y]of p.solCells) if(!set.has(idx(x,y))) return false;
  return true;
}

function winSequence(){
  // flood light
  for(const p of pieces){ p.light=0; }
  let i=0;
  const flood=setInterval(()=>{
    if(i<pieces.length){ animateLight(pieces[i]); glassClick(0.5); i++; }
    else clearInterval(flood);
  },70);

  const tightness=tightnessPct();
  // streak: perfect pack = solved (any solving lights the picture). Tightness=100 is the "perfect cut".
  const isPerfect = tightness===100;
  if(lastDay!==DAY_NUM){
    streak = (lastDay===DAY_NUM-1)? streak+1 : 1;
    lastDay=DAY_NUM;
  }
  wallDone[DAY_NUM]=true;
  save.streak=streak; save.lastDay=lastDay; save.wall=wallDone;
  save["tight_"+DAY_NUM]=tightness;
  writeSave(save);

  setTimeout(()=>showWin(tightness,isPerfect),900);
  refreshHUD(); renderWall();
}

function showWin(tightness,perfect){
  document.getElementById('winTtl').textContent = perfect? "Perfect Pack ✦" : "Panel Lit";
  document.getElementById('winRes').innerHTML =
    `Fit <b>${pieces.length}/${pieces.length}</b> shards · tightness <b>${tightness}%</b>`;
  drawWinPanel();
  document.getElementById('winGrid').textContent = emojiGrid(tightness);
  document.getElementById('ov').classList.add('show');
}

// spoiler-safe emoji grid: a coarse mosaic of placed-shard colours (no actual picture)
function emojiGrid(tightness){
  const cols=["🟥","🟧","🟨","🟩","🟦","🟪","⬜"];
  // map each shard colour to nearest emoji bucket by hue order; lay out a 5-wide teaser
  const order=["#e5564e","#ff6b6b","#c0392b","#f2a341","#ffa94d","#d68910","#ffd86b","#ffd43b","#4fb286","#69db7c","#27ae60","#3b86c9","#4dabf7","#2980b9","#7a5cc4","#9775fa","#8e44ad"];
  let line="";
  const sample=pieces.slice(0,10);
  for(let i=0;i<sample.length;i++){
    const h=sample[i].colour;
    let bucket=6;
    const c=h.toLowerCase();
    if(/e55|ff6|c03|d76|f78/.test(c))bucket=0;
    else if(/f2a|ffa|e67|d68/.test(c))bucket=1;
    else if(/ffd|fd4/.test(c))bucket=2;
    else if(/4fb|69d|27a|16a/.test(c))bucket=3;
    else if(/3b8|4da|298/.test(c))bucket=4;
    else if(/7a5|977|8e4/.test(c))bucket=5;
    line+=cols[bucket];
    if((i+1)%5===0)line+="\n";
  }
  return line.trim();
}

function shareText(){
  const tightness=save["tight_"+DAY_NUM]??tightnessPct();
  const grid=emojiGrid(tightness);
  return `Mosaic · Day ${DAY_NUM}\nFit ${pieces.length}/${pieces.length} shards · tightness ${tightness}%\nStreak ${streak}🔥\n${grid}`;
}

// ============================================================
//  HUD / WALL
// ============================================================
function refreshHUD(){
  document.getElementById('dayN').textContent=DAY_NUM;
  document.getElementById('streak').textContent=streak;
  document.getElementById('left').textContent=pieces.filter(p=>!p.placed).length;
  document.getElementById('undo').disabled=history.length===0||solved;
}

const WALL_DAYS=7;
function renderWall(){
  const wall=document.getElementById('wall'); wall.innerHTML="";
  const start=DAY_NUM-DOW; // start of this "week"
  for(let i=0;i<WALL_DAYS;i++){
    const d=start+i;
    const pane=document.createElement('div'); pane.className="pane";
    if(d===DAY_NUM) pane.classList.add("today");
    if(wallDone[d]){
      const c=document.createElement('canvas'); c.width=60; c.height=90;
      pane.appendChild(c);
      paintMiniPanel(c.getContext('2d'),60,90,d);
    }else{
      pane.classList.add("empty");
    }
    wall.appendChild(pane);
  }
}
// a tiny procedural lit window for finished days
function paintMiniPanel(ctx,w,h,dayNum){
  const r=mulberry32(hashStr("mini-"+dayNum));
  const pal=PALETTES[hashStr("mosaic-"+dayNum)%PALETTES.length];
  const cells=4, ch=6;
  for(let y=0;y<ch;y++)for(let x=0;x<cells;x++){
    const col=pal[(r()*pal.length)|0];
    ctx.fillStyle="#10131e"; ctx.fillRect(x*w/cells,y*h/ch,w/cells,h/ch);
    const g=ctx.createLinearGradient(0,y*h/ch,0,(y+1)*h/ch);
    g.addColorStop(0,mixGlow(col,1,18)); g.addColorStop(1,mixGlow(col,0.8,-18));
    ctx.fillStyle=g;
    ctx.fillRect(x*w/cells+1,y*h/ch+1,w/cells-2,h/ch-2);
  }
}
function drawWinPanel(){
  const c=document.getElementById('winPanel'), g=c.getContext('2d');
  const W=180,H=270; g.clearRect(0,0,W,H);
  const cw=W/GW, chh=H/GH;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const pid=occ[idx(x,y)];
    const p=pieces.find(pp=>pp.id===pid);
    const col=p?p.colour:"#222";
    g.fillStyle="#0c0f1a"; g.fillRect(x*cw,y*chh,cw,chh);
    const grad=g.createLinearGradient(0,y*chh,0,(y+1)*chh);
    grad.addColorStop(0,mixGlow(col,1,22)); grad.addColorStop(1,mixGlow(col,0.85,-20));
    g.fillStyle=grad; g.fillRect(x*cw+1,y*chh+1,cw-2,chh-2);
    g.fillStyle="rgba(255,255,255,.12)";
    g.beginPath();g.moveTo(x*cw+1,y*chh+1);g.lineTo(x*cw+cw*0.5,y*chh+1);g.lineTo(x*cw+1,y*chh+chh*0.5);g.closePath();g.fill();
  }
}

// ============================================================
//  HINT  (drops one correct shard into its true slot)
// ============================================================
function useHint(){
  if(solved) return;
  // find an unplaced shard whose solution slot is currently empty
  const cand=pieces.filter(p=>!p.placed && p.solCells.every(([x,y])=>occ[idx(x,y)]<0));
  if(cand.length===0){ toast("Clear some space first"); return; }
  const p=cand[0];
  // set rotation to solution and place at solAnchor
  for(let k=0;k<4;k++){
    const test=rotateCells(p.base,k);
    p.rot=k; p.cells=test;
    if(matchesAtAnchor(p)){ break; }
  }
  placePiece(p,p.solAnchor[0],p.solAnchor[1],false);
  glassClick();
  hideHowto();
  toast("Hint: one shard seated");
}
function matchesAtAnchor(p){
  const set=new Set(p.cells.map(([cx,cy])=>idx(p.solAnchor[0]+cx,p.solAnchor[1]+cy)));
  if(set.size!==p.solCells.length) return false;
  for(const[x,y]of p.solCells) if(!set.has(idx(x,y))) return false;
  return true;
}

// ============================================================
//  UNDO / RESET
// ============================================================
function undo(){
  if(solved||history.length===0) return;
  const pid=history.pop();
  const p=pieces.find(pp=>pp.id===pid);
  liftPlaced(p);
  packTray(); refreshHUD(); draw();
}
function resetBoard(){
  if(solved) return;
  for(const p of pieces){ if(p.placed) liftPlaced(p); }
  history=[];
  packTray(); refreshHUD(); draw();
  hint_used=false;
}

// ============================================================
//  FEEDBACK (sound + toast + howto)
// ============================================================
let actx=null;
function audio(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; }
function glassClick(vol){
  const a=audio(); if(!a) return;
  const t=a.currentTime, v=vol||1;
  const o=a.createOscillator(), g=a.createGain();
  o.type="triangle"; o.frequency.setValueAtTime(880+Math.random()*220,t);
  o.frequency.exponentialRampToValueAtTime(1600,t+0.05);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16*v,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
  o.connect(g).connect(a.destination); o.start(t); o.stop(t+0.2);
}
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600);
}
function tick(k){}
let howtoHidden=false;
function hideHowto(){
  if(howtoHidden) return; howtoHidden=true;
  document.getElementById('howto').innerHTML="Pack every cell — no gaps, no overlaps.";
}

// ============================================================
//  RENDER LOOP
// ============================================================
let last=0, hint_used=false;
function loop(ts){
  const dt=ts-last||16; last=ts;
  const live=tickAnims(dt);
  // keep redrawing while: animating, dragging, or onboarding pulse is active
  if(live||dragId!=null||(!howtoHidden&&!solved)) draw();
  requestAnimationFrame(loop);
}

// ============================================================
//  WIRE UP
// ============================================================
function bind(){
  document.getElementById('undo').onclick=undo;
  document.getElementById('reset').onclick=resetBoard;
  document.getElementById('hint').onclick=useHint;
  document.getElementById('close').onclick=()=>document.getElementById('ov').classList.remove('show');
  document.getElementById('share').onclick=async()=>{
    const txt=shareText();
    try{
      if(navigator.share){ await navigator.share({text:txt}); }
      else { await navigator.clipboard.writeText(txt); toast("Result copied!"); }
    }catch(e){ try{await navigator.clipboard.writeText(txt); toast("Result copied!");}catch(_){toast("Copy failed");} }
  };

  // pointer events on document so drags continue off-canvas
  const opts={passive:false};
  document.addEventListener('pointerdown',onDown,opts);
  document.addEventListener('pointermove',onMove,opts);
  document.addEventListener('pointerup',onUp,opts);
  document.addEventListener('pointercancel',onUp,opts);
  // fallback touch (some old webkit)
  document.addEventListener('touchstart',e=>{if(e.target===boardC||e.target===trayC)e.preventDefault();},opts);

  window.addEventListener('resize',()=>{DPR=Math.min(devicePixelRatio||1,2.5); sizeOverlay(); layout();});
}

// ============================================================
//  RESTORE A FINISHED DAY (already solved earlier today)
// ============================================================
function restoreSolved(){
  // seat every shard in its true solution slot, then mark solved & lit
  for(const p of pieces){
    for(let k=0;k<4;k++){
      p.rot=k; p.cells=rotateCells(p.base,k);
      if(matchesAtAnchor(p)) break;
    }
    p.placed=true; p.placedAt=[p.solAnchor[0],p.solAnchor[1]]; p.light=1;
    for(const[cx,cy]of p.cells) occ[idx(p.solAnchor[0]+cx,p.solAnchor[1]+cy)]=p.id;
  }
  history=[];
  solved=true;
  howtoHidden=true;
  document.getElementById('howto').innerHTML="Today's panel is lit. Come back tomorrow.";
}

// ============================================================
//  BOOT
// ============================================================
function boot(){
  bind();
  sizeOverlay();
  const alreadyDone = !!wallDone[DAY_NUM];
  if(alreadyDone) restoreSolved();
  layout();
  refreshHUD();
  renderWall();
  requestAnimationFrame(loop);
  if(alreadyDone){
    // show the result card again with a button to view it; keep board lit
    const tightness=save["tight_"+DAY_NUM]??100;
    setTimeout(()=>showWin(tightness, tightness===100), 500);
  }else{
    // gentle nudge: pulse the first shard the player should grab
    toast("Day "+DAY_NUM+" · drag the glass in");
  }
}
boot();
