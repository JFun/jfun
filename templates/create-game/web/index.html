<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>__GameName__</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app">
  <header><h1 id="title">__GameName__</h1><div id="hud"></div></header>
  <div id="board"></div>
  <div id="winCard" class="card hidden">
    <h2 id="winTitle">Solved!</h2>
    <p id="winLine"></p>
    <p id="winStreak" class="streak"></p>
    <div class="btns">
      <button id="btnShare" class="primary">Share</button>
      <button id="btnReplay" class="ghost">Replay (dev)</button>
    </div>
  </div>
</main>

<!-- @jfun packages, vendored as browser globals (no-build). new-game.mjs copies
     these from packages/*/src into js/vendor/. -->
<script src="js/vendor/web-game-core.js"></script>
<script src="js/vendor/analytics.js"></script>
<script src="js/vendor/audio.js"></script>
<script src="js/vendor/growth-loop.js"></script>
<!-- the game -->
<script src="js/engine.js"></script>
<script src="js/game.js"></script>
</body>
</html>
